<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・ローマ字マスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fff3e0;
      text-align: center;
      padding: 20px;
      transition: 0.3s;
    }
    h1 { color: #e65100; margin-bottom: 5px; }
    #level-display { font-size: 20px; font-weight: bold; color: #bf360c; margin-bottom: 5px; }
    #status { font-size: 16px; color: #666; margin-bottom: 15px; }

    #pokemon-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      min-width: 280px;
    }
    #pokemon-img { width: 180px; height: 180px; }
    #jp-name { font-size: 28px; font-weight: bold; color: #333; margin-top: 10px; }
    #ruby-name { font-size: 16px; color: #ff9800; font-weight: bold; }

    /* 入力エリア */
    #answer-area { margin: 15px auto; max-width: 500px; }
    #user-input {
      font-size: 24px; padding: 12px; width: 80%; border-radius: 8px;
      border: 2px solid #ffb74d; outline: none; text-align: center;
      text-transform: lowercase;
    }
    #submit-btn {
      margin-top: 15px; padding: 12px 40px; font-size: 20px;
      background-color: #ef6c00; color: white; border: none;
      border-radius: 10px; cursor: pointer; font-weight: bold;
    }

    #result { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 30px; white-space: pre-line; }
    
    #next-button {
      margin-top: 20px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none;
    }

    .correct-flash { background-color: #fff9c4 !important; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.0.0 | Updated: 2026-05-11 07:40</div>
  
  <h1>⌨️ ローマ字マスター</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">よみこみちゅう...</div>

  <div id="pokemon-card">
    <img id="pokemon-img" src="" alt="pokemon">
    <div id="ruby-name">よみかた</div>
    <div id="jp-name">？？？</div>
  </div>
  
  <div id="answer-area">
    <input type="text" id="user-input" placeholder="ローマ字を入力" autocomplete="off" spellcheck="false">
    <br>
    <button id="submit-btn" onclick="checkAnswer()">けってい！</button>
  </div>

  <div id="result"></div>
  
  <button id="next-button" onclick="generateQuiz()">つぎのもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script src="https://cdn.jsdelivr.net/npm/wanakana@4.0.2/wanakana.min.js"></script>
  <script>
    let correctJpName = "";
    let correctStreak = 0;
    let currentLevel = 1;

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) {
          this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2);
        } else {
          this._note(200, 'sawtooth', now, 0.2); this._note(150, 'sawtooth', now + 0.2, 0.3);
        }
      }
    };

    async function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("user-input").value = "";
      document.getElementById("user-input").style.display = "inline-block";
      document.getElementById("submit-btn").style.display = "inline-block";
      document.getElementById("next-button").style.display = "none";
      
      if (correctStreak < 5) {
        currentLevel = correctStreak + 1;
      } else {
        currentLevel = Math.floor(Math.random() * 5) + 1;
      }
      document.getElementById("level-display").textContent = `レベル ${currentLevel}`;
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      // 出題範囲の設定
      let id;
      if (currentLevel === 1) {
        // 短くて有名なポケモン
        const easyIds = [1, 4, 7, 25, 35, 39, 132, 133, 151];
        id = easyIds[Math.floor(Math.random() * easyIds.length)];
      } else if (currentLevel === 2) {
        id = Math.floor(Math.random() * 151) + 1;
      } else {
        id = Math.floor(Math.random() * 900) + 1;
      }

      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
        const data = await res.json();
        correctJpName = data.names.find(n => n.language.name === "ja").name;

        const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const pokeData = await pokeRes.json();

        document.getElementById("pokemon-img").src = pokeData.sprites.other['official-artwork'].front_default;
        document.getElementById("jp-name").textContent = correctJpName;
        
        // カタカナをひらがなに変換してルビ表示
        const hiraName = correctJpName.replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60));
        document.getElementById("ruby-name").textContent = hiraName;

      } catch (e) {
        generateQuiz();
      }
    }

    function checkAnswer() {
      const userInput = document.getElementById("user-input").value.trim().toLowerCase();
      if (!userInput) return;

      const resultArea = document.getElementById("result");
      const hiraName = document.getElementById("ruby-name").textContent;
      
      // wanakanaでローマ字候補を作成
      const expectedRomaji = wanakana.toRomaji(hiraName).toLowerCase();
      
      // 判定用のクレンジング（ポケモン特有の長音「ー」などは入力させない前提、または無視）
      const normalizedInput = userInput.replace(/[^a-z]/g, "");
      const normalizedExpected = expectedRomaji.replace(/[^a-z]/g, "");

      document.getElementById("user-input").style.display = "none";
      document.getElementById("submit-btn").style.display = "none";

      if (normalizedInput === normalizedExpected) {
        correctStreak++;
        Buzzer.play(true);
        resultArea.style.color = "#2e7d32";
        resultArea.textContent = `✨ せいかい！\n「${expectedRomaji.toUpperCase()}」`;
        document.body.classList.add("correct-flash");
        setTimeout(() => document.body.classList.remove("correct-flash"), 1000);
      } else {
        correctStreak = 0;
        Buzzer.play(false);
        resultArea.style.color = "#d32f2f";
        resultArea.textContent = `❌ ざんねん！\nせいかいは 「${expectedRomaji.toUpperCase()}」 だよ。`;
      }

      document.getElementById("next-button").style.display = "inline-block";
    }

    document.getElementById("user-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") checkAnswer();
    });

    window.onload = generateQuiz;
  </script>
</body>
</html>
