<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・ローマ字マスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fff3e0;
      text-align: center;
      padding: 20px;
      transition: 0.3s;
    }
    h1 { color: #e65100; margin-bottom: 5px; }
    #level-display { font-size: 20px; font-weight: bold; color: #bf360c; margin-bottom: 5px; }
    #status { font-size: 16px; color: #666; margin-bottom: 15px; }

    #pokemon-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      min-width: 280px;
    }
    #pokemon-img { width: 180px; height: 180px; min-height: 180px; }
    #jp-name { font-size: 28px; font-weight: bold; color: #333; margin-top: 10px; }
    #ruby-name { font-size: 16px; color: #ff9800; font-weight: bold; }

    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 500px;
      margin: 0 auto;
    }
    .choice-btn {
      padding: 15px 10px;
      font-size: 18px;
      font-weight: bold;
      background-color: white;
      border: 2px solid #ffb74d;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .choice-btn:hover { background-color: #fff8e1; border-color: #e65100; }
    .choice-btn:active { transform: scale(0.95); }
    .choice-btn:disabled { cursor: default; opacity: 0.8; }

    #result { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 30px; white-space: pre-line; }
    
    #next-button {
      margin-top: 20px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none;
    }

    .correct-flash { background-color: #fff9c4 !important; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.1.2 | Updated: 2026-05-12 12:30</div>
  
  <h1>⌨️ ローマ字マスター</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">よみこみちゅう...</div>

  <div id="pokemon-card">
    <img id="pokemon-img" src="" alt="pokemon">
    <div id="ruby-name">よみかた</div>
    <div id="jp-name">？？？</div>
  </div>
  
  <div class="choices-container" id="choices"></div>
  <div id="result"></div>
  
  <button id="next-button" onclick="generateQuiz()">つぎのもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script src="https://cdn.jsdelivr.net/npm/wanakana@4.0.2/wanakana.min.js"></script>

  <script>
    let correctRomaji = "";
    let correctStreak = 0;
    let currentLevel = 1;

    // ダミー選択肢用のローマ字リスト（APIを叩かずに済むように用意）
    const dummyRomajiList = [
      "PIKACHU", "FUSHIGIDANE", "HITOKAGE", "ZENIGAME", "NYARTH", "KODUCK", "GANGAR", "EIEVUI", "KABIGON", "MEWTWO",
      "CHIKORITA", "HINOARASHI", "WANINOKO", "MARILL", "LUGIA", "HO-OH", "KIMORI", "ACHAMO", "MIZUGOROU", "RAYQUAZA",
      "NAETLE", "HIKOZARU", "POCHAMA", "LUCARIO", "DIALGA", "PALKIA", "TSUTARA", "POKABU", "MIJUMARU", "ZOROARK",
      "CHESPIN", "FOKKO", "KEROMATSU", "SYLVEON", "XERNEAS", "YVELTAL", "MOKUROH", "NYABBY", "ASHIMARI", "MIMIKYU"
    ];

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) {
          this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2);
        } else {
          this._note(200, 'sawtooth', now, 0.2); this._note(150, 'sawtooth', now + 0.2, 0.3);
        }
      }
    };

    async function generateQuiz() {
      if (typeof wanakana === 'undefined') {
        setTimeout(generateQuiz, 100);
        return;
      }

      document.getElementById("result").textContent = "";
      document.getElementById("choices").innerHTML = "よみこみちゅう...";
      document.getElementById("next-button").style.display = "none";
      
      if (correctStreak < 5) {
        currentLevel = correctStreak + 1;
      } else {
        currentLevel = Math.floor(Math.random() * 5) + 1;
      }
      document.getElementById("level-display").textContent = `レベル ${currentLevel}`;
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      let maxId = currentLevel <= 2 ? 151 : 900;
      const targetId = Math.floor(Math.random() * maxId) + 1;

      try {
        // 正解のポケモン1匹分だけAPIを取得
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${targetId}`);
        const data = await res.json();
        const jpName = data.names.find(n => n.language.name === "ja").name;
        const hiraName = jpName.replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60));
        
        // ローマ字変換
        correctRomaji = wanakana.toRomaji(hiraName).toUpperCase().replace(/[^A-Z]/g, "");

        const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${targetId}`);
        const pokeData = await pokeRes.json();

        document.getElementById("pokemon-img").src = pokeData.sprites.other['official-artwork'].front_default;
        document.getElementById("jp-name").textContent = jpName;
        document.getElementById("ruby-name").textContent = hiraName;

        // 選択肢の作成（ダミーは用意したリストから選ぶので爆速！）
        let options = [correctRomaji];
        let shuffledDummies = dummyRomajiList.sort(() => Math.random() - 0.5);
        
        for (let dummy of shuffledDummies) {
          if (options.length >= 4) break;
          if (dummy !== correctRomaji) {
            options.push(dummy);
          }
        }

        options.sort(() => Math.random() - 0.5);

        const choicesDiv = document.getElementById("choices");
        choicesDiv.innerHTML = "";
        options.forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.textContent = opt;
          btn.onclick = () => checkAnswer(opt);
          choicesDiv.appendChild(btn);
        });

      } catch (e) {
        console.error(e);
        setTimeout(generateQuiz, 500);
      }
    }

    function checkAnswer(selected) {
      const resultArea = document.getElementById("result");
      const btns = document.querySelectorAll(".choice-btn");
      btns.forEach(b => b.disabled = true);

      if (selected === correctRomaji) {
        correctStreak++;
        Buzzer.play(true);
        resultArea.style.color = "#2e7d32";
        resultArea.textContent = `✨ せいかい！\n「${correctRomaji}」`;
        document.body.classList.add("correct-flash");
        setTimeout(() => document.body.classList.remove("correct-flash"), 1000);
      } else {
        correctStreak = 0;
        Buzzer.play(false);
        resultArea.style.color = "#d32f2f";
        resultArea.textContent = `❌ ざんねん！\nせいかいは 「${correctRomaji}」 だよ。`;
      }

      document.getElementById("next-button").style.display = "inline-block";
    }

    window.onload = function() {
      generateQuiz();
    };
  </script>
</body>
</html>
