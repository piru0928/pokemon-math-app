<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・ローマ字マスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fff3e0;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #e65100; margin-bottom: 5px; }
    #level-display { font-size: 20px; font-weight: bold; color: #bf360c; margin-bottom: 5px; }
    #status { font-size: 16px; color: #666; margin-bottom: 15px; }

    #pokemon-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      min-width: 280px;
    }
    #pokemon-img { width: 180px; height: 180px; min-height: 180px; background: #f9f9f9; border-radius: 10px; }
    #jp-name { font-size: 28px; font-weight: bold; color: #333; margin-top: 10px; }
    #ruby-name { font-size: 16px; color: #ff9800; font-weight: bold; }

    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 500px;
      margin: 0 auto;
      min-height: 150px;
    }
    .choice-btn {
      padding: 15px 10px;
      font-size: 18px;
      font-weight: bold;
      background-color: white;
      border: 2px solid #ffb74d;
      border-radius: 12px;
      cursor: pointer;
    }
    .choice-btn:disabled { opacity: 0.5; cursor: default; }

    #result { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 30px; }
    #next-button {
      margin-top: 20px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none;
    }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.1.3 | Updated: 2026-05-12 12:40</div>
  <h1>⌨️ ローマ字マスター</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">よみこみちゅう...</div>

  <div id="pokemon-card">
    <img id="pokemon-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="pokemon">
    <div id="ruby-name">よみかた</div>
    <div id="jp-name">？？？</div>
  </div>
  
  <div class="choices-container" id="choices"></div>
  <div id="result"></div>
  <button id="next-button" onclick="generateQuiz()">つぎのもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script src="https://cdn.jsdelivr.net/npm/wanakana@4.0.2/wanakana.min.js"></script>
  <script>
    let correctRomaji = "";
    let correctStreak = 0;

    const dummyRomajiList = ["PIKACHU", "LUCARIO", "EIEVUI", "KABIGON", "GANGAR", "MEWTWO", "LUGIA", "RAYQUAZA", "MIMIKYU", "SYLVEON"];

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(correct ? 880 : 200, now);
        gain.gain.setValueAtTime(0.05, now);
        osc.start(now); osc.stop(now + 0.2);
      }
    };

    async function generateQuiz() {
      if (typeof wanakana === 'undefined') { setTimeout(generateQuiz, 200); return; }

      document.getElementById("result").textContent = "";
      document.getElementById("choices").innerHTML = "通信中...";
      document.getElementById("next-button").style.display = "none";
      
      const level = correctStreak < 5 ? correctStreak + 1 : Math.floor(Math.random() * 5) + 1;
      document.getElementById("level-display").textContent = `レベル ${level}`;
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      const targetId = Math.floor(Math.random() * (level <= 2 ? 151 : 900)) + 1;

      try {
        // fetchにタイムアウトを設定
        const res = await Promise.race([
          fetch(`https://pokeapi.co/api/v2/pokemon-species/${targetId}/`),
          new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
        ]);
        const data = await res.json();
        const jpName = data.names.find(n => n.language.name === "ja").name;
        const hiraName = jpName.replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60));
        correctRomaji = wanakana.toRomaji(hiraName).toUpperCase().replace(/[^A-Z]/g, "");

        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${targetId}.png`;
        document.getElementById("jp-name").textContent = jpName;
        document.getElementById("ruby-name").textContent = hiraName;

        let options = [correctRomaji];
        let dummys = [...dummyRomajiList].sort(() => Math.random() - 0.5);
        for(let d of dummys) {
          if(options.length < 4 && d !== correctRomaji) options.push(d);
        }
        options.sort(() => Math.random() - 0.5);

        const choicesDiv = document.getElementById("choices");
        choicesDiv.innerHTML = "";
        options.forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.textContent = opt;
          btn.onclick = () => {
            document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
            if(opt === correctRomaji) {
              correctStreak++;
              Buzzer.play(true);
              document.getElementById("result").textContent = "✨ せいかい！";
              document.body.style.backgroundColor = "#fff9c4";
              setTimeout(() => document.body.style.backgroundColor = "#fff3e0", 500);
            } else {
              correctStreak = 0;
              Buzzer.play(false);
              document.getElementById("result").textContent = `❌ ざんねん！ 正解は ${correctRomaji}`;
            }
            document.getElementById("next-button").style.display = "inline-block";
          };
          choicesDiv.appendChild(btn);
        });

      } catch (e) {
        console.error("Error:", e);
        // エラーが出たらすぐに別のIDで再試行
        generateQuiz();
      }
    }

    window.onload = generateQuiz;
  </script>
</body>
</html>
