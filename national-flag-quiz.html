<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>こっきクイズ</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: "Arial", sans-serif;
      background-color: #e3f2fd;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #1976d2; }
    #flag-display { font-size: 80px; margin: 10px; }
    #question { font-size: 24px; margin: 10px; font-weight: bold; }
    #hint-box {
      background: #fff;
      border: 2px dashed #bbdefb;
      padding: 10px;
      margin: 10px auto;
      max-width: 400px;
      border-radius: 10px;
      color: #555;
    }
    .choice {
      font-size: 18px;
      padding: 12px 20px;
      margin: 8px;
      border-radius: 8px;
      border: 2px solid #64b5f6;
      cursor: pointer;
      background-color: #e3f2fd;
      width: 250px;
    }
    .choice:hover { background-color: #bbdefb; }
    #result {
      font-size: 20px;
      margin-top: 15px;
      color: #388e3c;
      white-space: pre-line;
      font-weight: bold;
    }
    #pokemon-info {
      font-size: 22px;
      font-weight: bold;
      color: #e91e63;
      margin-top: 10px;
    }
    #pokemon-img {
      margin-top: 10px;
      width: 120px;
      height: 120px;
      background: #fff;
      border-radius: 50%;
      border: 4px solid #ffeb3b;
    }
    #next-button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }
    #next-button:hover { background-color: #45a049; }
    #status {
      margin: 10px;
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>🚩 せかいの くにのなまえ</h1>
  <div id="status">ただいま 0もんせいかい！ あと 5もんで クリア！</div>
  
  <div id="flag-display"></div>
  <div id="question">この くには どこかな？</div>
  
  <div id="hint-box">
    💡 ヒント：<span id="hint-text"></span>
  </div>

  <div id="choices"></div>
  
  <div id="result"></div>
  <img id="pokemon-img" src="" alt="" style="display:none;">
  <div id="pokemon-info"></div>
  
  <button id="next-button" onclick="newQuestion()">つぎのもんだい</button>
  <br><br>
  <button onclick="markCleared()" style="display:none;" id="clear-button">🌸 クリア！トップに もどる</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script>
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbz5p2qedT5CAxNXmd5NGUjNh0oivxDW1PcaDCf-AM2aVwHyfQf-VPJktVPDOqRek9A-/exec";
    
    // クイズデータ（国名、国旗、首都、ヒント、関連ポケモンの図鑑番号）
    const quizData = [
      { name: "にほん", flag: "🇯🇵", capital: "とうきょう", hint: "たいようが のぼる くに！", pokeId: 338 }, // ソルロック
      { name: "アメリカ", flag: "🇺🇸", capital: "ワシントンD.C.", hint: "じゆうの めがみが あるよ！", pokeId: 628 }, // ウォーグル
      { name: "フランス", flag: "🇫🇷", capital: "パリ", hint: "エッフェルとうが ゆうめい！", pokeId: 907 }, // カヌチャン(ハンマー繋がり) ※151なら83(カモネギ)など
      { name: "イギリス", flag: "🇬🇧", capital: "ロンドン", hint: "大きな とけいだい「ビッグベン」！", pokeId: 823 }, // アーマーガア(英国風)
      { name: "イタリア", flag: "🇮🇹", capital: "ローマ", hint: "ピザや パスタが だいすき！", pokeId: 143 }, // カビゴン
      { name: "ブラジル", flag: "🇧🇷", capital: "ブラジリア", hint: "サッカーと ジャングル！", pokeId: 811 }, // ゴリランダー
      { name: "エジプト", flag: "🇪🇬", capital: "カイロ", hint: "ピラミッドと スフィンクス！", pokeId: 563 }, // デスカーン
      { name: "オーストラリア", flag: "🇦🇺", capital: "キャンベラ", hint: "コアラや カンガルーがいるよ！", pokeId: 115 } // ガルーラ
    ];

    let currentQuestion;
    let correctStreak = 0;
    const GOAL = 5; // 5問正解でクリア

    async function fetchPokemonName(number) {
      try {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${number}`);
        const data = await response.json();
        return data.names.find(n => n.language.name === "ja")?.name || "ポケモン";
      } catch {
        return "ポケモン";
      }
    }

    function updateStatus() {
      const remaining = GOAL - correctStreak;
      document.getElementById("status").textContent = `ただいま ${correctStreak}もんせいかい！ あと ${remaining > 0 ? remaining : 0}もんで クリア！`;
    }

    function newQuestion() {
      // ランダムに問題を選択
      currentQuestion = quizData[Math.floor(Math.random() * quizData.length)];

      document.getElementById("flag-display").textContent = currentQuestion.flag;
      document.getElementById("hint-text").textContent = currentQuestion.hint;
      document.getElementById("result").textContent = "";
      document.getElementById("pokemon-info").textContent = "";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("clear-button").style.display = "none";
      updateStatus();

      // 選択肢の作成
      const choices = new Set([currentQuestion.name]);
      while (choices.size < 3) {
        const randomCountry = quizData[Math.floor(Math.random() * quizData.length)].name;
        choices.add(randomCountry);
      }

      const choiceArray = Array.from(choices).sort(() => Math.random() - 0.5);
      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      
      choiceArray.forEach(value => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = value;
        btn.onclick = () => checkAnswer(value);
        choicesDiv.appendChild(btn);
      });
    }

    async function checkAnswer(selected) {
      document.getElementById("choices").innerHTML = "";

      if (selected === currentQuestion.name) {
        correctStreak++;
        const pokeName = await fetchPokemonName(currentQuestion.pokeId);
        const imgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${currentQuestion.pokeId}.png`;

        document.getElementById("result").textContent = `せいかい！\nしゅとは 「${currentQuestion.capital}」 だよ！`;
        document.getElementById("pokemon-img").src = imgUrl;
        document.getElementById("pokemon-img").style.display = "inline";
        document.getElementById("pokemon-info").textContent = `${pokeName} も おうえんしてるよ！`;

        updateStatus();

        if (correctStreak >= GOAL) {
          document.getElementById("result").textContent += "\n🎉 ぜんもん せいかい！ めざせ せかいのはかせ！";
          document.getElementById("clear-button").style.display = "inline";
        } else {
          document.getElementById("next-button").style.display = "inline";
        }
      } else {
        correctStreak = 0;
        document.getElementById("result").textContent = `ざんねん！\nこれは 「${currentQuestion.name}」 だよ。\n（しゅと：${currentQuestion.capital}）`;
        document.getElementById("next-button").style.display = "inline";
        updateStatus();
      }
    }

    function markCleared() {
      localStorage.setItem("cleared-country-quiz", "true");

      fetch(WEBHOOK_URL, {
        method: "POST",
        body: JSON.stringify({
          name: "なぎ",
          stage: "しゃかい：くにのなまえクイズ",
          score: GOAL,
          date: new Date().toLocaleString()
        })
      });

      alert("クリアじょうほう を ほぞんしたよ！");
      window.location.href = "index.html";
    }

    window.onload = newQuestion;
  </script>
</body>
</html>
