<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>こっきクイズ</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: "Arial", sans-serif;
      background-color: #e3f2fd;
      text-align: center;
      padding: 20px;
      transition: background-color 0.3s;
    }
    h1 { color: #1976d2; margin-bottom: 5px; }
    #flag-display { font-size: 100px; margin: 10px; line-height: 1; }
    #question { font-size: 22px; margin: 5px; font-weight: bold; }
    #hint-box {
      background: #fff; border: 2px dashed #bbdefb; padding: 10px;
      margin: 10px auto; max-width: 500px; border-radius: 10px; color: #555; font-size: 14px;
    }
    #answer-area { margin: 20px auto; max-width: 500px; display: flex; justify-content: center; gap: 10px; }
    #user-input {
      font-size: 20px; padding: 12px; width: 60%; border-radius: 8px; border: 2px solid #64b5f6; outline: none;
    }
    #submit-btn, #mic-btn {
      padding: 10px 20px; font-size: 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold;
    }
    #submit-btn { background-color: #1976d2; color: white; }
    #mic-btn { background-color: #f44336; color: white; font-size: 22px; }
    #mic-btn.listening { background-color: #ffeb3b; color: #333; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    #result { font-size: 20px; margin-top: 10px; color: #388e3c; font-weight: bold; white-space: pre-line; }
    #pokemon-reason { font-size: 14px; color: #666; margin-top: 5px; }
    #pokemon-img { margin-top: 10px; width: 120px; height: 120px; background: #fff; border-radius: 50%; border: 4px solid #ffeb3b; }
    @keyframes seikai-bg-flash {
      0%, 40%, 80% { background-color: #a5d6a7; }
      20%, 60%, 100% { background-color: #e3f2fd; }
    }
    .correct-flash { animation: seikai-bg-flash 1.2s ease-in-out; }
    .poke-pop { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
    @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); } }
    #next-button {
      margin-top: 15px; padding: 12px 30px; font-size: 18px;
      background-color: #4caf50; color: white; border: none; border-radius: 30px; cursor: pointer; display: none; box-shadow: 0 4px #2e7d32;
    }
    #status { margin: 10px; font-size: 16px; color: #555; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; background: rgba(255, 255, 255, 0.5); padding: 2px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.6.0 | Updated: 2026-05-10 17:30</div>
  
  <h1>🚩 こっきクイズ</h1>
  <div id="status">ただいま 0もん れんぞくせいかい！</div>
  <div id="flag-display"></div>
  <div id="question">この くには どこかな？</div>
  <div id="hint-box">💡 ヒント：<span id="hint-text"></span></div>
  
  <div id="answer-area">
    <input type="text" id="user-input" placeholder="くにのなまえを入力" autocomplete="off">
    <button id="submit-btn" onclick="processAnswer()">決定</button>
    <button id="mic-btn" onclick="startVoiceRecognition()">🎤</button>
  </div>
  
  <div id="result"></div>
  <div id="pokemon-reason"></div>
  <img id="pokemon-img" src="" alt="" style="display:none;">
  <div id="pokemon-info" style="font-size: 18px; font-weight: bold; color: #e91e63;"></div>
  
  <button id="next-button" onclick="newQuestion()">つぎのもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへもどる</a>

  <script>
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbz5p2qedT5CAxNXmd5NGUjNh0oivxDW1PcaDCf-AM2aVwHyfQf-VPJktVPDOqRek9A-/exec";
    
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration, endFreq) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, start + duration);
        gain.gain.setValueAtTime(0.1, start); gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(pattern) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (pattern === 'correct') {
          this._note(880, 'sine', now, 0.1, 1320); this._note(880, 'sine', now + 0.2, 0.1, 1320);
        } else {
          this._note(200, 'sawtooth', now, 0.3, 100); this._note(200, 'sawtooth', now + 0.4, 0.3, 100);
        }
      }
    };

    // クイズデータ（yomiにひらがな正解を入れ、acceptに別名を入れる）
    const quizData = [
      { name: "にほん", yomi: "にほん", accept: ["にっぽん", "日本"], flag: "🇯🇵", capital: "とうきょう", hint: "たいようが のぼる くに！", pokeId: 338, reason: "たいようの かたちをした ポケモンだから！" },
      { name: "アメリカ", yomi: "あめりか", flag: "🇺🇸", capital: "ワシントンD.C.", hint: "じゆうの めがみが あるよ！", pokeId: 628, reason: "アメリカの シンボル、ハクトウワシに にているから！" },
      { name: "北朝鮮（きたちょうせん）", yomi: "きたちょうせん", flag: "🇰🇵", capital: "ピョンヤン", hint: "大きな マスゲームが ゆうめい！", pokeId: 306, reason: "よろいのような かたい 体を もっているから！" },
      { name: "中国（ちゅうごく）", yomi: "ちゅうごく", flag: "🇨🇳", capital: "ペキン", hint: "パンダと 万里の長城！", pokeId: 675, reason: "パンダそっくりの ポケモン！" },
      // ... 以前のリストも同様に「yomi」プロパティを意識して追加してください
    ];

    let currentQuestion;
    let correctStreak = 0;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
      recognition.lang = 'ja-JP';
      recognition.onresult = (event) => {
        document.getElementById("user-input").value = event.results[0][0].transcript;
        document.getElementById("mic-btn").classList.remove("listening");
        processAnswer();
      };
      recognition.onend = () => document.getElementById("mic-btn").classList.remove("listening");
    }

    function startVoiceRecognition() {
      if (!recognition) { alert("このブラウザは音声入力に対応していません。"); return; }
      Buzzer.ctx.resume();
      document.getElementById("mic-btn").classList.add("listening");
      recognition.start();
    }

    async function fetchPokemonName(number) {
      try {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${number}`);
        const data = await response.json();
        return data.names.find(n => n.language.name === "ja")?.name || "ポケモン";
      } catch { return "ポケモン"; }
    }

    function newQuestion() {
      currentQuestion = quizData[Math.floor(Math.random() * quizData.length)];
      document.getElementById("flag-display").textContent = currentQuestion.flag;
      document.getElementById("hint-text").textContent = currentQuestion.hint;
      document.getElementById("result").textContent = "";
      document.getElementById("pokemon-reason").textContent = "";
      document.getElementById("pokemon-info").textContent = "";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("answer-area").style.display = "flex";
      document.getElementById("user-input").value = "";
      document.getElementById("user-input").focus();
      updateStatus();
    }

    function normalize(str) {
      if (!str) return "";
      return str.replace(/[ァ-ン]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0x60)) // カタカナをひらがなへ
                .replace(/（[^）]*）/g, "") // 括弧内を削除
                .replace(/[\s　、。！!？?]/g, "") // 記号と空白を削除
                .toLowerCase();
    }

    async function processAnswer() {
      const userInput = document.getElementById("user-input").value.trim();
      if (!userInput) return;

      const userNorm = normalize(userInput);
      
      // 正解パターンの作成（表示名、読み、acceptリストすべてをチェック対象にする）
      const correctPatterns = [
        currentQuestion.name,
        currentQuestion.yomi,
        ...(currentQuestion.accept || [])
      ].map(p => normalize(p));

      const isCorrect = correctPatterns.some(p => userNorm === p || userNorm.includes(p) || p.includes(userNorm));

      document.getElementById("answer-area").style.display = "none";

      if (isCorrect) {
        correctStreak++;
        Buzzer.play('correct');
        document.body.classList.add("correct-flash");
        setTimeout(() => document.body.classList.remove("correct-flash"), 1200);

        const pokeName = await fetchPokemonName(currentQuestion.pokeId);
        document.getElementById("result").innerHTML = `せいかい！ こたえは 「${currentQuestion.name}」<br>しゅとは 「${currentQuestion.capital}」 だよ！`;
        document.getElementById("pokemon-reason").textContent = `なぜこのポケモン？：${currentQuestion.reason}`;
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${currentQuestion.pokeId}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
        document.getElementById("pokemon-img").classList.add("poke-pop");
        document.getElementById("pokemon-info").textContent = `${pokeName} を ゲット！`;
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        document.getElementById("result").innerHTML = `ざんねん！ こたえは 「${currentQuestion.name}」 だよ。<br>（しゅと：${currentQuestion.capital}）`;
      }
      
      updateStatus();
      document.getElementById("next-button").style.display = "inline";
    }

    function updateStatus() {
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
    }

    document.getElementById("user-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") processAnswer();
    });

    window.onload = newQuestion;
  </script>
</body>
</html>
