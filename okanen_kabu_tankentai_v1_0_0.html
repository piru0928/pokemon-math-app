<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFF8E7">
<title>おかね・かぶ探検隊</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --cream:#FFF8E7;
  --paper:#FFFFFF;
  --navy:#17466E;
  --blue:#3B82F6;
  --blue-soft:#EAF4FF;
  --gold:#FFD54A;
  --gold-dark:#D6A700;
  --green:#39A96B;
  --green-dark:#237A4A;
  --red:#EF5350;
  --orange:#FF9F43;
  --purple:#7C5CE5;
  --gray:#667085;
  --line:#DCE5EC;
  --shadow:0 5px 0 rgba(23,70,110,.14);
}
html, body {
  margin:0;
  min-height:100%;
  background:var(--cream);
  font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic",sans-serif;
  color:#243443;
}
body {
  display:flex;
  justify-content:center;
  touch-action:manipulation;
}
button, input, select { font:inherit; }
button { cursor:pointer; }
#app {
  width:100%;
  max-width:520px;
  min-height:100dvh;
  padding:10px;
}
.screen {
  display:none;
  flex-direction:column;
  gap:10px;
  width:100%;
  min-height:calc(100dvh - 20px);
}
.screen.active { display:flex; }
.topbar {
  display:grid;
  grid-template-columns:76px 1fr 76px;
  align-items:center;
  min-height:46px;
  gap:6px;
}
.top-title {
  font-size:18px;
  font-weight:900;
  color:var(--navy);
  text-align:center;
  line-height:1.2;
}
.icon-btn, .back-btn {
  border:0;
  border-radius:18px;
  min-height:38px;
  padding:7px 10px;
  font-weight:900;
  color:white;
  box-shadow:0 4px 0 rgba(0,0,0,.16);
}
.back-btn { background:#78909C; }
.icon-btn { background:var(--purple); }
.icon-btn:active, .back-btn:active, .big-btn:active, .mini-btn:active, .choice-btn:active {
  transform:translateY(3px);
  box-shadow:none;
}
.hero {
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,#E9F8FF,#FFF8D7);
  border:3px solid #9BD6F6;
  border-radius:22px;
  padding:14px 14px 12px;
  min-height:145px;
  box-shadow:var(--shadow);
}
.hero h1 {
  margin:0;
  color:var(--navy);
  font-size:26px;
  font-weight:1000;
  letter-spacing:1px;
  padding-right:95px;
}
.hero p {
  margin:7px 90px 0 0;
  font-size:13px;
  line-height:1.7;
  color:#4B6274;
  font-weight:700;
}
.pokemon-wrap {
  position:absolute;
  right:6px;
  bottom:4px;
  width:98px;
  height:98px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.pokemon-img {
  width:92px;
  height:92px;
  object-fit:contain;
  image-rendering:auto;
  filter:drop-shadow(0 5px 5px rgba(0,0,0,.18));
  animation:pokemonMove 2.2s ease-in-out infinite;
}
@keyframes pokemonMove {
  0%,100% { transform:translateY(0) rotate(-2deg) scale(1); }
  35% { transform:translateY(-9px) rotate(2deg) scale(1.04); }
  70% { transform:translateY(-3px) rotate(-1deg) scale(.98); }
}
.menu-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.menu-card {
  border:3px solid var(--gold);
  background:white;
  border-radius:18px;
  min-height:132px;
  padding:12px 9px;
  box-shadow:var(--shadow);
  text-align:center;
  color:var(--navy);
  font-weight:900;
}
.menu-card .emoji { font-size:36px; display:block; margin-bottom:4px; }
.menu-card .menu-title { font-size:16px; line-height:1.35; }
.menu-card .menu-desc { font-size:10px; color:#6B7785; margin-top:5px; line-height:1.45; }
.panel {
  width:100%;
  background:white;
  border:3px solid var(--line);
  border-radius:18px;
  padding:12px;
  box-shadow:0 4px 0 rgba(23,70,110,.08);
}
.panel-title {
  margin:0 0 8px;
  font-size:17px;
  color:var(--navy);
  font-weight:1000;
}
.small-note {
  font-size:11px;
  line-height:1.55;
  color:var(--gray);
}
.warning {
  background:#FFF4D6;
  border:2px solid #F2C94C;
  border-radius:12px;
  padding:9px 10px;
  font-size:11px;
  line-height:1.55;
  color:#6B5300;
  font-weight:700;
}
.big-btn {
  border:0;
  border-radius:18px;
  min-height:48px;
  padding:10px 14px;
  color:white;
  font-weight:1000;
  box-shadow:0 5px 0 rgba(0,0,0,.16);
}
.big-btn.green { background:var(--green); }
.big-btn.blue { background:var(--blue); }
.big-btn.orange { background:var(--orange); }
.big-btn.purple { background:var(--purple); }
.big-btn.gray { background:#78909C; }
.big-btn.red { background:var(--red); }
.big-btn:disabled { opacity:.45; box-shadow:none; transform:none; cursor:default; }
.button-row {
  display:flex;
  gap:8px;
  width:100%;
}
.button-row > * { flex:1; }
.jars {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
}
.jar {
  border-radius:16px 16px 23px 23px;
  border:3px solid var(--line);
  min-height:156px;
  padding:9px 5px;
  text-align:center;
  background:linear-gradient(#FFF,#F8FBFD);
}
.jar.spend { border-color:#FFB4A8; }
.jar.save { border-color:#91C9FF; }
.jar.invest { border-color:#98DCB0; }
.jar-icon { font-size:30px; }
.jar-name { font-size:14px; font-weight:1000; color:var(--navy); margin-top:2px; }
.jar-value { font-size:20px; font-weight:1000; margin:5px 0; }
.stepper {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.step-btn {
  width:32px;
  height:32px;
  border:0;
  border-radius:50%;
  color:white;
  font-size:20px;
  font-weight:1000;
  background:var(--navy);
}
.summary-strip {
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  justify-content:center;
}
.pill {
  background:white;
  border:2px solid var(--gold);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:900;
  color:var(--navy);
}
.company-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.company-card {
  border:3px solid var(--line);
  background:white;
  border-radius:16px;
  padding:10px;
  text-align:left;
  min-height:145px;
  box-shadow:0 3px 0 rgba(23,70,110,.08);
}
.company-card.selected { border-color:var(--green); background:#F2FFF6; }
.company-icon { font-size:28px; }
.company-name { font-size:14px; font-weight:1000; color:var(--navy); line-height:1.4; }
.company-type { font-size:10px; color:var(--purple); font-weight:900; margin-top:2px; }
.company-desc { font-size:10px; color:#5E6D79; line-height:1.45; margin-top:5px; }
.company-money { font-size:13px; font-weight:1000; color:var(--green-dark); margin-top:6px; }
.company-actions { display:flex; gap:5px; margin-top:7px; }
.mini-btn {
  flex:1;
  min-height:34px;
  border:0;
  border-radius:12px;
  font-size:11px;
  font-weight:1000;
  color:white;
  box-shadow:0 3px 0 rgba(0,0,0,.12);
}
.mini-btn.plus { background:var(--green); }
.mini-btn.minus { background:#78909C; }
.game-board {
  background:linear-gradient(180deg,#EAF8FF,#FFFFFF);
  border:3px solid #91C9FF;
}
.day-display {
  text-align:center;
  font-size:20px;
  font-weight:1000;
  color:var(--navy);
}
.event-card {
  background:#FFF;
  border:3px solid var(--gold);
  border-radius:17px;
  padding:12px;
}
.event-company {
  font-size:13px;
  font-weight:900;
  color:var(--purple);
}
.event-title {
  font-size:19px;
  font-weight:1000;
  color:var(--navy);
  margin-top:5px;
}
.event-text {
  font-size:13px;
  line-height:1.7;
  margin-top:7px;
  font-weight:700;
}
.change-up { color:var(--green-dark); }
.change-down { color:var(--red); }
.change-flat { color:var(--gray); }
.why-box, .parent-box {
  display:none;
  margin-top:9px;
  border-radius:12px;
  padding:10px;
  font-size:12px;
  line-height:1.65;
}
.why-box { background:#EAF4FF; border:2px solid #91C9FF; }
.parent-box { background:#F4EEFF; border:2px solid #BCA7FF; }
.toggle-btn {
  width:100%;
  margin-top:8px;
  border:0;
  border-radius:12px;
  min-height:38px;
  background:#EFF3F6;
  color:var(--navy);
  font-weight:1000;
}
.holdings {
  display:grid;
  gap:7px;
}
.holding-row {
  display:grid;
  grid-template-columns:1fr auto;
  gap:7px;
  align-items:center;
  border:2px solid var(--line);
  border-radius:12px;
  padding:8px;
}
.holding-name { font-size:12px; font-weight:1000; color:var(--navy); }
.holding-value { font-size:13px; font-weight:1000; text-align:right; }
.quiz-question {
  font-size:18px;
  line-height:1.6;
  font-weight:1000;
  color:var(--navy);
  min-height:90px;
  display:flex;
  align-items:center;
}
.choice-list { display:grid; gap:8px; }
.choice-btn {
  border:3px solid #9CCBFF;
  background:white;
  color:var(--navy);
  border-radius:15px;
  min-height:52px;
  padding:9px;
  font-weight:1000;
  box-shadow:0 3px 0 rgba(23,70,110,.12);
}
.choice-btn.correct { background:#CFF5DA; border-color:var(--green); }
.choice-btn.wrong { background:#FFD5D3; border-color:var(--red); }
.feedback {
  display:none;
  border-radius:14px;
  padding:10px;
  font-size:12px;
  line-height:1.65;
  font-weight:700;
}
.feedback.good { display:block; background:#E8F9EE; border:2px solid var(--green); }
.feedback.bad { display:block; background:#FFF0EF; border:2px solid var(--red); }
.ledger-total {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
}
.total-card {
  border-radius:13px;
  padding:9px 4px;
  text-align:center;
  background:#F8FBFD;
  border:2px solid var(--line);
}
.total-label { font-size:10px; color:var(--gray); font-weight:900; }
.total-number { font-size:17px; font-weight:1000; color:var(--navy); margin-top:3px; }
.history-list { display:grid; gap:7px; }
.history-item {
  border:2px solid var(--line);
  border-radius:12px;
  padding:8px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:6px;
  font-size:11px;
}
.history-main { font-weight:900; color:var(--navy); }
.history-sub { color:var(--gray); margin-top:3px; }
.delete-btn {
  border:0;
  border-radius:10px;
  background:var(--red);
  color:white;
  font-weight:900;
  padding:5px 8px;
}
.form-grid { display:grid; gap:8px; }
label { font-size:12px; font-weight:900; color:var(--navy); }
input, select {
  width:100%;
  min-height:43px;
  border:2px solid var(--line);
  border-radius:12px;
  background:white;
  padding:8px 10px;
  color:#243443;
}
.parent-lock {
  text-align:center;
  padding:20px 12px;
}
.pin-dots {
  font-size:24px;
  letter-spacing:8px;
  color:var(--purple);
  min-height:36px;
}
.pin-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  max-width:260px;
  margin:10px auto 0;
}
.pin-btn {
  min-height:50px;
  border:0;
  border-radius:14px;
  background:white;
  border:2px solid #BCA7FF;
  color:var(--purple);
  font-size:18px;
  font-weight:1000;
}
.settings-list { display:grid; gap:9px; }
.setting {
  border:2px solid var(--line);
  border-radius:12px;
  padding:9px;
}
.setting-title { font-size:12px; font-weight:1000; color:var(--navy); }
.setting-desc { font-size:10px; color:var(--gray); line-height:1.5; margin:4px 0 7px; }
.footer-info {
  margin-top:auto;
  text-align:center;
  color:#8A98A5;
  font-size:10px;
  line-height:1.5;
  padding:10px 0 4px;
}
ruby { ruby-align:center; }
rt { font-size:.52em; font-weight:700; color:#6B7785; }
.hidden { display:none !important; }
.floating-pokemon-wrap {
  position:fixed;
  z-index:20;
  right:max(8px, calc((100vw - 520px) / 2 + 8px));
  bottom:6px;
  width:62px;
  height:62px;
  pointer-events:none;
  opacity:.92;
}
.floating-pokemon {
  width:62px;
  height:62px;
}
@media (max-width:360px) {
  .hero h1 { font-size:22px; }
  .menu-card { min-height:122px; padding:10px 6px; }
  .company-name { font-size:12px; }
  .company-desc { font-size:9px; }
}
</style>
</head>
<body>
<div id="app">

  <section id="screen-home" class="screen active">
    <div class="hero">
      <h1 id="home-title"></h1>
      <p id="home-copy"></p>
      <div class="pokemon-wrap">
        <img id="pokemon-home" class="pokemon-img" alt="ポケモン">
      </div>
    </div>

    <div class="menu-grid">
      <button class="menu-card" onclick="openScreen('screen-split')">
        <span class="emoji">🍭🐷🌱</span>
        <div class="menu-title" data-ruby="お金を分けよう"></div>
        <div class="menu-desc" data-ruby="使う・貯める・育てるの違いを学ぼう"></div>
      </button>
      <button class="menu-card" onclick="openStockSetup()">
        <span class="emoji">📈</span>
        <div class="menu-title" data-ruby="株ゲーム"></div>
        <div class="menu-desc" data-ruby="会社を応援して七日間の値動きを見よう"></div>
      </button>
      <button class="menu-card" onclick="startQuiz()">
        <span class="emoji">❓</span>
        <div class="menu-title" data-ruby="お金クイズ"></div>
        <div class="menu-desc" data-ruby="使う・貯める・投資するを考えよう"></div>
      </button>
      <button class="menu-card" onclick="openAllowance()">
        <span class="emoji">🪙</span>
        <div class="menu-title" data-ruby="お小遣い帳"></div>
        <div class="menu-desc" data-ruby="本物のお小遣いを三つの箱で見てみよう"></div>
      </button>
    </div>

    <div class="warning" data-ruby="このゲームの株価は架空です。実際の株価や会社の成績とは関係ありません。"></div>

    <button class="big-btn purple" onclick="openParentGate()" data-ruby="保護者モード"></button>

    <footer class="footer-info">
      <div id="version-home"></div>
      <div id="updated-home"></div>
    </footer>
  </section>

  <section id="screen-split" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()" data-ruby="戻る"></button>
      <div class="top-title" data-ruby="お金を分けよう"></div>
      <button class="icon-btn" onclick="speakCurrent()" aria-label="読み上げ">🔊</button>
    </div>

    <div class="panel">
      <h2 class="panel-title" data-ruby="三百コインを三つに分けよう"></h2>
      <div class="small-note" data-ruby="使うお金、貯めるお金、育てるお金を考えてみよう。百コインずつ動かせるよ。"></div>
    </div>

    <div class="jars">
      <div class="jar spend">
        <div class="jar-icon">🍭</div>
        <div class="jar-name" data-ruby="使う"></div>
        <div class="jar-value" id="split-spend">100</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeSplit('spend',-100)">−</button>
          <button class="step-btn" onclick="changeSplit('spend',100)">＋</button>
        </div>
      </div>
      <div class="jar save">
        <div class="jar-icon">🐷</div>
        <div class="jar-name" data-ruby="貯める"></div>
        <div class="jar-value" id="split-save">100</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeSplit('save',-100)">−</button>
          <button class="step-btn" onclick="changeSplit('save',100)">＋</button>
        </div>
      </div>
      <div class="jar invest">
        <div class="jar-icon">🌱</div>
        <div class="jar-name" data-ruby="育てる"></div>
        <div class="jar-value" id="split-invest">100</div>
        <div class="stepper">
          <button class="step-btn" onclick="changeSplit('invest',-100)">−</button>
          <button class="step-btn" onclick="changeSplit('invest',100)">＋</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title" id="split-left"></div>
      <div class="small-note" id="split-message"></div>
    </div>

    <button class="big-btn green" onclick="finishSplit()" data-ruby="これで決める"></button>

    <footer class="footer-info version-footer"></footer>
  </section>

  <section id="screen-stock-setup" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()" data-ruby="戻る"></button>
      <div class="top-title" data-ruby="会社を選ぼう"></div>
      <button class="icon-btn" onclick="speakCurrent()">🔊</button>
    </div>

    <div class="summary-strip">
      <div class="pill" id="stock-budget-pill"></div>
      <div class="pill" id="stock-left-pill"></div>
      <div class="pill" id="stock-count-pill"></div>
    </div>

    <div class="panel">
      <h2 class="panel-title" data-ruby="応援したい会社に百コインずつ分けよう"></h2>
      <div class="small-note" data-ruby="二つ以上の会社に分けると、一つの会社だけに任せない考え方を体験できるよ。"></div>
    </div>

    <div id="company-grid" class="company-grid"></div>

    <div class="button-row">
      <button class="big-btn gray" onclick="resetAllocations()" data-ruby="選び直す"></button>
      <button class="big-btn green" id="start-stock-btn" onclick="startStockGame()" data-ruby="七日間を始める"></button>
    </div>

    <footer class="footer-info version-footer"></footer>
  </section>

  <section id="screen-stock-game" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="confirmLeaveGame()" data-ruby="戻る"></button>
      <div class="top-title" data-ruby="株ゲーム"></div>
      <button class="icon-btn" onclick="speakCurrent()">🔊</button>
    </div>

    <div class="panel game-board">
      <div class="day-display" id="game-day"></div>
      <div class="summary-strip" style="margin-top:8px">
        <div class="pill" id="game-cash"></div>
        <div class="pill" id="game-assets"></div>
        <div class="pill" id="game-total"></div>
      </div>
    </div>

    <div id="event-area" class="event-card">
      <div class="event-company" id="event-company"></div>
      <div class="event-title" id="event-title"></div>
      <div class="event-text" id="event-text"></div>
      <button class="toggle-btn" onclick="toggleBox('why-box')" data-ruby="どうして"></button>
      <div id="why-box" class="why-box"></div>
      <button class="toggle-btn" onclick="toggleBox('parent-box')" data-ruby="大人向けの説明"></button>
      <div id="parent-box" class="parent-box"></div>
    </div>

    <div class="panel">
      <h2 class="panel-title" data-ruby="今の持ち物"></h2>
      <div id="holdings" class="holdings"></div>
    </div>

    <div class="button-row">
      <button class="big-btn orange" id="next-day-btn" onclick="nextDay()" data-ruby="次の日へ"></button>
      <button class="big-btn green" id="finish-game-btn" onclick="finishStockGame()" data-ruby="今売る"></button>
    </div>

    <div class="warning" data-ruby="このゲームでは出来事と値動きを分かりやすく単純化しています。良い出来事でも、本当の株価が必ず上がるわけではありません。"></div>

    <footer class="footer-info version-footer"></footer>
  </section>

  <section id="screen-result" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goHome()" data-ruby="戻る"></button>
      <div class="top-title" data-ruby="結果"></div>
      <button class="icon-btn" onclick="speakCurrent()">🔊</button>
    </div>

    <div class="hero">
      <h1 id="result-title"></h1>
      <p id="result-copy"></p>
      <div class="pokemon-wrap">
        <img id="pokemon-result" class="pokemon-img" alt="ポケモン">
      </div>
    </div>

    <div class="panel">
      <h2 class="panel-title" data-ruby="今回の学び"></h2>
      <div id="result-learning" class="small-note"></div>
    </div>

    <div id="medal-panel" class="panel"></div>

    <button class="big-btn blue" onclick="openStockSetup()" data-ruby="もう一度遊ぶ"></button>

const phraseKeys = Object.keys(PHRASE_RUBY).sort((a,b)=>b.length-a.length);

function rubyize(input) {
  const source = String(input ?? '');
  const parts = source.replace(/<[^>]+>/g, m => '\u0000' + m + '\u0000').split('\u0000');
  return parts.map(part => {
    if (part.startsWith('<')) return part;
    let out = '';
    let i = 0;
    while (i < part.length) {
      let match = '';
      for (const key of phraseKeys) {
        if (part.startsWith(key, i)) { match = key; break; }
      }
      if (match) {
        out += `<ruby>${match}<rt>${PHRASE_RUBY[match]}</rt></ruby>`;
        i += match.length;
        continue;
      }
      const ch = part[i];
      if (/[\u3400-\u9FFF]/.test(ch)) {
        const reading = CHAR_RUBY[ch] || ' ';
        out += `<ruby>${ch}<rt>${reading}</rt></ruby>`;
      } else {
        out += ch;
      }
      i++;
    }
    return out;
  }).join('');
}

function setRuby(id, text) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = rubyize(text);
}

function applyStaticRuby() {
  document.querySelectorAll('[data-ruby]').forEach(el => {
    el.innerHTML = rubyize(el.getAttribute('data-ruby'));
  });
}

function loadSettings() {
  return {...defaultSettings, ...(JSON.parse(localStorage.getItem('moneyExplorerSettings') || '{}'))};
}
let settings = loadSettings();

function saveSettings() {
  const v = document.getElementById('volatility-setting');
  const s = document.getElementById('speech-setting');
  if (v) settings.volatility = v.value;
  if (s) settings.speech = s.value;
  localStorage.setItem('moneyExplorerSettings', JSON.stringify(settings));
}

function showScreen(id, push=true) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (push && navStack[navStack.length-1] !== id) navStack.push(id);
  window.scrollTo({top:0,behavior:'smooth'});
  fetchPokemonForScreen(id);

  const floatWrap = document.getElementById('floating-pokemon-wrap');
  const useFloating = !['screen-home','screen-result'].includes(id);
  floatWrap.classList.toggle('hidden', !useFloating);
  if (useFloating) fetchPokemon('pokemon-floating');
}

function openScreen(id) { showScreen(id); }

function goBack() {
  if (navStack.length > 1) navStack.pop();
  const target = navStack[navStack.length-1] || 'screen-home';
  showScreen(target, false);
}

function goHome() {
  navStack = ['screen-home'];
  showScreen('screen-home', false);
  renderAllowance();
}

  });

async function fetchPokemon(imgId='pokemon-home') {
  const img = document.getElementById(imgId);
  if (!img) return;
  try {
    const id = Math.floor(Math.random()*151)+1;
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    img.src = data.sprites?.versions?.['generation-v']?.['black-white']?.animated?.front_default
      || data.sprites?.other?.['official-artwork']?.front_default
      || data.sprites?.front_default
      || '';
  } catch(e) {
    img.removeAttribute('src');
    img.alt = 'ポケモンを読み込めませんでした';
  }
}

function fetchPokemonForScreen(id) {
  if (id==='screen-home') fetchPokemon('pokemon-home');
  if (id==='screen-result') fetchPokemon('pokemon-result');
}

function changeSplit(type, amount) {
  const total = splitState.spend + splitState.save + splitState.invest;
  if (amount > 0) {
    const otherTypes = ['spend','save','invest'].filter(t=>t!==type && splitState[t]>=100);
    if (!otherTypes.length || total !== 300) return;
    const donor = otherTypes.sort((a,b)=>splitState[b]-splitState[a])[0];
    splitState[donor] -= 100;
    splitState[type] += 100;
  } else {
    if (splitState[type] < 100) return;
    const receiver = ['spend','save','invest'].filter(t=>t!==type).sort((a,b)=>splitState[a]-splitState[b])[0];
    splitState[type] -= 100;
    splitState[receiver] += 100;
  }
  renderSplit();
}

function renderSplit() {
  document.getElementById('split-spend').textContent = splitState.spend;
  document.getElementById('split-save').textContent = splitState.save;
  document.getElementById('split-invest').textContent = splitState.invest;
  const total = splitState.spend + splitState.save + splitState.invest;
  setRuby('split-left', `全部で${total}コイン`);
  let msg = '三つの使い方を考えられているね。';
  if (splitState.invest===300) msg='全部を育てるお金にすると、使いたい時のお金がなくなるよ。';
  if (splitState.spend===300) msg='全部使うと、あとで使うお金や育てるお金が残らないよ。';
  if (splitState.save===300) msg='全部貯めるのも一つの考え方。使う楽しみや育てる体験も考えてみよう。';
  setRuby('split-message', msg);
}

}

function openStockSetup() {
  // 「お金を分ける練習」と「株ゲーム」は別の教材です。
  // 株ゲームは、比較しやすいよう毎回1000コインで始めます。
  stockAlloc = {};
  companies.forEach(c=>stockAlloc[c.id]=0);
  gameState = {budget:1000};
  renderCompanyGrid();
  showScreen('screen-stock-setup');
}

function renderCompanyGrid() {
  const grid = document.getElementById('company-grid');
  const budget = gameState?.budget || 1000;
  const used = Object.values(stockAlloc).reduce((a,b)=>a+b,0);
  const left = budget-used;
  const count = Object.values(stockAlloc).filter(v=>v>0).length;
  setRuby('stock-budget-pill', `元のお金 ${budget}コイン`);
  setRuby('stock-left-pill', `残り ${left}コイン`);
  setRuby('stock-count-pill', `${count}社を応援`);
  grid.innerHTML = companies.map(c=>`
    <div class="company-card ${stockAlloc[c.id]>0?'selected':''}">
      <div class="company-icon">${c.icon}</div>
      <div class="company-name">${rubyize(c.name)}</div>
      <div class="company-type">${rubyize(c.type)}</div>
      <div class="company-desc">${rubyize(c.desc)}</div>
      <div class="company-money">${rubyize(`${stockAlloc[c.id]}コイン`)}</div>
      <div class="company-actions">
        <button class="mini-btn minus" onclick="changeAllocation('${c.id}',-100)">−100</button>
        <button class="mini-btn plus" onclick="changeAllocation('${c.id}',100)">＋100</button>
      </div>
    </div>
  `).join('');
  const btn = document.getElementById('start-stock-btn');
  btn.disabled = used===0;
}

function changeAllocation(id, amount) {
  const budget = gameState.budget;
  const used = Object.values(stockAlloc).reduce((a,b)=>a+b,0);
  if (amount>0 && used+amount>budget) return;
  if (amount<0 && stockAlloc[id]+amount<0) return;
  stockAlloc[id]+=amount;
  renderCompanyGrid();
}

function resetAllocations() {
  Object.keys(stockAlloc).forEach(k=>stockAlloc[k]=0);
  renderCompanyGrid();
}

function startStockGame() {
  const used = Object.values(stockAlloc).reduce((a,b)=>a+b,0);
  if (!used) return;
  gameState = {
    ...gameState,
    day:0,
    initial:gameState.budget,
    cash:gameState.budget-used,
    holdings:{},
    lastEvent:null,
    completed:false
  };
  companies.forEach(c=>{
    if (stockAlloc[c.id]>0) {
      gameState.holdings[c.id] = {cost:stockAlloc[c.id], value:stockAlloc[c.id]};
    }
  });
  showScreen('screen-stock-game');
  nextDay();
}

function volatilityFactor() {
  return settings.volatility==='gentle' ? .55 : settings.volatility==='clear' ? 1.35 : 1;
}

function nextDay() {
  if (!gameState || gameState.completed) return;
  gameState.day++;
  const ids = Object.keys(gameState.holdings);
  const id = ids[Math.floor(Math.random()*ids.length)];
  const company = companies.find(c=>c.id===id);
  const event = company.events[Math.floor(Math.random()*company.events.length)];
  const base = event[4];
  const scaled = Math.round(base*volatilityFactor());
  const before = gameState.holdings[id].value;
  const after = Math.max(10, Math.round(before*(1+scaled/100)));
  gameState.holdings[id].value = after;
  gameState.lastEvent = {company,event,change:scaled,before,after};
  if (gameState.day>=7) gameState.completed=true;
  renderGame();
}

function renderGame() {
  setRuby('game-day', `${gameState.day}日目 / 7日`);
  const assets = Object.values(gameState.holdings).reduce((s,h)=>s+h.value,0);
  const total = assets+gameState.cash;
  setRuby('game-cash', `残り ${gameState.cash}コイン`);
  setRuby('game-assets', `株 ${assets}コイン`);
  setRuby('game-total', `全部 ${total}コイン`);
  const e = gameState.lastEvent;
  setRuby('event-company', `${e.company.icon} ${e.company.name}`);
  setRuby('event-title', e.event[0]);
  const cls = e.change>0?'change-up':e.change<0?'change-down':'change-flat';
  const sign = e.change>0?'+':'';
  document.getElementById('event-text').innerHTML =
    `${rubyize(e.event[1])}<br><strong class="${cls}">${rubyize(`${e.before}コイン → ${e.after}コイン（${sign}${e.change}%）`)}</strong>`;
  setRuby('why-box', e.event[2]);
  setRuby('parent-box', `保護者の方へ：${e.event[3]}`);
  document.getElementById('why-box').style.display='none';
  document.getElementById('parent-box').style.display='none';

  document.getElementById('holdings').innerHTML = Object.entries(gameState.holdings).map(([id,h])=>{
    const c = companies.find(x=>x.id===id);
    const diff = h.value-h.cost;
    const cls = diff>0?'change-up':diff<0?'change-down':'change-flat';
    const sign = diff>0?'+':'';
    return `<div class="holding-row">
      <div class="holding-name">${c.icon} ${rubyize(c.name)}<br><span class="small-note">${rubyize(`はじめ ${h.cost}コイン`)}</span></div>
      <div class="holding-value ${cls}">${rubyize(`${h.value}コイン`)}<br>${rubyize(`${sign}${diff}コイン`)}</div>
    </div>`;
  }).join('');

  const nextBtn = document.getElementById('next-day-btn');
  const finishBtn = document.getElementById('finish-game-btn');
  nextBtn.disabled = gameState.completed;
  nextBtn.innerHTML = rubyize(gameState.completed?'七日目まで終わった':'次の日へ');
  finishBtn.innerHTML = rubyize(gameState.completed?'結果を見る':'今売る');
}

function finishStockGame() {
  if (!gameState) return;
  const assets = Object.values(gameState.holdings).reduce((s,h)=>s+h.value,0);
  const total = assets+gameState.cash;
  const diff = total-gameState.initial;
  const sign = diff>0?'+':'';
  setRuby('result-title', diff>0?'お金が増えたよ！':diff<0?'お金が減ったよ':'同じ金額だったよ');
  setRuby('result-copy', `${gameState.initial}コインが${total}コインになったよ。結果は${sign}${diff}コインです。`);
  setRuby('result-learning',
    diff>=0
      ? '今回は増えたけれど、投資は毎回増えるとは限らないよ。会社の出来事や、みんなの予想で値段が動くんだ。'
      : '今回は減ったけれど、株が下がっただけで会社が悪いとは限らないよ。投資するお金は増える時も減る時もあるんだ。'
  );
  const count = Object.keys(gameState.holdings).length;
  const medals = [
    count>=2?'🏅 二つ以上の会社に分けた':'🌱 会社を応援した',
    gameState.day>=7?'🏅 七日間見守った':'🌱 自分で売る時を決めた',
    '🏅 出来事の理由を学んだ'
  ];
  document.getElementById('medal-panel').innerHTML =
    `<h2 class="panel-title">${rubyize('もらったメダル')}</h2>`+
    medals.map(m=>`<div style="font-size:14px;font-weight:900;margin:6px 0">${rubyize(m)}</div>`).join('');
  confetti({particleCount:150,spread:90,origin:{y:.55}});
  showScreen('screen-result');
}

function confirmLeaveGame() {
  if (confirm('ゲームをやめて、会社を選ぶ画面へ戻りますか？')) {
    openStockSetup();
  }
}

function startQuiz() {
  quizIndex=0;
  quizScore=0;
  quizLocked=false;
  showScreen('screen-quiz');
  renderQuiz();
}

function renderQuiz() {
  if (quizIndex>=quizData.length) {
    setRuby('quiz-question', `おしまい！ ${quizData.length}問のうち${quizScore}問正解したよ。`);
    document.getElementById('quiz-choices').innerHTML='';
    document.getElementById('quiz-feedback').className='feedback good';
    setRuby('quiz-feedback','使う・貯める・投資するの違いを、これからもいっしょに考えてみよう。');
    document.getElementById('quiz-next').classList.add('hidden');
    confetti({particleCount:120,spread:75,origin:{y:.6}});
    return;
  }
  quizLocked=false;
  const q=quizData[quizIndex];
  setRuby('quiz-number', `${quizIndex+1}問目 / ${quizData.length}問`);
  setRuby('quiz-score', `${quizScore}問正解`);
  setRuby('quiz-question', q.q);
  const choices=document.getElementById('quiz-choices');
  choices.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='choice-btn';
    b.innerHTML=rubyize(opt);
    b.onclick=()=>answerQuiz(i,b);
    choices.appendChild(b);
  });
  const fb=document.getElementById('quiz-feedback');
  fb.className='feedback';
  fb.innerHTML='';
  document.getElementById('quiz-next').classList.add('hidden');
}

function answerQuiz(i,btn) {
  if (quizLocked) return;
  quizLocked=true;
  const q=quizData[quizIndex];
  const buttons=[...document.querySelectorAll('#quiz-choices .choice-btn')];
  if (i===q.ans) {
    quizScore++;
    btn.classList.add('correct');
    const fb=document.getElementById('quiz-feedback');
    fb.className='feedback good';
    fb.innerHTML=rubyize(`正解！ ${q.explain}`);
    confetti({particleCount:55,spread:55,origin:{y:.7}});
  } else {
    btn.classList.add('wrong');
    if (buttons[q.ans]) buttons[q.ans].classList.add('correct');
    const fb=document.getElementById('quiz-feedback');
    fb.className='feedback bad';
    fb.innerHTML=rubyize(`もう一歩！ ${q.explain}`);
  }
  setRuby('quiz-score', `${quizScore}問正解`);
  document.getElementById('quiz-next').classList.remove('hidden');
}

function nextQuiz() {
  quizIndex++;
  renderQuiz();
}

function loadAllowance() {
  return JSON.parse(localStorage.getItem('allowanceEntries') || '[]');
}

function saveAllowance(entries) {
  localStorage.setItem('allowanceEntries',JSON.stringify(entries));
}

function openAllowance() {
  renderAllowance();
  showScreen('screen-allowance');
}

function renderAllowance() {
  const entries=loadAllowance();
  const totals={spend:0,save:0,invest:0};
  entries.forEach(e=>totals[e.category]=(totals[e.category]||0)+e.amount);
  setRuby('allow-spend', `${totals.spend}円`);
  setRuby('allow-save', `${totals.save}円`);
  setRuby('allow-invest', `${totals.invest}円`);
  const list=document.getElementById('allowance-history');
  if (!list) return;
  if (!entries.length) {
    list.innerHTML=`<div class="small-note">${rubyize('まだ記録はありません。保護者モードから追加できます。')}</div>`;
    return;
  }
  const names={spend:'つかった',save:'ためた',invest:'そだてる'};
  list.innerHTML=entries.slice().reverse().map(e=>`
    <div class="history-item">
      <div>
        <div class="history-main">${rubyize(`${names[e.category]}：${e.amount}円`)}</div>
        <div class="history-sub">${rubyize(`${e.note}・${e.date}`)}</div>
      </div>
    </div>
  `).join('');
}

function addAllowanceEntry() {
  const amount=Number(document.getElementById('entry-amount').value);
  const category=document.getElementById('entry-category').value;
  const note=document.getElementById('entry-note').value;
  if (!Number.isFinite(amount) || amount<=0) {
    alert('金額を入力してください。');
    return;
  }
  const entries=loadAllowance();
  entries.push({
    id:Date.now(),
    amount:Math.round(amount),
    category,
    note,
    date:new Date().toLocaleDateString('ja-JP')
  });
  saveAllowance(entries);
  document.getElementById('entry-amount').value='';
  renderAllowance();
  alert('記録を追加しました。');
}

function openParentGate() {
  pinInput='';
  renderPinGate();
  showScreen('screen-parent-gate');
}

function renderPinGate() {
  settings=loadSettings();
  const first=!settings.pinInitialized;
  setRuby('pin-title', first?'最初の暗証番号を決めよう':'暗証番号を入れてください');
  setRuby('pin-desc', first?'好きな四桁を入力すると、保護者用の暗証番号として保存します。':'四桁の暗証番号を入力してください。');
  document.getElementById('pin-dots').textContent='●'.repeat(pinInput.length)+'○'.repeat(4-pinInput.length);
  const keys=[1,2,3,4,5,6,7,8,9,'消す',0,'決定'];
  document.getElementById('pin-grid').innerHTML=keys.map(k=>`
    <button class="pin-btn" onclick="pressPin('${k}')">${rubyize(k)}</button>
  `).join('');
  const fb=document.getElementById('pin-feedback');
  fb.className='feedback';
  fb.innerHTML='';
}

function pressPin(key) {
  if (key==='消す') pinInput=pinInput.slice(0,-1);
  else if (key==='決定') {
    submitPin();
    return;
  } else if (pinInput.length<4) pinInput+=key;
  renderPinGate();
}

function submitPin() {
  if (pinInput.length!==4) {
    const fb=document.getElementById('pin-feedback');
    fb.className='feedback bad';
    fb.innerHTML=rubyize('四桁を入力してください。');
    return;
  }
  settings=loadSettings();
  if (!settings.pinInitialized) {
    settings.pin=pinInput;
    settings.pinInitialized=true;
    localStorage.setItem('moneyExplorerSettings',JSON.stringify(settings));
    openParentPanel();
  } else if (pinInput===settings.pin) {
    openParentPanel();
  } else {
    const fb=document.getElementById('pin-feedback');
    fb.className='feedback bad';
    fb.innerHTML=rubyize('暗証番号が違います。');
    pinInput='';
    setTimeout(renderPinGate,700);
  }
}

function openParentPanel() {
  settings=loadSettings();
  showScreen('screen-parent');
  document.getElementById('volatility-setting').value=settings.volatility;
  document.getElementById('speech-setting').value=settings.speech;
}

function lockParent() {
  pinInput='';
  goHome();
}

function changePin() {
  const v=document.getElementById('new-pin').value.trim();
  if (!/^\d{4}$/.test(v)) {
    alert('四桁の数字を入力してください。');
    return;
  }
  settings.pin=v;
  settings.pinInitialized=true;
  localStorage.setItem('moneyExplorerSettings',JSON.stringify(settings));
  document.getElementById('new-pin').value='';
  alert('暗証番号を変更しました。');
}

function resetGameData() {
  if (!confirm('ゲームの記録と設定の一部を初期化しますか？')) return;
  localStorage.removeItem('lastSplit');
  splitState={spend:100,save:100,invest:100};
  renderSplit();
  alert('ゲームを初期化しました。');
}

function resetAllowanceData() {
  if (!confirm('お小遣い帳の記録をすべて削除しますか？')) return;
  localStorage.removeItem('allowanceEntries');
  renderAllowance();
  alert('お小遣い帳を初期化しました。');
}

function speakCurrent() {
  settings=loadSettings();
  if (settings.speech==='off') return;
  if (!('speechSynthesis' in window)) return;
  const active=document.querySelector('.screen.active');
  const text=active ? active.innerText.replace(/\s+/g,' ').trim() : '';
  speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang='ja-JP';
  utter.rate=.88;
  utter.pitch=1.05;
  speechSynthesis.speak(utter);
}

function init() {
  applyStaticRuby();
  setRuby('home-title','🪙 お金探検隊');
  setRuby('home-copy','使う、貯める、育てる。三つのお金を、ゲームで楽しく学ぼう！');
  addVersionInfo();
  renderSplit();
  renderAllowance();
  fetchPokemon('pokemon-home');
}

init();
</script>
