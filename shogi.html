<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しょうぎクイズ</title>
  <style>
    :root { 
      --shogi-wood: #f3d494; 
      --shogi-dark: #5d4037; 
      --accent-red: #e74c3c; 
      --correct-green: #2ecc71; 
      --pokemon-pink: #ffafcc; 
    }

    body { 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
      background-color: #fdf5e6; 
      color: var(--shogi-dark); 
      margin: 0; 
      padding: 0; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      min-height: 100vh;
    }

    header { 
      background-color: var(--shogi-dark); 
      color: var(--shogi-wood); 
      width: 100%; 
      padding: 15px 0; 
      text-align: center; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    h1 { margin: 0; font-size: 24px; }

    .container { 
      width: 90%; 
      max-width: 500px; 
      margin: 20px auto; 
      background: white; 
      padding: 20px; 
      border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      box-sizing: border-box;
    }

    .status-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      margin-bottom: 15px; 
    }

    .combo-badge { 
      background: var(--pokemon-pink); 
      color: white; 
      padding: 4px 12px; 
      border-radius: 20px; 
      font-weight: bold; 
      font-size: 14px; 
    }

    /* 盤面表示の修正：はみ出し防止と中央揃え */
    .board-aa { 
      background: #fafafa; 
      padding: 15px; 
      border-radius: 10px; 
      font-family: "Consolas", "Monaco", "Courier New", monospace; 
      white-space: pre-wrap; /* 折り返しを許可 */
      word-wrap: break-word;
      line-height: 1.4; 
      margin: 15px 0; 
      font-size: 1.2rem; 
      border: 2px solid #eee; 
      text-align: center; 
      letter-spacing: 0.1em;
      color: #333;
    }

    .options { 
      display: grid; 
      gap: 10px; 
      margin-top: 20px; 
    }

    .option-btn { 
      padding: 12px 10px; 
      font-size: 16px; 
      background: var(--shogi-wood); 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: bold; 
      color: var(--shogi-dark); 
      transition: transform 0.1s, background 0.2s;
      line-height: 1.5; /* ルビがあっても崩れないように */
    }

    .option-btn:active { transform: scale(0.98); }
    .option-btn:disabled { opacity: 0.7; cursor: default; }

    .explanation { 
      margin-top: 20px; 
      padding: 15px; 
      border-radius: 10px; 
      display: none; 
      line-height: 1.6; 
      font-size: 15px;
    }

    .btn-group { 
      display: flex; 
      gap: 10px; 
      justify-content: center; 
      margin-top: 20px; 
    }

    .nav-btn { 
      padding: 12px 20px; 
      border: none; 
      border-radius: 25px; 
      cursor: pointer; 
      font-weight: bold; 
      font-size: 15px; 
      flex: 1;
    }

    .next-btn { background: var(--shogi-dark); color: white; }
    .home-btn { background: #eee; color: #666; }

    .pokemon-img { 
      width: 60px; 
      height: 60px;
      object-fit: contain;
      float: right; 
      margin-top: -5px; 
    }

    footer { 
      margin-top: auto; 
      font-size: 11px; 
      color: #999; 
      text-align: center; 
      padding: 20px 0; 
    }

    ruby rt { font-size: 0.6em; color: rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<header>
  <h1><ruby>将棋<rt>しょうぎ</rt></ruby>クイズ</h1>
</header>

<div id="main-menu" class="container" style="text-align:center;">
  <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/35.png" style="width:120px; margin-bottom: 10px;" alt="ピッピ">
  <h2 style="margin-bottom: 20px;">いっしょに<ruby>修行<rt>しゅぎょう</rt></ruby>しよう！</h2>
  <button class="nav-btn next-btn" style="width:100%; font-size:18px;" onclick="startQuiz()">クイズをはじめる</button>
</div>

<div id="quiz-container" class="container" style="display:none;">
  <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/35.png" class="pokemon-img" alt="ピッピ">
  
  <div class="status-bar">
    <div id="lv-disp" style="font-weight:bold; color: var(--shogi-dark);">LEVEL 1</div>
    <div id="combo-disp" class="combo-badge">COMBO: 0</div>

  <div id="q-text" style="font-size:1.1rem; font-weight:bold; margin-bottom:10px; clear: left;"></div>
  <div id="board-aa" class="board-aa"></div>

  <div class="options" id="options"></div>
  <div id="explanation" class="explanation"></div>
  
  <div class="btn-group">
    <button class="nav-btn home-btn" onclick="goHome()">🏠 もどる</button>
    <button id="next-btn" class="nav-btn next-btn" style="display:none;" onclick="loadQuestion()">つぎへ！ ➡</button>
  </div>
</div>

    { q: "「<ruby>歩<rt>ふ</rt></ruby>」が<ruby>成<rt>な</rt></ruby>ると、どの<ruby>駒<rt>こま</rt></ruby>と<ruby>同<rt>おな</rt></ruby>じ<ruby>動<rt>うご</rt></ruby>きになる？", aa: "歩 ➡ (？)", a: ["<ruby>金<rt>きん</rt></ruby>", "<ruby>銀<rt>ぎん</rt></ruby>", "<ruby>桂馬<rt>けいま</rt></ruby>"], c: 0, e: "「と<ruby>金<rt>きん</rt></ruby>」は、<ruby>金<rt>きん</rt></ruby>と<ruby>全<rt>まった</rt></ruby>く<ruby>同<rt>おな</rt></ruby>じ<ruby>動<rt>うご</rt></ruby>きになるんだよ！" },

    { q: "「<ruby>銀将<rt>ぎんしょう</rt></ruby>」が<ruby>成<rt>な</rt></ruby>ると、どの<ruby>駒<rt>こま</rt></ruby>と<ruby>同<rt>おな</rt></ruby>じ<ruby>動<rt>うご</rt></ruby>きになる？", aa: "銀 ➡ (？)", a: ["<ruby>金<rt>きん</rt></ruby>", "<ruby>王<rt>おう</rt></ruby>", "<ruby>飛車<rt>ひしゃ</rt></ruby>"], c: 0, e: "「<ruby>成銀<rt>なりぎん</rt></ruby>」も、<ruby>金<rt>きん</rt></ruby>の<ruby>動<rt>うご</rt></ruby>きになります。<ruby>成<rt>な</rt></ruby>ると<ruby>斜<rt>なな</rt></ruby>めうしろに行けなくなるよ！" },

    { q: "「<ruby>王手<rt>おうて</rt></ruby>」と同時に「<ruby>飛車<rt>ひしゃ</rt></ruby>」を狙う、恐ろしい手筋は？", aa: "飛 ↖ 角 ↗ 王", a: ["<ruby>王手飛車<rt>おうてびしゃ</rt></ruby>", "<ruby>二枚替<rt>にまいがえ</rt></ruby>え", "<ruby>田楽刺<rt>でんがくざ</rt></ruby>し"], c: 0, e: "「<ruby>王手飛車<rt>おうてびしゃ</rt></ruby>取り」は、飛車がほぼ確実に取られてしまう大技だよ！" },
    { q: "一石二鳥！一つの駒で二つの駒を同時に狙うことを何という？", aa: "↖ 駒 ↗\n狙 狙", a: ["<ruby>両取<rt>りょうど</rt></ruby>り", "<ruby>二連打<rt>にれんだ</rt></ruby>", "<ruby>挟<rt>はさ</rt></ruby>み<ruby>撃<rt>う</rt></ruby>ち"], c: 0, e: "特に「<ruby>角<rt>かく</rt></ruby>」や「<ruby>桂馬<rt>けいま</rt></ruby>」で狙う<ruby>両取<rt>りょうど</rt></ruby>りは強力です。" },
    { q: "相手の駒を動かなくさせてしまう攻め方を何という？", aa: "・ 駒 ・\n・ ・ ・\n・ 狙 ・", a: ["<ruby>詰<rt>つ</rt></ruby>み", "<ruby>縛<rt>しば</rt></ruby>り", "<ruby>釘付<rt>くぎづ</rt></ruby>け"], c: 2, e: "強力な駒を動けなくして無力化することを「<ruby>釘付<rt>くぎづ</rt></ruby>け」にする、と言ったりします。" },
    // --- その他将棋知識 ---
    { q: "プロの将棋の先生のことを何と呼ぶ？", aa: "？？先生", a: ["<ruby>棋士<rt>きし</rt></ruby>", "<ruby>将士<rt>しょうし</rt></ruby>", "<ruby>盤士<rt>ばんし</rt></ruby>"], c: 0, e: "正解は「<ruby>棋士<rt>きし</rt></ruby>」です。藤井聡太先生などが有名だね！" },
    { q: "将棋盤のマス目は、全部でいくつある？", aa: "９ × ９ ＝ ？", a: ["64マス", "81マス", "100マス"], c: 1, e: "縦9マス、横9マスで合計81マスあります。" },
    { q: "将棋の駒の種類は、全部で何種類？（裏側は含めない）", aa: "玉・飛・角…", a: ["7種類", "8種類", "9種類"], c: 1, e: "玉・飛・角・金・銀・桂・香・歩の8種類あります。" },
    { q: "「<ruby>駒<rt>こま</rt></ruby>」を置く板の名前は？", aa: "━━━━━━\n┃　　　　┃", a: ["<ruby>将棋盤<rt>しょうぎばん</rt></ruby>", "<ruby>将棋机<rt>しょうぎづくえ</rt></ruby>", "<ruby>将棋床<rt>しょうぎどこ</rt></ruby>"], c: 0, e: "<ruby>将棋盤<rt>しょうぎばん</rt></ruby>といいます。木でできているものが多いよ。" },
    { q: "対局を始めるときの挨拶は？", aa: "「？？？」", a: ["よろしく", "お願いします", "がんばります"], c: 1, e: "「お願いします」と礼に始まり、「ありがとうございました」と礼に終わるのが将棋のマナーです。" },
    { q: "自分が負けたことを認める言葉は？", aa: "「？？？」", a: ["まいりました", "もうだめだ", "おわりです"], c: 0, e: "「負けました」や「まいりました」とはっきり言うことが大切です。" },
    // --- 追加の駒の動き（再確認） ---
    { q: "「<ruby>飛車<rt>ひしゃ</rt></ruby>」が成った時の名前は？", aa: "飛 ➡ ？", a: ["<ruby>龍王<rt>りゅうおう</rt></ruby>", "<ruby>龍馬<rt>りょうま</rt></ruby>", "<ruby>金龍<rt>きんりゅう</rt></ruby>"], c: 0, e: "飛車が成ると「<ruby>龍王<rt>りゅうおう</rt></ruby>」、略して「<ruby>龍<rt>りゅう</rt></ruby>」と呼びます。" },
    { q: "「<ruby>角<rt>かく</rt></ruby>」が成った時の名前は？", aa: "角 ➡ ？", a: ["<ruby>龍王<rt>りゅうおう</rt></ruby>", "<ruby>龍馬<rt>りょうま</rt></ruby>", "<ruby>銀馬<rt>ぎんま</rt></ruby>"], c: 1, e: "角が成ると「<ruby>龍馬<rt>りょうま</rt></ruby>」、略して「<ruby>馬<rt>うま</rt></ruby>」と呼びます。" },
    { q: "将棋の駒で、唯一後ろに下がれない駒は？", aa: "　↑　\n　？　", a: ["<ruby>歩<rt>ふ</rt></ruby>と<ruby>香車<rt>きょうしゃ</rt></ruby>と<ruby>桂馬<rt>けいま</rt></ruby>", "<ruby>歩<rt>ふ</rt></ruby>だけ", "<ruby>金<rt>きん</rt></ruby>以外全部"], c: 0, e: "歩・香・桂の3つは、一度進むと後ろには戻れません。" },
    { q: "「<ruby>金<rt>きん</rt></ruby>」が動ける方向の数は？", aa: "＼　↑　／\n←　金　→\n　　↓　　", a: ["4マス", "6マス", "8マス"], c: 1, e: "前3つ、横2つ、後ろ1つの、合計6マスに動けます。" },
    { q: "「<ruby>銀<rt>ぎん</rt></ruby>」が動ける方向の数は？", aa: "＼　↑　／\n　　銀　　\n／　　　＼", a: ["3マス", "4マス", "5マス"], c: 2, e: "前3つ、斜め後ろ2つの、合計5マスに動けます。" },
    { q: "持ち駒の「<ruby>歩<rt>ふ</rt></ruby>」を、一番奥の列に打つことはできる？", aa: "━━打？━\n・ ・ ・ ", a: ["できる", "できない", "<ruby>成<rt>な</rt></ruby>ればできる"], c: 1, e: "次に動く場所がない場所に駒を打つことはできません。歩や香車は一番奥には打てないよ。" },
    { q: "「<ruby>桂馬<rt>けいま</rt></ruby>」を、相手から数えて2列目以内に打つことはできる？", aa: "━━１━━\n━━２━━\n━━打？━", a: ["できる", "できない", "3枚までならOK"], c: 1, e: "桂馬は前2マス先に動くので、残り1〜2列目には打つことができません。" },
    { q: "相手の王様を捕まえて、どこにも逃げられなくすることを何という？", aa: "＼　┃　／\n━　王　━\n／　┃　＼", a: ["<ruby>詰<rt>つ</rt></ruby>み", "<ruby>勝<rt>か</rt></ruby>ち", "<ruby>終<rt>お</rt></ruby>わり"], c: 0, e: "これを「<ruby>詰<rt>つ</rt></ruby>み」と言います。将棋のゴールだね！" },
    { q: "将棋盤の右上のマスを、数字で何と呼ぶ？", aa: "（？、？）", a: ["1一", "1九", "9一"], c: 0, e: "将棋は右から123...、上から一二三...と数えるので、右端の一番上は「1一」だよ。" }
  ];

  let currentIdx = 0;
  let combo = 0;
  let shuffledQuestions = [];

  function startQuiz() {
    document.getElementById("main-menu").style.display = "none";
    document.getElementById("quiz-container").style.display = "block";
    shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
    currentIdx = 0;
    combo = 0;
    loadQuestion();
  }

  function goHome() {
    document.getElementById("main-menu").style.display = "block";
    document.getElementById("quiz-container").style.display = "none";
  }

  function loadQuestion() {
    if (currentIdx >= shuffledQuestions.length) {
      alert("全問終了！お疲れ様でした！");
      goHome();
      return;
    }
    const q = shuffledQuestions[currentIdx];
    
    document.getElementById("lv-disp").innerText = `第 ${currentIdx + 1} 問`;
    document.getElementById("combo-disp").innerText = `COMBO: ${combo}`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("board-aa").innerText = q.aa;
    
    const optCont = document.getElementById("options");
    optCont.innerHTML = "";
    q.a.forEach((txt, i) => {
      const b = document.createElement("button");
      b.className = "option-btn";
      b.innerHTML = txt;
      b.onclick = () => check(i);
      optCont.appendChild(b);
    });
    
    document.getElementById("explanation").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
  }

  function check(i) {
    const q = shuffledQuestions[currentIdx];
    const exp = document.getElementById("explanation");
    const btns = document.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);

    if (i === q.c) {
      combo++;
      exp.innerHTML = "<strong>★<ruby>正解<rt>せいかい</rt></ruby>！★</strong><br>" + q.e;
      exp.style.backgroundColor = "#d4edda";
      exp.style.color = "#155724";
      exp.style.borderLeft = "5px solid var(--correct-green)";
    } else {
      combo = 0;
      exp.innerHTML = "<strong><ruby>残念<rt>ざんねん</rt></ruby>！</strong><br><ruby>正解<rt>せいかい</rt></ruby>は「" + q.a[q.c] + "」でした。<br>" + q.e;
      exp.style.backgroundColor = "#f8d7da";
      exp.style.color = "#721c24";
      exp.style.borderLeft = "5px solid var(--accent-red)";
    }
    exp.style.display = "block";
    document.getElementById("next-btn").style.display = "inline-block";
    currentIdx++;
  }
</script>
