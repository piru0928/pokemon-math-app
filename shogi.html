  <title>しょうぎクイズ</title>
  <style>
    :root { --shogi-wood: #f3d494; --shogi-dark: #5d4037; --accent-red: #e74c3c; --correct-green: #2ecc71; --pokemon-pink: #ffafcc; }
    body { font-family: sans-serif; background-color: #fdf5e6; color: var(--shogi-dark); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    header { background-color: var(--shogi-dark); color: var(--shogi-wood); width: 100%; padding: 15px 0; text-align: center; }
    .container { width: 92%; max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
    .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
    .combo-badge { background: var(--pokemon-pink); color: white; padding: 2px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    /* 盤面を見やすく調整 */
    .board-aa { background: #f0f0f0; padding: 20px; border-radius: 10px; font-family: 'Courier New', monospace; white-space: pre; line-height: 1.5; margin: 15px 0; font-size: 18px; border: 2px solid #ddd; text-align: center; letter-spacing: 2px; }
    .options { display: grid; gap: 12px; margin-top: 20px; }
    .option-btn { padding: 15px; font-size: 17px; background: var(--shogi-wood); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--shogi-dark); }
    .explanation { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; }
    .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .nav-btn { padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .next-btn { background: var(--shogi-dark); color: white; }
    .home-btn { background: #ccc; color: #333; }
    .pokemon-img { width: 70px; float: right; margin-top: -10px; }
    footer { margin-top: 20px; font-size: 11px; color: #999; text-align: center; width: 100%; padding-bottom: 20px; }
    ruby rt { font-size: 0.6em; color: #666; }
  </style>
</head>

  let currentIdx = 0;
  let combo = 0;

  function startQuiz() {
    document.getElementById("main-menu").style.display = "none";
    document.getElementById("quiz-container").style.display = "block";
    currentIdx = 0;
    combo = 0;
    loadQuestion();
  }

  function goHome() {
    document.getElementById("main-menu").style.display = "block";
    document.getElementById("quiz-container").style.display = "none";
  }

  function loadQuestion() {
    if (currentIdx >= questions.length) currentIdx = 0;
    const q = questions[currentIdx];
    
    document.getElementById("lv-disp").innerText = `LEVEL ${currentIdx + 1}`;
    document.getElementById("combo-disp").innerText = `COMBO: ${combo}`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("board-aa").innerText = q.aa;
    
    const optCont = document.getElementById("options");
    optCont.innerHTML = "";
    q.a.forEach((txt, i) => {
      const b = document.createElement("button");
      b.className = "option-btn";
      b.innerHTML = txt;
      b.onclick = () => check(i);
      optCont.appendChild(b);
    });
    
    document.getElementById("explanation").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
  }

  function check(i) {
    const q = questions[currentIdx];
    const exp = document.getElementById("explanation");
    const btns = document.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);

    if (i === q.c) {
      combo++;
      exp.innerHTML = "<strong>★<ruby>正解<rt>せいかい</rt></ruby>！★</strong><br>" + q.e;
      exp.style.backgroundColor = "#d4edda";
      exp.style.borderLeft = "5px solid var(--correct-green)";
    } else {
      combo = 0;
      exp.innerHTML = "<strong><ruby>残念<rt>ざんねん</rt></ruby>！</strong><br><ruby>正解<rt>せいかい</rt></ruby>は「" + q.a[q.c] + "」でした。<br>" + q.e;
      exp.style.backgroundColor = "#f8d7da";
      exp.style.borderLeft = "5px solid var(--accent-red)";
    }
    exp.style.display = "block";
    document.getElementById("next-btn").style.display = "block";
    currentIdx++;
  }
</script>
