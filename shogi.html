<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しょうぎクイズ</title>
  <style>
    :root { --shogi-wood: #f3d494; --shogi-dark: #5d4037; --accent-red: #e74c3c; --correct-green: #2ecc71; --pokemon-pink: #ffafcc; }
    body { font-family: sans-serif; background-color: #fdf5e6; color: var(--shogi-dark); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    header { background-color: var(--shogi-dark); color: var(--shogi-wood); width: 100%; padding: 15px 0; text-align: center; }
    .container { width: 92%; max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
    .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
    .combo-badge { background: var(--pokemon-pink); color: white; padding: 2px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    /* 盤面を見やすく調整 */
    .board-aa { background: #f0f0f0; padding: 20px; border-radius: 10px; font-family: 'Courier New', monospace; white-space: pre; line-height: 1.5; margin: 15px 0; font-size: 18px; border: 2px solid #ddd; text-align: center; letter-spacing: 2px; }
    .options { display: grid; gap: 12px; margin-top: 20px; }
    .option-btn { padding: 15px; font-size: 17px; background: var(--shogi-wood); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--shogi-dark); }
    .explanation { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; }
    .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .nav-btn { padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .next-btn { background: var(--shogi-dark); color: white; }
    .home-btn { background: #ccc; color: #333; }
    .pokemon-img { width: 70px; float: right; margin-top: -10px; }
    footer { margin-top: 20px; font-size: 11px; color: #999; text-align: center; width: 100%; padding-bottom: 20px; }
    ruby rt { font-size: 0.6em; color: #666; }
  </style>
</head>
<body>

<header><h1><ruby>将棋<rt>しょうぎ</rt></ruby>クイズ</h1></header>

<div id="main-menu" class="container" style="text-align:center;">
  <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/35.png" style="width:120px;" alt="ピッピ">
  <h2>いっしょに<ruby>修行<rt>しゅぎょう</rt></ruby>しよう！</h2>
  <button class="nav-btn next-btn" style="width:100%; font-size:18px;" onclick="startQuiz()">クイズをはじめる</button>
</div>

<div id="quiz-container" class="container" style="display:none;">
  <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/35.png" class="pokemon-img" alt="ピッピ">
  
  <div class="status-bar">
    <div id="lv-disp" style="font-weight:bold;">LEVEL 1</div>
    <div id="combo-disp" class="combo-badge">COMBO: 0</div>
  </div>

  <div id="q-text" style="font-size:18px; font-weight:bold; margin-bottom:10px;"></div>
  <div id="board-aa" class="board-aa"></div>

  <div class="options" id="options"></div>
  <div id="explanation" class="explanation"></div>
  
  <div class="btn-group">
    <button class="nav-btn home-btn" onclick="goHome()"><ruby>最初<rt>さいしょ</rt></ruby>に戻る</button>
    <button id="next-btn" class="nav-btn next-btn" style="display:none;" onclick="loadQuestion()">つぎへ！</button>
  </div>
</div>

<footer>Ver. 1.5.0 | しょうぎクイズ</footer>

<script>
  const questions = [
    { 
      q: "「<ruby>角<rt>かく</rt></ruby>」が<ruby>成<rt>な</rt></ruby>った「<ruby>龍馬<rt>りょうま</rt></ruby>」は、どこに<ruby>動<rt>うご</rt></ruby>ける？", 
      aa: "＼　┃　／\n　＼前／　\n━　馬　━\n　／後／　\n／　┃　／", 
      a: ["ななめ<ruby>全部<rt>ぜんぶ</rt></ruby> ＋ <ruby>前後左右<rt>ぜんごさゆう</rt></ruby>1マス", "<ruby>前後左右<rt>ぜんごさゆう</rt></ruby><ruby>全部<rt>ぜんぶ</rt></ruby>", "ななめだけ"], 
      c: 0, 
      e: "「<ruby>龍馬<rt>りょうま</rt></ruby>」は<ruby>斜<rt>なな</rt></ruby>めの<ruby>動<rt>うご</rt></ruby>きに、<ruby>王様<rt>おうさま</rt></ruby>の<ruby>動<rt>うご</rt></ruby>きがプラスされた<ruby>強力<rt>きょうりょく</rt></ruby>な<ruby>駒<rt>こま</rt></ruby>です！" 
    },
    { 
      q: "この<ruby>囲<rt>かこ</rt></ruby>いの<ruby>名前<rt>なまえ</rt></ruby>は何？", 
      aa: "・ ・ ・ \n・ 玉 ・ \n・ 銀 ・ \n金 金 ・ ", 
      a: ["<ruby>穴熊<rt>あなぐま</rt></ruby>", "<ruby>美濃囲<rt>みのがこ</rt></ruby>い", "<ruby>矢倉<rt>やぐら</rt></ruby>"], 
      c: 1, 
      e: "<ruby>金<rt>きん</rt></ruby>2<ruby>枚<rt>まい</rt></ruby>と<ruby>銀<rt>ぎん</rt></ruby>1<ruby>枚<rt>まい</rt></ruby>でガッチリ<ruby>守<rt>まも</rt></ruby>る、<ruby>振<rt>ふ</rt></ruby>り<ruby>飛車<rt>びしゃ</rt></ruby>の<ruby>基本<rt>きほん</rt></ruby>です！" 
    },
    { 
      q: "【1<ruby>手詰<rt>てづめ</rt></ruby>】<ruby>王様<rt>おうさま</rt></ruby>の<ruby>目<rt>め</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>に「<ruby>金<rt>きん</rt></ruby>」を<ruby>打<rt>う</rt></ruby>つ<ruby>詰<rt>つ</rt></ruby>みの<ruby>名前<rt>なまえ</rt></ruby>は？", 
      aa: "・ ・ ・ \n・ 王 ・ \n・ ？ ・ \n・ ・ ・ ", 
      a: ["<ruby>腹銀<rt>はらぎん</rt></ruby>", "<ruby>尻金<rt>しりきん</rt></ruby>", "<ruby>頭金<rt>あたまきん</rt></ruby>"], 
      c: 2, 
      e: "<ruby>王様<rt>おうさま</rt></ruby>の「<ruby>頭<rt>あたま</rt></ruby>」に<ruby>金<rt>きん</rt></ruby>を<ruby>打<rt>う</rt></ruby>つので「<ruby>頭金<rt>あたまきん</rt></ruby>」といいます！" 
    },
    { 
      q: "「<ruby>歩<rt>ふ</rt></ruby>」が<ruby>成<rt>な</rt></ruby>ると、どの<ruby>駒<rt>こま</rt></ruby>と<ruby>同<rt>おな</rt></ruby>じ<ruby>動<rt>うご</rt></ruby>きになる？", 
      aa: "歩 ➡ (？)", 
      a: ["<ruby>と金<rt>ときん</rt></ruby>（<ruby>金<rt>きん</rt></ruby>と<ruby>同<rt>おな</rt></ruby>じ）", "<ruby>銀<rt>ぎん</rt></ruby>", "<ruby>桂馬<rt>けいま</rt></ruby>"], 
      c: 0, 
      e: "「と<ruby>金<rt>きん</rt></ruby>」になると、<ruby>強力<rt>きょうりょく</rt></ruby>な「<ruby>金<rt>きん</rt></ruby>」のパワーを<ruby>手<rt>て</rt></ruby>にれます！" 
    }
  ];

  let currentIdx = 0;
  let combo = 0;

  function startQuiz() {
    document.getElementById("main-menu").style.display = "none";
    document.getElementById("quiz-container").style.display = "block";
    currentIdx = 0;
    combo = 0;
    loadQuestion();
  }

  function goHome() {
    document.getElementById("main-menu").style.display = "block";
    document.getElementById("quiz-container").style.display = "none";
  }

  function loadQuestion() {
    if (currentIdx >= questions.length) currentIdx = 0;
    const q = questions[currentIdx];
    
    document.getElementById("lv-disp").innerText = `LEVEL ${currentIdx + 1}`;
    document.getElementById("combo-disp").innerText = `COMBO: ${combo}`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("board-aa").innerText = q.aa;
    
    const optCont = document.getElementById("options");
    optCont.innerHTML = "";
    q.a.forEach((txt, i) => {
      const b = document.createElement("button");
      b.className = "option-btn";
      b.innerHTML = txt;
      b.onclick = () => check(i);
      optCont.appendChild(b);
    });
    
    document.getElementById("explanation").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
  }

  function check(i) {
    const q = questions[currentIdx];
    const exp = document.getElementById("explanation");
    const btns = document.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);

    if (i === q.c) {
      combo++;
      exp.innerHTML = "<strong>★<ruby>正解<rt>せいかい</rt></ruby>！★</strong><br>" + q.e;
      exp.style.backgroundColor = "#d4edda";
      exp.style.borderLeft = "5px solid var(--correct-green)";
    } else {
      combo = 0;
      exp.innerHTML = "<strong><ruby>残念<rt>ざんねん</rt></ruby>！</strong><br><ruby>正解<rt>せいかい</rt></ruby>は「" + q.a[q.c] + "」でした。<br>" + q.e;
      exp.style.backgroundColor = "#f8d7da";
      exp.style.borderLeft = "5px solid var(--accent-red)";
    }
    exp.style.display = "block";
    document.getElementById("next-btn").style.display = "block";
    currentIdx++;
  }
</script>
</body>
</html>
