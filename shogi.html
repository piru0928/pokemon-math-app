<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しょうぎクイズ</title>
  <style>
    :root { --shogi-wood: #f3d494; --shogi-dark: #5d4037; --accent-red: #e74c3c; --correct-green: #2ecc71; }
    body { font-family: sans-serif; background-color: #fdf5e6; color: var(--shogi-dark); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    header { background-color: var(--shogi-dark); color: var(--shogi-wood); width: 100%; padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 100; }
    header h1 { margin: 0; font-size: 22px; }
    .top-link { display: inline-block; margin-top: 5px; color: var(--shogi-wood); text-decoration: none; font-size: 12px; border: 1px solid var(--shogi-wood); padding: 2px 8px; border-radius: 4px; }
    .container { width: 92%; max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    #quiz-area, #result-area { display: none; }
    #quiz-area.active, #result-area.active { display: block; }
    .level-badge { display: inline-block; background: var(--accent-red); color: white; padding: 2px 10px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
    .question-text { font-size: 18px; font-weight: bold; margin-bottom: 20px; line-height: 1.8; }
    ruby rt { font-size: 0.6em; color: #666; }
    .options { display: grid; gap: 10px; }
    .option-btn { padding: 15px; font-size: 16px; background: var(--shogi-wood); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: var(--shogi-dark); text-align: left; }
    .explanation-card { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; }
    .correct-style { background-color: #d4edda; border-left: 5px solid var(--correct-green); }
    .wrong-style { background-color: #f8d7da; border-left: 5px solid var(--accent-red); }
    .next-btn { margin: 20px auto 0; padding: 12px 40px; background: var(--shogi-dark); color: white; border: none; border-radius: 25px; cursor: pointer; display: block; }
  </style>
</head>
<body>

<header>
  <h1>しょうぎクイズ</h1>
  <a href="https://piru0928.github.io/pokemon-math-app/index.html" class="top-link">🏠 もどる</a>
</header>

<div class="container">
  <div id="quiz-area" class="active">
    <div id="level-display" class="level-badge"></div>
    <div id="progress" style="font-size: 12px; color: #999; margin-bottom: 5px;"></div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="options-container"></div>
    <div id="explanation" class="explanation-card"></div>
    <button id="next-button" class="next-btn" onclick="nextQuestion()" style="display:none;">つぎへ</button>
  </div>

  <div id="result-area">
    <h2 style="text-align:center;"><ruby>結果<rt>けっか</rt></ruby></h2>
    <div id="score-display" style="text-align:center; font-size:20px; margin:20px;"></div>
    <button class="next-btn" style="background:var(--correct-green);" onclick="restartQuiz()">もう<ruby>一度<rt>いちど</rt></ruby>あそぶ</button>
  </div>
</div>

<script>
  // クイズデータ（レベル別）
  const quizPool = {
    1: [{ q: "<ruby>一番<rt>いちばん</rt></ruby><ruby>大切<rt>たいせつ</rt></ruby>な<ruby>駒<rt>こま</rt></ruby>、「<ruby>王将<rt>おうしょう</rt></ruby>」が<ruby>取<rt>と</rt></ruby>られるとどうなる？", a: ["<ruby>負<rt>ま</rt></ruby>けになる", "<ruby>交代<rt>こうたい</rt></ruby>する", "<ruby>復活<rt>ふっかつ</rt></ruby>する"], c: 0, e: "王様が取られたら対局終了です。" }],
    2: [{ q: "「<ruby>角行<rt>かくぎょう</rt></ruby>」が<ruby>成<rt>な</rt></ruby>ると、どの<ruby>駒<rt>こま</rt></ruby>になる？", a: ["<ruby>龍王<rt>りゅうおう</rt></ruby>", "<ruby>龍馬<rt>りゅうめ</rt></ruby>", "<ruby>成角<rt>なりかく</rt></ruby>"], c: 1, e: "角が成ると龍馬になり、ななめに無限、上下左右に1マス動けます。" }],
    3: [{ q: "<ruby>王様<rt>おうさま</rt></ruby>を<ruby>守<rt>まも</rt></ruby>る「<ruby>囲<rt>かこ</rt></ruby>い」のうち、<ruby>横<rt>よこ</rt></ruby>からの<ruby>攻<rt>せ</rt></ruby>めに<ruby>強<rt>つよ</rt></ruby>いのは？", a: ["<ruby>矢倉<rt>やぐら</rt></ruby>", "<ruby>美濃囲<rt>みのがこ</rt></ruby>い", "<ruby>棒銀<rt>ぼうぎん</rt></ruby>"], c: 1, e: "美濃囲いは振り飛車の定番の守りです。" }],
    4: [{ q: "【<ruby>詰<rt>つ</rt></ruby>め<ruby>将棋<rt>しょうぎ</rt></ruby>】<ruby>相手<rt>あいて</rt></ruby>の<ruby>王様<rt>おうさま</rt></ruby>が「1一」にいて、<ruby>自分<rt>じぶん</rt></ruby>の「<ruby>金<rt>きん</rt></ruby>」を「1二」に<ruby>打<rt>う</rt></ruby>ちました。これは？", a: ["<ruby>王手<rt>おうて</rt></ruby>", "<ruby>詰<rt>つ</rt></ruby>み", "<ruby>反則<rt>はんそく</rt></ruby>"], c: 1, e: "「頭金（あたまきん）」という最も基本的な詰みの形です。" }],
    5: [{ q: "【<ruby>詰<rt>つ</rt></ruby>め<ruby>将棋<rt>しょうぎ</rt></ruby>】<ruby>持<rt>も</rt></ruby>ち<ruby>駒<rt>ごま</rt></ruby>の「<ruby>桂馬<rt>けいま</rt></ruby>」を<ruby>打<rt>う</rt></ruby>って<ruby>王手<rt>おうて</rt></ruby>をすることを、その<ruby>動<rt>うご</rt></ruby>きから何と<ruby>呼<rt>よ</rt></ruby>ぶ？", a: ["<ruby>王手<rt>おうて</rt></ruby>ジャンプ", "<ruby>大手<rt>おおて</rt></ruby>ふんどし", "<ruby>桂王手<rt>けいおうて</rt></ruby>"], c: 1, e: "桂馬で2つの駒を同時に狙うことを「ふんどしの桂」と呼びます。" }]
  };

  let level = 1;
  let score = 0;
  let isMasterMode = false;

  function loadQuestion() {
    const targetLv = isMasterMode ? Math.floor(Math.random() * 5) + 1 : level;
    const qList = quizPool[targetLv] || quizPool[1];
    const q = qList[Math.floor(Math.random() * qList.length)];
    
    document.getElementById("level-display").innerHTML = isMasterMode ? "MASTER MODE" : `LEVEL ${level}`;
    document.getElementById("q-text").innerHTML = q.q;
    
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    q.a.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = opt;
      btn.onclick = () => checkAnswer(i, q);
      container.appendChild(btn);
    });
    document.getElementById("explanation").style.display = "none";
    document.getElementById("next-button").style.display = "none";
  }

  function checkAnswer(idx, q) {
    const exp = document.getElementById("explanation");
    const btns = document.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);

    if (idx === q.c) {
      score++;
      if(!isMasterMode) level++;
      if(level > 5) isMasterMode = true;
      exp.innerHTML = "<strong><ruby>正解<rt>せいかい</rt></ruby>！</strong><br>" + q.e;
      exp.className = "explanation-card correct-style";
    } else {
      exp.innerHTML = "<strong><ruby>不正解<rt>ふせいかい</rt></ruby>…</strong><br><ruby>正解<rt>せいかい</rt></ruby>は「" + q.a[q.c] + "」です。<br>" + q.e;
      exp.className = "explanation-card wrong-style";
    }
    exp.style.display = "block";
    document.getElementById("next-button").style.display = "block";
  }

  function nextQuestion() {
    if (score >= 10) { showResult(); } else { loadQuestion(); }
  }

  function showResult() {
    document.getElementById("quiz-area").classList.remove("active");
    document.getElementById("result-area").classList.add("active");
    document.getElementById("score-display").innerHTML = `10<ruby>問終了<rt>もんしゅうりょう</rt></ruby>！`;
  }

  function restartQuiz() {
    level = 1; score = 0; isMasterMode = false;
    document.getElementById("quiz-area").classList.add("active");
    document.getElementById("result-area").classList.remove("active");
    loadQuestion();
  }

  window.onload = loadQuestion;
</script>
</body>
</html>
