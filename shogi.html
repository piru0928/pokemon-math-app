<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しょうぎクイズ</title>
  <style>
    :root { --shogi-wood: #f3d494; --shogi-dark: #5d4037; --accent-red: #e74c3c; --correct-green: #2ecc71; --pokemon-pink: #ffafcc; }
    body { font-family: 'Courier New', Courier, monospace; background-color: #fdf5e6; color: var(--shogi-dark); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    header { background-color: var(--shogi-dark); color: var(--shogi-wood); width: 100%; padding: 15px 0; text-align: center; }
    .container { width: 92%; max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
    .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .combo-badge { background: var(--pokemon-pink); color: white; padding: 2px 10px; border-radius: 10px; font-weight: bold; }
    .board-aa { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; white-space: pre; line-height: 1.2; margin: 10px 0; font-size: 14px; border: 1px solid #ccc; text-align: center; }
    .options { display: grid; gap: 10px; margin-top: 20px; }
    .option-btn { padding: 15px; font-size: 16px; background: var(--shogi-wood); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .explanation { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
    .next-btn { margin: 20px auto 0; padding: 12px 40px; background: var(--shogi-dark); color: white; border: none; border-radius: 25px; cursor: pointer; display: block; }
    .pokemon-img { width: 70px; float: right; }
    footer { margin-top: 20px; font-size: 11px; color: #999; }
  </style>
</head>
<body>

<header><h1>しょうぎクイズ</h1></header>

<div class="container">
  <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/35.png" class="pokemon-img" alt="ピッピ">
  
  <div class="status-bar">
    <div id="lv-disp" style="font-weight:bold;">LEVEL 1</div>
    <div id="combo-disp" class="combo-badge">COMBO: 0</div>
  </div>

  <div id="q-text" style="font-size:18px; font-weight:bold; margin-bottom:10px;"></div>
  <div id="board-aa" class="board-aa"></div>

  <div class="options" id="options"></div>
  <div id="explanation" class="explanation"></div>
  <button id="next-btn" class="next-btn" style="display:none;" onclick="loadNext()">次の問題へ</button>
</div>

<footer>Ver. 1.4.0 | しょうぎクイズ</footer>

<script>
  const questions = [
    { q: "「<ruby>角<rt>かく</rt></ruby>」が<ruby>成<rt>な</rt></ruby>って「<ruby>龍馬<rt>りょうま</rt></ruby>」になりました。どこに動ける？", aa: "　＼　┃　／\n　　＼前／\n　左━馬━右\n　　／後＼\n　／　┃　＼", a: ["ななめ全部＋前後左右1マス", "前後左右全部", "ななめだけ"], c: 0, e: "龍馬（りょうま）は斜めの動きに加えて、上下左右に1マス動けるようになります。" },
    { q: "この囲いの名前は何？", aa: "【盤面：右下】\n ・ ・ ・ \n ・ 玉 ・ \n ・ 銀 ・ \n 金 金 ・ ", a: ["穴熊", "美濃囲い", "矢倉"], c: 1, e: "金2枚と銀1枚で王様を横から守る「美濃囲い」です。" },
    { q: "【1手詰】王様の目の前に「金」を打つ詰みの名前は？", aa: " ・ ・ ・ \n ・ 王 ・ \n ・ 金 ・ \n ・ ・ ・ ", a: ["腹銀", "尻金", "頭金"], c: 2, e: "王様の頭に打つので「頭金（あたまきん）」と言います。" },
    { q: "「<ruby>歩<rt>ふ</rt></ruby>」が成ったあとの名前は？", aa: "歩 ➡ (？)", a: ["と金", "成歩", "金将"], c: 0, e: "「と金」になります。動きは金と同じになります。" }
  ];

  let currentIdx = 0;
  let combo = 0;

  function loadNext() {
    if (currentIdx >= questions.length) {
        currentIdx = 0; // ループ
    }
    const q = questions[currentIdx];
    document.getElementById("lv-disp").innerText = `LEVEL ${currentIdx + 1}`;
    document.getElementById("combo-disp").innerText = `COMBO: ${combo}`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("board-aa").innerText = q.aa;
    
    const optCont = document.getElementById("options");
    optCont.innerHTML = "";
    q.a.forEach((txt, i) => {
      const b = document.createElement("button");
      b.className = "option-btn";
      b.innerHTML = txt;
      b.onclick = () => check(i);
      optCont.appendChild(b);
    });
    document.getElementById("explanation").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
  }

  function check(i) {
    const q = questions[currentIdx];
    const exp = document.getElementById("explanation");
    if (i === q.c) {
      combo++;
      exp.innerHTML = "🎉 正解！<br>" + q.e;
      exp.style.backgroundColor = "#d4edda";
    } else {
      combo = 0;
      exp.innerHTML = "❌ 残念...<br>正解は「" + q.a[q.c] + "」でした。";
      exp.style.backgroundColor = "#f8d7da";
    }
    exp.style.display = "block";
    document.getElementById("next-btn").style.display = "block";
    currentIdx++;
  }

  loadNext();
</script>
</body>
</html>
