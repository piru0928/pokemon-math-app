<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・ことわざマスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f3e5f5;
      text-align: center;
      padding: 10px;
      transition: 0.3s;
      user-select: none;
      -webkit-user-select: none;
    }
    ruby { ruby-position: over; }
    rt { font-size: 0.55em; color: #7b1fa2; font-weight: normal; }

    h1 { color: #7b1fa2; margin-bottom: 5px; font-size: 24px; }
    
    .score-container {
      display: flex;
      justify-content: space-between;
      max-width: 400px;
      margin: 0 auto 10px auto;
      gap: 10px;
    }
    .combo-counter {
      flex: 1;
      background-color: #ba68c8;
      color: white;
      padding: 6px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
    }
    .best-counter {
      flex: 1;
      background-color: #ffb300;
      color: white;
      padding: 6px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
    }

    #quiz-card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 15px;
      width: 95%;
      max-width: 400px;
      box-sizing: border-box;
    }
    
    #pokemon-img { width: 130px; height: 130px; background: #fdfbff; border-radius: 50%; border: 4px solid #ce93d8; margin-bottom: 10px; }
    #question-text { font-size: 18px; font-weight: bold; color: #333; margin: 10px 0; line-height: 1.8; padding: 0 5px; }

    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 400px;
      margin: 10px auto;
    }
    .choice-btn {
      padding: 15px 5px;
      font-size: 15px;
      font-weight: bold;
      background-color: white;
      border: 3px solid #ce93d8;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px #ba68c8;
    }
    .choice-btn:active { transform: translateY(2px); box-shadow: 0 2px #ba68c8; }
    .choice-btn:disabled { opacity: 0.7; cursor: default; }

    #result { font-size: 20px; margin-top: 10px; font-weight: bold; min-height: 30px; }
    #next-button {
      margin-top: 15px; padding: 12px 40px; font-size: 18px;
      background-color: #9c27b0; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none; font-weight: bold;
      box-shadow: 0 4px 0 #7b1fa2;
    }
    #next-button:active { transform: translateY(2px); box-shadow: 0 2px 0 #7b1fa2; }
    #version-info { position: fixed; bottom: 5px; right: 5px; font-size: 9px; color: #9e9e9e; }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.1.0</div>
  <h1>💬 <ruby>諺<rt>ことわざ</rt></ruby>マスター</h1>
  
  <div class="score-container">
    <div class="combo-counter" id="combo-display">れんぞくせいかい: 0 もん</div>
    <div class="best-counter" id="best-display">👑 さいこう: 0 もん</div>
  </div>

  <div id="quiz-card">
    <img id="pokemon-img" src="" alt="pokemon">
    <div id="question-text">もんだい</div>
  </div>
  
  <div class="choices-container" id="choices"></div>
  <div id="result"></div>
  
  <button id="next-button" onclick="generateQuiz()"><ruby>次<rt>つぎ</rt></ruby>のもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script>
    // 全て王道・定番の「ことわざ（諺）」に差し替え・追加（全20問）
    const wordQuestions = [
      { q: "「ネコに <ruby>小判<rt>こばん</rt></ruby>」と<ruby>同<rt>おな</rt></ruby>じいみの <ruby>言葉<rt>ことば</rt></ruby>は、どっちかな？", a: ["ブタに <ruby>真珠<rt>しんじゅ</rt></ruby>", "イヌに おやつ", "ウサギに ぼうし", "カメに こうら"] },
      { q: "「イヌも <ruby>歩<rt>ある</rt></ruby>けば ○に あたる」。○に <ruby>入<rt>はい</rt></ruby>るのは？", a: ["<ruby>棒<rt>ぼう</rt></ruby>", "<ruby>石<rt>いし</rt></ruby>", "パン", "<ruby>穴<rt>あな</rt></ruby>"] },
      { q: "「サルも <ruby>木<rt>き</rt></ruby>から ○」。とくいなことでも <ruby>失敗<rt>しっぱい</rt></ruby>する、という意味だよ。", a: ["<ruby>落<rt>お</rt></ruby>ちる", "<ruby>飛<rt>と</rt></ruby>ぶ", "<ruby>寝<rt>ね</rt></ruby>る", "<ruby>笑<rt>わら</rt></ruby>う"] },
      { q: "「カエルの <ruby>子<rt>こ</rt></ruby>は ○」。子どもは 親（おや）に にるものだ、という意味だよ。", a: ["カエル", "おたまじゃくし", "ヘビ", "サカナ"] },
      { q: "「スズメの ○」。とっても すくない、という意味の<ruby>言葉<rt>ことば</rt></ruby>だよ。", a: ["<ruby>涙<rt>なみだ</rt></ruby>", "<ruby>羽根<rt>はね</rt></ruby>", "<ruby>歌<rt>うた</rt></ruby>", "<ruby>巣<rt>す</rt></ruby>"] },
      { q: "「○の <ruby>耳<rt>みみ</rt></ruby>に <ruby>念仏<rt>ねんぶつ</rt></ruby>」。いくら言っても きかないことだよ。", a: ["ウマ", "ウシ", "ヤギ", "ネズミ"] },
      { q: "「○の <ruby>前<rt>まえ</rt></ruby>の <ruby>杖<rt>つえ</rt></ruby>」。あぶないことが 起（お）こる前（まえ）に、しっかり<ruby>準備<rt>じゅんび</rt></ruby>することだよ。", a: ["<ruby>転<rt>ころ</rt></ruby>ばぬ", "<ruby>走<rt>はし</rt></ruby>らぬ", "<ruby>起<rt>お</rt></ruby>きぬ", "<ruby>滑<rt>すべ</rt></ruby>らぬ"] },
      { q: "「○は <ruby>災<rt>わざわ</rt></ruby>いの <ruby>元<rt>もと</rt></ruby>」。うっかりしゃべったことで、トラブルに なることだよ。", a: ["<ruby>口<rt>くち</rt></ruby>", "<ruby>目<rt>め</rt></ruby>", "<ruby>耳<rt>みみ</rt></ruby>", "<ruby>手<rt>て</rt></ruby>"] },
      { q: "「ちりも <ruby>積<rt>つ</rt></ruby>もれば ○と なる」。すこしのことでも、ずっと つづければ 大きな力になるよ。", a: ["<ruby>山<rt>やま</rt></ruby>", "<ruby>海<rt>うみ</rt></ruby>", "<ruby>城<rt>しろ</rt></ruby>", "<ruby>雲<rt>くも</rt></ruby>"] },
      { q: "「○を聞（き）いて <ruby>十<rt>じゅう</rt></ruby>を知（し）る」。あたまがよくて、すこし聞いただけで すべてわかることだよ。", a: ["<ruby>一<rt>いち</rt></ruby>", "<ruby>二<rt>に</rt></ruby>", "<ruby>三<rt>さん</rt></ruby>", "<ruby>五<rt>ご</rt></ruby>"] },
      { q: "「<ruby>三日<rt>みっか</rt></ruby>ボーズ」と<ruby>同<rt>おな</rt></ruby>じいみの <ruby>言葉<rt>ことば</rt></ruby>は、どっちかな？", a: ["<ruby>三日<rt>みっか</rt></ruby>ぼうず", "<ruby>十日<rt>とおか</rt></ruby>ぼうず", "<ruby>一年<rt>いちねん</rt></ruby>ぼうず", "<ruby>五日<rt>いつか</rt></ruby>ぼうず"] },
      { q: "「○より だんご」。かっこいいものより、おなかが ふくらむ 実（じつ）のあるほうが いいな！という意味だよ。", a: ["<ruby>花<rt>はな</rt></ruby>", "<ruby>星<rt>ほし</rt></ruby>", "<ruby>歌<rt>うた</rt></ruby>", "<ruby>服<rt>ふく</rt></ruby>"] },
      { q: "「<ruby>失敗<rt>しっぱい</rt></ruby>は ○の <ruby>母<rt>はは</rt></ruby>」。うまくいかなくても、それがつぎの チャンスになるよ。", a: ["<ruby>成功<rt>せいこう</rt></ruby>", "<ruby>天才<rt>てんさい</rt></ruby>", "<ruby>元気<rt>げんき</rt></ruby>", "<ruby>応援<rt>おうえん</rt></ruby>"] },
      { q: "「早（はや）おきは ○の <ruby>得<rt>とく</rt></ruby>」。朝（あさ）はやく 起（お）きると、いいことが あるよという意味だよ。", a: ["<ruby>三文<rt>さんもん</rt></ruby>", "<ruby>百円<rt>ひゃくえん</rt></ruby>", "<ruby>一両<rt>いちりょう</rt></ruby>", "<ruby>十円<rt>じゅうえん</rt></ruby>"] },
      { q: "「急（いそ）がば ○」。いそいでいるときほど、あわてず 安全（あんぜん）な道（みち）を 行（い）こうということだよ。", a: ["<ruby>回<rt>まわ</rt></ruby>れ", "<ruby>走<rt>はし</rt></ruby>れ", "<ruby>止<rt>と</rt></ruby>まれ", "<ruby>進<rt>すす</rt></ruby>め"] },
      { q: "「○に <ruby>追<rt>お</rt></ruby>われるものは ○をみず」。ひとつのことに むちゅうになると、まわりが 見（み）えなくなるよ。", a: ["<ruby>鹿<rt>しか</rt></ruby>", "<ruby>鳥<rt>とり</rt></ruby>", "<ruby>魚<rt>さかな</rt></ruby>", "<ruby>虫<rt>むし</rt></ruby>"] },
      { q: "「情（なさ）けは ○のためならず」。人に やさしくしておくと、めぐりめぐって 自分（じぶん）にいいことが返ってくるよ。", a: ["<ruby>人<rt>ひと</rt></ruby>", "<ruby>友<rt>とも</rt></ruby>", "<ruby>親<rt>おや</rt></ruby>", "<ruby>神<rt>かみ</rt></ruby>"] },
      { q: "「○の上の <ruby>三年<rt>さんねん</rt></ruby>」。つらくても がまんして つづければ、いつか うまくいくよという意味だよ。", a: ["<ruby>石<rt>いし</rt></ruby>", "<ruby>木<rt>き</rt></ruby>", "<ruby>山<rt>やま</rt></ruby>", "<ruby>椅子<rt>いす</rt></ruby>"] },
      { q: "「聞（き）くは <ruby>一時<rt>いっとき</rt></ruby>の <ruby>恥<rt>はじ</rt></ruby>、聞（き）かぬは ○の <ruby>恥<rt>はじ</rt></ruby>」。知らないことは はずかしがらずに 聞こうねということだよ。", a: ["<ruby>一生<rt>いっしょう</rt></ruby>", "<ruby>一年<rt>いちねん</rt></ruby>", "<ruby>一日<rt>いちにち</rt></ruby>", "<ruby>十回<rt>じっかい</rt></ruby>"] },
      { q: "「エビで ○を つる」。すこしの プレゼントで、ものすごく 大きなものを 手（て）にいれることだよ。", a: ["<ruby>鯛<rt>たい</rt></ruby>", "<ruby>クジラ</rt></ruby>", "<ruby>サメ<rt>さめ</rt></ruby>", "<ruby>マグロ<rt>まぐろ</rt></ruby>"] }
    ];

    let correctStreak = 0;
    let bestStreak = 0;
    let currentAnswer = "";

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(type) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (type === 'correct') {
          this._note(880, now, 0.1); this._note(1100, now + 0.1, 0.2);
        } else if (type === 'special') {
          [523, 659, 783, 1046].forEach((f, i) => this._note(f, now + (i * 0.1), 0.3));
        } else {
          this._note(200, now, 0.3);
        }
      }
    };

    // ハイスコアの読み込み
    function loadHighScore() {
      const savedBest = localStorage.getItem("kotowaza_best_streak");
      if (savedBest !== null) {
        bestStreak = parseInt(savedBest, 10);
      }
      document.getElementById("best-display").innerText = `👑 さいこう: ${bestStreak} もん`;
    }

    async function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.body.style.backgroundColor = "#f3e5f5";

      const qData = wordQuestions[Math.floor(Math.random() * wordQuestions.length)];
      document.getElementById("question-text").innerHTML = qData.q;
      currentAnswer = qData.a[0];

      // エスパータイプや知的なポケモンの画像を表示
      const smartPokemon = [63, 64, 65, 122, 133, 149, 151, 196]; 
      const pokeId = smartPokemon[Math.floor(Math.random() * smartPokemon.length)];
      document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png`;

      let options = [...qData.a].sort(() => Math.random() - 0.5);
      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerHTML = opt;
        btn.onclick = () => checkAnswer(opt);
        choicesDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
      const resArea = document.getElementById("result");

      if (selected === currentAnswer) {
        correctStreak++;
        if (correctStreak % 5 === 0) Buzzer.play('special');
        else Buzzer.play('correct');
        resArea.textContent = "✨ せいかい！";
        document.body.style.backgroundColor = "#f1f8e9";

        // 最高連続記録の更新
        if (correctStreak > bestStreak) {
          bestStreak = correctStreak;
          localStorage.setItem("kotowaza_best_streak", bestStreak);
          document.getElementById("best-display").innerText = `👑 さいこう: ${bestStreak} もん`;
        }
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        resArea.innerHTML = `❌ こたえは「${currentAnswer}」だよ`;
        document.body.style.backgroundColor = "#ffebee";
      }
      
      document.getElementById("combo-display").innerText = `れんぞくせいかい: ${correctStreak} もん`;
      document.getElementById("next-button").style.display = "inline-block";
    }

    window.onload = () => {
      loadHighScore();
      generateQuiz();
    };
  </script>
</body>
</html>
