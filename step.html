<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポケモン論理配置パズル</title>
    <style>
        body { font-family: sans-serif; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .level-info { font-weight: bold; color: #3182ce; margin-bottom: 10px; }
        .stairs-container { display: flex; align-items: flex-end; justify-content: center; gap: 5px; height: 120px; margin: 20px 0; border-bottom: 2px solid #333; }
        .slot { width: 60px; height: 60px; border: 2px dashed #ccc; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .stairs-1 { height: 30px; width: 60px; background: #d69e2e; }
        .stairs-2 { height: 60px; width: 60px; background: #d69e2e; }
        .stairs-3 { height: 90px; width: 60px; background: #d69e2e; }
        .clue { background: #eef; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.9rem; }
        .btn-poke { background: #3182ce; color: white; border: none; padding: 10px; margin: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="game-card">
    <div id="level-info" class="level-info">Level 1</div>
    <div id="stairs" class="stairs-container"></div>
    <div id="clue" class="clue"></div>
    <div id="choices"></div>
    <div id="msg"></div>
</div>

<script>
    const pokemon = [
        {name: "ピカチュウ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"},
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "ミュウ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/151.png"}
    ];

    let currentLevel = 1;
    let correctAnswer = [];
    let playerAnswer = [];

    function generateProblem() {
        // ランダムに配置を決定
        correctAnswer = [...pokemon].sort(() => Math.random() - 0.5);
        
        // ヒントの生成 (論理ロジック)
        const c1 = `${correctAnswer[0].name}は${correctAnswer[1].name}より左にいるよ。`;
        const c2 = `${correctAnswer[2].name}は一番右にいるよ。`;
        document.getElementById('clue').innerText = `ヒント: ${c1} ${c2}`;
        
        document.getElementById('level-info').innerText = currentLevel <= 5 ? `Level ${currentLevel}` : "エクストリームモード！";
        
        renderGame();
    }

    function renderGame() {
        const stairs = document.getElementById('stairs');
        stairs.innerHTML = '';
        correctAnswer.forEach((_, i) => {
            const div = document.createElement('div');
            div.className = `stairs-${i + 1} slot`;
            div.onclick = () => removeAnswer(i);
            div.innerHTML = playerAnswer[i] ? `<img src="${playerAnswer[i].img}" width="50">` : "?";
            stairs.appendChild(div);
        });

        const choices = document.getElementById('choices');
        choices.innerHTML = '';
        pokemon.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'btn-poke';
            btn.innerText = p.name;
            btn.onclick = () => addAnswer(p);
            choices.appendChild(btn);
        });
    }

    function addAnswer(p) {
        if(playerAnswer.length < 3) {
            playerAnswer.push(p);
            renderGame();
            if(playerAnswer.length === 3) check();
        }
    }

    function removeAnswer(i) {
        playerAnswer.splice(i, 1);
        renderGame();
    }

    function check() {
        const isCorrect = playerAnswer.every((p, i) => p.name === correctAnswer[i].name);
        if(isCorrect) {
            alert("せいかい！");
            currentLevel++;
            playerAnswer = [];
            generateProblem();
        } else {
            alert("ちがうみたい！もういちど！");
            playerAnswer = [];
            renderGame();
        }
    }

    generateProblem();
</script>
</body>
</html>
