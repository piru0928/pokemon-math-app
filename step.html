<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケモン推理パズル Ver 3.2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f7ff; --accent: #3182ce; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; overflow-y: auto; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; min-height: 90vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #level-title { text-align: center; margin: 10px 0; }
        
        /* スロット：幅に収まるよう自動調整 */
        .drop-zone { display: flex; gap: 2vw; justify-content: center; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .slot { width: 15vw; height: 15vw; min-width: 50px; min-height: 50px; max-width: 70px; max-height: 70px; border: 2px dashed #cbd5e0; border-radius: 12px; background: #fafafa; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        
        #clue { background: #ebf8ff; border-left: 4px solid var(--accent); padding: 12px; font-size: 0.95rem; line-height: 1.8; margin-bottom: 20px; border-radius: 0 10px 10px 0; }
        #choices { display: flex; justify-content: space-evenly; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        
        /* 画像を小さくして全体に収まるように */
        .pokemon-item { width: 18vw; height: 18vw; min-width: 50px; min-height: 50px; max-width: 80px; max-height: 80px; cursor: pointer; object-fit: contain; transition: 0.2s; }
        .selected { opacity: 0.3; transform: scale(0.9); }
        
        .buttons { display: flex; gap: 10px; margin-top: auto; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; flex: 1; color: white; cursor: pointer; font-size: 1rem; }
        
        #msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; font-size: 2rem; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button onclick="history.back()" style="background:#a0aec0; padding: 8px;">⬅ もどる</button>
        <span style="color:#718096; font-size: 0.8rem;">Ver 3.2.0</span>
    </div>
    
    <h2 id="level-title">Level 1</h2>
    <div id="drop-zone" class="drop-zone"></div>
    <div id="clue"></div>
    <div id="choices"></div>
    
    <div class="buttons">
        <button onclick="initGame()" style="background:#e53e3e;">リセット</button>
        <button onclick="checkAnswer()" style="background:#48bb78;">ていしゅつ！</button>
    </div>
</div>

<div id="msg">大せいかい！！</div>
</body>
</html>
