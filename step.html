<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブイズのステップクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Kosugi Maru', sans-serif; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .drop-zone { display: flex; align-items: flex-end; justify-content: center; gap: 10px; height: 180px; margin: 30px 0; border-bottom: 6px solid #4a5568; }
        .slot { width: 70px; height: 70px; border: 3px dashed #cbd5e0; display: flex; justify-content: center; align-items: center; border-radius: 10px; background: #fff; position: relative; }
        .pokemon-item { width: 60px; cursor: grab; transition: transform 0.2s; }
        .clue { background: #ebf8ff; border-left: 5px solid #3182ce; padding: 20px; margin: 20px 0; line-height: 2.2; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <button onclick="history.back()">⬅ もどる</button>
        <span style="color:#718096;">Ver 1.3.0</span>
    </div>
    <h2 id="level-title" style="text-align:center;">Level 1</h2>
    
    <div id="drop-zone" class="drop-zone"></div>
    <div id="clue" class="clue"></div>
    <div id="choices" style="display:flex; justify-content:center; gap:10px; min-height:80px; padding: 10px;"></div>

    <div style="text-align:center; margin-top:20px; display: flex; gap: 10px; justify-content: center;">
        <button onclick="resetGame()" style="background:#e53e3e; color:white; padding:15px 30px; border:none; border-radius:10px; cursor:pointer;">やりなおす</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white; padding:15px 30px; border:none; border-radius:10px; cursor:pointer;">ていしゅつ！</button>
    </div>
</div>

<script>
    const pokemonPool = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"},
        {name: "エーフィ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/196.png"},
        {name: "ブラッキー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/197.png"}
    ];

    let currentLevel = 1;
    let currentOrder = [];

    function initGame() {
        const num = Math.min(2 + currentLevel, 6);
        currentOrder = [...pokemonPool].sort(() => Math.random() - 0.5).slice(0, num);
        
        document.getElementById('level-title').innerText = `Level ${currentLevel}`;
        
        // 問題文をポケモンの数(num)だけ生成
        let clueText = "ヒント：<br>";
        for(let i = 0; i < num; i++) {
            if(i === 0) clueText += `・${currentOrder[0].name}は${currentOrder[1].name}より左にいるよ。<br>`;
            else if(i === num - 1) clueText += `・${currentOrder[num-1].name}は一番右にいるよ。<br>`;
            else clueText += `・${currentOrder[i].name}は${currentOrder[i-1].name}の右隣にいるよ。<br>`;
        }
        document.getElementById('clue').innerHTML = clueText;
        render();
    }

    function render() {
        const dropZone = document.getElementById('drop-zone');
        dropZone.innerHTML = '';
        currentOrder.forEach(() => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.ondragover = e => e.preventDefault();
            slot.ondrop = drop;
            dropZone.appendChild(slot);
        });

        const choices = document.getElementById('choices');
        choices.innerHTML = '';
        [...currentOrder].sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = p.img;
            img.className = 'pokemon-item';
            img.draggable = true;
            img.id = p.name;
            img.ondragstart = e => e.dataTransfer.setData("text", e.target.id);
            choices.appendChild(img);
        });
    }

    function drop(e) {
        e.preventDefault();
        const draggedId = e.dataTransfer.getData("text");
        const draggedEl = document.getElementById(draggedId);
        const targetSlot = e.target.closest('.slot');
        
        if (targetSlot) {
            if (targetSlot.firstChild) {
                // 入れ替え処理：ターゲットに既にポケモンがいる場合
                const existingEl = targetSlot.firstChild;
                draggedEl.parentNode.appendChild(existingEl);
            }
            targetSlot.appendChild(draggedEl);
        }
    }

    function resetGame() { render(); }

    function checkAnswer() {
        const slots = document.querySelectorAll('.slot');
        let playerAns = Array.from(slots).map(s => s.querySelector('img')?.id);
        
        if(playerAns.includes(undefined)) return alert("全部並べてね！");
        
        if(playerAns.every((name, i) => name === currentOrder[i].name)) {
            confetti({ particleCount: 300, spread: 150 });
            setTimeout(() => {
                currentLevel++;
                alert("大せいかい！次のレベルへ！");
                initGame();
            }, 500);
        } else {
            alert("ちがうみたい…もう一度考えてみよう！");
        }
    }

    initGame();
</script>
</body>
</html>
