<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン推理パズル Ver 2.0.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f7ff; --card: #ffffff; --accent: #3182ce; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .game-card { background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* ポケモン配置エリア（横スクロール） */
        .drop-zone-wrapper { width: 100%; overflow-x: auto; padding-bottom: 10px; margin: 20px 0; }
        .drop-zone { display: inline-flex; gap: 15px; min-width: 100%; justify-content: center; }
        .slot { flex-shrink: 0; width: 120px; height: 120px; border: 4px dashed #cbd5e0; border-radius: 20px; background: #fafafa; display: flex; justify-content: center; align-items: center; }
        
        .pokemon-item { width: 110px; height: 110px; cursor: grab; object-fit: contain; touch-action: none; }
        #choices { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; min-height: 120px; padding: 15px; background: #f7fafc; border-radius: 20px; }
        
        .clue { background: #ebf8ff; border-left: 6px solid var(--accent); padding: 20px; border-radius: 0 15px 15px 0; font-weight: bold; line-height: 2.0; font-size: 1.1rem; }
        .checked { color: #a0aec0; text-decoration: line-through; }
        
        .controls { display: flex; gap: 15px; margin-top: 20px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">
        <button onclick="history.back()">⬅ もどる</button>
        <span style="color:#718096; font-size:0.8rem;">Ver 2.0.0</span>
    </div>
    <h2 id="level-title" style="text-align:center;">Level 1</h2>
    
    <div class="drop-zone-wrapper"><div id="drop-zone" class="drop-zone"></div></div>
    <div id="clue" class="clue"></div>
    <div id="choices"></div>

    <div class="controls">
        <button onclick="resetGame()" style="background:#e53e3e; color:white;">やりなおす</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white;">ていしゅつ！</button>
    </div>
</div>

<script>
    const pool = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"},
        {name: "エーフィ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/196.png"},
        {name: "ブラッキー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/197.png"}
    ];

    let currentLevel = 1, currentOrder = [];

    function initGame() {
        const num = Math.min(2 + currentLevel, 6);
        currentOrder = [...pool].sort(() => Math.random() - 0.5).slice(0, num);
        document.getElementById('level-title').innerText = `Level ${currentLevel}`;
        
        let clues = [];
        clues.push(`${currentOrder[num-1].name}は<ruby>一番<rt>いちばん</rt></ruby><ruby>右<rt>みぎ</rt></ruby>にいる。`);
        clues.push(`${currentOrder[0].name}は${currentOrder[1].name}の<ruby>左隣<rt>ひだりどなり</rt></ruby>にいる。`);
        for(let i = 1; i < num - 1; i++) {
            clues.push(`${currentOrder[i].name}は${currentOrder[i+1].name}の<ruby>左隣<rt>ひだりどなり</rt></ruby>にいる。`);
        }
        clues.sort(() => Math.random() - 0.5);

        let html = "ヒント：<br>";
        clues.forEach(c => {
            html += `<div><input type="checkbox" onchange="this.nextElementSibling.classList.toggle('checked', this.checked)"> <span>${c}</span></div>`;
        });
        document.getElementById('clue').innerHTML = html;
        render();
    }

    function render() {
        const zone = document.getElementById('drop-zone');
        zone.innerHTML = '';
        currentOrder.forEach(() => {
            const s = document.createElement('div');
            s.className = 'slot';
            s.ondragover = e => e.preventDefault();
            s.ondrop = drop;
            zone.appendChild(s);
        });
        const ch = document.getElementById('choices');
        ch.innerHTML = '';
        [...currentOrder].sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = p.img; img.className = 'pokemon-item'; img.draggable = true;
            img.id = p.name; img.ondragstart = e => e.dataTransfer.setData("text", e.target.id);
            ch.appendChild(img);
        });
    }

    function drop(e) {
        e.preventDefault();
        const dragged = document.getElementById(e.dataTransfer.getData("text"));
        const target = e.target.closest('.slot');
        if (target) {
            if (target.firstChild) dragged.parentNode.appendChild(target.firstChild);
            target.appendChild(dragged);
        }
    }

    function resetGame() { render(); }

    function checkAnswer() {
        const slots = document.querySelectorAll('.slot');
        const ans = Array.from(slots).map(s => s.querySelector('img')?.id);
        if(ans.includes(undefined)) return alert("全部のポケモンを並べてね！");
        if(ans.every((name, i) => name === currentOrder[i].name)) {
            confetti({ particleCount: 300, spread: 150 });
            setTimeout(() => { currentLevel++; initGame(); }, 1000);
        } else {
            alert("ちがうみたい…ヒントのチェックリストを使ってみよう！");
        }
    }

    initGame();
</script>
</body>
</html>
