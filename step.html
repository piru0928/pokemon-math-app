<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン推理パズル Ver 2.1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f7ff; --card: #ffffff; --accent: #3182ce; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        .game-card { background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        
        .drop-zone-wrapper { width: 100%; overflow-x: auto; margin: 20px 0; padding-bottom: 10px; }
        .drop-zone { display: inline-flex; gap: 15px; min-width: 100%; justify-content: center; }
        .slot { flex-shrink: 0; width: 120px; height: 120px; border: 4px dashed #cbd5e0; border-radius: 20px; background: #fafafa; display: flex; justify-content: center; align-items: center; }
        
        /* ポケモンのサイズとタッチ最適化 */
        .pokemon-item { width: 110px; height: 110px; cursor: grab; object-fit: contain; touch-action: none; user-select: none; position: relative; z-index: 10; }
        #choices { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; min-height: 120px; padding: 15px; background: #f7fafc; border-radius: 20px; }
        
        .clue { background: #ebf8ff; border-left: 6px solid var(--accent); padding: 20px; border-radius: 0 15px 15px 0; font-weight: bold; line-height: 2.0; font-size: 1.1rem; }
        .checked { color: #a0aec0; text-decoration: line-through; }
        button { flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div class="game-card">
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button onclick="history.back()">⬅ もどる</button>
        <span style="color:#718096; font-size:0.8rem;">Ver 2.1.0</span>
    </div>
    <h2 id="level-title" style="text-align:center;">Level 1</h2>
    <div class="drop-zone-wrapper"><div id="drop-zone" class="drop-zone"></div></div>
    <div id="clue" class="clue"></div>
    <div id="choices"></div>
    <div style="display: flex; gap: 15px; margin-top: 20px;">
        <button onclick="initGame()" style="background:#e53e3e; color:white;">やりなおす</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white;">ていしゅつ！</button>
    </div>
</div>

<script>
    const pool = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"},
        {name: "エーフィ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/196.png"},
        {name: "ブラッキー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/197.png"}
    ];

    let currentLevel = 1, currentOrder = [], draggedItem = null;

    function initGame() {
        const num = Math.min(2 + currentLevel, 6);
        currentOrder = [...pool].sort(() => Math.random() - 0.5).slice(0, num);
        document.getElementById('level-title').innerText = `Level ${currentLevel}`;
        // ... (ヒント生成ロジックは以前の通り)
        render();
    }

    function render() {
        const zone = document.getElementById('drop-zone');
        zone.innerHTML = '';
        currentOrder.forEach(() => {
            const s = document.createElement('div');
            s.className = 'slot';
            // ポインターイベントでドラッグを制御
            s.onpointerup = drop;
            zone.appendChild(s);
        });
        const ch = document.getElementById('choices');
        ch.innerHTML = '';
        [...currentOrder].sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = p.img; img.className = 'pokemon-item'; img.id = p.name;
            // 「即座に」ドラッグを開始させるためのポインターダウン設定
            img.onpointerdown = e => { draggedItem = img; img.style.opacity = '0.5'; };
            ch.appendChild(img);
        });
    }

    function drop(e) {
        if (!draggedItem) return;
        const target = e.target.closest('.slot');
        if (target) {
            if (target.firstChild) draggedItem.parentNode.appendChild(target.firstChild);
            target.appendChild(draggedItem);
        }
        draggedItem.style.opacity = '1';
        draggedItem = null;
    }

    function checkAnswer() { /* 以前の判定ロジック */ }
    initGame();
</script>
</body>
</html>
