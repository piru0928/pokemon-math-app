<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン推理パズル Ver 1.6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f7ff; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .game-card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        /* ポケモンを大きく表示 */
        .drop-zone { display: flex; align-items: center; justify-content: center; gap: 5px; height: 100px; margin: 20px 0; border-bottom: 4px solid #4a5568; }
        .slot { width: 65px; height: 65px; border: 2px dashed #cbd5e0; display: flex; justify-content: center; align-items: center; border-radius: 10px; background: #fff; }
        .pokemon-item { width: 55px; height: 55px; cursor: grab; }
        #choices { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .clue { background: #ebf8ff; border-left: 5px solid #3182ce; padding: 15px; margin: 10px 0; line-height: 1.8; font-size: 0.95rem; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .checked { color: #a0aec0; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="game-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <button onclick="history.back()">⬅ もどる</button>
        <span style="color:#718096; font-size: 0.8rem;">Ver 1.6.0</span>
    </div>
    <h2 id="level-title" style="text-align:center; margin: 5px 0;">Level 1</h2>
    
    <div id="drop-zone" class="drop-zone"></div>
    <div id="clue" class="clue"></div>
    <div id="choices"></div>

    <div style="text-align:center; display: flex; gap: 10px; justify-content: center;">
        <button onclick="resetGame()" style="background:#e53e3e; color:white;">やりなおす</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white;">ていしゅつ！</button>
    </div>
</div>

<script>
    const pool = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"},
        {name: "エーフィ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/196.png"},
        {name: "ブラッキー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/197.png"}
    ];

    let currentLevel = 1, currentOrder = [];

    function initGame() {
        const num = Math.min(2 + currentLevel, 6);
        currentOrder = [...pool].sort(() => Math.random() - 0.5).slice(0, num);
        
        document.getElementById('level-title').innerText = `Level ${currentLevel}`;
        
        // 厳密な条件文（ポケモンの数分作成）
        let clues = [];
        clues.push(`${currentOrder[num-1].name}は<ruby>一番<rt>いちばん</rt></ruby><ruby>右<rt>みぎ</rt></ruby>にいる。`);
        clues.push(`${currentOrder[0].name}は${currentOrder[1].name}の<ruby>左隣<rt>ひだりどなり</rt></ruby>にいる。`);
        for(let i = 1; i < num - 1; i++) {
            clues.push(`${currentOrder[i].name}は${currentOrder[i+1].name}の<ruby>左隣<rt>ひだりどなり</rt></ruby>にいる。`);
        }
        clues.sort(() => Math.random() - 0.5);

        let clueHtml = "ヒント：<br>";
        clues.forEach((c, i) => {
            clueHtml += `<input type="checkbox" onchange="this.nextElementSibling.classList.toggle('checked', this.checked)"> <span>${c}</span><br>`;
        });
        document.getElementById('clue').innerHTML = clueHtml;
        render();
    }

    function render() {
        const zone = document.getElementById('drop-zone');
        zone.innerHTML = '';
        currentOrder.forEach(() => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.ondragover = e => e.preventDefault();
            slot.ondrop = drop;
            zone.appendChild(slot);
        });

        const ch = document.getElementById('choices');
        ch.innerHTML = '';
        [...currentOrder].sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = p.img; img.className = 'pokemon-item'; img.draggable = true;
            img.id = p.name; img.ondragstart = e => e.dataTransfer.setData("text", e.target.id);
            ch.appendChild(img);
        });
    }

    function drop(e) {
        e.preventDefault();
        const dragged = document.getElementById(e.dataTransfer.getData("text"));
        const target = e.target.closest('.slot');
        if (target) {
            if (target.firstChild) dragged.parentNode.appendChild(target.firstChild);
            target.appendChild(dragged);
        }
    }

    function resetGame() { render(); }

    function checkAnswer() {
        const slots = document.querySelectorAll('.slot');
        const ans = Array.from(slots).map(s => s.querySelector('img')?.id);
        if(ans.includes(undefined)) return alert("全部並べてね！");
        if(ans.every((name, i) => name === currentOrder[i].name)) {
            confetti({ particleCount: 300, spread: 150 });
            setTimeout(() => { currentLevel++; initGame(); }, 1000);
        } else {
            alert("ちがうみたい…ヒントをよく見て並び変えてみよう！");
        }
    }

    initGame();
</script>
</body>
</html>
