<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブイズのステップクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Kosugi Maru', sans-serif; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .drop-zone { display: flex; align-items: flex-end; justify-content: center; gap: 10px; height: 180px; margin: 30px 0; border-bottom: 6px solid #4a5568; }
        .slot { width: 70px; height: 70px; border: 3px dashed #cbd5e0; display: flex; justify-content: center; align-items: center; border-radius: 10px; background: #fff; position: relative; }
        .pokemon-item { width: 60px; cursor: grab; transition: transform 0.2s; }
        .clue { background: #ebf8ff; border-left: 5px solid #3182ce; padding: 20px; margin: 20px 0; line-height: 1.8; font-weight: bold; }
        .jump { animation: jumpEff 0.4s ease-in-out infinite alternate; }
        @keyframes jumpEff { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div class="game-card">
    <button onclick="history.back()">⬅ もどる</button>
    <h2 style="text-align:center;">ブイズのステップクイズ</h2>
    <div id="level-info" style="font-weight:bold; color:#3182ce; text-align:center; font-size: 1.5rem;">Level 1</div>
    
    <div id="drop-zone" class="drop-zone"></div>
    <div id="clue" class="clue"></div>
    <div id="choices" style="display:flex; justify-content:center; gap:10px; min-height:80px; padding: 10px;"></div>

    <div style="text-align:center; margin-top:20px; display: flex; gap: 10px; justify-content: center;">
        <button onclick="resetGame()" style="background:#e53e3e; color:white; padding:15px 30px; border:none; border-radius:10px; font-size:1.2rem; cursor:pointer;">やりなおす</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white; padding:15px 30px; border:none; border-radius:10px; font-size:1.2rem; cursor:pointer;">ていしゅつ！</button>
    </div>
</div>

<script>
    const eeveeFamily = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"},
        {name: "エーフィ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/196.png"},
        {name: "ブラッキー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/197.png"}
    ];

    let currentLevel = 1;
    let correctAnswer = [];

    function initGame() {
        // レベルに応じてキャラクター数を増加 (L1:3匹, L2:4匹, L3:5匹, L4:6匹)
        const num = Math.min(2 + currentLevel, 6);
        correctAnswer = [...eeveeFamily].sort(() => Math.random() - 0.5).slice(0, num);
        
        document.getElementById('level-info').innerText = `Level ${currentLevel}`;
        
        // 論理的に複雑なヒントを動的生成
        let clueText = "ヒント：<br>";
        clueText += `・${correctAnswer[0].name}は${correctAnswer[1].name}の左側にいるよ。<br>`;
        clueText += `・${correctAnswer[num-1].name}は一番右にいるよ。<br>`;
        if(num >= 4) clueText += `・${correctAnswer[2].name}は${correctAnswer[1].name}と${correctAnswer[3].name}の間にいるよ。<br>`;
        if(num >= 5) clueText += `・${correctAnswer[4].name}は一番左の隣にいるよ。`;

        document.getElementById('clue').innerHTML = clueText;
        render();
    }

    function render() {
        const dropZone = document.getElementById('drop-zone');
        dropZone.innerHTML = '';
        correctAnswer.forEach((_, i) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.ondragover = e => e.preventDefault();
            slot.ondrop = drop;
            dropZone.appendChild(slot);
        });

        const choices = document.getElementById('choices');
        choices.innerHTML = '';
        [...correctAnswer].sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = p.img;
            img.className = 'pokemon-item';
            img.draggable = true;
            img.id = p.name;
            img.ondragstart = e => e.dataTransfer.setData("text", e.target.id);
            choices.appendChild(img);
        });
    }

    function drop(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text");
        const el = document.getElementById(id);
        if (e.target.classList.contains('slot')) {
            if (e.target.firstChild) document.getElementById('choices').appendChild(e.target.firstChild);
            el.classList.add('jump');
            e.target.appendChild(el);
        }
    }

    function resetGame() { render(); }

    function checkAnswer() {
        const slots = document.querySelectorAll('.slot');
        let playerAns = [];
        slots.forEach(s => {
            const img = s.querySelector('img');
            playerAns.push(img ? img.id : null);
        });

        if(playerAns.includes(null)) return alert("全部並べてね！");
        
        if(playerAns.every((name, i) => name === correctAnswer[i].name)) {
            confetti({ particleCount: 400, spread: 100 });
            setTimeout(() => {
                currentLevel++;
                alert("大せいかい！次のレベルに進むよ！");
                initGame();
            }, 500);
        } else {
            alert("ちがうみたい…ヒントをもう一度よーく読んでみて！");
        }
    }

    initGame();
</script>
</body>
</html>
