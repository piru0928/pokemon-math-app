<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブイズのステップクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Kosugi Maru', sans-serif; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        .stairs-container { display: flex; align-items: flex-end; justify-content: center; gap: 8px; height: 180px; margin: 30px 0; border-bottom: 6px solid #4a5568; padding-bottom: 10px; }
        .slot { width: 60px; border: 3px dashed #cbd5e0; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 10px; background: #f7fafc; transition: 0.3s; }
        .slot img { width: 55px; height: 55px; object-fit: contain; }
        .clue { background: #ebf8ff; border-left: 5px solid #3182ce; padding: 20px; margin: 20px 0; font-size: 1.1rem; line-height: 1.8; color: #2a4365; }
        .btn-poke { background: #4299e1; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-poke:disabled { background: #a0aec0; cursor: not-allowed; opacity: 0.7; }
        .firework { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    </style>
</head>
<body>

<div class="game-card">
    <div style="display: flex; justify-content: space-between;">
        <button onclick="history.back()">⬅ もどる</button>
        <span style="color:#718096;">Ver 1.2.0</span>
    </div>
    <h2 style="text-align:center;">ブイズのステップクイズ</h2>
    <div id="level-info" style="font-weight: bold; color: #3182ce; font-size: 1.3rem;">Level 1</div>
    <div id="stairs" class="stairs-container"></div>
    <div id="clue" class="clue"></div>
    <div id="choices"></div>
    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
        <button onclick="resetAnswer()" style="background:#e53e3e; color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer;">やりなおす</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-size: 1.1rem;">ていしゅつ！</button>
    </div>
</div>

<script>
    const eeveeFamily = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"},
        {name: "エーフィ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/196.png"},
        {name: "ブラッキー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/197.png"}
    ];

    let currentLevel = 1;
    let correctAnswer, playerAnswer;

    // 順列生成と論理検証
    function isValidPuzzle(arr, clues) {
        // すべての配置パターンを計算
        const permute = (arr) => {
            if (arr.length <= 1) return [arr];
            let res = [];
            for(let i=0; i<arr.length; i++) {
                let rest = permute(arr.slice(0, i).concat(arr.slice(i+1)));
                for(let p of rest) res.push([arr[i], ...p]);
            }
            return res;
        };

        const allPerms = permute(arr);
        // ヒントを満たす組み合わせが1つだけか検証
        const validPerms = allPerms.filter(p => clues.every(c => c(p)));
        return validPerms.length === 1;
    }

    function initGame() {
        const num = Math.min(3 + Math.floor((currentLevel - 1) / 2), 5);
        let pool, clues, logic;

        // 問題の論理的成立を保証するまでループ
        do {
            pool = [...eeveeFamily].sort(() => Math.random() - 0.5).slice(0, num);
            // 仮のヒントロジック
            logic = [
                p => p.indexOf(pool[0]) < p.indexOf(pool[1]),
                p => p[num-1] === pool[num-1],
                p => Math.abs(p.indexOf(pool[2]) - p.indexOf(pool[1])) === 1
            ];
        } while (!isValidPuzzle(pool, logic));

        correctAnswer = pool;
        playerAnswer = Array(num).fill(null);
        document.getElementById('clue').innerHTML = 
            `ヒント：<br>・${pool[0].name}は${pool[1].name}より左にいるよ。<br>・${pool[num-1].name}は一番右にいるよ。<br>・${pool[2].name}は${pool[1].name}の隣にいるよ。`;
        render();
    }

    function checkAnswer() {
        if(playerAnswer.includes(null)) return alert("まだ空いてる場所があるよ！");
        if(playerAnswer.every((p, i) => p.name === correctAnswer[i].name)) {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            alert("大せいかい！！すごすぎる！ 🎉");
            currentLevel++;
            initGame();
        } else {
            alert("うーん、ちがうみたい。もういちどヒントを読み返してみよう！");
        }
    }

    // 他のrender等の関数は前回同様
    function render() { /* ...省略... */ }
    function resetAnswer() { playerAnswer = Array(correctAnswer.length).fill(null); render(); }
    initGame();
</script>
</body>
</html>
