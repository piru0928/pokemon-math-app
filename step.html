<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン推理パズル Ver 2.3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f7ff; --card: #ffffff; --accent: #3182ce; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .game-card { background: var(--card); padding: 10px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; height: 98vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        h2 { text-align: center; margin: 5px 0; font-size: 1.2rem; }
        
        .drop-zone { display: flex; gap: 5px; justify-content: center; margin: 10px 0; }
        .slot { width: 60px; height: 60px; border: 2px dashed #cbd5e0; border-radius: 10px; background: #fafafa; display: flex; justify-content: center; align-items: center; }
        .pokemon-item { width: 55px; height: 55px; cursor: grab; object-fit: contain; }
        
        #clue { background: #ebf8ff; border-left: 4px solid var(--accent); padding: 8px; font-size: 0.9rem; line-height: 1.6; flex-grow: 1; margin: 5px 0; overflow-y: auto; }
        #choices { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
        
        .msg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; }
        .msg-box { background: white; padding: 20px; border-radius: 20px; font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">
        <button onclick="history.back()">⬅ もどる</button>
        <span>Ver 2.3.0</span>
    </div>
    <h2 id="level-title">Level 1</h2>
    <div id="drop-zone" class="drop-zone"></div>
    <div id="clue"></div>
    <div id="choices"></div>
    <div style="display: flex; gap: 10px;">
        <button onclick="initGame()" style="background:#e53e3e; color:white; flex:1;">リセット</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white; flex:1;">ていしゅつ！</button>
    </div>
</div>

<div id="msg" class="msg-overlay" onclick="this.style.display='none'"><div class="msg-box">大せいかい！✨</div></div>

<script>
    const pool = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"},
        {name: "エーフィ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/196.png"},
        {name: "ブラッキー", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/197.png"}
    ];

    let currentLevel = 1, currentOrder = [], draggedItem = null;

    function initGame() {
        const num = Math.min(2 + currentLevel, 6);
        currentOrder = [...pool].sort(() => Math.random() - 0.5).slice(0, num);
        document.getElementById('level-title').innerText = `Level ${currentLevel}`;
        
        let html = "ヒント：<br>";
        for(let i=0; i<num-1; i++) {
            html += `<div>・${currentOrder[i].name}は${currentOrder[i+1].name}の<ruby>左隣<rt>ひだりどなり</rt></ruby>。</div>`;
        }
        html += `<div>・${currentOrder[num-1].name}は<ruby>一番<rt>いちばん</rt></ruby><ruby>右<rt>みぎ</rt></ruby>。</div>`;
        document.getElementById('clue').innerHTML = html;
        render();
    }

    function render() {
        const zone = document.getElementById('drop-zone');
        const ch = document.getElementById('choices');
        zone.innerHTML = ''; ch.innerHTML = '';
        currentOrder.forEach(() => {
            const s = document.createElement('div');
            s.className = 'slot';
            s.onpointerup = e => { if(draggedItem) { e.target.closest('.slot').appendChild(draggedItem); draggedItem = null; } };
            zone.appendChild(s);
        });
        [...currentOrder].sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = p.img; img.className = 'pokemon-item'; img.id = p.name;
            img.onpointerdown = e => { draggedItem = img; };
            ch.appendChild(img);
        });
    }

    function checkAnswer() {
        const slots = document.querySelectorAll('.slot');
        const ans = Array.from(slots).map(s => s.querySelector('img')?.id);
        if(ans.every((name, i) => name === currentOrder[i].name)) {
            confetti({ particleCount: 200 });
            document.getElementById('msg').style.display = 'flex';
            setTimeout(() => { document.getElementById('msg').style.display = 'none'; currentLevel++; initGame(); }, 1500);
        } else {
            alert("もういちど かんがえてみてね！");
        }
    }
    document.addEventListener('DOMContentLoaded', initGame);
</script>
</body>
</html>
