<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン・ロジックパズル</title>
    <style>
        body { font-family: sans-serif; background: #fdf6e3; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav-bar { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; }
        .options button { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 10px; background: #4a90e2; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <span>Ver 1.0.0</span>
        <button onclick="alert('最初の画面に戻ります')">戻る</button>
    </div>

    <h2 id="level-badge">Level 1</h2>
    
    <div id="svg-container" style="margin: 20px 0;">
        <svg width="300" height="100" viewBox="0 0 300 100">
            <rect x="20" y="60" width="80" height="30" fill="#a0522d" />
            <rect x="110" y="40" width="80" height="50" fill="#a0522d" />
            <rect x="200" y="20" width="80" height="70" fill="#a0522d" />
            <text x="60" y="80" text-anchor="middle" fill="white">シャ</text>
            <text x="150" y="70" text-anchor="middle" fill="white">サン</text>
            <text x="240" y="60" text-anchor="middle" fill="white">ブー</text>
        </svg>
    </div>

    <p id="problem-text">シャワーズの右にサンダース、サンダースの右にブースターがいます。右から2番目はだれ？</p>
    <div id="options" class="options"></div>
</div>

<script>
    // 問題データ
    const quizData = [
        { level: 1, text: "シャワーズの右にサンダース、サンダースの右にブースターがいます。右から2番目はだれ？", options: ["シャワーズ", "サンダース", "ブースター"], answer: "サンダース" }
    ];

    function render() {
        const stage = quizData[0];
        document.getElementById('problem-text').innerText = stage.text;
        const optDiv = document.getElementById('options');
        stage.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => alert(opt === stage.answer ? "正解！" : "残念！");
            optDiv.appendChild(btn);
        });
    }
    render();
</script>
</body>
</html>
