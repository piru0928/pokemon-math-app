<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブイズのステップクイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Kosugi Maru', sans-serif; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        .drop-zone { display: flex; align-items: flex-end; justify-content: center; gap: 10px; height: 180px; margin: 30px 0; border-bottom: 6px solid #4a5568; }
        .slot { width: 70px; height: 70px; border: 3px dashed #cbd5e0; display: flex; justify-content: center; align-items: center; border-radius: 10px; background: #fff; }
        .pokemon-item { width: 60px; cursor: grab; }
        .clue { background: #ebf8ff; border-left: 5px solid #3182ce; padding: 20px; margin: 20px 0; line-height: 1.8; }
        
        /* ポケモンが動くアニメーション */
        .jump { animation: jumpEff 0.4s ease-in-out infinite alternate; }
        @keyframes jumpEff { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div class="game-card">
    <button onclick="history.back()">⬅ もどる</button>
    <h2 style="text-align:center;">ブイズのステップクイズ</h2>
    <div id="level-info" style="font-weight:bold; color:#3182ce;">Level 1</div>
    
    <div id="drop-zone" class="drop-zone"></div>
    <div id="clue" class="clue"></div>
    <div id="choices" style="display:flex; justify-content:center; gap:10px; min-height:80px;"></div>

    <div style="text-align:center; margin-top:20px;">
        <button onclick="checkAnswer()" style="background:#48bb78; color:white; padding:15px 30px; border:none; border-radius:10px; font-size:1.2rem; cursor:pointer;">ていしゅつ！</button>
    </div>
</div>

<script>
    const pool = [
        {name: "イーブイ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png"},
        {name: "シャワーズ", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/134.png"},
        {name: "サンダース", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png"},
        {name: "ブースター", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/136.png"}
    ];

    let currentOrder = [];
    let currentLevel = 1;

    function initGame() {
        currentOrder = [...pool].sort(() => Math.random() - 0.5);
        document.getElementById('level-info').innerText = `Level ${currentLevel}`;
        document.getElementById('clue').innerHTML = `
            ヒント：<br>
            ・${currentOrder[0].name}は${currentOrder[1].name}より左にいるよ。<br>
            ・${currentOrder[3].name}は一番右にいるよ。<br>
            ・${currentOrder[1].name}は${currentOrder[2].name}の左隣にいるよ。
        `;
        render();
    }

    function render() {
        const dropZone = document.getElementById('drop-zone');
        dropZone.innerHTML = '';
        for(let i=0; i<4; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.ondragover = e => e.preventDefault();
            slot.ondrop = drop;
            dropZone.appendChild(slot);
        }

        const choices = document.getElementById('choices');
        choices.innerHTML = '';
        pool.forEach(p => {
            const img = document.createElement('img');
            img.src = p.img;
            img.className = 'pokemon-item';
            img.draggable = true;
            img.id = p.name;
            img.ondragstart = e => e.dataTransfer.setData("text", e.target.id);
            choices.appendChild(img);
        });
    }

    function drop(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text");
        const el = document.getElementById(id);
        el.classList.add('jump'); // 配置されたら動く
        e.target.appendChild(el);
    }

    function checkAnswer() {
        const slots = document.querySelectorAll('.slot');
        let playerAns = [];
        slots.forEach(s => {
            const img = s.querySelector('img');
            playerAns.push(img ? img.id : null);
        });

        if(playerAns.includes(null)) return alert("全部並べてね！");
        
        if(playerAns.every((name, i) => name === currentOrder[i].name)) {
            confetti({ particleCount: 300, spread: 150, origin: { y: 0.6 } });
            setTimeout(() => {
                alert("正解！すごすぎる！");
                currentLevel++;
                initGame();
            }, 500);
        } else {
            alert("もう一度考えてみよう！");
        }
    }

    initGame();
</script>
</body>
</html>
