<script>
    // ... (前略)

    function initGame() {
        const num = Math.min(2 + currentLevel, 6);
        currentOrder = [...pool].sort(() => Math.random() - 0.5).slice(0, num);
        document.getElementById('level-title').innerText = `Level ${currentLevel}`;
        
        // --- 修正箇所: ヒント生成ロジックを確実に実行 ---
        try {
            let clues = [];
            clues.push(`${currentOrder[num-1].name}は一番右にいる。`);
            clues.push(`${currentOrder[0].name}は${currentOrder[1].name}の左隣にいる。`);
            for(let i = 1; i < num - 1; i++) {
                clues.push(`${currentOrder[i].name}は${currentOrder[i+1].name}の左隣にいる。`);
            }
            clues.sort(() => Math.random() - 0.5);

            const clueContainer = document.getElementById('clue');
            if (!clueContainer) throw new Error("ヒントエリアが見つかりません");

            let html = "ヒント：<br>";
            clues.forEach(c => {
                html += `<div><input type="checkbox" onchange="this.nextElementSibling.classList.toggle('checked', this.checked)"> <span>${c}</span></div>`;
            });
            clueContainer.innerHTML = html;
        } catch (e) {
            console.error("ヒントの生成に失敗しました:", e);
            document.getElementById('clue').innerHTML = "ヒントの読み込みに失敗しました。ページを再読み込みしてください。";
        }
        // --- 修正ここまで ---

        render();
    }

    // ... (後略)
</script>
