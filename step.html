<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン推理パズル Ver 2.4.0</title>
    <style>
        :root { --bg: #f0f7ff; --card: #ffffff; --accent: #3182ce; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .game-card { 
            background: var(--card); 
            padding: 10px; 
            border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
            height: 98vh; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; flex-shrink: 0; }
        h2 { text-align: center; margin: 5px 0; font-size: 1.2rem; flex-shrink: 0; }
        
        /* 配置エリア：スロットのサイズを少し縮小して領域を確保 */
        .drop-zone { display: flex; gap: 4px; justify-content: center; margin: 5px 0; flex-shrink: 0; }
        .slot { width: 50px; height: 50px; border: 2px dashed #cbd5e0; border-radius: 10px; background: #fafafa; display: flex; justify-content: center; align-items: center; }
        .pokemon-item { width: 45px; height: 45px; cursor: grab; object-fit: contain; }
        
        /* 修正箇所：ヒントエリアに高さを制限し、スクロール可能にする */
        #clue { 
            background: #ebf8ff; 
            border-left: 4px solid var(--accent); 
            padding: 8px; 
            font-size: 0.85rem; 
            line-height: 1.4; 
            flex-grow: 1; /* 残りのスペースを埋める */
            overflow-y: auto; /* ここでスクロールさせる */
            margin: 5px 0;
            border-radius: 0 10px 10px 0;
        }
        
        /* 選択肢エリアとボタンを下に固定 */
        #choices { display: flex; justify-content: center; gap: 5px; margin: 5px 0; flex-shrink: 0; }
        .footer-buttons { display: flex; gap: 10px; flex-shrink: 0; margin-top: auto; padding-top: 5px; }
        
        button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">
        <button onclick="history.back()">⬅ もどる</button>
        <span>Ver 2.4.0</span>
    </div>
    <h2 id="level-title">Level 1</h2>
    <div id="drop-zone" class="drop-zone"></div>
    <div id="clue"></div>
    <div id="choices"></div>
    <div class="footer-buttons">
        <button onclick="initGame()" style="background:#e53e3e; color:white;">リセット</button>
        <button onclick="checkAnswer()" style="background:#48bb78; color:white;">ていしゅつ！</button>
    </div>
</div>

</body>
</html>
