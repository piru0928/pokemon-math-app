<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・マナーマスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #e1f5fe;
      text-align: center;
      padding: 10px;
      transition: 0.3s;
    }
    /* ルビの調整 */
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: #0277bd; font-weight: normal; }

    h1 { color: #0288d1; margin-bottom: 5px; font-size: 24px; }
    #status { font-size: 16px; color: #455a64; margin-bottom: 10px; font-weight: bold; }

    #quiz-card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 15px;
      width: 95%;
      max-width: 400px;
    }
    
    #pokemon-img { width: 140px; height: 140px; background: #f1f8ff; border-radius: 50%; border: 4px solid #81d4fa; margin-bottom: 10px; }
    #question-text { font-size: 18px; font-weight: bold; color: #333; margin: 10px 0; line-height: 1.8; padding: 0 5px; }

    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: 10px auto;
    }
    .choice-btn {
      padding: 15px 5px;
      font-size: 15px;
      font-weight: bold;
      background-color: white;
      border: 3px solid #81d4fa;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px #4fc3f7;
    }
    .choice-btn:active { transform: translateY(2px); box-shadow: 0 2px #4fc3f7; }
    .choice-btn:disabled { opacity: 0.7; cursor: default; }

    #result { font-size: 20px; margin-top: 10px; font-weight: bold; min-height: 30px; }
    #next-button {
      margin-top: 15px; padding: 12px 40px; font-size: 18px;
      background-color: #03a9f4; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none; font-weight: bold;
    }
    #version-info { position: fixed; bottom: 5px; right: 5px; font-size: 9px; color: #9e9e9e; }
  </style>
</head>

      { q: "お辞儀（おじぎ）をするときはどうする？", a: ["<ruby>腰<rt>こし</rt></ruby>をまげる", "首（くび）だけふる", "しない", "ジャンプする"] },
      { q: "「おめでとう」と言われたら？", a: ["「ありがとうございます」", "「知ってる」", "「もっと言って」", "無視する"] },
      { q: "お菓子（かし）の袋（ふくろ）が開かないときは？", a: ["「あけて」とたのむ", "歯でかみちぎる", "投げる", "あきらめる"] }
    ];

    let correctStreak = 0;
    let currentAnswer = "";

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(type) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (type === 'correct') {
          this._note(880, now, 0.1); this._note(1100, now + 0.1, 0.2);
        } else if (type === 'special') {
          [523, 659, 783, 1046].forEach((f, i) => this._note(f, now + (i * 0.1), 0.3));
        } else {
          this._note(200, now, 0.3);
        }
      }
    };

    function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.body.style.backgroundColor = "#e1f5fe";
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      // ランダムに選ぶ
      const qData = mannerQuestions[Math.floor(Math.random() * mannerQuestions.length)];
      document.getElementById("question-text").innerHTML = qData.q;
      currentAnswer = qData.a[0];

      // かわいいポケモン
      const cutePokemon = [1, 4, 7, 25, 35, 39, 133, 151, 175]; 
      const pokeId = cutePokemon[Math.floor(Math.random() * cutePokemon.length)];
      document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png`;

      // 選択肢（シャッフル）
      let options = [...qData.a].sort(() => Math.random() - 0.5);
      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerHTML = opt; // ← innerHTML に変えることで「ふりがな」が有効になります
        btn.onclick = () => checkAnswer(opt);
        choicesDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
      const resArea = document.getElementById("result");

      if (selected === currentAnswer) {
        correctStreak++;
        if (correctStreak % 5 === 0) Buzzer.play('special');
        else Buzzer.play('correct');
        resArea.textContent = "✨ せいかい！";
        document.body.style.backgroundColor = "#e8f5e9";
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        resArea.textContent = `❌ こたえは「${currentAnswer}」だよ`;
        document.body.style.backgroundColor = "#ffebee";
      }
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
      document.getElementById("next-button").style.display = "inline-block";
    }

    window.onload = generateQuiz;
  </script>
</body>
</html>
