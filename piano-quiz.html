<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポケモンピアノマスター ステージ選択</title>
    <style>
        .stage-map { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .stage-btn { padding: 20px; background: var(--yellow); border-radius: 15px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="gc">
    <div id="map-screen" class="stage-map">
        <div class="stage-btn" onclick="startStage(1)">ステージ1<br>黒鍵の森</div>
        <div class="stage-btn" onclick="startStage(2)">ステージ2<br>ドの隠れ家</div>
        <div class="stage-btn" onclick="startStage(3)">ステージ3<br>指のダンス</div>
        <div class="stage-btn" onclick="startStage(4)">ステージ4<br>ドレミの階段</div>
        <div class="stage-btn" onclick="startStage(5)">ステージ5<br>音のかくれんぼ</div>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="stage-title">ステージ名</h2>
        <div id="instruction">指示が表示されます</div>
        <div id="piano-container"></div>
        <button class="btn" onclick="goBackToMap()">マップにもどる</button>
    </div>
</div>

<script>
    let currentStage = 0;

    function startStage(stageNum) {
        currentStage = stageNum;
        document.getElementById('map-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        renderStageContent(stageNum);
    }

    function renderStageContent(stageNum) {
        const piano = document.getElementById('piano-container');
        piano.innerHTML = '';
        
        switch(stageNum) {
            case 1:
                document.getElementById('stage-title').innerText = "黒鍵の森";
                document.getElementById('instruction').innerText = "2つのお山を全部タッチしてね！";
                // ステージ1専用の鍵盤レンダリング
                createKeyboardForStage1(piano);
                break;
            case 2:
                // ドの隠れ家（もぐら叩きロジック）
                break;
            // ... 他のステージも同様に追加
        }
    }

    function goBackToMap() {
        document.getElementById('map-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
    }

    // ステージ1: 2つ並びの黒鍵を判定するロジック例

        // タップ時に「正解ならキラキラ＋動物出現」の演出を紐付け

</script>
</body>
</html>
