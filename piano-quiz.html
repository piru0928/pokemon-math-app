<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ピアノ探検隊</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --cream: #FFF9E6;
  --gold: #FFD700;
  --gold-dark: #E6B800;
  --blue: #004A99;
  --blue-light: #E6F7FF;
  --blue-border: #91D5FF;
  --orange: #FF9800;
  --orange-dark: #E65100;
  --green: #4CAF50;
  --green-dark: #2E7D32;
  --red: #F44336;
  --purple: #7C3AED;
  --purple-dark: #5B21B6;
}

body {
  margin: 0;
  padding: 0;
  background: var(--cream);
  font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'BIZ UDPGothic', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100dvh;
  overflow-y: auto;
  touch-action: manipulation;
}

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 520px;
  min-height: 100%;
  padding: 12px 10px;
  gap: 12px;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  gap: 12px;
}

.screen.active {
  display: flex;
}

#screen-select {
  justify-content: flex-start;
  min-height: 80dvh;
  gap: 12px;
  padding: 20px 0;
}

.select-title {
  font-size: 28px;
  font-weight: 900;
  color: var(--blue);
  text-align: center;
  letter-spacing: 2px;
  text-shadow: 0 3px 0 rgba(0,74,153,0.15);
  margin-bottom: 5px;
}

.select-title span {
  color: var(--gold-dark);
}

.select-subtitle {
  font-size: 13px;
  color: #888;
  text-align: center;
  margin-bottom: 10px;
}

.stage-card {
  width: 95%;
  background: white;
  border-radius: 16px;
  border: 3px solid var(--gold);
  padding: 12px 16px;
  box-shadow: 0 4px 0 rgba(0,0,0,0.12);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  display: flex;
  align-items: center;
  text-align: left;
  gap: 12px;
}

.stage-card:active {
  transform: translateY(4px);
  box-shadow: 0 0 0 rgba(0,0,0,0.12);
}

.stage-card-icon {
  font-size: 32px;
  flex-shrink: 0;
}

.stage-card-content {
  flex: 1;
}

.stage-card-title {
  font-size: 16px;
  font-weight: 900;
  color: var(--blue);
  margin-bottom: 4px;
}

.stage-card-desc {
  font-size: 11px;
  color: #666;
  line-height: 1.4;
}

.game-header {
  width: 100%;
  text-align: center;
}

.status-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.status-pill {
  font-size: 15px;
  font-weight: bold;
  background: white;
  padding: 6px 16px;
  border-radius: 20px;
  border: 3px solid var(--gold);
  color: #555;
  box-shadow: 0 3px 0 rgba(0,0,0,0.1);
}

.question-area {
  display: flex;
  align-items: center;
  background: var(--blue-light);
  padding: 12px 15px;
  border-radius: 15px;
  border: 3px solid var(--blue-border);
  width: 100%;
  min-height: 90px;
}

#pokemon-img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  margin-right: 12px;
  flex-shrink: 0;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-7px); }
}

.instruction {
  font-size: 15px;
  font-weight: bold;
  color: var(--blue);
  line-height: 1.6;
  flex: 1;
  word-break: break-word;
}

.instruction ruby {
  ruby-align: center;
}

rt {
  font-size: .55em;
  font-weight: 700;
  color: #777;
}

.music-symbol {
  font-size: 1.3em;
  font-weight: 900;
  display: inline-block;
  min-width: 1.2em;
  text-align: center;
}

.play-audio-btn {
  display: inline-block;
  margin-top: 6px;
  background: var(--green);
  color: white;
  border: none;
  padding: 7px 14px;
  border-radius: 18px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--green-dark);
}

.play-audio-btn:active {
  transform: translateY(3px);
  box-shadow: none;
}

.rationale-box {
  width: 100%;
  background: white;
  border: 3px solid var(--gold);
  border-radius: 14px;
  padding: 10px 12px;
  color: #444;
  font-size: 13px;
  line-height: 1.6;
  display: none;
  box-shadow: 0 3px 0 rgba(0,0,0,.08);
}

.rationale-box.good {
  border-color: var(--green);
}

.rationale-box.bad {
  border-color: var(--red);
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px) rotate(-2deg); }
  50% { transform: translateX(8px) rotate(2deg); }
  75% { transform: translateX(-8px) rotate(-2deg); }
}

.shake {
  animation: shake 0.4s ease-in-out;
  border-color: var(--red) !important;
}

.keyboard {
  display: flex;
  position: relative;
  width: 100%;
  height: 26vh;
  min-height: 160px;
  max-height: 210px;
  background: #444;
  padding: 5px;
  border-radius: 8px;
  border-bottom: 10px solid #222;
}

.key {
  cursor: pointer;
  border-radius: 0 0 6px 6px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 12px;
  font-weight: bold;
  transition: background-color 0.08s;
}

.key.white {
  flex: 1;
  background: white;
  border: 1px solid #ccc;
  z-index: 1;
  color: #666;
  margin: 0 2px;
  font-size: 13px;
  box-shadow: inset 0 -8px 8px rgba(0,0,0,0.05);
}

.key.black {
  position: absolute;
  width: calc((100% - 10px) / 7 * 0.65);
  height: 60%;
  background: #222;
  color: white;
  z-index: 2;
  top: 5px;
  transform: translateX(-50%);
  font-size: 10px;
  padding-bottom: 7px;
  box-shadow: inset -2px -5px 5px rgba(255,255,255,0.15);
}

.key.black[data-note="C#"] { left: calc((100% - 10px) / 7 * 1 + 5px); }
.key.black[data-note="D#"] { left: calc((100% - 10px) / 7 * 2 + 5px); }
.key.black[data-note="F#"] { left: calc((100% - 10px) / 7 * 4 + 5px); }
.key.black[data-note="G#"] { left: calc((100% - 10px) / 7 * 5 + 5px); }
.key.black[data-note="A#"] { left: calc((100% - 10px) / 7 * 6 + 5px); }

.key.active.white {
  background: #FFD666;
}

.key.active.black {
  background: #777;
}

.key.hide-label {
  color: transparent !important;
}

.sheet-area {
  width: 100%;
  background: white;
  border-radius: 15px;
  border: 3px solid var(--purple);
  padding: 12px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.sheet-label {
  font-size: 12px;
  font-weight: bold;
  color: var(--purple);
}

#sheet-canvas {
  display: block;
  max-width: 100%;
  border-radius: 8px;
}

.note-choices {
  display: none;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  width: 100%;
}

.note-choice-btn {
  padding: 12px 12px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 14px;
  border: 3px solid var(--blue-border);
  background: white;
  color: var(--blue);
  cursor: pointer;
  box-shadow: 0 3px 0 rgba(0,74,153,0.2);
  transition: transform 0.08s, box-shadow 0.08s;
  flex: 1 1 40%;
  max-width: 230px;
  text-align: center;
  line-height: 1.45;
}

.note-choice-btn:active {
  transform: translateY(3px);
  box-shadow: none;
}

.note-choice-btn.correct {
  background: #a8f0a8;
  border-color: var(--green);
}

.note-choice-btn.wrong {
  background: #fca5a5;
  border-color: var(--red);
}

#rhythm-area {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  gap: 10px;
  background: #222;
  border-radius: 15px;
  padding: 15px;
  border: 4px solid var(--orange);
}

#rhythm-canvas {
  width: 100%;
  height: 120px;
  background: #111;
  border-radius: 8px;
  border: 2px solid #555;
}

.rhythm-tap-btn {
  width: 100%;
  background: var(--orange);
  color: white;
  border: none;
  padding: 20px;
  font-size: 24px;
  font-weight: 900;
  border-radius: 12px;
  box-shadow: 0 6px 0 var(--orange-dark);
  cursor: pointer;
}

.rhythm-tap-btn:active {
  transform: translateY(6px);
  box-shadow: none;
  background: #FFB74D;
}

.rhythm-feedback {
  font-size: 20px;
  font-weight: bold;
  height: 24px;
  color: var(--gold);
}

.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  width: 100%;
}

.home-btn {
  background: #78909C;
  color: white;
  border: none;
  padding: 11px 24px;
  font-size: 15px;
  font-weight: bold;
  border-radius: 22px;
  cursor: pointer;
  box-shadow: 0 4px 0 #455A64;
  margin-bottom: 16px;
  margin-top: 6px;
}

.home-btn:active {
  transform: translateY(4px);
  box-shadow: none;
}

#extreme-badge-wrap {
  display:none;
  margin-top:6px;
  text-align:center;
}

.extreme-badge {
  background: linear-gradient(135deg, var(--purple), #C026D3);
  color: white;
  font-size: 13px;
  font-weight: 900;
  padding: 6px 18px;
  border-radius: 20px;
  letter-spacing: 2px;
  animation: pulse-badge 1.5s ease-in-out infinite;
}

@keyframes pulse-badge {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.05); }
}

#extreme-count-display {
  font-size: 13px;
  color: var(--purple);
  font-weight: bold;
  margin-top: 4px;
}
</style>
</head>

<body>
<div id="app">

  <div id="screen-select" class="screen active"></div>

  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="status-bar">
        <div class="status-pill" id="stage-pill">ステージ1</div>
        <div class="status-pill" id="level-pill">Lv: <span id="level-display">1</span></div>
        <div class="status-pill" id="combo-pill">🔥 <span id="combo-display">0</span></div>
      </div>
      <div id="extreme-badge-wrap">
        <div class="extreme-badge">⚡ EXTREME MODE ⚡</div>
        <div id="extreme-count-display"></div>
      </div>
    </div>

    <div class="question-area" id="question-area">
      <img id="pokemon-img" src="" alt="">
      <div id="instruction-box" class="instruction">読み込み中…</div>
    </div>

    <div class="sheet-area" id="sheet-area">
      <div class="sheet-label" id="sheet-label">五線譜</div>
      <canvas id="sheet-canvas" width="360" height="150"></canvas>
    </div>

    <div class="note-choices" id="note-choices"></div>
    <div id="rationale-box" class="rationale-box"></div>

    <div class="keyboard" id="keyboard"></div>

    <div id="rhythm-area">
      <div id="rhythm-title" style="color:white; font-size:14px; font-weight:bold;">
        本格ドラムループに合わせてタイミングよく叩け！
      </div>
      <canvas id="rhythm-canvas" width="400" height="120"></canvas>
      <div id="rhythm-feedback" class="rhythm-feedback"></div>
      <button class="rhythm-tap-btn" id="rhythm-tap-btn">TAP !!</button>
    </div>

    <div class="btn-row">
      <button class="home-btn" onclick="goHome()">🏠 ホーム</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// =============================================
// ルビ設定
// 重複ルビを防ぐため、左から最長一致で1回だけ付与
// =============================================
const RUBY = {
  探検隊:'たんけんたい',
  鍵盤探し:'けんばんさがし',
  楽譜読み:'がくふよみ',
  音楽記号:'おんがくきごう',
  上級和声:'じょうきゅうわせい',

  音楽史:'おんがくし',

  鍵盤:'けんばん',
  楽譜:'がくふ',
  五線譜:'ごせんふ',
  音符:'おんぷ',
  聴音:'ちょうおん',
  記号:'きごう',
  強弱:'きょうじゃく',
  和音:'わおん',

  導音:'どうおん',

  長調:'ちょうちょう',
  短調:'たんちょう',
  対位法:'たいいほう',
  古典派:'こてんは',
  印象派:'いんしょうは',
  複雑:'ふくざつ',
  問題:'もんだい',
  解説:'かいせつ',
  理由:'りゆう',
  背景:'はいけい',
  意味:'いみ',

  八分音符:'はちぶおんぷ',

  正解:'せいかい',
  不正解:'ふせいかい',
  大正解:'だいせいかい',

  選:'えら',
  探:'さが',
  読:'よ',
  見:'み',
  答:'こた',
  覚:'おぼ',
  支:'ささ',
  打:'た',
  鳴:'な',
  触:'さわ',
  右:'みぎ',
  左:'ひだり',
  黒:'くろ',
  白:'しろ',
  耳:'みみ',
  逆:'ぎゃく',

  音:'おと',
  曲:'きょく',
  拍:'はく',
  長:'なが',
  短:'みじか',
  速:'はや',
  遅:'おそ',
  弱:'よわ',
  強:'つよ',
  低:'ひく',
  高:'たか',
  明:'あか',
  暗:'くら',
  響:'ひび',
  機能:'きのう',
  進行:'しんこう',
  解決:'かいけつ',
  裏:'うら',
  表:'おもて',
  半音:'はんおん',
  全音:'ぜんおん',
  歴史:'れきし'
};

const rubyKeys = Object.keys(RUBY).sort((a, b) => b.length - a.length);

function rubyize(str) {
  const parts = String(str)
    .replace(/<[^>]+>/g, m => '\u0000' + m + '\u0000')
    .split('\u0000');

  return parts.map(part => {
    if (part.startsWith('<')) return part;

    let result = '';
    let i = 0;

    while (i < part.length) {
      let matched = '';

      for (const key of rubyKeys) {
        if (part.startsWith(key, i)) {
          matched = key;
          break;
        }
      }

      if (matched) {
        result += `<ruby>${matched}<rt>${RUBY[matched]}</rt></ruby>`;
        i += matched.length;
      } else {
        result += part[i];
        i++;
      }
    }

    return result;
  }).join('');
}

function setHTML(id, html) {
  document.getElementById(id).innerHTML = rubyize(html);
}

// =============================================
// ホーム画面
// =============================================
const stages = [
  ['🎮', 'ステージ１：鍵盤探し', 'ポケモンのヒントを見て正しい鍵盤をタッチ！', 'var(--gold-dark)', 'var(--gold)'],
  ['🎼', 'ステージ２：楽譜読み', '五線譜の音符を読んで答えよう！', 'var(--purple)', 'var(--purple)'],
  ['🥁', 'ステージ３：リズム＆聴音', '【Lv1〜5】クイズ 【Lv6〜10】音ゲー！', 'var(--green-dark)', 'var(--green)'],
  ['𝄆', 'ステージ４：音楽記号クイズ', '強弱記号などの意味をクイズで覚えよう！', '#E91E63', '#E91E63'],
  ['✨', 'ステージ５：上級和声クイズ', '代理和音・借用和音・終止を考えよう！', '#00838F', '#00BCD4'],
  ['🎸', 'ステージ６：モード＆リズム理論', '旋法・複雑な拍子・音楽史を学ぼう！', 'var(--orange-dark)', 'var(--orange)'],
  ['🎧', 'ステージ７：DAW＆アレンジ理論', '録音・編集・音源・ミックスの知識に挑戦！', '#3F51B5', '#3F51B5']
];

function renderHome() {
  const root = document.getElementById('screen-select');

  root.innerHTML =
    `<div class="select-title">🎹 ピアノ<span>${rubyize('探検隊')}</span></div>
     <div class="select-subtitle">${rubyize('ステージをえらんでね！')}</div>` +
    stages.map((s, i) => `
      <div class="stage-card" onclick="startStage(${i + 1})" style="border-color:${s[4]};">
        <div class="stage-card-icon">${s[0]}</div>
        <div class="stage-card-content">
          <div class="stage-card-title" style="color:${s[3]};">${rubyize(s[1])}</div>
          <div class="stage-card-desc">${rubyize(s[2])}</div>
        </div>
      </div>
    `).join('');
}

// =============================================
// 音響エンジン
// =============================================
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = new AC();
let audioUnlocked = false;

const SOUNDFONT = 'https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/acoustic_grand_piano-mp3/';

const noteToMidi = {
  'C':60, 'C#':61, 'D':62, 'D#':63, 'E':64, 'F':65,
  'F#':66, 'G':67, 'G#':68, 'A':69, 'A#':70, 'B':71
};

const midiFiles = {
  60:'C4', 61:'Cs4', 62:'D4', 63:'Ds4', 64:'E4', 65:'F4',
  66:'Fs4', 67:'G4', 68:'Gs4', 69:'A4', 70:'As4', 71:'B4'
};

const noteFreq = {
  'C':261.6, 'C#':277.2, 'D':293.7, 'D#':311.1, 'E':329.6, 'F':349.2,
  'F#':370, 'G':392, 'G#':415.3, 'A':440, 'A#':466.2, 'B':493.9
};

const audioBuffers = {};

function unlockAudio() {
  if (audioUnlocked) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const o = audioCtx.createOscillator();
  o.connect(audioCtx.destination);
  o.start(0);
  o.stop(0.001);

  audioUnlocked = true;
}

document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('mousedown', unlockAudio, { once: true });

async function preloadAllNotes() {
  await Promise.all(Object.values(noteToMidi).map(async midi => {
    try {
      const res = await fetch(SOUNDFONT + midiFiles[midi] + '.mp3');
      const ab = await res.arrayBuffer();
      audioBuffers[midi] = await audioCtx.decodeAudioData(ab);
    } catch(e) {}
  }));
}

function playTone(freq, type = 'sine', dur = 0.5, vol = 0.3, when = audioCtx.currentTime) {
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.frequency.value = freq;
  o.type = type;

  o.connect(g);
  g.connect(audioCtx.destination);

  g.gain.setValueAtTime(vol, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + dur);

  o.start(when);
  o.stop(when + dur);
}

function playPianoNote(noteName, when = audioCtx.currentTime, dur = 2.2, vol = 0.9) {
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const midi = noteToMidi[noteName];
  const buf = audioBuffers[midi];

  if (buf) {
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();

    src.buffer = buf;
    gain.gain.setValueAtTime(vol, when);
    gain.gain.exponentialRampToValueAtTime(0.001, when + dur);

    src.connect(gain);
    gain.connect(audioCtx.destination);

    src.start(when);
    src.stop(when + dur);
  } else {
    playTone(noteFreq[noteName], 'triangle', dur, vol, when);
  }
}

const canvas = document.getElementById('sheet-canvas');
const ctx2d = canvas.getContext('2d');

function drawStaff(clef, noteInfo) {
  const W = canvas.width;
  const H = canvas.height;

  ctx2d.clearRect(0, 0, W, H);
  ctx2d.fillStyle = '#FFFEF5';
  ctx2d.fillRect(0, 0, W, H);

  const TOP = 36;
  const LINEGAP = 16;
  const STAFFH = LINEGAP * 4;

  ctx2d.strokeStyle = '#333';
  ctx2d.lineWidth = 1.5;

  for (let i = 0; i < 5; i++) {
    const y = TOP + i * LINEGAP;
    ctx2d.beginPath();
    ctx2d.moveTo(40, y);
    ctx2d.lineTo(W - 20, y);
    ctx2d.stroke();
  }

  ctx2d.fillStyle = '#222';

  if (clef === 'treble') {
    ctx2d.font = `${STAFFH * 2.2}px serif`;
    ctx2d.fillText('𝄞', 42, TOP + STAFFH + 8);
  } else {
    ctx2d.font = `bold ${STAFFH * 1.1}px serif`;
    ctx2d.fillText('𝄢', 42, TOP + LINEGAP * 2.5);
  }

  if (!noteInfo) return;

  const noteX = W / 2 + 10;
  const R = LINEGAP * 0.72;
  const staffY = pos => TOP + (4 - pos) * LINEGAP;
  const noteY = staffY(noteInfo.staff);

  if (noteInfo.ledger && noteInfo.staff < 0) {
    const ledgerY = TOP + 4 * LINEGAP;
    ctx2d.beginPath();
    ctx2d.moveTo(noteX - R * 1.6, ledgerY);
    ctx2d.lineTo(noteX + R * 1.6, ledgerY);
    ctx2d.stroke();
  }

  ctx2d.fillStyle = '#1a1a2e';
  ctx2d.beginPath();
  ctx2d.ellipse(noteX, noteY, R, R * 0.78, -0.3, 0, Math.PI * 2);
  ctx2d.fill();

  const stemDir = noteInfo.staff < 2 ? -1 : 1;
  const stemX = stemDir === -1 ? noteX + R * 0.85 : noteX - R * 0.85;

  ctx2d.strokeStyle = '#1a1a2e';
  ctx2d.lineWidth = 2;
  ctx2d.beginPath();
  ctx2d.moveTo(stemX, noteY);
  ctx2d.lineTo(stemX, noteY + stemDir * LINEGAP * 3.5);
  ctx2d.stroke();
}

let currentStage = 1;
let currentLevel = 1;
let combo = 0;
let isLocked = false;
let isExtreme = false;
let extremeCount = 0;
let currentQ = null;
let seqIdx = 0;
let s2CurrentNote = null;

let recent = {
  1: [], 2: [], 3: [], 4: [], 5: [], 6: [], 7: []
};

function pickFresh(arr, stage) {
  const pool = arr.filter((_, i) => !recent[stage].includes(i));
  const src = pool.length ? pool : arr;
  const item = src[Math.floor(Math.random() * src.length)];
  const idx = arr.indexOf(item);

  recent[stage].push(idx);
  if (recent[stage].length > 8) recent[stage].shift();

  return item;
}

async function fetchPokemon() {
  try {
    const id = Math.floor(Math.random() * 151) + 1;
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    const d = await res.json();
    document.getElementById('pokemon-img').src = d.sprites.front_default;
  } catch(e) {}
}

// =============================================
// 出題処理
// =============================================
function loadQuestion() {
  isLocked = false;
  seqIdx = 0;

  stopBGM();
  if (rhythmLoop) cancelAnimationFrame(rhythmLoop);

  document.getElementById('level-display').textContent = isExtreme ? '∞' : currentLevel;
  document.getElementById('combo-display').textContent = combo;

  document.getElementById('question-area').style.display = 'none';
  document.getElementById('keyboard').style.display = 'none';
  document.getElementById('sheet-area').style.display = 'none';
  document.getElementById('note-choices').style.display = 'none';
  document.getElementById('rhythm-area').style.display = 'none';

  const rb = document.getElementById('rationale-box');
  rb.style.display = 'none';
  rb.className = 'rationale-box';

  if (currentStage === 1) {
    document.getElementById('question-area').style.display = 'flex';
    document.getElementById('keyboard').style.display = 'flex';

    updateKeyLabels(currentLevel);

    const candidates = S1.filter(q => q.level <= currentLevel + 1);
    currentQ = pickFresh(candidates, 1);

    setHTML('instruction-box', currentQ.text);
  }

  else if (currentStage === 2) {
    document.getElementById('question-area').style.display = 'flex';
    document.getElementById('keyboard').style.display = 'flex';
    document.getElementById('sheet-area').style.display = 'flex';

    updateKeyLabels(currentLevel);

    const choices = S2.filter(q => q.level <= currentLevel + 1);
    const item = pickFresh(choices, 2);

    s2CurrentNote = item.note;

    setHTML('sheet-label', item.clef === 'treble' ? 'ト音記号' : 'ヘ音記号');
    drawStaff(item.clef, s2CurrentNote);
    setHTML('instruction-box', '五線譜の音符を見て、鍵盤をタッチ！');
  }

  else if (currentStage === 3 && currentLevel >= 6) {
    document.getElementById('rhythm-area').style.display = 'flex';
    setHTML('rhythm-title', '本格ドラムループに合わせてタイミングよく叩け！');
    startRhythmGame();
  }

  else {
    document.getElementById('question-area').style.display = 'flex';
    const cArea = document.getElementById('note-choices');
    cArea.style.display = 'flex';

    const quiz = pickFresh(quizData[currentStage], currentStage);

    setHTML('instruction-box', quiz.q);

    cArea.innerHTML = '';

    quiz.opts.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'note-choice-btn';
      btn.innerHTML = rubyize(opt);
      btn.onclick = () => answerQuiz(btn, idx, quiz);
      cArea.appendChild(btn);
    });
  }
}

function answerQuiz(btn, idx, quiz) {
  if (isLocked) return;

  isLocked = true;

  const ok = idx === quiz.ans;
  btn.classList.add(ok ? 'correct' : 'wrong');

  if (!ok) {
    const buttons = document.querySelectorAll('.note-choice-btn');
    if (buttons[quiz.ans]) buttons[quiz.ans].classList.add('correct');
  }

  showRationale(ok, quiz);

  if (ok) {
    handleCorrect(true);
  } else {
    handleWrong(true);
  }
}

function showRationale(ok, quiz) {
  const rb = document.getElementById('rationale-box');
  rb.className = 'rationale-box ' + (ok ? 'good' : 'bad');
  rb.style.display = 'block';
  rb.innerHTML = rubyize(`${ok ? '正解！' : '不正解！'}<br>${quiz.rationale}`);
}

// =============================================
// キーボード入力
// =============================================
function onKeyPress(note) {
  if (isLocked) return;

  if (currentStage === 1) {
    if (currentQ.type === 'single' || currentQ.type === 'ear') {
      note === currentQ.target[0] ? handleCorrect() : handleWrong();
    } else {
      if (note === currentQ.target[seqIdx]) {
        seqIdx++;
        if (seqIdx === currentQ.target.length) handleCorrect();
      } else {
        seqIdx = 0;
        handleWrong();
      }
    }
  }

  else if (currentStage === 2) {
    note === s2CurrentNote.note ? handleCorrect() : handleWrong();
  }
}

// =============================================
// 正解・不正解
// =============================================
function handleCorrect(hasRationale = false) {
  isLocked = true;
  combo++;

  document.getElementById('combo-display').textContent = combo;

  if (currentStage <= 2) {
    setHTML('instruction-box', '大正解！すごい！🎉');
  }

  setTimeout(() => {
    playFanfare();
    confetti({
      particleCount: 100,
      spread: 70,
      origin: { y: 0.6 }
    });
  }, 250);

  setTimeout(() => {
    if (isExtreme) {
      extremeCount++;
      document.getElementById('extreme-count-display').innerHTML =
        rubyize(`${extremeCount} 問正解！`);
      currentLevel = Math.ceil(Math.random() * 10);
    } else {
      if (currentLevel < 10) {
        currentLevel++;
      } else {
        isExtreme = true;
        extremeCount = 0;

        document.getElementById('extreme-badge-wrap').style.display = 'block';
        document.getElementById('level-pill').style.borderColor = 'var(--purple)';

        confetti({
          particleCount: 250,
          spread: 120,
          origin: { y: 0.5 }
        });

        currentLevel = Math.ceil(Math.random() * 10);
      }
    }

    fetchPokemon();
    loadQuestion();
  }, hasRationale ? 3600 : 1900);
}

function handleWrong(hasRationale = false) {
  combo = 0;
  document.getElementById('combo-display').textContent = 0;

  playBuzzer();

  const target = document.getElementById(
    currentStage === 3 && currentLevel >= 6
      ? 'rhythm-area'
      : currentStage <= 2
        ? 'question-area'
        : 'note-choices'
  );

  target.classList.add('shake');
  setTimeout(() => target.classList.remove('shake'), 400);

  setTimeout(() => {
    isLocked = false;
    if (hasRationale) loadQuestion();
  }, hasRationale ? 4200 : 450);
}

// =============================================
// リズムゲーム
// ステージ3 Lv6〜10のみ
// =============================================
let bgmNodes = [];
let rhythmLoop = null;

let RHYTHM = {
  active: false,
  startTime: 0,
  notes: [],
  speed: 180,
  hits: 0,
  misses: 0,
  bpm: 120
};

function noiseBurst(time, dur, vol, filterFreq, type = 'bandpass') {
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  const src = audioCtx.createBufferSource();
  const f = audioCtx.createBiquadFilter();
  const g = audioCtx.createGain();

  src.buffer = buffer;
  f.type = type;
  f.frequency.setValueAtTime(filterFreq, time);

  g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);

  src.connect(f);
  f.connect(g);
  g.connect(audioCtx.destination);

  src.start(time);
  src.stop(time + dur);

  bgmNodes.push(src);
}

function kick(t) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.type = 'sine';
  o.frequency.setValueAtTime(130, t);
  o.frequency.exponentialRampToValueAtTime(45, t + 0.13);

  g.gain.setValueAtTime(0.9, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start(t);
  o.stop(t + 0.3);

  bgmNodes.push(o);
}

function snare(t) {
  noiseBurst(t, 0.16, 0.45, 1800);
  playTone(190, 'triangle', 0.12, 0.18, t);
}

function hat(t, open = false) {
  noiseBurst(t, open ? 0.18 : 0.05, open ? 0.18 : 0.09, 8000, 'highpass');
}

function clap(t) {
  noiseBurst(t + 0.015, 0.08, 0.22, 2200);
  noiseBurst(t + 0.045, 0.08, 0.18, 2200);
}

function scheduleDrumPattern(start, beat, bpm) {
  for (let bar = 0; bar < 4; bar++) {
    for (let step = 0; step < 16; step++) {
      const t = start + (bar * 16 + step) * (beat / 4);

      if ([0, 7, 10].includes(step)) kick(t);

      if ([4, 12].includes(step)) {
        snare(t);
        clap(t);
      }

      if (step % 2 === 0) hat(t, step === 14);

      if (bpm > 128 && [3, 11, 15].includes(step)) {
        hat(t, false);
      }
    }
  }
}

function stopBGM() {
  bgmNodes.forEach(n => {
    try { n.stop(); } catch(e) {}
  });
  bgmNodes = [];
}

const rCanvas = document.getElementById('rhythm-canvas');
const rctx = rCanvas.getContext('2d');

function startRhythmGame() {
  if (audioCtx.state === 'suspended') audioCtx.resume();

  RHYTHM.notes = [];
  RHYTHM.hits = 0;
  RHYTHM.misses = 0;
  RHYTHM.bpm = 104 + currentLevel * 8 + (isExtreme ? 12 : 0);

  const beat = 60 / RHYTHM.bpm;
  RHYTHM.speed = 180 + currentLevel * 14;

  const now = audioCtx.currentTime + 1;
  RHYTHM.startTime = now;

  scheduleDrumPattern(now, beat, RHYTHM.bpm);

  for (let bar = 0; bar < 4; bar++) {
    for (let step = 0; step < 16; step++) {
      const hit =
        [0, 4, 8, 12].includes(step) ||
        (currentLevel >= 7 && [2, 10].includes(step)) ||
        (currentLevel >= 8 && [7, 14].includes(step)) ||
        (currentLevel >= 9 && [3, 11, 15].includes(step));

      if (hit) {
        RHYTHM.notes.push({
          time: now + (bar * 16 + step) * (beat / 4),
          hit: false,
          miss: false
        });
      }
    }
  }

  RHYTHM.active = true;

  document.getElementById('rhythm-feedback').textContent = `BPM ${RHYTHM.bpm}`;
  rhythmLoop = requestAnimationFrame(updateRhythm);
}

function updateRhythm() {
  if (!RHYTHM.active) return;

  const now = audioCtx.currentTime;
  const W = rCanvas.width;
  const H = rCanvas.height;
  const TARGET_X = 60;

  rctx.clearRect(0, 0, W, H);
  rctx.fillStyle = '#111';
  rctx.fillRect(0, 0, W, H);

  rctx.strokeStyle = 'rgba(255,255,255,0.5)';
  rctx.lineWidth = 4;
  rctx.beginPath();
  rctx.moveTo(TARGET_X, 10);
  rctx.lineTo(TARGET_X, H - 10);
  rctx.stroke();

  rctx.beginPath();
  rctx.arc(TARGET_X, H / 2, 25, 0, Math.PI * 2);
  rctx.fillStyle = 'rgba(255,255,255,0.1)';
  rctx.fill();
  rctx.strokeStyle = 'white';
  rctx.stroke();

  let allDone = true;

  RHYTHM.notes.forEach(n => {
    if (n.hit || n.miss) return;

    allDone = false;

    const x = TARGET_X + (n.time - now) * RHYTHM.speed;

    if (x < -30) {
      n.miss = true;
      RHYTHM.misses++;
      showRhythmFeedback('MISS', 'var(--red)');
      combo = 0;
      document.getElementById('combo-display').textContent = 0;
      playBuzzer();
    } else if (x < W + 30) {
      rctx.beginPath();
      rctx.arc(x, H / 2, 20, 0, Math.PI * 2);
      rctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--orange').trim();
      rctx.fill();

      rctx.strokeStyle = 'white';
      rctx.lineWidth = 3;
      rctx.stroke();

      rctx.fillStyle = 'white';
      rctx.font = 'bold 18px sans-serif';
      rctx.textAlign = 'center';
      rctx.textBaseline = 'middle';
      rctx.fillText('♪', x, H / 2);
    }
  });

  if (allDone) {
    RHYTHM.active = false;

    setTimeout(() => {
      if (RHYTHM.hits >= RHYTHM.notes.length * 0.62) {
        handleCorrect();
      } else {
        handleWrong();
      }
    }, 900);
  } else {
    rhythmLoop = requestAnimationFrame(updateRhythm);
  }
}

document.getElementById('rhythm-tap-btn').addEventListener('mousedown', e => {
  e.preventDefault();

  if (!RHYTHM.active) return;

  hat(audioCtx.currentTime, false);

  const now = audioCtx.currentTime;
  let closest = null;
  let minDiff = 999;

  RHYTHM.notes.forEach(n => {
    if (!n.hit && !n.miss) {
      const diff = Math.abs(n.time - now);
      if (diff < minDiff) {
        minDiff = diff;
        closest = n;
      }
    }
  });

  if (closest && minDiff < 0.18) {
    closest.hit = true;
    RHYTHM.hits++;
    combo++;

    document.getElementById('combo-display').textContent = combo;
    showRhythmFeedback(minDiff < 0.07 ? 'PERFECT!' : 'GREAT!', 'var(--green)');
  } else {
    combo = 0;
    document.getElementById('combo-display').textContent = 0;
    showRhythmFeedback('MISS', 'var(--red)');
    playBuzzer();
  }
});

document.getElementById('rhythm-tap-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  document.getElementById('rhythm-tap-btn').dispatchEvent(new Event('mousedown'));
});

function showRhythmFeedback(text, color) {
  const fb = document.getElementById('rhythm-feedback');
  fb.textContent = text;
  fb.style.color = color;
}

// =============================================
// ナビゲーション
// =============================================
function startStage(n) {
  currentStage = n;
  currentLevel = 1;
  combo = 0;
  isExtreme = false;
  extremeCount = 0;

  setHTML('stage-pill', `ステージ${n}`);

  document.getElementById('extreme-badge-wrap').style.display = 'none';
  document.getElementById('level-pill').style.borderColor = '';

  showScreen('screen-game');

  fetchPokemon();
  loadQuestion();
}

function goHome() {
  stopBGM();

  if (rhythmLoop) cancelAnimationFrame(rhythmLoop);

  showScreen('screen-select');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// =============================================
// 起動
// =============================================
renderHome();

(async () => {
  await preloadAllNotes();
})();
</script>
</body>
</html>
