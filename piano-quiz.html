<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピアノ探検隊</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #fcf8e8; touch-action: manipulation; }
        #app { max-width: 500px; margin: 0 auto; text-align: center; }
        .instruction { font-size: 1.2rem; margin: 20px 0; padding: 15px; background: #e6f7ff; border-radius: 10px; }
        
        .keyboard { display: flex; justify-content: center; height: 150px; margin-top: 20px; }
        .key { flex: 1; border: 1px solid #999; background: white; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; font-weight: bold; }
        .key.black { flex: 0.6; background: #333; color: white; margin: 0 -5%; z-index: 1; }
        .key:active, .key.active { background: #ffd666; }
    </style>
</head>
<body>

<div id="app">
    <h2 id="title">ドを探せ！</h2>
    <div class="instruction" id="msg">「2つのお山」の左下にある「ド」をタッチしてね！</div>
    
    <div class="keyboard" id="keyboard">
        <div class="key" data-note="261.63" data-name="ド">ド</div>
        <div class="key black" data-note="277.18">ド#</div>
        <div class="key" data-note="293.66" data-name="レ">レ</div>
        <div class="key black" data-note="311.13">レ#</div>
        <div class="key" data-note="329.63" data-name="ミ">ミ</div>
        <div class="key" data-note="349.23" data-name="ファ">ファ</div>
        <div class="key black" data-note="369.99">ファ#</div>
        <div class="key" data-note="392.00" data-name="ソ">ソ</div>
        <div class="key black" data-note="415.30">ソ#</div>
        <div class="key" data-note="440.00" data-name="ラ">ラ</div>
        <div class="key black" data-note="466.16">ラ#</div>
        <div class="key" data-note="493.88" data-name="シ">シ</div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playNote(freq) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1);
    }

    document.querySelectorAll('.key').forEach(key => {
        // タッチとクリックの両方に対応
        const handler = (e) => {
            e.preventDefault();
            const freq = key.getAttribute('data-note');
            playNote(freq);
            
            // 正解判定ロジック
            if(key.getAttribute('data-name') === 'ド') {
                document.getElementById('msg').innerText = "大正解！ドだね！";
            } else if(key.getAttribute('data-name')) {
                document.getElementById('msg').innerText = "ちがうよ！「ド」を探してみよう！";
            }
        };

        key.addEventListener('touchstart', handler, {passive: false});
        key.addEventListener('mousedown', handler);
    });
</script>
</body>
</html>
