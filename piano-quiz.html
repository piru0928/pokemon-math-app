<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピアノ探検隊</title>
    <style>
        /* リセットと基本設定 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #FFF9E6;
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* 画面に均等に配置 */
            width: 100%;
            max-width: 500px;
            height: 100%;
            padding: 20px 10px;
        }

        /* ヘッダー・ステータス表示 */
        header { width: 100%; text-align: center; }
        .meta-info { font-size: 10px; color: #888; margin-bottom: 8px; }
        .status {
            font-size: 18px;
            font-weight: bold;
            background: #fff;
            padding: 8px 20px;
            border-radius: 25px;
            border: 3px solid #FFD700;
            display: inline-block;
            color: #555;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        /* 質問とポケモンのエリア */
        .question-area {
            display: flex;
            align-items: center;
            background: #E6F7FF;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #91D5FF;
            width: 95%;
            min-height: 100px;
            margin: 10px 0;
        }

        /* ポケモンのふわふわアニメーション */
        #pokemon-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-right: 15px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* 指示文（ルビが崩れないように修正） */
        .instruction {
            font-size: 17px;
            font-weight: bold;
            color: #004A99;
            line-height: 1.8;
            word-break: keep-all; /* 文字の途中で改行させない */
            flex: 1;
        }

        /* 鍵盤レイアウト */
        .keyboard {
            display: flex;
            position: relative;
            width: 100%;
            height: 30vh;
            max-height: 220px;
            background: #444;
            padding: 5px;
            border-radius: 8px;
            border-bottom: 10px solid #222;
        }

        .key {
            cursor: pointer;
            border-radius: 0 0 6px 6px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 15px;
            font-weight: bold;
            transition: background-color 0.1s;
        }

        /* 白鍵 */
        .key.white {
            flex: 1;
            background: white;
            border: 1px solid #ccc;
            z-index: 1;
            color: #666;
            margin: 0 2px;
            font-size: 14px;
            box-shadow: inset 0 -10px 10px rgba(0,0,0,0.05);
        }

        /* 黒鍵 */
        .key.black {
            position: absolute;
            width: calc((100% - 10px) / 7 * 0.65);
            height: 60%;
            background: #222;
            color: white;
            z-index: 2;
            top: 5px;
            transform: translateX(-50%);
            font-size: 11px;
            padding-bottom: 8px;
            box-shadow: inset -2px -5px 5px rgba(255,255,255,0.2);
        }

        .key.black[data-note="C#"] { left: calc((100% - 10px) / 7 * 1 + 5px); }
        .key.black[data-note="D#"] { left: calc((100% - 10px) / 7 * 2 + 5px); }
        .key.black[data-note="F#"] { left: calc((100% - 10px) / 7 * 4 + 5px); }
        .key.black[data-note="G#"] { left: calc((100% - 10px) / 7 * 5 + 5px); }
        .key.black[data-note="A#"] { left: calc((100% - 10px) / 7 * 6 + 5px); }

        .key.active.white { background: #FFD666; }
        .key.active.black { background: #666; }

        /* エラー時の揺れ */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-2deg); }
            50% { transform: translateX(8px) rotate(2deg); }
            75% { transform: translateX(-8px) rotate(-2deg); }
        }
        .shake { animation: shake 0.4s ease-in-out; border-color: red !important; }

        /* 戻るボタン */
        .back-btn {
            background: #FF9800;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0 #E65100;
            margin-bottom: 10px;
        }
        .back-btn:active { transform: translateY(5px); box-shadow: none; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="meta-info">
                v1.2.0 | <ruby>更新<rt>こうしん</rt></ruby><ruby>日時<rt>にちじ</rt></ruby>: 2026/06/07
            </div>
            <div class="status">
                レベル: <span id="level-display">1</span> | 
                <ruby>連続<rt>れんぞく</rt></ruby><ruby>正解<rt>せいかい</rt></ruby>: <span id="combo-display">0</span>
            </div>
        </header>

        <div class="question-area" id="question-area">
            <img id="pokemon-img" src="" alt="ポケモン">
            <div id="instruction-box" class="instruction">
                </div>
        </div>

        <div class="keyboard" id="keyboard"></div>

        <button class="back-btn" onclick="location.href='https://piru0928.github.io/pokemon-math-app/'">
            <ruby>戻<rt>もど</rt></ruby>る
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        // 音の準備
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const noteFreq = {
            'C': 261.6, 'C#': 277.2, 'D': 293.7, 'D#': 311.1, 'E': 329.6, 'F': 349.2,
            'F#': 370.0, 'G': 392.0, 'G#': 415.3, 'A': 440.0, 'A#': 466.2, 'B': 493.9
        };

        const keysData = [
            { note: 'C', name: 'ド', type: 'white' }, { note: 'C#', name: 'ド#', type: 'black' },
            { note: 'D', name: 'レ', type: 'white' }, { note: 'D#', name: 'レ#', type: 'black' },
            { note: 'E', name: 'ミ', type: 'white' }, { note: 'F', name: 'ファ', type: 'white' },
            { note: 'F#', name: 'ファ#', type: 'black' }, { note: 'G', name: 'ソ', type: 'white' },
            { note: 'G#', name: 'ソ#', type: 'black' }, { note: 'A', name: 'ラ', type: 'white' },
            { note: 'A#', name: 'ラ#', type: 'black' }, { note: 'B', name: 'シ', type: 'white' }
        ];

        // 各レベルの問題パターンを複数用意
        const stageData = [
            {
                level: 1, type: 'single',
                questions: [
                    { text: `<ruby>二<rt>ふた</rt></ruby>つのお<ruby>山<rt>やま</rt></ruby>の<ruby>左<rt>ひだり</rt></ruby><ruby>下<rt>した</rt></ruby>、「ド」をタッチ！`, target: ['C'] },
                    { text: `すべての<ruby>基本<rt>きほん</rt></ruby>！「ド」の<ruby>音<rt>おと</rt></ruby>はどこかな？`, target: ['C'] }
                ]
            },
            {
                level: 2, type: 'single',
                questions: [
                    { text: `<ruby>黒<rt>くろ</rt></ruby>いお<ruby>山<rt>やま</rt></ruby>をどれか<ruby>一<rt>ひと</rt></ruby>つタッチしてね！`, target: ['C#', 'D#', 'F#', 'G#', 'A#'] },
                    { text: `<ruby>二<rt>ふた</rt></ruby>つならんだ<ruby>黒<rt>くろ</rt></ruby>いお<ruby>山<rt>やま</rt></ruby>のどちらかをさわって！`, target: ['C#', 'D#'] }
                ]
            },
            {
                level: 3, type: 'single',
                questions: [
                    { text: `<ruby>二<rt>ふた</rt></ruby>つのお<ruby>山<rt>やま</rt></ruby>の<ruby>右<rt>みぎ</rt></ruby><ruby>下<rt>した</rt></ruby>、「ミ」をタッチしてね！`, target: ['E'] },
                    { text: `「ド」のすぐお<ruby>隣<rt>となり</rt></ruby>、「レ」はどこかな？`, target: ['D'] },
                    { text: `お<ruby>山<rt>やま</rt></ruby>が<ruby>三<rt>みっ</rt></ruby>つの<ruby>左<rt>ひだり</rt></ruby><ruby>下<rt>した</rt></ruby>、「ファ」をさがせ！`, target: ['F'] }
                ]
            },
            {
                level: 4, type: 'sequence',
                questions: [
                    { text: `<ruby>階段<rt>かいだん</rt></ruby>だよ！「ド」→「レ」→「ミ」の<ruby>順番<rt>じゅんばん</rt></ruby>にタッチ！`, target: ['C', 'D', 'E'] },
                    { text: `おりるよ！「ミ」→「レ」→「ド」の<ruby>順番<rt>じゅんばん</rt></ruby>にさわって！`, target: ['E', 'D', 'C'] },
                    { text: `「ファ」→「ソ」→「ラ」と<ruby>順番<rt>じゅんばん</rt></ruby>にのぼってみよう！`, target: ['F', 'G', 'A'] }
                ]
            },
            {
                level: 5, type: 'single',
                questions: [
                    { text: `「ソ」のお<ruby>隣<rt>となり</rt></ruby>さん、「ラ」はどこかな？`, target: ['A'] },
                    { text: `「ド」からひとつとばし！「ミ」はどこ？`, target: ['E'] },
                    { text: `一番<ruby>右<rt>みぎ</rt></ruby>のはしっこ、「シ」をならして！`, target: ['B'] }
                ]
            }
        ];

        let currentLevel = 1;
        let combo = 0;
        let currentQuestion = null;
        let currentSequenceIndex = 0;
        
        // ★ 連打防止用のロック機能 ★
        let isLocked = false; 

        const keyboardDiv = document.getElementById('keyboard');
        const instructionBox = document.getElementById('instruction-box');
        const questionArea = document.getElementById('question-area');
        const levelDisplay = document.getElementById('level-display');
        const comboDisplay = document.getElementById('combo-display');
        const pokemonImg = document.getElementById('pokemon-img');

        // 音を鳴らす（スマホ対応強化）
        function playTone(freq, type = 'sine', duration = 0.6) {
            // スマホはタップ時にResumeしないと音が鳴らない
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.type = type;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playFanfare() {
            playTone(523.25, 'triangle', 0.2); // ド
            setTimeout(() => playTone(659.25, 'triangle', 0.2), 150); // ミ
            setTimeout(() => playTone(783.99, 'triangle', 0.4), 300); // ソ
        }
        function playBuzzer() {
            playTone(150, 'sawtooth', 0.3); // 低いブー音
        }

        async function fetchPokemon() {
            try {
                const id = Math.floor(Math.random() * 151) + 1;
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                const data = await res.json();
                pokemonImg.src = data.sprites.front_default;
            } catch (e) {
                console.error("ポケモン取得エラー", e);
            }
        }

        function loadQuestion() {
            const stage = stageData[currentLevel - 1];
            // そのレベルの問題パターンからランダムに1つ選ぶ
            const randomIdx = Math.floor(Math.random() * stage.questions.length);
            currentQuestion = stage.questions[randomIdx];
            currentSequenceIndex = 0;
            
            instructionBox.innerHTML = currentQuestion.text;
            levelDisplay.innerText = currentLevel;
            comboDisplay.innerText = combo;
            
            isLocked = false; // 問題が出たらロック解除
        }

        function handleCorrect() {
            isLocked = true; // 正解演出中は連打できないようにロック
            combo++;
            playFanfare();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            
            setTimeout(() => {
                // 3連続正解でレベルアップ
                if (combo % 3 === 0 && currentLevel < 5) {
                    currentLevel++;
                }
                fetchPokemon();
                loadQuestion();
            }, 1500);
        }

        function handleWrong() {
            combo = 0;
            comboDisplay.innerText = combo;
            playBuzzer();
            questionArea.classList.add('shake');
            setTimeout(() => questionArea.classList.remove('shake'), 400);
        }

        function checkAnswer(note) {
            if (isLocked) return; // ロック中は何もしない

            const stage = stageData[currentLevel - 1];
            
            if (stage.type === 'single') {
                if (currentQuestion.target.includes(note)) {
                    instructionBox.innerHTML = `<ruby>大<rt>だい</rt></ruby><ruby>正解<rt>せいかい</rt></ruby>！すごい！`;
                    handleCorrect();
                } else {
                    handleWrong();
                }
            } else if (stage.type === 'sequence') {
                if (note === currentQuestion.target[currentSequenceIndex]) {
                    currentSequenceIndex++;
                    if (currentSequenceIndex === currentQuestion.target.length) {
                        instructionBox.innerHTML = `<ruby>大<rt>だい</rt></ruby><ruby>正解<rt>せいかい</rt></ruby>！すごい！`;
                        handleCorrect();
                    }
                } else {
                    currentSequenceIndex = 0; // まちがえたら最初から
                    handleWrong();
                }
            }
        }

        // 鍵盤の生成
        keysData.forEach(k => {
            const keyDiv = document.createElement('div');
            keyDiv.className = `key ${k.type}`;
            keyDiv.setAttribute('data-note', k.note);
            keyDiv.innerText = k.name;

            const triggerEvent = (e) => {
                e.preventDefault();
                // iPhone等で音を出すための魔法のおまじない
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                keyDiv.classList.add('active');
                playTone(noteFreq[k.note]); // 鍵盤の音を鳴らす
                checkAnswer(k.note);
                setTimeout(() => keyDiv.classList.remove('active'), 200);
            };

            keyDiv.addEventListener('touchstart', triggerEvent, { passive: false });
            keyDiv.addEventListener('mousedown', triggerEvent);
            
            keyboardDiv.appendChild(keyDiv);
        });

        // 最初のセットアップ
        fetchPokemon();
        loadQuestion();
    </script>
</body>
</html>
