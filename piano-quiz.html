<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ピアノ探検隊</title>
<style>
*, *::before, *::after { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

:root {
  --cream: #FFF9E6;
  --gold: #FFD700;
  --gold-dark: #E6B800;
  --blue: #004A99;
  --blue-light: #E6F7FF;
  --blue-border: #91D5FF;
  --orange: #FF9800;
  --orange-dark: #E65100;
  --green: #4CAF50;
  --green-dark: #2E7D32;
  --red: #F44336;
  --purple: #7C3AED;
  --purple-dark: #5B21B6;
}

body {
  margin: 0; padding: 0;
  background: var(--cream);
  font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'BIZ UDPGothic', sans-serif;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100dvh; overflow-y: auto; touch-action: manipulation;
}

#app {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; max-width: 520px; min-height: 100%;
  padding: 12px 10px; gap: 12px;
}

/* ===== SCREENS ===== */
.screen { display: none; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
.screen.active { display: flex; }

/* ===== STAGE SELECT ===== */
#screen-select {
  justify-content: center; min-height: 80dvh;
  gap: 20px; padding: 20px 0;
}
.select-title {
  font-size: 28px; font-weight: 900; color: var(--blue);
  text-align: center; letter-spacing: 2px;
  text-shadow: 0 3px 0 rgba(0,74,153,0.15);
}
.select-title span { color: var(--gold-dark); }
.select-subtitle { font-size: 13px; color: #888; text-align: center; }

.stage-card {
  width: 90%; background: white; border-radius: 20px;
  border: 3px solid var(--gold); padding: 20px 24px;
  box-shadow: 0 6px 0 rgba(0,0,0,0.12);
  cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  text-align: center;
}
.stage-card:active { transform: translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
.stage-card.stage2 { border-color: var(--purple); box-shadow: 0 6px 0 rgba(124,58,237,0.2); }
.stage-card-icon { font-size: 40px; margin-bottom: 6px; }
.stage-card-title { font-size: 20px; font-weight: 900; color: var(--blue); margin-bottom: 4px; }
.stage-card.stage2 .stage-card-title { color: var(--purple); }
.stage-card-desc { font-size: 13px; color: #666; line-height: 1.5; }

/* ===== HEADER ===== */
.game-header { width: 100%; text-align: center; }
.meta-info { font-size: 10px; color: #aaa; margin-bottom: 4px; }
.status-bar {
  display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap;
}
.status-pill {
  font-size: 15px; font-weight: bold; background: white;
  padding: 6px 16px; border-radius: 20px;
  border: 3px solid var(--gold); color: #555;
  box-shadow: 0 3px 0 rgba(0,0,0,0.1);
}
.status-pill.extreme { border-color: var(--purple); color: var(--purple); }
.status-pill.stage2-pill { border-color: var(--purple); }

/* ===== QUESTION AREA ===== */
.question-area {
  display: flex; align-items: center;
  background: var(--blue-light); padding: 12px 15px;
  border-radius: 15px; border: 3px solid var(--blue-border);
  width: 100%; min-height: 100px;
}
#pokemon-img {
  width: 55px; height: 55px; object-fit: contain;
  margin-right: 12px; flex-shrink: 0;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
  animation: float 2s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.instruction {
  font-size: 15px; font-weight: bold; color: var(--blue);
  line-height: 1.6; flex: 1; word-break: break-word;
}
.instruction ruby { ruby-align: center; }
.play-audio-btn {
  display: inline-block; margin-top: 6px;
  background: var(--green); color: white; border: none;
  padding: 7px 14px; border-radius: 18px;
  font-size: 13px; font-weight: bold; cursor: pointer;
  box-shadow: 0 3px 0 var(--green-dark);
}
.play-audio-btn:active { transform: translateY(3px); box-shadow: none; }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px) rotate(-2deg)}
  50%{transform:translateX(8px) rotate(2deg)}
  75%{transform:translateX(-8px) rotate(-2deg)}
}
.shake { animation: shake 0.4s ease-in-out; border-color: var(--red) !important; }

/* ===== KEYBOARD ===== */
.keyboard {
  display: flex; position: relative; width: 100%;
  height: 26vh; min-height: 160px; max-height: 210px;
  background: #444; padding: 5px;
  border-radius: 8px; border-bottom: 10px solid #222;
}
.key {
  cursor: pointer; border-radius: 0 0 6px 6px;
  display: flex; justify-content: center; align-items: flex-end;
  padding-bottom: 12px; font-weight: bold; transition: background-color 0.08s;
}
.key.white {
  flex: 1; background: white; border: 1px solid #ccc;
  z-index: 1; color: #666; margin: 0 2px; font-size: 13px;
  box-shadow: inset 0 -8px 8px rgba(0,0,0,0.05);
}
.key.black {
  position: absolute;
  width: calc((100% - 10px) / 7 * 0.65);
  height: 60%; background: #222; color: white;
  z-index: 2; top: 5px; transform: translateX(-50%);
  font-size: 10px; padding-bottom: 7px;
  box-shadow: inset -2px -5px 5px rgba(255,255,255,0.15);
}
.key.black[data-note="C#"] { left: calc((100% - 10px) / 7 * 1 + 5px); }
.key.black[data-note="D#"] { left: calc((100% - 10px) / 7 * 2 + 5px); }
.key.black[data-note="F#"] { left: calc((100% - 10px) / 7 * 4 + 5px); }
.key.black[data-note="G#"] { left: calc((100% - 10px) / 7 * 5 + 5px); }
.key.black[data-note="A#"] { left: calc((100% - 10px) / 7 * 6 + 5px); }
.key.active.white { background: #FFD666; }
.key.active.black { background: #777; }
.key.hide-label { color: transparent !important; }
.key.highlight-correct.white { background: #a8f0a8 !important; }
.key.highlight-correct.black { background: #3a9a3a !important; }

/* ===== SHEET MUSIC ===== */
.sheet-area {
  width: 100%; background: white;
  border-radius: 15px; border: 3px solid var(--purple);
  padding: 12px; display: flex; flex-direction: column;
  align-items: center; gap: 8px;
}
.sheet-label {
  font-size: 12px; font-weight: bold; color: var(--purple);
}
#sheet-canvas {
  display: block; max-width: 100%;
  border-radius: 8px;
}

/* ===== NOTE CHOICE BUTTONS (Stage2 reverse quiz) ===== */
.note-choices {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 8px; width: 100%;
}
.note-choice-btn {
  padding: 10px 18px; font-size: 16px; font-weight: bold;
  border-radius: 14px; border: 3px solid var(--blue-border);
  background: white; color: var(--blue); cursor: pointer;
  box-shadow: 0 3px 0 rgba(0,74,153,0.2);
  transition: transform 0.08s, box-shadow 0.08s;
}
.note-choice-btn:active { transform: translateY(3px); box-shadow: none; }
.note-choice-btn.correct { background: #a8f0a8; border-color: var(--green); }
.note-choice-btn.wrong { background: #fca5a5; border-color: var(--red); }

/* ===== EXTREME MODE BADGE ===== */
.extreme-badge {
  background: linear-gradient(135deg, var(--purple), #C026D3);
  color: white; font-size: 13px; font-weight: 900;
  padding: 6px 18px; border-radius: 20px;
  letter-spacing: 2px; box-shadow: 0 3px 0 var(--purple-dark);
  animation: pulse-badge 1.5s ease-in-out infinite;
}
@keyframes pulse-badge {
  0%,100%{transform:scale(1)} 50%{transform:scale(1.05)}
}

/* ===== LOADING ===== */
#loading-msg { font-size: 12px; color: #aaa; text-align: center; min-height: 16px; }

/* ===== BUTTONS ===== */
.btn-row { display: flex; gap: 10px; justify-content: center; width: 100%; }
.back-btn {
  background: var(--orange); color: white; border: none;
  padding: 11px 32px; font-size: 16px; font-weight: bold;
  border-radius: 22px; cursor: pointer;
  box-shadow: 0 4px 0 var(--orange-dark);
  margin-bottom: 16px; margin-top: 6px;
}
.back-btn:active { transform: translateY(4px); box-shadow: none; }
.home-btn {
  background: #78909C; color: white; border: none;
  padding: 11px 24px; font-size: 15px; font-weight: bold;
  border-radius: 22px; cursor: pointer;
  box-shadow: 0 4px 0 #455A64;
  margin-bottom: 16px; margin-top: 6px;
}
.home-btn:active { transform: translateY(4px); box-shadow: none; }

/* ===== EXTREME CLEARED ===== */
#extreme-count-display { font-size: 13px; color: var(--purple); font-weight: bold; }
</style>
</head>
<body>
<div id="app">

  <!-- ========== STAGE SELECT ========== -->
  <div id="screen-select" class="screen active">
    <div class="select-title">🎹 ピアノ<span>探検隊</span></div>
    <div class="select-subtitle">ステージをえらんでね！</div>

    <div class="stage-card" onclick="startStage(1)">
      <div class="stage-card-icon">🎮</div>
      <div class="stage-card-title">ステージ１：鍵盤探し</div>
      <div class="stage-card-desc">
        ポケモンのヒントを見て<br>正しい鍵盤をタッチしよう！<br>Lv1〜10 ＋ エクストリームモード
      </div>
    </div>

    <div class="stage-card stage2" onclick="startStage(2)">
      <div class="stage-card-icon">🎼</div>
      <div class="stage-card-title">ステージ２：楽譜読み</div>
      <div class="stage-card-desc">
        五線譜の音符を読んで答えよう！<br>Lv1〜5：ト音記号 ／ Lv6〜10：ヘ音記号<br>Lv1〜10 ＋ エクストリームモード
      </div>
    </div>
  </div>

  <!-- ========== GAME SCREEN ========== -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="meta-info" id="meta-info">v2.0.0 | 2026/06/07</div>
      <div class="status-bar">
        <div class="status-pill" id="stage-pill">ステージ1</div>
        <div class="status-pill" id="level-pill">Lv: <span id="level-display">1</span></div>
        <div class="status-pill" id="combo-pill">🔥 <span id="combo-display">0</span></div>
      </div>
      <div id="extreme-badge-wrap" style="margin-top:6px;display:none;">
        <div class="extreme-badge">⚡ EXTREME MODE ⚡</div>
        <div id="extreme-count-display"></div>
      </div>
    </div>

    <div class="question-area" id="question-area">
      <img id="pokemon-img" src="" alt="">
      <div id="instruction-box" class="instruction">読み込み中…</div>
    </div>

    <!-- Stage2: sheet music -->
    <div class="sheet-area" id="sheet-area" style="display:none;">
      <div class="sheet-label" id="sheet-label">五線譜</div>
      <canvas id="sheet-canvas" width="360" height="150"></canvas>
    </div>

    <!-- Stage2 reverse quiz: note choice buttons -->
    <div class="note-choices" id="note-choices" style="display:none;"></div>

    <div id="loading-msg"></div>

    <div class="keyboard" id="keyboard"></div>

    <div class="btn-row">
      <button class="home-btn" onclick="goHome()">🏠 ホーム</button>
      <button class="back-btn" onclick="location.href='https://piru0928.github.io/pokemon-math-app/'">
        <ruby>戻<rt>もど</rt></ruby>る
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// =============================================
// AUDIO ENGINE
// =============================================
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = new AC();
let audioUnlocked = false;

const SOUNDFONT = 'https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/acoustic_grand_piano-mp3/';
const noteToMidi = { 'C':60,'C#':61,'D':62,'D#':63,'E':64,'F':65,'F#':66,'G':67,'G#':68,'A':69,'A#':70,'B':71 };
const midiFiles  = { 60:'C4',61:'Cs4',62:'D4',63:'Ds4',64:'E4',65:'F4',66:'Fs4',67:'G4',68:'Gs4',69:'A4',70:'As4',71:'B4' };
const noteFreq   = { 'C':261.6,'C#':277.2,'D':293.7,'D#':311.1,'E':329.6,'F':349.2,'F#':370,'G':392,'G#':415.3,'A':440,'A#':466.2,'B':493.9 };
const audioBuffers = {};

function unlockAudio() {
  if (audioUnlocked) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator(); o.connect(audioCtx.destination); o.start(0); o.stop(0.001);
  audioUnlocked = true;
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('mousedown',  unlockAudio, { once: true });

async function preloadAllNotes() {
  const msg = document.getElementById('loading-msg');
  const midis = Object.values(noteToMidi);
  let n = 0;
  await Promise.all(midis.map(async midi => {
    try {
      const r = await fetch(SOUNDFONT + midiFiles[midi] + '.mp3');
      const ab = await r.arrayBuffer();
      audioBuffers[midi] = await audioCtx.decodeAudioData(ab);
    } catch(e) { console.warn('load fail', midi); }
    msg.textContent = `🎹 音源ロード中… (${++n}/${midis.length})`;
  }));
  msg.textContent = '';
}

window.playPianoNote = function(noteName) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const midi = noteToMidi[noteName];
  const buf  = audioBuffers[midi];
  if (buf) {
    const src  = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    src.buffer = buf;
    gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0);
    src.connect(gain); gain.connect(audioCtx.destination);
    src.start(); src.stop(audioCtx.currentTime + 3.0);
  } else {
    // fallback
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = noteFreq[noteName];
    osc.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
    osc.start(); osc.stop(audioCtx.currentTime + 1.5);
  }
};

function playTone(freq, type='sine', dur=0.5) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.frequency.value = freq; o.type = type;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playFanfare() {
  playTone(523.25,'triangle',0.2);
  setTimeout(()=>playTone(659.25,'triangle',0.2),150);
  setTimeout(()=>playTone(783.99,'triangle',0.4),300);
}
function playBuzzer() { playTone(150,'sawtooth',0.3); }

// =============================================
// KEYBOARD BUILD
// =============================================
const keysData = [
  {note:'C', name:'ド',   type:'white'},
  {note:'C#',name:'ド#', type:'black'},
  {note:'D', name:'レ',   type:'white'},
  {note:'D#',name:'レ#', type:'black'},
  {note:'E', name:'ミ',   type:'white'},
  {note:'F', name:'ファ', type:'white'},
  {note:'F#',name:'ファ#',type:'black'},
  {note:'G', name:'ソ',   type:'white'},
  {note:'G#',name:'ソ#', type:'black'},
  {note:'A', name:'ラ',   type:'white'},
  {note:'A#',name:'ラ#', type:'black'},
  {note:'B', name:'シ',   type:'white'}
];

const keyboardDiv = document.getElementById('keyboard');
keysData.forEach(k => {
  const div = document.createElement('div');
  div.className = `key ${k.type}`;
  div.setAttribute('data-note', k.note);
  div.textContent = k.name;
  const trigger = e => {
    e.preventDefault();
    div.classList.add('active');
    playPianoNote(k.note);
    onKeyPress(k.note);
    setTimeout(()=>div.classList.remove('active'), 200);
  };
  div.addEventListener('touchstart', trigger, {passive:false});
  div.addEventListener('mousedown',  trigger);
  keyboardDiv.appendChild(div);
});

function updateKeyLabels(level) {
  document.querySelectorAll('.key').forEach(k => {
    k.classList.toggle('hide-label', level >= 4);
  });
}

function flashKey(note, cls='highlight-correct') {
  const el = document.querySelector(`.key[data-note="${note}"]`);
  if (!el) return;
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls), 600);
}

// =============================================
// STAGE 1 DATA (keyboard hunt)
// =============================================
const stage1Data = [
  { level:1, type:'single', questions:[
    { text:`2つ<ruby>並<rt>なら</rt></ruby>んだ<ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>の<ruby>左<rt>ひだり</rt></ruby><ruby>下<rt>した</rt></ruby>の「ド」をタッチ！`, target:['C'] },
    { text:`「ド」の<ruby>音<rt>おと</rt></ruby>はどこかな？`, target:['C'] },
    { text:`いちばん<ruby>左<rt>ひだり</rt></ruby>の<ruby>白<rt>しろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>が「ド」だよ！`, target:['C'] }
  ]},
  { level:2, type:'single', questions:[
    { text:`「ド」のすぐ<ruby>右<rt>みぎ</rt></ruby>の「レ」はどこかな？`, target:['D'] },
    { text:`2つ<ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>の<ruby>右<rt>みぎ</rt></ruby><ruby>下<rt>した</rt></ruby>の「ミ」をタッチ！`, target:['E'] },
    { text:`「ド」→「レ」の「レ」はど〜こだ？`, target:['D'] }
  ]},
  { level:3, type:'sequence', questions:[
    { text:`<ruby>順番<rt>じゅんばん</rt></ruby>に！「ド」→「レ」→「ミ」！`, target:['C','D','E'] },
    { text:`おりるよ！「ミ」→「レ」→「ド」！`, target:['E','D','C'] },
    { text:`「ド・レ・ミ」とひいてみよう！`, target:['C','D','E'] }
  ]},
  { level:4, type:'single', questions:[
    { text:`3つ<ruby>並<rt>なら</rt></ruby>んだ<ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>の<ruby>左<rt>ひだり</rt></ruby><ruby>下<rt>した</rt></ruby>が「ファ」だよ！`, target:['F'] },
    { text:`「ファ」のすぐ<ruby>右<rt>みぎ</rt></ruby>の「ソ」はどこ？`, target:['G'] },
    { text:`「ソ」をタッチ！`, target:['G'] }
  ]},
  { level:5, type:'single', questions:[
    { text:`いちばん<ruby>右<rt>みぎ</rt></ruby>のはしっこ「シ」をならして！`, target:['B'] },
    { text:`「シ」のすぐ<ruby>左<rt>ひだり</rt></ruby>の「ラ」はどこ？`, target:['A'] },
    { text:`「ラ」をタッチしてみよう！`, target:['A'] }
  ]},
  { level:6, type:'single', questions:[
    { text:`<ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>の「ド#」はどこかな？`, target:['C#'] },
    { text:`<ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>の「ファ#」をタッチ！`, target:['F#'] },
    { text:`「ソ#」はどこだろう？`, target:['G#'] }
  ]},
  { level:7, type:'ear', questions:[
    { text:`【音当てクイズ】耳をすましてね！<br><button class="play-audio-btn" onclick="playPianoNote('C')">▶️ 音をきく</button>`, target:['C'] },
    { text:`【音当てクイズ】よく聞いてあてよう！<br><button class="play-audio-btn" onclick="playPianoNote('G')">▶️ 音をきく</button>`, target:['G'] },
    { text:`【音当てクイズ】この音は？<br><button class="play-audio-btn" onclick="playPianoNote('E')">▶️ 音をきく</button>`, target:['E'] },
    { text:`【音当てクイズ】どこかな？<br><button class="play-audio-btn" onclick="playPianoNote('A')">▶️ 音をきく</button>`, target:['A'] }
  ]},
  { level:8, type:'sequence', questions:[
    { text:`「ド」から「ソ」まで！`, target:['C','D','E','F','G'] },
    { text:`「ファ」→「ソ」→「ラ」→「シ」！`, target:['F','G','A','B'] },
    { text:`「ド・レ・ミ・ファ・ミ・レ・ド」！`, target:['C','D','E','F','E','D','C'] }
  ]},
  { level:9, type:'sequence', questions:[
    { text:`<ruby>逆<rt>ぎゃく</rt></ruby>の<ruby>階段<rt>かいだん</rt></ruby>！「ソ」→「ファ」→「ミ」→「レ」→「ド」！`, target:['G','F','E','D','C'] },
    { text:`「シ」→「ラ」→「ソ」とおりて！`, target:['B','A','G'] },
    { text:`「ラ・ソ・ファ・ミ・レ・ド」！`, target:['A','G','F','E','D','C'] }
  ]},
  { level:10, type:'sequence', questions:[
    { text:`【きらきら星】「ド・ド・ソ・ソ・ラ・ラ・ソ」`, target:['C','C','G','G','A','A','G'] },
    { text:`【メリーさんのひつじ】「ミ・レ・ド・レ・ミ・ミ・ミ」`, target:['E','D','C','D','E','E','E'] },
    { text:`【カエルの合唱】「ド・レ・ミ・ファ・ミ・レ・ド」`, target:['C','D','E','F','E','D','C'] }
  ]}
];

// =============================================
// STAGE 2 DATA (sheet music)
// =============================================
// noteInfo: { note, octave, clef, solfege }
// type: 'read' (sheet→key), 'write' (key→choice)

// Treble clef notes (C4=ド, up to B5)
// Staff line positions (0=bottom line, 4=top line; 0.5=space)
// We'll draw on canvas with line positions
// Treble clef: E4=bottom line(staff=0), lines go up by 1 per line, 0.5 per space
// C4 is ledger line below staff → staff=-1
// D4 → staff=-0.5 (space below bottom line)
// E4 → staff=0 (1st line = bottom line)
// F4 → staff=0.5, G4→1, A4→1.5, B4→2, C5→2.5, D5→3, E5→3.5, F5→4(top), G5→4.5
const trebleNotes = [
  {note:'C', oct:4, staff:-1,  ledger:true,  solfege:'ド'},
  {note:'D', oct:4, staff:-0.5,ledger:false, solfege:'レ'},
  {note:'E', oct:4, staff:0,   ledger:false, solfege:'ミ'},
  {note:'F', oct:4, staff:0.5, ledger:false, solfege:'ファ'},
  {note:'G', oct:4, staff:1,   ledger:false, solfege:'ソ'},
  {note:'A', oct:4, staff:1.5, ledger:false, solfege:'ラ'},
  {note:'B', oct:4, staff:2,   ledger:false, solfege:'シ'},
  {note:'C', oct:5, staff:2.5, ledger:false, solfege:'ド'},
  {note:'D', oct:5, staff:3,   ledger:false, solfege:'レ'},
  {note:'E', oct:5, staff:3.5, ledger:false, solfege:'ミ'},
];

const bassNotes = [
  // F2-B3 range
  {note:'G', oct:2, staff:0,  ledger:false, solfege:'ソ'},
  {note:'A', oct:2, staff:0.5,ledger:false, solfege:'ラ'},
  {note:'B', oct:2, staff:1,  ledger:false, solfege:'シ'},
  {note:'C', oct:3, staff:1.5,ledger:false, solfege:'ド'},
  {note:'D', oct:3, staff:2,  ledger:false, solfege:'レ'},
  {note:'E', oct:3, staff:2.5,ledger:false, solfege:'ミ'},
  {note:'F', oct:3, staff:3,  ledger:false, solfege:'ファ'},
  {note:'G', oct:3, staff:3.5,ledger:false, solfege:'ソ'},
  {note:'A', oct:3, staff:4,  ledger:false, solfege:'ラ'},
  {note:'B', oct:3, staff:4.5,ledger:true,  solfege:'シ'},
];

// Stage2 levels
const stage2Data = [
  { level:1, clef:'treble', notePool: trebleNotes.slice(0,3), type:'read',
    hint:`<ruby>五線譜<rt>ごせんふ</rt></ruby>の<ruby>音符<rt>おんぷ</rt></ruby>を見て、おなじ<ruby>鍵盤<rt>けんばん</rt></ruby>をタッチ！` },
  { level:2, clef:'treble', notePool: trebleNotes.slice(0,5), type:'mixed',
    hint:`<ruby>音符<rt>おんぷ</rt></ruby>はどの<ruby>鍵盤<rt>けんばん</rt></ruby>かな？` },
  { level:3, clef:'treble', notePool: trebleNotes.slice(0,7), type:'mixed',
    hint:`ト<ruby>音記号<rt>おんきごう</rt></ruby>の<ruby>音符<rt>おんぷ</rt></ruby>を<ruby>読<rt>よ</rt></ruby>もう！` },
  { level:4, clef:'treble', notePool: trebleNotes.slice(0,8), type:'mixed',
    hint:`<ruby>音符<rt>おんぷ</rt></ruby>の<ruby>場所<rt>ばしょ</rt></ruby>をおぼえよう！` },
  { level:5, clef:'treble', notePool: trebleNotes.slice(0,10), type:'mixed',
    hint:`ト<ruby>音記号<rt>おんきごう</rt></ruby>マスター<ruby>目指<rt>めざ</rt></ruby>せ！` },
  { level:6, clef:'bass', notePool: bassNotes.slice(0,3), type:'read',
    hint:`ヘ<ruby>音記号<rt>おんきごう</rt></ruby>スタート！<ruby>音符<rt>おんぷ</rt></ruby>をタッチ！` },
  { level:7, clef:'bass', notePool: bassNotes.slice(0,5), type:'mixed',
    hint:`ヘ<ruby>音記号<rt>おんきごう</rt></ruby>の<ruby>音符<rt>おんぷ</rt></ruby>はどれかな？` },
  { level:8, clef:'bass', notePool: bassNotes.slice(0,7), type:'mixed',
    hint:`ヘ<ruby>音記号<rt>おんきごう</rt></ruby>もどんどん<ruby>読<rt>よ</rt></ruby>もう！` },
  { level:9, clef:'bass', notePool: bassNotes.slice(0,9), type:'mixed',
    hint:`ヘ<ruby>音記号<rt>おんきごう</rt></ruby><ruby>上級<rt>じょうきゅう</rt></ruby>！` },
  { level:10, clef:'bass', notePool: bassNotes.slice(0,10), type:'mixed',
    hint:`ヘ<ruby>音記号<rt>おんきごう</rt></ruby>マスター<ruby>挑戦<rt>ちょうせん</rt></ruby>！` },
];

// =============================================
// SHEET MUSIC DRAWING
// =============================================
const canvas = document.getElementById('sheet-canvas');
const ctx2d  = canvas.getContext('2d');

function drawStaff(clef, noteInfo) {
  const W = canvas.width, H = canvas.height;
  ctx2d.clearRect(0, 0, W, H);

  // Background
  ctx2d.fillStyle = '#FFFEF5';
  ctx2d.fillRect(0, 0, W, H);

  const TOP    = 36;   // extra top space so ledger notes below have room
  const LINEGAP = 16;
  const STAFFH = LINEGAP * 4;

  // Draw 5 staff lines
  ctx2d.strokeStyle = '#333';
  ctx2d.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    const y = TOP + i * LINEGAP;
    ctx2d.beginPath();
    ctx2d.moveTo(40, y); ctx2d.lineTo(W - 20, y);
    ctx2d.stroke();
  }

  // Clef symbol
  ctx2d.font = `bold ${STAFFH * 1.6}px serif`;
  ctx2d.fillStyle = '#222';
  if (clef === 'treble') {
    ctx2d.font = `${STAFFH * 2.2}px serif`;
    ctx2d.fillText('𝄞', 42, TOP + STAFFH + 8);
  } else {
    ctx2d.font = `bold ${STAFFH * 1.1}px serif`;
    ctx2d.fillText('𝄢', 42, TOP + LINEGAP * 2.5);
  }

  if (!noteInfo) return;

  // Note position: staff=0 is bottom line, 4 is top line
  // y = TOP + (4 - staff) * LINEGAP
  const noteX = W / 2 + 10;
  // staff position: 0=bottom line(y=TOP+4*LINEGAP), 0.5=1st space, 1=2nd line...
  // staffY: staff 0 → y = TOP + 4*LINEGAP
  const staffY = pos => TOP + (4 - pos) * LINEGAP;
  const noteY  = staffY(noteInfo.staff);
  const R      = LINEGAP * 0.72;

  // Ledger lines: draw for notes outside the 5-line staff
  ctx2d.strokeStyle = '#333'; ctx2d.lineWidth = 1.8;
  if (noteInfo.ledger) {
    if (noteInfo.staff < 0) {
      // Below bottom line: draw ledger line at y of bottom staff line (staff=0)
      const ledgerY = TOP + 4 * LINEGAP;
      ctx2d.beginPath();
      ctx2d.moveTo(noteX - R*1.6, ledgerY);
      ctx2d.lineTo(noteX + R*1.6, ledgerY);
      ctx2d.stroke();
    }
    if (noteInfo.staff > 4) {
      // Above top line: draw ledger line
      const ledgerY = TOP + (4 - noteInfo.staff) * LINEGAP;
      ctx2d.beginPath();
      ctx2d.moveTo(noteX - R*1.6, ledgerY);
      ctx2d.lineTo(noteX + R*1.6, ledgerY);
      ctx2d.stroke();
    }
  }

  // Note head (filled ellipse)
  ctx2d.fillStyle = '#1a1a2e';
  ctx2d.beginPath();
  ctx2d.ellipse(noteX, noteY, R, R * 0.78, -0.3, 0, Math.PI*2);
  ctx2d.fill();

  // Stem
  const stemDir = noteInfo.staff < 2 ? -1 : 1; // below middle → stem up
  const stemX   = stemDir === -1 ? noteX + R*0.85 : noteX - R*0.85;
  const stemY1  = noteY;
  const stemY2  = noteY + stemDir * LINEGAP * 3.5;
  ctx2d.strokeStyle = '#1a1a2e'; ctx2d.lineWidth = 2;
  ctx2d.beginPath();
  ctx2d.moveTo(stemX, stemY1); ctx2d.lineTo(stemX, stemY2);
  ctx2d.stroke();

  // Solfege hint (small, below/above staff)
  ctx2d.font = `bold 13px 'Hiragino Maru Gothic ProN', sans-serif`;
  ctx2d.fillStyle = '#7C3AED';
  ctx2d.textAlign = 'center';
  ctx2d.fillText('?', noteX, TOP + STAFFH + 22);
  ctx2d.textAlign = 'left';
}

// =============================================
// GAME STATE
// =============================================
let currentStage  = 1;
let currentLevel  = 1;
let combo         = 0;
let isLocked      = false;
let isExtreme     = false;
let extremeCount  = 0;
let currentQ      = null; // current question object
let seqIdx        = 0;
let s2CurrentNote = null;   // current noteInfo for stage2

// Per-level question pools (to avoid repeats)
let questionPool  = [];

function buildQuestionPool(stageNum, level) {
  const data = stageNum === 1 ? stage1Data : stage2Data;
  const stageLevel = data.find(s => s.level === level);
  if (!stageLevel) return [];
  if (stageNum === 1) {
    return [...stageLevel.questions].sort(()=>Math.random()-0.5);
  } else {
    // Stage2: build pool of {noteInfo} from notePool, randomized
    return [...stageLevel.notePool].sort(()=>Math.random()-0.5);
  }
}

function getNextQuestion(stageNum, level) {
  if (questionPool.length === 0) {
    questionPool = buildQuestionPool(stageNum, level);
  }
  return questionPool.shift();
}

// =============================================
// POKEMON
// =============================================
async function fetchPokemon() {
  try {
    const id  = Math.floor(Math.random()*151)+1;
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    const d   = await res.json();
    document.getElementById('pokemon-img').src = d.sprites.front_default;
  } catch(e){}
}

// =============================================
// LOAD QUESTION
// =============================================
function loadQuestion() {
  isLocked = false;
  seqIdx   = 0;

  updateKeyLabels(currentLevel);

  const levelDisp  = document.getElementById('level-display');
  const comboDisp  = document.getElementById('combo-display');
  const instrBox   = document.getElementById('instruction-box');
  const sheetArea  = document.getElementById('sheet-area');
  const noteChoices= document.getElementById('note-choices');
  const sheetLabel = document.getElementById('sheet-label');

  levelDisp.textContent = isExtreme ? '∞' : currentLevel;
  comboDisp.textContent = combo;

  if (currentStage === 1) {
    // ---- Stage 1 ----
    sheetArea.style.display  = 'none';
    noteChoices.style.display= 'none';

    const stageLevel = stage1Data.find(s => s.level === currentLevel);
    currentQ = getNextQuestion(1, currentLevel);
    if (!currentQ) { questionPool = buildQuestionPool(1, currentLevel); currentQ = questionPool.shift(); }

    instrBox.innerHTML = currentQ.text;
    if (stageLevel && stageLevel.type === 'ear') {
      setTimeout(()=>playPianoNote(currentQ.target[0]), 500);
    }

  } else {
    // ---- Stage 2: always keyboard mode ----
    const stageLevel = stage2Data.find(s => s.level === currentLevel);
    const ni = getNextQuestion(2, currentLevel);
    if (!ni) { questionPool = buildQuestionPool(2, currentLevel); s2CurrentNote = questionPool.shift(); }
    else { s2CurrentNote = ni; }

    sheetLabel.textContent = stageLevel.clef === 'treble' ? 'ト音記号' : 'ヘ音記号';
    sheetArea.style.display = 'flex';
    noteChoices.style.display = 'none';
    drawStaff(stageLevel.clef, s2CurrentNote);

    // Play the note so they can hear it
    setTimeout(()=>playPianoNote(s2CurrentNote.note), 400);

    instrBox.innerHTML = stageLevel.hint + `<br>🎹 <ruby>鍵盤<rt>けんばん</rt></ruby>をタッチ！`;
  }
}

// Stage2 write mode: choice buttons
function buildNoteChoices(correctNote, pool) {
  const container = document.getElementById('note-choices');
  container.innerHTML = '';
  container.style.display = 'flex';

  // Pick 3-4 unique wrong options
  const allSolfeges = [...new Set(pool.map(n=>n.solfege))];
  const wrong = allSolfeges.filter(s=>s!==correctNote.solfege).sort(()=>Math.random()-0.5).slice(0,3);
  const options = [...wrong, correctNote.solfege].sort(()=>Math.random()-0.5);

  options.forEach(solfege => {
    const btn = document.createElement('button');
    btn.className = 'note-choice-btn';
    btn.textContent = solfege;
    btn.onclick = () => {
      if (isLocked) return;
      const isCorrect = solfege === correctNote.solfege;
      btn.classList.add(isCorrect ? 'correct' : 'wrong');
      if (isCorrect) {
        playPianoNote(correctNote.note);
        flashKey(correctNote.note);
        handleCorrect();
      } else {
        playBuzzer();
        handleWrong();
      }
    };
    container.appendChild(btn);
  });
}

// =============================================
// KEY PRESS HANDLER
// =============================================
function onKeyPress(note) {
  if (isLocked) return;

  if (currentStage === 1) {
    const stageLevel = stage1Data.find(s=>s.level===currentLevel);
    if (!stageLevel) return;

    if (stageLevel.type === 'single' || stageLevel.type === 'ear') {
      if (currentQ.target.includes(note)) {
        document.getElementById('instruction-box').innerHTML = `<ruby>大<rt>だい</rt></ruby><ruby>正解<rt>せいかい</rt></ruby>！すごい！🎉`;
        handleCorrect();
      } else { handleWrong(); }

    } else if (stageLevel.type === 'sequence') {
      if (note === currentQ.target[seqIdx]) {
        seqIdx++;
        if (seqIdx === currentQ.target.length) {
          document.getElementById('instruction-box').innerHTML = `<ruby>大<rt>だい</rt></ruby><ruby>正解<rt>せいかい</rt></ruby>！すごい！🎉`;
          handleCorrect();
        }
      } else {
        seqIdx = 0;
        handleWrong();
      }
    }

  } else {
    // Stage2: keyboard always
    if (note === s2CurrentNote.note) {
      document.getElementById('instruction-box').innerHTML = `<ruby>大<rt>だい</rt></ruby><ruby>正解<rt>せいかい</rt></ruby>！すごい！🎉`;
      handleCorrect();
    } else { handleWrong(); }
  }
}

// =============================================
// CORRECT / WRONG
// =============================================
function handleCorrect() {
  isLocked = true;
  combo++;

  setTimeout(()=>{
    playFanfare();
    confetti({particleCount:100,spread:70,origin:{y:0.6}});
  }, 350);

  setTimeout(()=>{
    if (isExtreme) {
      extremeCount++;
      document.getElementById('extreme-count-display').innerHTML =
        `${extremeCount} <ruby>問<rt>もん</rt></ruby><ruby>正解<rt>せいかい</rt></ruby>！`;
      // Extreme: random level 1-10
      currentLevel = Math.ceil(Math.random()*10);
      questionPool = buildQuestionPool(currentStage, currentLevel);
    } else {
      if (combo % 3 === 0 && currentLevel < 10) {
        currentLevel++;
        questionPool = buildQuestionPool(currentStage, currentLevel);
      } else if (currentLevel === 10 && combo % 3 === 0) {
        // Enter extreme mode!
        isExtreme = true;
        extremeCount = 0;
        document.getElementById('extreme-badge-wrap').style.display = 'block';
        document.getElementById('level-pill').style.borderColor = 'var(--purple)';
        confetti({particleCount:250,spread:120,origin:{y:0.5}});
        currentLevel = Math.ceil(Math.random()*10);
        questionPool = buildQuestionPool(currentStage, currentLevel);
      }
    }
    fetchPokemon();
    loadQuestion();
  }, 2000);
}

function handleWrong() {
  combo = 0;
  document.getElementById('combo-display').textContent = 0;
  playBuzzer();
  const qa = document.getElementById('question-area');
  qa.classList.add('shake');
  setTimeout(()=>qa.classList.remove('shake'), 400);
}

// =============================================
// NAVIGATION
// =============================================
function startStage(n) {
  currentStage  = n;
  currentLevel  = 1;
  combo         = 0;
  isExtreme     = false;
  extremeCount  = 0;
  questionPool  = [];

  const stagePill = document.getElementById('stage-pill');
  stagePill.textContent = `ステージ${n}`;
  stagePill.className   = n === 2 ? 'status-pill stage2-pill' : 'status-pill';

  document.getElementById('extreme-badge-wrap').style.display = 'none';
  document.getElementById('level-pill').style.borderColor = '';

  showScreen('screen-game');
  loadQuestion();
  fetchPokemon();
}

function goHome() {
  showScreen('screen-select');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// =============================================
// BOOT
// =============================================
(async () => {
  await preloadAllNotes();
})();
</script>
