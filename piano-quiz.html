<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピアノ探検隊</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: #FFF9E6; font-family: 'Hiragino Maru Gothic ProN', sans-serif; display: flex; justify-content: center; min-height: 100dvh; touch-action: manipulation; }
        #app { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; padding: 15px 10px; gap: 15px; }
        .status { font-size: 18px; font-weight: bold; background: #fff; padding: 8px 20px; border-radius: 25px; border: 3px solid #FFD700; color: #555; }
        .question-area { display: flex; align-items: center; background: #E6F7FF; padding: 15px; border-radius: 15px; border: 3px solid #91D5FF; width: 100%; min-height: 110px; }
        #pokemon-img { width: 60px; height: 60px; margin-right: 15px; flex-shrink: 0; }
        .instruction { font-size: 16px; font-weight: bold; color: #004A99; line-height: 1.6; }
        .keyboard { display: flex; position: relative; width: 100%; height: 28vh; min-height: 180px; background: #444; padding: 5px; border-radius: 8px; }
        .key { cursor: pointer; border-radius: 0 0 6px 6px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 15px; font-weight: bold; transition: background-color 0.1s; }
        .key.white { flex: 1; background: white; border: 1px solid #ccc; z-index: 1; color: #666; margin: 0 2px; font-size: 14px; }
        .key.black { position: absolute; width: 8%; height: 60%; background: #222; color: white; z-index: 2; top: 5px; font-size: 11px; }
        /* 鍵盤上の文字を消すクラス */
        .hide-text .key { color: transparent !important; }
        .key.active { background: #FFD666 !important; }
    </style>
</head>
<body>
    <div id="app">
        <div class="status">レベル: <span id="level-display">1</span></div>
        <div class="question-area">
            <img id="pokemon-img" src="" alt="ポケモン">
            <div id="instruction-box" class="instruction"></div>
        </div>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // ★グランドピアノ音源（倍音を加えてピアノの響きを再現）
        function playGrandPiano(noteName) {
            const freq = { 'C': 261.6, 'C#': 277.2, 'D': 293.7, 'D#': 311.1, 'E': 329.6, 'F': 349.2, 'F#': 370.0, 'G': 392.0, 'G#': 415.3, 'A': 440.0, 'A#': 466.2, 'B': 493.9 }[noteName];
            
            // 複数の波形を重ねることでグランドピアノ特有の複雑な音色を作る
            [1, 2, 3].forEach(i => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq * i; // 倍音成分
                gain.gain.value = 0.3 / i;      // 高次倍音は小さく
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (2.0 / i));
                osc.start();
                osc.stop(audioCtx.currentTime + 2.0);
            });
        }

        const keysData = [
            { note: 'C', name: 'ド', type: 'white' }, { note: 'C#', name: 'ド#', type: 'black' },
            { note: 'D', name: 'レ', type: 'white' }, { note: 'D#', name: 'レ#', type: 'black' },
            { note: 'E', name: 'ミ', type: 'white' }, { note: 'F', name: 'ファ', type: 'white' },
            { note: 'F#', name: 'ファ#', type: 'black' }, { note: 'G', name: 'ソ', type: 'white' },
            { note: 'G#', name: 'ソ#', type: 'black' }, { note: 'A', name: 'ラ', type: 'white' },
            { note: 'A#', name: 'ラ#', type: 'black' }, { note: 'B', name: 'シ', type: 'white' }
        ];

        // 鍵盤生成
        const keyboardDiv = document.getElementById('keyboard');
        keysData.forEach(k => {
            const d = document.createElement('div');
            d.className = `key ${k.type}`;
            d.innerText = k.name;
            d.addEventListener('touchstart', (e) => {
                e.preventDefault();
                playGrandPiano(k.note);
                d.classList.add('active');
                setTimeout(() => d.classList.remove('active'), 200);
            });
            keyboardDiv.appendChild(d);
        });

        // レベル更新時に実行する関数
        function updateLevel(level) {
            document.getElementById('level-display').innerText = level;
            // レベル5以上で音階名を非表示にする
            if (level >= 5) {
                keyboardDiv.classList.add('hide-text');
            } else {
                keyboardDiv.classList.remove('hide-text');
            }
        }

        // テスト用：レベルを5にして動作確認
        updateLevel(5); 
    </script>
</body>
</html>
