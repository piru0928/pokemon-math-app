<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピアノマスター - タップクイズ版</title>
    <style>
        :root {
            --primary-color: #e91e63;
            --bg-color: #fce4ec;
            --card-bg: #ffffff;
            --text-color: #424242;
        }

        body {
            margin: 0;
            padding: 15px;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        .quiz-container {
            width: 100%;
            max-width: 540px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            box-sizing: border-box;
            text-align: center;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: bold;
        }

        .combo-counter {
            background-color: #ff80ab;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
        }

        .title {
            color: var(--primary-color);
            font-size: 22px;
            margin: 5px 0 15px 0;
            font-weight: bold;
        }

        .question-box {
            background: #fafafa;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.8;
        }

        .target-sound {
            font-size: 28px;
            color: var(--primary-color);
            background: #fff0f5;
            padding: 2px 16px;
            border-radius: 12px;
            border: 2px dashed #ff80ab;
            display: inline-block;
            margin: 5px 0;
        }

        /* ーーー 鍵盤（けんばん）のレスポンシブデザイン ーーー */
        .piano-wrapper {
            width: 100%;
            overflow-x: auto; /* スマホではみ出た場合スクロール可能に */
            padding: 10px 0;
            margin-bottom: 15px;
            background: #222;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .piano-keyboard {
            display: flex;
            position: relative;
            width: max-content;
            margin: 0 auto;
            padding: 5px 10px 15px 10px;
        }

        /* 白鍵（はっけん） */
        .white-key {
            width: 42px;
            height: 160px;
            background: linear-gradient(to bottom, #eeeeee 0%, #ffffff 100%);
            border: 1px solid #bbb;
            border-radius: 0 0 6px 6px;
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 2px rgba(0,0,0,0.15);
            transition: background 0.1s;
        }

        /* 黒鍵（こくけん）の配置用コンポーネント */
        .black-keys-overlay {
            position: absolute;
            top: 5px;
            left: 10px;
            display: flex;
            pointer-events: none; /* 下の白鍵の邪魔をしない */
            z-index: 2;
        }

        .black-key {
            width: 24px;
            height: 100px;
            background: linear-gradient(to bottom, #444444 0%, #000000 100%);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 3px 3px rgba(0,0,0,0.4);
            box-sizing: border-box;
            /* 白鍵の隙間に合わせるためのマージン計算 */
            margin-left: 18px; 
            flex-shrink: 0;
        }

        /* 黒鍵がない場所（ミ〜ファ、シ〜ドの間）のスペース空け */
        .black-gap {
            width: 24px;
            margin-left: 18px;
            visibility: hidden;
            flex-shrink: 0;
        }

        /* アニメーション用：正解・不正解・選択時の変化 */
        .white-key.correct-flash {
            background: #a5d6a7 !important; /* 緑 */
        }
        .white-key.wrong-flash {
            background: #ef9a9a !important; /* 赤 */
        }

        /* フィードバック */
        .feedback {
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            min-height: 30px;
        }
        .correct { color: #4caf50; }
        .incorrect { color: #f44336; }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #c2185b;
            display: none;
        }
        .next-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c2185b;
        }

        ruby { ruby-position: over; }
        rt { font-size: 0.55em; color: #e91e63; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header-info">
        <span id="question-number">第 1 / 50 問</span>
        <span class="combo-counter" id="combo-display">ただいま 0もん れんぞくせいかい！</span>
    </div>

    <div class="title">🎹 ピアノマスター</div>

    <div class="question-box">
        <div class="question-text">
            ピアノの <span class="target-sound" id="target-sound-text">??</span> はどこかな？<br>
            <ruby>正<rt>ただ</rt></ruby>しい<ruby>鍵盤<rt>けんばん</rt></ruby>を <strong>ポン！</strong> と<ruby>押<rt>お</rt></ruby>してみよう！
        </div>
    </div>

    <div class="piano-wrapper">
        <div class="piano-keyboard" id="piano-keyboard">
            </div>
    </div>

    <div class="feedback" id="feedback-text"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">つぎのもんだいへ！</button>
</div>

<script>
    // 1. CからhihiCまでの「白鍵（はっけん）」を順番に定義
    // 各鍵盤がどの音名に対応しているかを完全に固定します（バグの発生を防ぎます）
    const KEY_LIST = [
        // 低音域 (オクターブ1)
        { id: 0,  name: "ド",     hasBlackRight: true },
        { id: 1,  name: "レ",     hasBlackRight: true },
        { id: 2,  name: "ミ",     hasBlackRight: false }, // ミとファの間は黒鍵なし
        { id: 3,  name: "ファ",   hasBlackRight: true },
        { id: 4,  name: "ソ",     hasBlackRight: true },
        { id: 5,  name: "ラ",     hasBlackRight: true },
        { id: 6,  name: "シ",     hasBlackRight: false }, // シとドの間は黒鍵なし
        
        // 中音域 (オクターブ2)
        { id: 7,  name: "ド",     hasBlackRight: true },
        { id: 8,  name: "レ",     hasBlackRight: true },
        { id: 9,  name: "ミ",     hasBlackRight: false },
        { id: 10, name: "ファ",   hasBlackRight: true },
        { id: 11, name: "ソ",     hasBlackRight: true },
        { id: 12, name: "ラ",     hasBlackRight: true },
        { id: 13, name: "シ",     hasBlackRight: false },

        // 高音域 (オクターブ3)
        { id: 14, name: "ド（高）", hasBlackRight: true },
        { id: 15, name: "レ（高）", hasBlackRight: true },
        { id: 16, name: "ミ（高）", hasBlackRight: false },
        { id: 17, name: "ファ（高）", hasBlackRight: true },
        { id: 18, name: "ソ（高）", hasBlackRight: true },
        { id: 19, name: "ラ（高）", hasBlackRight: true },
        { id: 20, name: "シ（高）", hasBlackRight: false },

        // 特高音域 hi (オクターブ4)
        { id: 21, name: "hiC",    hasBlackRight: true },
        { id: 22, name: "hiD",    hasBlackRight: true },
        { id: 23, name: "hiE",    hasBlackRight: false },
        { id: 24, name: "hiF",    hasBlackRight: true },
        { id: 25, name: "hiG",    hasBlackRight: true },
        { id: 26, name: "hiA",    hasBlackRight: true },
        { id: 27, name: "hiB",    hasBlackRight: false },

        // 超高音域 hihi (オクターブ5)
        { id: 28, name: "hihiC",  hasBlackRight: false }
    ];

    let currentQuestionIdx = 1;
    let comboCount = 0;
    let currentTargetKey = null;
    let isAnswered = false;

    // 2. 画面上にC〜hihiCの鍵盤をズレなく組み立てる関数
    function initPiano() {
        const keyboardContainer = document.getElementById("piano-keyboard");
        keyboardContainer.innerHTML = "";

        // 黒鍵レイヤー用のコンテナを作成
        const blackOverlay = document.createElement("div");
        blackOverlay.className = "black-keys-overlay";

        // 最初の黒鍵の左側マージンを調整（ドの左端に合わせる）
        let isFirstBlack = true;

        KEY_LIST.forEach((key) => {
            // 白鍵の生成
            const whiteDOM = document.createElement("div");
            whiteDOM.className = "white-key";
            whiteDOM.dataset.id = key.id;
            whiteDOM.onclick = () => handleKeyClick(key.id, whiteDOM);
            keyboardContainer.appendChild(whiteDOM);

            // 最後の鍵盤（hihiC）以外で、右側に黒鍵が必要か不要かに応じてレイアウトを生成
            if (key.id < KEY_LIST.length - 1) {
                if (key.hasBlackRight) {
                    const blackDOM = document.createElement("div");
                    blackDOM.className = "black-key";
                    // 最初の黒鍵だけ白鍵の半分ズラすための位置調整
                    if (isFirstBlack) {
                        blackDOM.style.marginLeft = "28px";
                        isFirstBlack = false;
                    }
                    blackOverlay.appendChild(blackDOM);
                } else {
                    // ミやシの右側など、黒鍵がない場所には透明なスペースを挟む
                    const gapDOM = document.createElement("div");
                    gapDOM.className = "black-gap";
                    blackOverlay.appendChild(gapDOM);
                }
            }
        });

        // 白鍵の上に黒鍵レイヤーを重ねる
        keyboardContainer.appendChild(blackOverlay);
    }

    // クイズを出題する関数
    function loadQuiz() {
        isAnswered = false;
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("feedback-text").innerHTML = "";
        document.getElementById("question-number").innerText = `第 ${currentQuestionIdx} / 50 問`;

        // すべての白鍵の色をクリア
        const keys = document.querySelectorAll(".white-key");
        keys.forEach(k => {
            k.className = "white-key";
        });

        // C〜hihiCの中から完全にランダムで1つターゲットを選定
        currentTargetKey = KEY_LIST[Math.floor(Math.random() * KEY_LIST.length)];
        
        // 問題文の音名表示を更新
        document.getElementById("target-sound-text").innerText = currentTargetKey.name;
    }

    // 鍵盤がタップされた時の成否判定
    function handleKeyClick(clickedId, element) {
        if (isAnswered) return; // 回答済みならタップを受け付けない
        isAnswered = true;

        const feedbackEl = document.getElementById("feedback-text");
        
        // 正解の白鍵のエレメントを取得
        const correctElement = document.querySelector(`.white-key[data-id="${currentTargetKey.id}"]`);

        if (clickedId === currentTargetKey.id) {
            // 正解の場合
            comboCount++;
            element.classList.add("correct-flash");
            feedbackEl.innerHTML = "<span class='correct'>✨ せいかい！ 正しい場所をおせたね！</span>";
        } else {
            // 不正解の場合
            comboCount = 0; // コンボリセット
            element.classList.add("wrong-flash"); // タップした間違った場所を赤く
            correctElement.classList.add("correct-flash"); // 正しかった場所を緑でお知らせ
            feedbackEl.innerHTML = `<span class='incorrect'>❌ ざんねん！ 正しい「${currentTargetKey.name}」の場所はみどりのところだよ！</span>`;
        }

        document.getElementById("combo-display").innerText = `ただいま ${comboCount}もん れんぞくせいかい！`;
        document.getElementById("next-btn").style.display = "inline-block";
    }

    // 次の問題へ
    function nextQuestion() {
        currentQuestionIdx++;
        if (currentQuestionIdx > 50) {
            alert("50問全問クリアしました！すごい！はじめにもどるよ。");
            currentQuestionIdx = 1;
            comboCount = 0;
        }
        loadQuiz();
    }

    // ページ読み込み時に初期化
    window.onload = () => {
        initPiano();
        loadQuiz();
    };
</script>

</body>
</html>
