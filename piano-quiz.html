<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピアノマスター - 改善版</title>
    <style>
        :root {
            --primary-color: #e91e63;
            --bg-color: #fce4ec;
            --card-bg: #ffffff;
            --btn-bg: #fff3e0;
            --btn-hover: #ffe0b2;
            --text-color: #424242;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: bold;
        }

        .combo-counter {
            background-color: #ff80ab;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
        }

        .title {
            color: var(--primary-color);
            font-size: 22px;
            margin: 10px 0;
        }

        .question-box {
            background: #fafafa;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* 画像・アセットエリア */
        .asset-area {
            width: 100%;
            max-width: 320px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        /* SVG ト音記号描画 */
        .clef-svg {
            height: 90px;
        }

        /* SVG 音符（四分音符） */
        .note-svg {
            height: 70px;
        }

        /* ミニ鍵盤UI */
        .keyboard-preview {
            display: flex;
            position: relative;
            background: #000;
            padding: 2px;
            border-radius: 4px;
        }
        .white-key {
            width: 30px;
            height: 80px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            box-sizing: border-box;
        }
        .white-key.highlight {
            background-color: #ff9800; /* オレンジ強調 */
        }
        .black-key-container {
            position: absolute;
            top: 2px;
            left: 2px;
            display: flex;
            pointer-events: none;
        }
        .black-key {
            width: 18px;
            height: 50px;
            background: black;
            margin-left: 12px; /* 簡易マッピング用 */
            border-radius: 0 0 2px 2px;
        }
        .black-key.spacer {
            background: transparent;
            visibility: hidden;
        }

        /* 選択肢ボタン */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: var(--btn-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px 8px;
            font-size: 16px;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #ffe0b2;
        }
        .option-btn:hover {
            background-color: var(--btn-hover);
        }
        .option-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* フィードバック表示 */
        .feedback {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .correct { color: #4caf50; }
        .incorrect { color: #f44336; }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header-info">
        <span id="question-number">第 1 / 50 問</span>
        <span class="combo-counter" id="combo-display">ただいま 0もん れんぞくせいかい！</span>
    </div>

    <div class="title">🎹 ピアノマスター</div>

    <div class="question-box">
        <div class="question-text" id="question-text">Loading...</div>
        <div class="asset-area" id="asset-area">
            </div>
    </div>

    <div class="options-grid" id="options-container">
        </div>

    <div class="feedback" id="feedback-text"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ！</button>
</div>

<script>
    // 1. 鍵盤問題用の音域データ定義（CからhihiCまで定義）
    // octave: 1=低音域(C), 2=中音域(c), 3=高音域(c'), 4=特高音(hiC), 5=超高音(hihiC)
    const KEYBOARD_NOTES = [
        { label: "C", name: "ド", octave: 1, type: "2つ並んでいるところ" },
        { label: "D", name: "レ", octave: 1, type: "2つ並んでいるところ" },
        { label: "E", name: "ミ", octave: 1, type: "2つ並んでいるところ" },
        { label: "F", name: "ファ", octave: 1, type: "3つ並んでいるところ" },
        { label: "G", name: "ソ", octave: 1, type: "3つ並んでいるところ" },
        { label: "A", name: "ラ", octave: 1, type: "3つ並んでいるところ" },
        { label: "B", name: "シ", octave: 1, type: "3つ並んでいるところ" },
        
        { label: "c", name: "ド", octave: 2, type: "2つ並んでいるところ" },
        { label: "d", name: "レ", octave: 2, type: "2つ並んでいるところ" },
        { label: "e", name: "ミ", octave: 2, type: "2つ並んでいるところ" },
        { label: "f", name: "ファ", octave: 2, type: "3つ並んでいるところ" },
        { label: "g", name: "ソ", octave: 2, type: "3つ並んでいるところ" },
        { label: "a", name: "ラ", octave: 2, type: "3つ並んでいるところ" },
        { label: "b", name: "シ", octave: 2, type: "3つ並んでいるところ" },

        { label: "c'", name: "ド (高)", octave: 3, type: "2つ並んでいるところ" },
        { label: "d'", name: "レ (高)", octave: 3, type: "2つ並んでいるところ" },
        { label: "e'", name: "ミ (高)", octave: 3, type: "2つ並んでいるところ" },
        { label: "f'", name: "ファ (高)", octave: 3, type: "3つ並んでいるところ" },
        { label: "g'", name: "ソ (高)", octave: 3, type: "3つ並んでいるところ" },
        { label: "a'", name: "ラ (高)", octave: 3, type: "3つ並んでいるところ" },
        { label: "b'", name: "シ (高)", octave: 3, type: "3つ並んでいるところ" },

        { label: "hiC", name: "hiC (ド)", octave: 4, type: "2つ並んでいるところ" },
        { label: "hiD", name: "hiD (レ)", octave: 4, type: "2つ並んでいるところ" },
        { label: "hiE", name: "hiE (ミ)", octave: 4, type: "2つ並んでいるところ" },
        { label: "hiF", name: "hiF (ファ)", octave: 4, type: "3つ並んでいるところ" },
        { label: "hiG", name: "hiG (ソ)", octave: 4, type: "3つ並んでいるところ" },
        { label: "hiA", name: "hiA (ラ)", octave: 4, type: "3つ並んでいるところ" },
        { label: "hiB", name: "hiB (シ)", octave: 4, type: "3つ並んでいるところ" },

        { label: "hihiC", name: "hihiC (ド)", octave: 5, type: "2つ並んでいるところ" }
    ];

    // 2. 固定問題プール（音楽理論・記号）※バグを修正済み
    const THEORY_QUIZZES = [
        {
            category: "theory",
            question: "この「1拍（タン！）」の長さの黒いおんぷの名前はなあに？",
            assetType: "quarter_note", // 正しい四分音符を表示させるトリガー
            answer: "四分音符",
            options: ["四分音符", "全音符", "八分音符", "二分音符"]
        },
        {
            category: "theory",
            question: "楽譜の一番 左にある、高い音を表す記号の名前はなあに？",
            assetType: "treble_clef", // ト音記号を表示させるトリガー
            answer: "ト音記号",
            options: ["八音記号", "ト音記号", "おんどり記号", "へ音記号"]
        }
    ];

    // 状態管理
    let currentQuestionIdx = 1;
    let comboCount = 0;
    let currentQuiz = null;
    let isAnswered = false;

    // 3. 確率調整ルーチン（鍵盤問題を優先出題：出現確率 75%）
    function getRandomQuiz() {
        const isKeyboard = Math.random() < 0.75; // 75%の確率で鍵盤問題

        if (isKeyboard) {
            // 鍵盤音域（C〜hihiC）からランダムに1つターゲットを選定
            const targetNote = KEYBOARD_NOTES[Math.floor(Math.random() * KEYBOARD_NOTES.length)];
            
            return {
                category: "keyboard",
                question: `ピアノの「${targetNote.name}」の場所は、黒い鍵盤（くろけん）がいくつの並んでいるところの左下かな？`,
                assetType: "keyboard_ui",
                target: targetNote,
                answer: targetNote.type,
                options: ["2つ並んでいるところ", "3つ並んでいるところ", "1つもないところ", "5つ並んでいるところ"]
            };
        } else {
            // 25%の確率で理論・記号問題
            const quiz = THEORY_QUIZZES[Math.floor(Math.random() * THEORY_QUIZZES.length)];
            // オプションをシャッフル（浅いコピー）
            const options = [...quiz.options].sort(() => Math.random() - 0.5);
            return { ...quiz, options };
        }
    }

    // アセット描画エンジン（バグ修正・SVG直書き）
    function renderAsset(quiz) {
        const container = document.getElementById("asset-area");
        container.innerHTML = ""; // 初期化

        if (quiz.assetType === "quarter_note") {
            // 【バグ修正】旗のない、正しい「四分音符」のインラインSVGを描画
            container.innerHTML = `
                <svg class="note-svg" viewBox="0 0 50 100">
                    <ellipse cx="20" cy="75" rx="12" ry="8" transform="rotate(-20 20 75)" fill="black" />
                    <line x1="31" y1="73" x2="31" y2="15" stroke="black" stroke-width="4" stroke-linecap="round" />
                </svg>
            `;
        } 
        else if (quiz.assetType === "treble_clef") {
            // 【バグ修正】非表示だったト音記号を視認性の高いSVGパスで正確に描画
            container.innerHTML = `
                <svg class="clef-svg" viewBox="0 0 100 120" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 50 10 L 50 100 A 8 8 0 1 1 42 92" />
                    <path d="M 50 100 A 14 14 0 1 0 50 72 A 10 10 0 1 0 50 92 A 4 4 0 1 0 47 86" />
                    <path d="M 50 72 C 50 40 65 30 50 10 C 40 25 35 55 68 70 C 80 78 78 95 62 95 C 52 95 48 85 52 75" />
                </svg>
            `;
        } 
        else if (quiz.assetType === "keyboard_ui") {
            // 【機能拡張】C〜hihiCまでマッピング可能な2オクターブ分の動的鍵盤ミニUIを生成
            // ターゲット音符のタイプ（2つ並びか3つ並びか）を視覚的にヒント付与
            const isTwoGroup = (quiz.target.type === "2つ並んでいるところ");
            
            container.innerHTML = `
                <div class="keyboard-preview">
                    <div class="white-key ${isTwoGroup ? 'highlight' : ''}"></div>
                    <div class="white-key"></div>
                    <div class="white-key"></div>
                    ${!isTwoGroup ? '<div class="white-key"></div>' : ''}
                    
                    <div class="black-key-container">
                        ${isTwoGroup ? `
                            <div class="black-key" style="margin-left: 20px;"></div>
                            <div class="black-key" style="margin-left: 12px;"></div>
                        ` : `
                            <div class="black-key" style="margin-left: 20px;"></div>
                            <div class="black-key" style="margin-left: 12px;"></div>
                            <div class="black-key" style="margin-left: 12px;"></div>
                        `}
                    </div>
                </div>
            `;
        }
    }

    // クイズの読み込みルーチン
    function loadQuiz() {
        isAnswered = false;
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("feedback-text").innerHTML = "";
        
        document.getElementById("question-number").innerText = `第 ${currentQuestionIdx} / 50 問`;
        
        currentQuiz = getRandomQuiz();
        document.getElementById("question-text").innerText = currentQuiz.question;
        
        // アセットのレンダリング
        renderAsset(currentQuiz);
        
        // 選択肢ボタンの構築
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        
        currentQuiz.options.forEach(option => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = option;
            btn.onclick = () => checkAnswer(option, btn);
            optionsContainer.appendChild(btn);
        });
    }

    // 判定ルーチン
    function checkAnswer(selectedOption, clickedBtn) {
        if (isAnswered) return; // 連続タップ防止
        isAnswered = true;
        
        const feedbackEl = document.getElementById("feedback-text");
        const allButtons = document.querySelectorAll(".option-btn");
        
        // 全ボタンを無効化
        allButtons.forEach(btn => btn.style.pointerEvents = "none");

        if (selectedOption === currentQuiz.answer) {
            comboCount++;
            feedbackEl.innerHTML = "<span class='correct'>✨ せいかい！ ピアノのはかせだね！</span>";
            clickedBtn.style.backgroundColor = "#c8e6c9";
            clickedBtn.style.borderColor = "#4caf50";
        } else {
            comboCount = 0; // コンボリセット
            feedbackEl.innerHTML = `<span class='incorrect'>❌ ざんねん！ せいかいは「${currentQuiz.answer}」だよ</span>`;
            clickedBtn.style.backgroundColor = "#ffcdd2";
            clickedBtn.style.borderColor = "#f44336";
        }
        
        // コンボ表示の更新
        document.getElementById("combo-display").innerText = `ただいま ${comboCount}もん れんぞくせいかい！`;
        
        // 次へボタンの表示
        document.getElementById("next-btn").style.display = "inline-block";
    }

    // 次の問題へ遷移
    function nextQuestion() {
        currentQuestionIdx++;
        if (currentQuestionIdx > 50) {
            alert("50問全問クリアしました！トップに戻ります。");
            currentQuestionIdx = 1;
            comboCount = 0;
        }
        loadQuiz();
    }

    // 初回起動
    window.onload = loadQuiz;
</script>

</body>
</html>
