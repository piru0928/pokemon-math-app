<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピアノ探検隊</title>
    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; background: #fdf6e3; touch-action: manipulation; }
        #app { max-width: 400px; margin: 0 auto; text-align: center; }
        .meta { font-size: 0.7rem; color: #888; margin-bottom: 10px; }
        .status { display: flex; justify-content: space-around; font-weight: bold; margin: 10px 0; }
        #pokemon-img { height: 100px; }
        .instruction { font-size: 1.1rem; margin: 10px 0; padding: 10px; background: #fff; border-radius: 10px; }
        
        /* ピアノ鍵盤の形 */
        .keyboard { display: flex; position: relative; height: 180px; margin-top: 20px; border: 2px solid #333; }
        .white { flex: 1; border: 1px solid #ccc; background: white; z-index: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; font-size: 0.8rem; }
        .black { width: 10%; height: 110px; background: #333; color: white; margin: 0 -5%; z-index: 2; font-size: 0.6rem; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; }
        
        button { padding: 10px 20px; margin-top: 20px; font-size: 1rem; border-radius: 10px; border: none; background: #ffd666; }
    </style>
</head>
<body>

<div id="app">
    <div class="meta">v1.1.0 | 更新: 2026/06/07</div>
    <div class="status"><span>レベル: <span id="lv">1</span></span><span>連続正解: <span id="combo">0</span></span></div>
    <img id="pokemon-img" src="" alt="pokemon">
    <div class="instruction" id="msg"><ruby>音<rt>おと</rt></ruby>をきいて、「ド」をさわってね！</div>
    
    <div class="keyboard" id="keyboard">
        <div class="white" onclick="check('ド')">ド</div><div class="black">ド#</div>
        <div class="white" onclick="check('レ')">レ</div><div class="black">レ#</div>
        <div class="white" onclick="check('ミ')">ミ</div>
        <div class="white" onclick="check('ファ')">ファ</div><div class="black">ファ#</div>
        <div class="white" onclick="check('ソ')">ソ</div><div class="black">ソ#</div>
        <div class="white" onclick="check('ラ')">ラ</div><div class="black">ラ#</div>
        <div class="white" onclick="check('シ')">シ</div>
    </div>
    
    <button onclick="location.href='https://piru0928.github.io/pokemon-math-app/'">もどる</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    let combo = 0;
    let lv = 1;

    async function fetchPokemon() {
        const id = Math.floor(Math.random() * 150) + 1;
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await res.json();
        document.getElementById('pokemon-img').src = data.sprites.front_default;
    }

    function check(note) {
        if(note === 'ド') {
            combo++;
            lv = Math.min(5, Math.floor(combo/3) + 1);
            document.getElementById('msg').innerText = "大正解！すごいね！";
            document.getElementById('combo').innerText = combo;
            document.getElementById('lv').innerText = lv;
            confetti();
            new Audio('https://actions.google.com/sounds/v1/cartoon/success_fanfare.ogg').play();
            setTimeout(fetchPokemon, 1000);
        } else {
            combo = 0;
            document.getElementById('msg').innerText = "おしい！もういちど！";
            document.getElementById('combo').innerText = combo;
        }
    }
    fetchPokemon();
</script>
</body>
</html>
