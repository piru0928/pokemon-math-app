<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピアノマスター・ポケモン版</title>
    <style>
        :root { --primary-color: #e91e63; --bg-color: #fce4ec; }
        body { margin: 0; padding: 10px; font-family: sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; min-height: 100vh; }
        .quiz-container { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .header-info { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 10px; }
        .piano-keyboard { display: flex; justify-content: center; margin: 20px 0; touch-action: manipulation; }
        .white-key { width: 40px; height: 120px; background: white; border: 1px solid #ccc; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; font-weight: bold; }
        .white-key:active { background: #ffeb3b; }
        .target-box { font-size: 24px; margin: 20px 0; padding: 20px; background: #fff0f5; border-radius: 15px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; background: #e91e63; color: white; font-weight: bold; cursor: pointer; margin: 5px; }
        ruby rt { font-size: 0.6em; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header-info">
        <span>ver 2.0.0</span>
        <button onclick="alert('ただいま開発中！')">戻る</button>
    </div>
    
    <div class="title">🎹 <ruby>絶対音感<rt>ぜったいおんかん</rt></ruby>ポケモンマスター</div>
    
    <div class="target-box" id="question-area">
        <ruby>音<rt>おと</rt></ruby>を<ruby>聞<rt>き</rt></ruby>いて、<ruby>鍵盤<rt>けんばん</rt></ruby>を<ruby>押<rt>お</rt></ruby>そう！
    </div>

    <div class="piano-keyboard" id="keyboard"></div>

    <div id="status"></div>
    <button class="btn" id="next-btn" style="display:none;" onclick="playNextQuestion()">つぎのポケモンへ！</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [
        { name: "ド", freq: 261.63 }, { name: "レ", freq: 293.66 }, { name: "ミ", freq: 329.63 },
        { name: "ファ", freq: 349.23 }, { name: "ソ", freq: 392.00 }, { name: "ラ", freq: 440.00 }, { name: "シ", freq: 493.88 }
    ];

    let currentTarget = null;
    let difficulty = 1; // 正解数に応じて難易度が上がる

    function playTone(freq, duration = 0.5) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // 正解時の派手な音（ポケモンゲット音のイメージ）
    function playVictorySound() {
        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
            setTimeout(() => playTone(f, 0.3), i * 150);
        });
    }

    function init() {
        const kb = document.getElementById('keyboard');
        notes.forEach(n => {
            const div = document.createElement('div');
            div.className = 'white-key';
            div.innerText = n.name;
            div.onclick = () => checkAnswer(n);
            kb.appendChild(div);
        });
        playNextQuestion();
    }

    function playNextQuestion() {
        // 難易度調整：レベルが上がると音の長さが短くなる
        const duration = Math.max(0.1, 0.6 - (difficulty * 0.05));
        currentTarget = notes[Math.floor(Math.random() * notes.length)];
        document.getElementById('question-area').innerHTML = "🎶 この<ruby>音<rt>おと</rt></ruby>はどれかな？";
        document.getElementById('next-btn').style.display = 'none';
        
        setTimeout(() => playTone(currentTarget.freq, duration), 500);
    }

    function checkAnswer(note) {
        if (note.name === currentTarget.name) {
            difficulty++;
            playVictorySound();
            document.getElementById('status').innerHTML = "✨ せいかい！ゲットだぜ！";
            document.getElementById('next-btn').style.display = 'inline-block';
        } else {
            document.getElementById('status').innerHTML = "❌ ざんねん！もういちどきいてみて！";
            playTone(note.freq, 0.3);
        }
    }

    init();
</script>
</body>
</html>
