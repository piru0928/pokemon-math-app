<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピアノマスター - 改善版</title>
    <style>
        :root {
            --primary-color: #e91e63;
            --bg-color: #fce4ec;
            --card-bg: #ffffff;
            --btn-bg: #fff3e0;
            --btn-hover: #ffe0b2;
            --text-color: #424242;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: bold;
        }

        .combo-counter {
            background-color: #ff80ab;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
        }

        .title {
            color: var(--primary-color);
            font-size: 22px;
            margin: 10px 0;
        }

        .question-box {
            background: #fafafa;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        /* アセットエリア */
        .asset-area {
            width: 100%;
            max-width: 320px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        /* 連動型・鍵盤UIグラフィック */
        .keyboard-preview {
            display: flex;
            position: relative;
            background: #000;
            padding: 2px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .white-key {
            width: 35px;
            height: 90px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            box-sizing: border-box;
        }
        /* 正解の基準となるエリアを視覚的にハイライト */
        .white-key.highlight {
            background-color: #fff9c4; 
        }
        .black-key-container {
            position: absolute;
            top: 2px;
            left: 2px;
            display: flex;
            pointer-events: none;
        }
        .black-key {
            width: 20px;
            height: 55px;
            background: black;
            border-radius: 0 0 3px 3px;
        }

        /* 選択肢ボタン */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: var(--btn-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px 8px;
            font-size: 16px;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #ffe0b2;
        }
        .option-btn:hover {
            background-color: var(--btn-hover);
        }
        .option-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* フィードバック表示 */
        .feedback {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .correct { color: #4caf50; }
        .incorrect { color: #f44336; }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: none;
        }

        /* ルビの読みやすさ微調整 */
        ruby {
            ruby-position: over;
        }
        rt {
            font-size: 0.55em;
            color: #e91e63;
            letter-spacing: 0.05em;
            padding-bottom: 1px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header-info">
        <span id="question-number">第 1 / 50 問</span>
        <span class="combo-counter" id="combo-display">ただいま 0もん れんぞくせいかい！</span>
    </div>

    <div class="title">🎹 ピアノマスター</div>

    <div class="question-box">
        <div class="question-text" id="question-text">Loading...</div>
        <div class="asset-area" id="asset-area"></div>
    </div>

    <div class="options-grid" id="options-container"></div>

    <div class="feedback" id="feedback-text"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ！</button>
</div>

<script>
    // 1. 各音名（C〜hihiC）ごとの正確な「黒鍵タイプ」マッピングデータ
    // type => 0: 2つ並んでいるところ, 1: 3つ並んでいるところ, 2: 並んでいないところ
    const NOTE_DATA = [
        // 低音域 (オクターブ1)
        { name: "ド", display: "ド", type: 0 },
        { name: "レ", display: "レ", type: 0 },
        { name: "ミ", display: "ミ", type: 0 },
        { name: "ファ", display: "ファ", type: 1 },
        { name: "ソ", display: "ソ", type: 1 },
        { name: "ラ", display: "ラ", type: 1 },
        { name: "シ", display: "シ", type: 1 },

        // 中音域 (オクターブ2)
        { name: "ド", display: "ド", type: 0 },
        { name: "レ", display: "レ", type: 0 },
        { name: "ミ", display: "ミ", type: 0 },
        { name: "ファ", display: "ファ", type: 1 },
        { name: "ソ", display: "ソ", type: 1 },
        { name: "ラ", display: "ラ", type: 1 },
        { name: "シ", display: "シ", type: 1 },

        // 高音域 (オクターブ3)
        { name: "ド（高）", display: "ド<span style='font-size:12px;'>(高)</span>", type: 0 },
        { name: "レ（高）", display: "レ<span style='font-size:12px;'>(高)</span>", type: 0 },
        { name: "ミ（高）", display: "ミ<span style='font-size:12px;'>(高)</span>", type: 0 },
        { name: "ファ（高）", display: "ファ<span style='font-size:12px;'>(高)</span>", type: 1 },
        { name: "ソ（高）", display: "ソ<span style='font-size:12px;'>(高)</span>", type: 1 },
        { name: "ラ（高）", display: "ラ<span style='font-size:12px;'>(高)</span>", type: 1 },
        { name: "シ（高）", display: "シ<span style='font-size:12px;'>(高)</span>", type: 1 },

        // 特高音域 hi (オクターブ4)
        { name: "hiC", display: "hiC", type: 0 },
        { name: "hiD", display: "hiD", type: 0 },
        { name: "hiE", display: "hiE", type: 0 },
        { name: "hiF", display: "hiF", type: 1 },
        { name: "hiG", display: "hiG", type: 1 },
        { name: "hiA", display: "hiA", type: 1 },
        { name: "hiB", display: "hiB", type: 1 },

        // 超高音域 hihi (オクターブ5) ※最高音のド
        { name: "hihiC", display: "hihiC", type: 2 } // 単体のドのため周辺に黒鍵が並んでいない扱い
    ];

    // 選択肢の定義（HTMLルビ付き文字列）
    const ANSWER_OPTIONS = [
        { id: 0, html: `<ruby>2つ<rt>ふたつ</rt></ruby><ruby>並<rt>なら</rt></ruby>んでいるところ` },
        { id: 1, html: `<ruby>3つ<rt>みっつ</rt></ruby><ruby>並<rt>なら</rt></ruby>んでいるところ` },
        { id: 2, html: `<ruby>並<rt>なら</rt></ruby>んでいないところ` },
        { id: 3, html: `<ruby>5つ<rt>いつつ</rt></ruby><ruby>並<rt>なら</rt></ruby>んでいるところ` }
    ];

    let currentQuestionIdx = 1;
    let comboCount = 0;
    let currentQuiz = null;
    let isAnswered = false;

    // クイズ生成（問題・画像・答えの不整合を完全修正）
    function generateQuiz() {
        // 全音域のリストからランダムに1つ選定
        const targetNote = NOTE_DATA[Math.floor(Math.random() * NOTE_DATA.length)];
        
        return {
            noteName: targetNote.display,
            blackKeyType: targetNote.type, // 正解のID (0, 1, 2)
            answerHtml: ANSWER_OPTIONS.find(o => o.id === targetNote.type).html
        };
    }

    // 鍵盤グラフィックの動的連動生成
    function drawKeyboard(type) {
        const container = document.getElementById("asset-area");
        container.innerHTML = "";

        const keyboardDiv = document.createElement("div");
        keyboardDiv.className = "keyboard-preview";

        let whiteKeysHtml = "";
        let blackKeysHtml = "";

        if (type === 0 || type === 2) {
            // 「2つ並び」または「並んでいない（単体）」のときは、ド・レ・ミ側の3鍵盤を描画
            whiteKeysHtml = `
                <div class="white-key highlight"></div>
                <div class="white-key"></div>
                <div class="white-key"></div>
            `;
            // 黒鍵は2本
            blackKeysHtml = `
                <div class="black-key" style="margin-left: 24px;"></div>
                <div class="black-key" style="margin-left: 14px;"></div>
            `;
        } else if (type === 1) {
            // 「3つ並び」のときは、ファ・ソ・ラ・シ側の4鍵盤を描画
            whiteKeysHtml = `
                <div class="white-key highlight"></div>
                <div class="white-key"></div>
                <div class="white-key"></div>
                <div class="white-key"></div>
            `;
            // 黒鍵は3本
            blackKeysHtml = `
                <div class="black-key" style="margin-left: 24px;"></div>
                <div class="black-key" style="margin-left: 14px;"></div>
                <div class="black-key" style="margin-left: 14px;"></div>
            `;
        }

        keyboardDiv.innerHTML = whiteKeysHtml;
        
        const blackContainer = document.createElement("div");
        blackContainer.className = "black-key-container";
        blackContainer.innerHTML = blackKeysHtml;
        
        keyboardDiv.appendChild(blackContainer);
        container.appendChild(keyboardDiv);
    }

    // クイズ画面のレンダリング
    function loadQuiz() {
        isAnswered = false;
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("feedback-text").innerHTML = "";
        document.getElementById("question-number").innerText = `第 ${currentQuestionIdx} / 50 問`;

        currentQuiz = generateQuiz();

        // 【修正】問題文全体にルビを追加し、動的に音名を埋め込み
        document.getElementById("question-text").innerHTML = `
            ピアノの「<strong>${currentQuiz.noteName}</strong>」の<ruby>場所<rt>ばしょ</rt></ruby>は、
            <ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>（くろけん）が
            いくつの<ruby>並<rt>なら</rt></ruby>んでいるところの<ruby>左下<rt>ひだりした</rt></ruby>かな？
        `;

        // 【修正】問題の正解タイプに合わせた正しい鍵盤イラストを生成
        drawKeyboard(currentQuiz.blackKeyType);

        // 選択肢ボタンの生成（すべての選択肢にルビ適用）
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        ANSWER_OPTIONS.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = opt.html;
            btn.onclick = () => checkAnswer(opt.id, btn);
            optionsContainer.appendChild(btn);
        });
    }

    // 判定ロジック
    function checkAnswer(selectedId, clickedBtn) {
        if (isAnswered) return;
        isAnswered = true;

        const feedbackEl = document.getElementById("feedback-text");
        const allButtons = document.querySelectorAll(".option-btn");
        allButtons.forEach(btn => btn.style.pointerEvents = "none");

        if (selectedId === currentQuiz.blackKeyType) {
            comboCount++;
            feedbackEl.innerHTML = "<span class='correct'>✨ せいかい！ ピアノのはかせだね！</span>";
            clickedBtn.style.backgroundColor = "#c8e6c9";
            clickedBtn.style.borderColor = "#4caf50";
        } else {
            comboCount = 0;
            feedbackEl.innerHTML = `<span class='incorrect'>❌ ざんねん！ せいかいは「${currentQuiz.answerHtml}」だよ</span>`;
            clickedBtn.style.backgroundColor = "#ffcdd2";
            clickedBtn.style.borderColor = "#f44336";
        }

        document.getElementById("combo-display").innerText = `ただいま ${comboCount}もん れんぞくせいかい！`;
        document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
        currentQuestionIdx++;
        if (currentQuestionIdx > 50) {
            alert("50問全問クリアしました！トップに戻ります。");
            currentQuestionIdx = 1;
            comboCount = 0;
        }
        loadQuiz();
    }

    window.onload = loadQuiz;
</script>

</body>
</html>
