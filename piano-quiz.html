<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>絶対音感ポケモンマスター</title>
    <style>
        body { font-family: sans-serif; background: #fce4ec; display: flex; justify-content: center; padding: 10px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .piano { display: flex; justify-content: center; margin: 20px 0; }
        .key { width: 40px; height: 100px; border: 1px solid #000; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; }
        .white { background: white; }
        .black { background: black; color: white; width: 30px; height: 70px; margin: 0 -15px; z-index: 1; }
        .btn { padding: 10px 20px; margin: 5px; border-radius: 20px; border: none; background: #e91e63; color: white; font-weight: bold; cursor: pointer; }
        #pokemon-img { width: 150px; height: 150px; }
        .ruby { font-size: 0.7em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 12px;">ver 1.0.0 | <ruby>更新日時<rt>こうしんにちじ</rt></ruby>: 2026/06/06</div>
    <h2><ruby>絶対音感<rt>ぜったいおんかん</rt></ruby>ポケモンマスター</h2>
    
    <div id="stats">レベル: 1 | <ruby>連続正解<rt>れんぞくせいかい</rt></ruby>: 0</div>
    <img id="pokemon-img" src="" alt="ポケモン">
    <div id="msg"><ruby>音<rt>おと</rt></ruby>を<ruby>聞<rt>き</rt></ruby>いて、<ruby>鍵盤<rt>けんばん</rt></ruby>を<ruby>押<rt>お</rt></ruby>そう！</div>
    
    <div class="piano" id="keyboard"></div>
    
    <button class="btn" onclick="playCurrentNote()">もう一度聞く</button>
    <button class="btn" style="background:#666" onclick="location.href='https://piru0928.github.io/pokemon-math-app/'">戻る</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [
        { name: "C", label: "ド", freq: 261.63, type: "white" },
        { name: "C#", label: "ド#", freq: 277.18, type: "black" },
        { name: "D", label: "レ", freq: 293.66, type: "white" },
        { name: "D#", label: "レ#", freq: 311.13, type: "black" },
        { name: "E", label: "ミ", freq: 329.63, type: "white" },
        { name: "F", label: "ファ", freq: 349.23, type: "white" },
        { name: "F#", label: "ファ#", freq: 369.99, type: "black" },
        { name: "G", label: "ソ", freq: 392.00, type: "white" },
        { name: "G#", label: "ソ#", freq: 415.30, type: "black" },
        { name: "A", label: "ラ", freq: 440.00, type: "white" },
        { name: "A#", label: "ラ#", freq: 466.16, type: "black" },
        { name: "B", label: "シ", freq: 493.88, type: "white" }
    ];

    let currentTarget, level = 1, combo = 0;

    function playTone(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1);
    }

    function initKeyboard() {
        const kb = document.getElementById('keyboard');
        notes.forEach(n => {
            const div = document.createElement('div');
            div.className = `key ${n.type}`;
            div.innerText = n.label;
            div.onclick = () => checkAnswer(n);
            kb.appendChild(div);
        });
    }

    async function loadPokemon() {
        const id = Math.floor(Math.random() * 151) + 1;
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await res.json();
        document.getElementById('pokemon-img').src = data.sprites.front_default;
    }

    function playCurrentNote() { playTone(currentTarget.freq); }

    function checkAnswer(n) {
        if (n.name === currentTarget.name) {
            combo++;
            level = Math.min(5, Math.floor(combo / 3) + 1);
            document.getElementById('msg').innerHTML = "✨ 正解！おめでとう！";
            alert("🎉 ポケモンゲット！紙吹雪が舞っています！");
            next();
        } else {
            combo = 0;
            document.getElementById('msg').innerHTML = "❌ 残念…もう一度！";
        }
        document.getElementById('stats').innerText = `レベル: ${level} | 連続正解: ${combo}`;
    }

    function next() {
        currentTarget = notes[Math.floor(Math.random() * (level * 2 + 2)) % notes.length];
        loadPokemon();
        setTimeout(playCurrentNote, 500);
    }

    initKeyboard();
    next();
</script>
</body>
</html>
