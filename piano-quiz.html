<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・ピアノマスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #fff5f5;
      text-align: center;
      padding: 10px;
      transition: 0.3s;
    }
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: #b83280; font-weight: normal; }

    h1 { color: #b83280; margin-bottom: 5px; font-size: 24px; }
    #status { font-size: 16px; color: #d63384; margin-bottom: 10px; font-weight: bold; }

    #quiz-card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 15px;
      width: 95%;
      max-width: 400px;
      vertical-align: top;
    }
    
    .visual-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    #pokemon-img { width: 110px; height: 110px; background: #fff0f6; border-radius: 50%; border: 4px solid #fbb6ce; }
    
    /* 動的イラスト用スタイル（鍵盤や音符記号） */
    #dynamic-illustration {
      width: 140px;
      height: 110px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f7fafc;
      border-radius: 12px;
      border: 3px solid #e2e8f0;
      overflow: hidden;
    }

    /* ピアノ鍵盤のスタイル */
    .piano-mini { display: flex; background: #334155; padding: 2px; border-radius: 6px; position: relative; }
    .piano-key-w { width: 18px; height: 70px; background: white; border: 1px solid #cbd5e1; border-radius: 0 0 3px 3px; }
    .piano-key-b { width: 12px; height: 42px; background: #1e293b; margin-left: -6px; margin-right: -6px; z-index: 2; border-radius: 0 0 2px 2px; }
    .highlight-orange { background: #ff823a !important; border-color: #ff823a; }
    .highlight-blue { background: #3182ce !important; border-color: #3182ce; }

    /* 特殊記号や文字のスタイル */
    .symbol-text { font-size: 50px; font-weight: bold; font-family: serif; color: #2d3748; }
    .symbol-large { font-size: 65px; color: #2d3748; }

    #question-text { font-size: 18px; font-weight: bold; color: #333; margin: 10px 0; line-height: 1.8; padding: 0 5px; }

    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: 10px auto;
    }
    .choice-btn {
      padding: 15px 5px;
      font-size: 15px;
      font-weight: bold;
      background-color: white;
      border: 3px solid #fbb6ce;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px #f687b3;
    }
    .choice-btn:active { transform: translateY(2px); box-shadow: 0 2px #f687b3; }
    .choice-btn:disabled { opacity: 0.7; cursor: default; }

    #result { font-size: 20px; margin-top: 10px; font-weight: bold; min-height: 30px; }
    #next-button {
      margin-top: 15px; padding: 12px 40px; font-size: 18px;
      background-color: #d63384; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none; font-weight: bold;
    }
    #version-info { position: fixed; bottom: 5px; right: 5px; font-size: 9px; color: #9e9e9e; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="version-info">Ver 1.1.0</div>
  <h1>🎹 <ruby>ピアノ<rt>ぴあの</rt></ruby>マスター</h1>
  <div id="status">よみこみちゅう...</div>

  <div id="quiz-card">
    <div class="visual-area">
      <div id="dynamic-illustration"></div>
      <img id="pokemon-img" src="" alt="pokemon">
    </div>
    <div id="question-text">もんだい</div>
  </div>
  
  <div class="choices-container" id="choices"></div>
  <div id="result"></div>
  
  <button id="next-button" onclick="generateQuiz()"><ruby>次<rt>つぎ</rt></ruby>のもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script>
    const pianoQuestions = [
      // type: 'piano2' (2つ黒鍵)、'piano3' (3つ黒鍵)、'icon' (アイコンフォント)、'text' (特殊文字) でイラストを切り替えます
      { q: "ピアノの「ド」の<ruby>場所<rt>ばしょ</rt></ruby>は、<ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>（くろけん）がいくつ<ruby>並<rt>なら</rt></ruby>んでいるところの<ruby>左下<rt>ひだりした</rt></ruby>かな？", a: ["2つ<ruby>並<rt>なら</rt></ruby>んでいるところ", "3つ<ruby>並<rt>なら</rt></ruby>んでいるところ", "5つ<ruby>並<rt>なら</rt></ruby>んでいるところ", "1つもなじところ"], type: "piano2", param: "do" },
      { q: "「ド」の<ruby>右<rt>みぎ</rt></ruby>となり（1つ<ruby>高<rt>たか</rt></ruby>い<ruby>音<rt>おと</rt></ruby>）にある<ruby>白<rt>しろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>（しろけん）の<ruby>名前<rt>なまえ</rt></ruby>はなに？", a: ["レ", "ミ", "ファ", "ソ"], type: "piano2", param: "re" },
      { q: "「ファ」の<ruby>場所<rt>ばしょ</rt></ruby>は、<ruby>黒<rt>くろ</rt></ruby>い<ruby>鍵盤<rt>けんばん</rt></ruby>がいくつ<ruby>並<rt>なら</rt></ruby>んでいるグループの<ruby>左下<rt>ひだりした</rt></ruby>かな？", a: ["3つ<ruby>並<rt>なら</rt></ruby>んでいるところ", "2つ<ruby>並<rt>なら</rt></ruby>んでいるところ", "4つ<ruby>並<rt>なら</rt></ruby>んでいるところ", "ないところ"], type: "piano3", param: "fa" },
      { q: "<ruby>楽譜<rt>がくふ</rt></ruby>の<ruby>一番<rt>いちばん</rt></ruby><ruby>左<rt>ひだり</rt></ruby>にある、<ruby>高<rt>たか</rt></ruby>い<ruby>音<rt>おと</rt></ruby>を<ruby>表<rt>あらわ</rt></ruby>すこの<ruby>記号<rt>きごう</rt></ruby>の<ruby>名前<rt>なまえ</rt></ruby>はなあに？", a: ["ト<ruby>音記号<rt>おんきごう</rt></ruby>", "ヘ<ruby>音記号<rt>おんきごう</rt></ruby>", "ハ<ruby>音記号<rt>おんきごう</rt></ruby>", "おんどり<ruby>記号<rt>きごう</rt></ruby>"], type: "icon", param: "fa-g-clef" },
      { q: "「<ruby>強<rt>つよ</rt></ruby>く」という<ruby>意味<rt>いみ</rt></ruby>がある音楽（おんがく）の<ruby>記号<rt>きごう</rt></ruby>「𝒇」のよみかたはどれ？", a: ["フォルテ", "ピアノ", "メゾピアノ", "ピカチュウ"], type: "text", param: "f" },
      { q: "この「1<ruby>拍<rt>ぱく</rt></ruby>（タン！）」の<ruby>長<rt>なが</rt></ruby>さの<ruby>黒<rt>くろ</rt></ruby>いおんぷの<ruby>名前<rt>なまえ</rt></ruby>はなあに？", a: ["<ruby>四分音符<rt>しぶんおんぷ</rt></ruby>", "<ruby>二分音符<rt>にぶおんぷ</rt></ruby>", "<ruby>全音符<rt>ぜんおんぷ</rt></ruby>", "<ruby>八分音符<rt>はちぶおんぷ</rt></ruby>"], type: "icon", param: "fa-music" },
      { q: "<ruby>低<rt>ひく</rt></ruby>い<ruby>音<rt>おと</rt></ruby>や、<ruby>左手<rt>ひだりて</rt></ruby>でひくときに<ruby>使<rt>つか</rt></ruby>うこの<ruby>記号<rt>きごう</rt></ruby>はなあに？", a: ["ヘ<ruby>音記号<rt>おんきごう</rt></ruby>", "ト<ruby>音記号<rt>おんきごう</rt></ruby>", "ハ<ruby>音記号<rt>おんきごう</rt></ruby>", "へんしん<ruby>記号<rt>きごう</rt></ruby>"], type: "icon", param: "fa-f-clef" },
      { q: "ピアノをひくときは、おててをどんな<ruby>形<rt>かたち</rt></ruby>にするのがいいかな？", a: ["たまごをふわっともった<ruby>形<rt>かたち</rt></ruby>", "まっすぐピンとのばした<ruby>形<rt>かたち</rt></ruby>", "グーのカタチにかためた<ruby>形<rt>かたち</rt></ruby>", "チョキの<ruby>形<rt>かたち</rt></ruby>"], type: "icon", param: "fa-hand-holding-egg" },
      { q: "ピアノの<ruby>指番号<rt>ゆびばんごう</rt></ruby>で、「1」の<ruby>指<rt>ゆび</rt></ruby>はどの<ruby>指<rt>ゆび</rt></ruby>のことかな？", a: ["お<ruby>父<rt>とう</rt></ruby>さん<ruby>指<rt>ゆび</rt></ruby>（<ruby>親指<rt>おやゆび</rt></ruby>）", "お<ruby>母<rt>かあ</rt></ruby>さん<ruby>指<rt>ゆび</rt></ruby>（<ruby>人差<rt>ひとさ</rt></ruby>し<ruby>指<rt>ゆび</rt></ruby>）", "おにいいさん<ruby>指<rt>ゆび</rt></ruby>（<ruby>中指<rt>なかゆび</rt></ruby>）", "赤ちゃん<ruby>指<rt>ゆび</rt></ruby>（<ruby>小指<rt>こゆび</rt></ruby>）"], type: "icon", param: "fa-hand" },
      { q: "ピアノをひくとき、どんな<ruby>姿勢<rt>しせい</rt></ruby>（すわりかた）がいいかな？", a: ["<ruby>背<rt>せ</rt></ruby>すじをまっすぐのばす", "だらーんとまるくなる", "ねころがってひく", "あぐらをかく"], type: "icon", param: "fa-chair" },
      { q: "<ruby>音<rt>おと</rt></ruby>をきれいにのばしたり響（ひび）かせたりする、<ruby>足<rt>あし</rt></ruby>もとにある板（いた）は？", a: ["ペダル", "アクセル", "ブレーキ", "スイッチ"], type: "icon", param: "fa-shoe-prints" },
      { q: "「弱（よわ）く」という<ruby>意味<rt>いみ</rt></ruby>がある音楽（おんがく）の<ruby>記号<rt>きごう</rt></ruby>「𝒑」のよみかたはどれ？", a: ["ピアノ", "フォルテ", "クレッシェンド", "ピチュー"], type: "text", param: "p" },
      { q: "2つ（たーあん）のばす、なかみが<ruby>白<rt>しろ</rt></ruby>くて棒（ぼう）があるおんぷのなまえは？", a: ["<ruby>二分音符<rt>にぶおんぷ</rt></ruby>", "<ruby>四分音符<rt>しぶんおんぷ</rt></ruby>", "<ruby>全音符<rt>ぜんおんぷ</rt></ruby>", "<ruby>十六分音符<rt>じゅうろくぶおんぷ</rt></ruby>"], type: "icon", param: "fa-music" }
    ];

    let correctStreak = 0;
    let currentAnswer = "";

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(type) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (type === 'correct') {
          this._note(880, now, 0.1); this._note(1100, now + 0.1, 0.2);
        } else if (type === 'special') {
          [523, 659, 783, 1046].forEach((f, i) => this._note(f, now + (i * 0.1), 0.3));
        } else {
          this._note(200, now, 0.3);
        }
      }
    };

    // クイズ問題に応じた動的なイラストをHTMLで組み立てて表示する関数
    function updateDynamicIllustration(type, param) {
      const wrapper = document.getElementById("dynamic-illustration");
      wrapper.innerHTML = "";

      if (type === "piano2") {
        // 2つの黒鍵グループをベースにしたミニ鍵盤
        wrapper.innerHTML = `
          <div class="piano-mini">
            <div class="piano-key-w ${param === 'do' ? 'highlight-orange' : ''}"></div>
            <div class="piano-key-b"></div>
            <div class="piano-key-w ${param === 're' ? 'highlight-blue' : ''}"></div>
            <div class="piano-key-b"></div>
            <div class="piano-key-w"></div>
          </div>
        `;
      } else if (type === "piano3") {
        // 3つの黒鍵グループをベースにしたミニ鍵盤
        wrapper.innerHTML = `
          <div class="piano-mini">
            <div class="piano-key-w ${param === 'fa' ? 'highlight-orange' : ''}"></div>
            <div class="piano-key-b"></div>
            <div class="piano-key-w"></div>
            <div class="piano-key-b"></div>
            <div class="piano-key-w"></div>
            <div class="piano-key-b"></div>
            <div class="piano-key-w"></div>
          </div>
        `;
      } else if (type === "icon") {
        // アイコンフォントを使った綺麗なビジュアル化
        if (param === "fa-hand-holding-egg") {
          wrapper.innerHTML = `<span class="symbol-large" style="color: #ed64a6;"><i class="fa-solid fa-hand-dots"></i>🥚</span>`;
        } else {
          wrapper.innerHTML = `<span class="symbol-large" style="color: #b83280;"><i class="fa-solid ${param}"></i></span>`;
        }
      } else if (type === "text") {
        // fやpなどの強弱記号を綺麗にフォント表示
        const color = param === 'f' ? '#e53e3e' : '#3182ce';
        wrapper.innerHTML = `<span class="symbol-text" style="color: ${color}; font-style: italic;">${param}</span>`;
      }
    }

    function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.body.style.backgroundColor = "#fff5f5";
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      const qData = pianoQuestions[Math.floor(Math.random() * pianoQuestions.length)];
      document.getElementById("question-text").innerHTML = qData.q;
      currentAnswer = qData.a[0];

      // 動的なイラストの更新
      updateDynamicIllustration(qData.type, qData.param);

      // 可愛い・音楽に合いそうなポケモンたち（ピッピ、プリン、ピカチュウ、ミュウ、トゲピー、イーブイ、マリル、キレイハナなど）
      const cutePoke = [35, 39, 25, 151, 175, 133, 183, 182, 251]; 
      const pokeId = cutePoke[Math.floor(Math.random() * cutePoke.length)];
      document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png`;

      let options = [...qData.a].sort(() => Math.random() - 0.5);
      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerHTML = opt;
        btn.onclick = () => checkAnswer(opt);
        choicesDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
      const resArea = document.getElementById("result");

      if (selected === currentAnswer) {
        correctStreak++;
        if (correctStreak % 5 === 0) Buzzer.play('special');
        else Buzzer.play('correct');
        resArea.innerHTML = "✨ せいかい！ ピアノの はかせだね！";
        document.body.style.backgroundColor = "#fff0f6";
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        resArea.innerHTML = `❌ こたえは「${currentAnswer}」だよ`;
        document.body.style.backgroundColor = "#fff5f5";
      }
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
      document.getElementById("next-button").style.display = "inline-block";
    }

    window.onload = generateQuiz;
  </script>
</body>
</html>
