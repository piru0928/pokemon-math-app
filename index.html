<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモンおべんきょう</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #fefaf0;
      --card-bg: #ffffff;
      --text-main: #5a5a5a;
    }

    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 15px 10px;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      color: #ff5e5e;
      font-size: 22px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .container {
      max-width: 450px;
      margin: 0 auto;
    }

    .category {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 2px solid #f0f0f0;
      position: relative;
    }

    .category h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #333;
    }

    /* アイコンを大きく修正 */
    .cat-icon {
      width: 60px;
      height: 60px;
      margin-left: -10px; /* 少し左に出してバランス調整 */
      margin-top: -5px;
    }

    ul {
      list-style: none;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 0;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      text-decoration: none;
      background: #fdfdfd;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #eee;
      transition: all 0.2s;
    }

    .menu-item:active {
      transform: scale(0.96);
      background: #f0f0f0;
    }

    .status {
      font-size: 16px;
      margin-right: 8px;
    }

    .menu-item span:last-child {
      font-size: 13px;
      color: #444;
      font-weight: bold;
      white-space: nowrap;
    }

    .bg-poke {
      position: fixed;
      z-index: -1;
      opacity: 0.12;
      pointer-events: none;
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    #version-info {
      position: fixed;
      bottom: 5px;
      right: 5px;
      font-size: 9px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.6.1</div>

  <h1>ポケモンおべんきょう</h1>

  <div class="container">
    <div class="category">
      <h2><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" class="cat-icon" alt=""> さんすう</h2>
      <ul>
        <li><a href="addition.html" class="menu-item"><span class="status" id="status-addition">⭐</span><span>たしざん</span></a></li>
        <li><a href="subtraction.html" class="menu-item"><span class="status" id="status-subtraction">⭐</span><span>ひきざん</span></a></li>
        <li><a href="multiplication.html" class="menu-item"><span class="status" id="status-multiplication">⭐</span><span>かけざん</span></a></li>
        <li><a href="division.html" class="menu-item"><span class="status" id="status-division">⭐</span><span>わりざん</span></a></li>
      </ul>
    </div>

    <div class="category">
      <h2><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" class="cat-icon" alt=""> こくご</h2>
      <ul>
        <li><a href="tanbun-quiz.html" class="menu-item"><span class="status" id="status-tanbun-quiz">⭐</span><span>たんぶん</span></a></li>
        <li><a href="kanji-quiz.html" class="menu-item"><span class="status" id="status-kanji-quiz">⭐</span><span>かんじ</span></a></li>
      </ul>
    </div>

    <div class="category">
      <h2><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" class="cat-icon" alt=""> えいご</h2>
      <ul>
        <li><a href="pokemon-english.html" class="menu-item"><span class="status" id="status-pokemon-english">⭐</span><span>えいご</span></a></li>
        <li><a href="pokemon-romaji.html" class="menu-item"><span class="status" id="status-pokemon-romaji">⭐</span><span>ローマ字</span></a></li>
      </ul>
    </div>

    <div class="category">
      <h2><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" class="cat-icon" alt=""> しゃかい</h2>
      <ul>
        <li><a href="national-flag-quiz.html" class="menu-item"><span class="status" id="status-national-flag-quiz">⭐</span><span>こっき</span></a></li>
        <li><a href="capital-quiz.html" class="menu-item"><span class="status" id="status-capital-quiz">⭐</span><span>しゅと</span></a></li>
      </ul>
    </div>

    <div class="category">
      <h2><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/52.png" class="cat-icon" alt=""> スペシャル</h2>
      <ul>
        <li><a href="money-quiz.html" class="menu-item"><span class="status" id="status-money-quiz">⭐</span><span>おかね</span></a></li>
      </ul>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const MAX_POKEMON_ID = 151;
    function createBackgroundPokemon() {
      for (let i = 0; i < 12; i++) {
        const id = Math.floor(Math.random() * MAX_POKEMON_ID) + 1;
        const img = document.createElement("img");
        img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
        img.className = "bg-poke";
        img.style.width = "60px";
        img.style.top = `${Math.random() * 90}%`;
        img.style.left = `${Math.random() * 90}%`;
        img.style.animationDelay = `${Math.random() * 5}s`;
        document.body.appendChild(img);
      }
    }
    window.onload = function () {
      createBackgroundPokemon();
      if (typeof updateStatusIcons === 'function') updateStatusIcons();
    };
  </script>
</body>
</html>
