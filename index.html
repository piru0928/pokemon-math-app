<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモンおべんきょうサイト</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #fdf6e3;
      color: #333;
      padding: 0px;
    }
    h1 {
      color: #e74c3c;
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }
    .category {
      background: #fff8dc;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
      box-shadow: none;
    }
    .category h2 {
      margin-top: 0;
      color: #d35400;
      font-size: 20px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 8px 0;
      display: flex;
      align-items: center;
    }
    .status {
      display: inline-block;
      width: 48px;
      margin-right: 8px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }
    a {
      text-decoration: none;
      color: #2980b9;
      font-weight: bold;
    }
    a:hover {
      color: #c0392b;
    }
    .clear-button {
      display: block;
      margin: 10px auto;
      padding: 8px 16px;
      font-size: 14px;
      background-color: #f78fb3;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .clear-button:hover {
      background-color: #f368e0;
    }

    /* バージョン情報の表示スタイル（他ページと統一） */
    #version-info {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 10px;
      color: #90a4ae;
      background: rgba(255, 255, 255, 0.5);
      padding: 2px 5px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.3.1 | Updated: 2026-05-12 12:45</div>

  <h1>ポケモンおべんきょうサイト</h1>

  <div class="category">
    <h2>＜さんすう＞</h2>
    <ul>
      <li><span class="status" id="status-addition">⭐</span><a href="addition.html">たしざん</a></li>
      <li><span class="status" id="status-subtraction">⭐</span><a href="subtraction.html">ひきざん</a></li>
      <li><span class="status" id="status-multiplication">⭐</span><a href="multiplication.html">かけざん</a></li>
      <li><span class="status" id="status-division">⭐</span><a href="division.html">わりざん</a></li>
    </ul>
    <button class="clear-button" onclick="clearByUnit('math')">🌱 さんすうのデータをクリア</button>
  </div>

  <div class="category">
    <h2>＜こくご＞</h2>
    <ul>
      <li><span class="status" id="status-tanbun-quiz">⭐</span><a href="tanbun-quiz.html">たんぶん</a></li>
      <li><span class="status" id="status-kanji-quiz">⭐</span><a href="kanji-quiz.html">漢字</a></li>
    </ul>
    <button class="clear-button" onclick="clearByUnit('japanese')">🌱 こくごのデータをクリア</button>
  </div>

  <div class="category">
    <h2>＜えいご＞</h2>
    <ul>
      <li><span class="status" id="status-pokemon-english">⭐</span><a href="pokemon-english.html">ポケモン英語</a></li>
      <li><span class="status" id="status-pokemon-romaji">⭐</span><a href="pokemon-romaji.html">ポケモンローマ字</a></li>
    </ul>
    <button class="clear-button" onclick="clearByUnit('english')">🌱 えいごのデータをクリア</button>
  </div>

  <div class="category">
    <h2>＜しゃかい＞</h2>
    <ul>
      <li><span class="status" id="status-national-flag-quiz">⭐</span><a href="national-flag-quiz.html">こっきクイズ</a></li>
      <li><span class="status" id="status-capital-quiz">⭐</span><a href="capital-quiz.html">しゅとクイズ</a></li>
    </ul>
    <button class="clear-button" onclick="clearByUnit('social')">🌱 しゃかいのデータをクリア</button>
  </div>

  <script src="script.js"></script>
  <script>
    const MAX_POKEMON_ID = 151; // 初代ポケモンまで
    const POKEMON_COUNT = 20; // 表示する画像数
  
    function getRandomId() {
      return Math.floor(Math.random() * MAX_POKEMON_ID) + 1;
    }
  
    function createBackgroundPokemon() {
      for (let i = 0; i < POKEMON_COUNT; i++) {
        const id = getRandomId();
        const img = document.createElement("img");
        img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
        img.style.position = "absolute";
        img.style.opacity = "0.5";
        img.style.width = "96px";
        img.style.height = "96px";
        img.style.zIndex = "-1";
        img.style.top = `${Math.random() * 100}%`;
        img.style.left = `${Math.random() * 100}%`;
        img.style.transform = `rotate(${Math.random() * 360}deg)`;
  
        document.body.appendChild(img);
      }
    }
  
    window.onload = function () {
      createBackgroundPokemon();
      if (typeof updateStatusIcons === 'function') updateStatusIcons(); // 既存の初期処理も実行
    };
  </script>

  <div style="margin-top: 40px; padding: 10px; border-top: 2px dashed #ccc;">
  <h3>🛠 デバッグ用 localStorage の中身</h3>
  <pre id="debug-storage" style="background:#eee; padding:10px; border-radius:5px;"></pre>
  <button onclick="showLocalStorage()">📋 表示更新</button>
</div>

</body>
</html>
