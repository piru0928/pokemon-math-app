    body {

    .cat-icon {
      width: 60px;
      height: 60px;
      margin-left: -10px;

    ul {
      list-style: none;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 0;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: center; /* 中央揃えに変更 */
      text-decoration: none;
      background: #fdfdfd;
      padding: 12px 10px;
      border-radius: 12px;
      border: 1px solid #eee;
      transition: all 0.2s;
    }

    .menu-item:active {
      transform: scale(0.96);
      background: #f0f0f0;
    }

    .menu-item span {
      font-size: 14px;
      color: #444;
      font-weight: bold;
      white-space: nowrap;
    }

    .bg-poke {
      position: fixed;
      z-index: -1;
      opacity: 0.12;
      pointer-events: none;
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    #version-info {
      position: fixed;
      bottom: 5px;
      right: 5px;
      font-size: 9px;
      color: #ccc;
    }
  </style>

<body>

  <script>
    const MAX_POKEMON_ID = 151;
    function createBackgroundPokemon() {
      for (let i = 0; i < 12; i++) {
        const id = Math.floor(Math.random() * MAX_POKEMON_ID) + 1;
        const img = document.createElement("img");
        img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
        img.className = "bg-poke";
        img.style.width = "60px";
        img.style.top = `${Math.random() * 90}%`;
        img.style.left = `${Math.random() * 90}%`;
        img.style.animationDelay = `${Math.random() * 5}s`;
        document.body.appendChild(img);
      }
    }
    window.onload = function () {
      createBackgroundPokemon();
    };
  </script>

  <!-- 隠しゲーム用画面 -->
  <div id="game-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle, #5ec3ff, #0076be); z-index:10000; touch-action:none; overflow:hidden;">
      <canvas id="gameCanvas"></canvas>
      <div id="game-ui" style="position:absolute; top:20px; left:20px; color:white; font-family:'M PLUS Rounded 1c', sans-serif; font-size:24px; text-shadow:2px 2px 4px rgba(0,0,0,0.5); pointer-events:none;">
          Score: <span id="score">0</span>
      </div>
      <button onclick="closeGame()" style="position:absolute; top:20px; right:20px; padding:10px 20px; background:#ff5e5e; color:white; border:none; border-radius:20px; font-weight:bold; box-shadow:0 4px 0 #cc4a4a;">とじる</button>
      <div id="game-msg" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:white; font-size:20px; text-align:center; display:none; background:rgba(0,0,0,0.6); padding:20px; border-radius:15px; width:80%;"></div>
  </div>
  
  <script>
  // --- 隠しコマンドの設定 ---
  let titleClickCount = 0;
  document.querySelector('h1').addEventListener('click', () => {
      titleClickCount++;
      if (titleClickCount >= 5) {
          openGame();
          titleClickCount = 0;
      }
      setTimeout(() => { titleClickCount = 0; }, 3000);
  });
  
  // --- ゲーム本体 ---
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let animationId;
  let score = 0;
  let gameActive = false;
  
  // 画像素材の定義
  const imgDora = new Image();
  imgDora.src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/151.png"; // 代わりの可愛いキャラ（ミュウ）ですが、ドラえもん風のフリー素材URLがあればここに差し替え可能です
  // ドラえもん風のフリー素材を模した青いネコ型ロボットの描画関数（画像がない場合のフォールバック）
  function drawDora(x, y, size) {
      ctx.font = size + "px serif";
      ctx.fillText("🐱", x - size/2, y + size/2); // 代用絵文字
  }
  
  const items = [];
  const enemies = [];
  
  function openGame() {
      document.getElementById('game-overlay').style.display = 'block';
      document.getElementById('game-msg').style.display = 'none';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      player.x = canvas.width / 2;
      player.y = canvas.height - 100;
      score = 0;
      document.getElementById('score').textContent = score;
      items.length = 0;
      enemies.length = 0;
      gameActive = true;
      loop();
  }
  
  function closeGame() {
      gameActive = false;
      cancelAnimationFrame(animationId);
      document.getElementById('game-overlay').style.display = 'none';
  }
  
  // プレイヤー設定
  const player = { x: 0, y: 0, size: 70 };
  
  // 操作（スマホの左右スライドに対応）
  window.addEventListener('mousemove', e => { if(gameActive) player.x = e.clientX; });
  window.addEventListener('touchmove', e => {
      if(gameActive) {
          player.x = e.touches[0].clientX;
          e.preventDefault();
      }
  }, {passive: false});
  
  function loop() {
      if (!gameActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
  
      // 背景に雲を描画
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath(); ctx.arc(50, 100, 40, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(canvas.width-80, 200, 50, 0, Math.PI*2); ctx.fill();
  
      // プレイヤー（ドラえもん）描画
      // 本来は imgDora を使うが、今回はわかりやすく「大きな青い猫」の絵文字でリッチに表現
      ctx.font = player.size + "px serif";
      ctx.textAlign = "center";
      ctx.fillText("🤖", player.x, player.y); 
  
      // どら焼き（🥞）生成 - 上から降ってくる
      if (Math.random() < 0.04) {
          items.push({ x: Math.random() * canvas.width, y: -50, size: 40, emoji: "🥞" });
      }
  
      // ネズミ（🐭）生成 - 邪魔者
      if (Math.random() < 0.02) {
          enemies.push({ x: Math.random() * canvas.width, y: -50, size: 40, emoji: "🐭", speed: 4 + Math.random() * 4 });
      }
  
      // どら焼きの処理
      for (let i = items.length - 1; i >= 0; i--) {
          items[i].y += 5;
          ctx.font = items[i].size + "px serif";
          ctx.fillText(items[i].emoji, items[i].x, items[i].y);
          
          // 当たり判定
          if (Math.abs(player.x - items[i].x) < 40 && Math.abs(player.y - items[i].y) < 50) {
              score += 10;
              document.getElementById('score').textContent = score;
              items.splice(i, 1);
          } else if (items[i].y > canvas.height) {
              items.splice(i, 1);
          }
      }
  
      // 敵の処理
      for (let i = enemies.length - 1; i >= 0; i--) {
          enemies[i].y += enemies[i].speed;
          ctx.font = enemies[i].size + "px serif";
          ctx.fillText(enemies[i].emoji, enemies[i].x, enemies[i].y);
          
          if (Math.abs(player.x - enemies[i].x) < 35 && Math.abs(player.y - enemies[i].y) < 45) {
              gameOver();
              return;
          } else if (enemies[i].y > canvas.height) {
              enemies.splice(i, 1);
          }
      }
  
      animationId = requestAnimationFrame(loop);
  }
  
  function gameOver() {
      gameActive = false;
      const msg = document.getElementById('game-msg');
      msg.style.display = 'block';
      msg.innerHTML = `<span style="font-size:40px;">🐭💦</span><br><br>ネズミだ〜！にげろ〜！<br><br>スコア: ${score}<br><br><button onclick="openGame()" style="padding:10px 20px; border-radius:10px; border:none; background:#4CAF50; color:white; font-weight:bold;">もういっかい</button>`;
  }
  </script>
</body>
