<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・漢字マスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f1f8e9;
      text-align: center;
      padding: 20px;
      transition: 0.3s;
    }
    h1 { color: #2e7d32; margin-bottom: 10px; }
    #level-display { font-size: 18px; font-weight: bold; color: #1b5e20; }
    #status { font-size: 16px; color: #666; margin-bottom: 15px; }

    #kanji-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      min-width: 300px;
      max-width: 90%;
    }
    
    /* ポケモン常時表示 */
    #pokemon-img { width: 150px; height: 150px; background: #f9f9f9; border-radius: 50%; border: 3px solid #81c784; }
    
    #yomi-display { font-size: 32px; font-weight: bold; color: #333; margin: 15px 0; }
    #example-sentence { font-size: 18px; color: #555; background: #f9f9f9; padding: 10px; border-radius: 10px; }

    /* 選択肢 */
    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 400px;
      margin: 20px auto;
    }
    .choice-btn {
      padding: 20px 10px;
      font-size: 28px;
      font-weight: bold;
      background-color: white;
      border: 2px solid #81c784;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .choice-btn:hover { background-color: #e8f5e9; }
    .choice-btn:disabled { opacity: 0.8; cursor: default; }

    #result { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 30px; }
    #next-button {
      margin-top: 10px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none;
    }
    #grade-selector { margin-bottom: 15px; padding: 8px; border-radius: 5px; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>
</head>
<body>
  <div id="version-info">Ver 2.0.0 | Updated: 2026-05-12 13:00</div>
  <h1>📝 漢字マスター</h1>

  <select id="grade-selector" onchange="correctStreak = 0; generateQuiz();">
    <option value="1">小学1年生</option>
    <option value="2">小学2年生</option>
    <option value="3">小学3年生</option>
    <option value="4">小学4年生</option>
    <option value="5">小学5年生</option>
    <option value="6">小学6年生</option>
    <option value="7">中学生</option>
  </select>

  <div id="status">ただいま 0もん れんぞくせいかい！</div>

  <div id="kanji-card">
    <img id="pokemon-img" src="" alt="pokemon">
    <div id="yomi-display">読み込み中...</div>
    <div id="example-sentence"></div>
  </div>
  
  <div class="choices-container" id="choices"></div>
  <div id="result"></div>
  <button id="next-button" onclick="generateQuiz()">つぎのもんだいへ！</button>

  <br><br>
  <a href="index.html">← トップページへ</a>

  <script>
    let correctKanji = "";
    let correctStreak = 0;

    // 学年別漢字リスト（一部抜粋）
    const kanjiData = {
      1: ["一", "山", "木", "水", "人", "子", "日", "月", "火", "円"],
      2: ["強", "読", "道", "新", "春", "夏", "秋", "冬", "朝", "昼"],
      3: ["運", "悪", "安", "開", "館", "期", "業", "具", "君", "係"],
      4: ["愛", "案", "以", "衣", "位", "囲", "胃", "印", "英", "栄"],
      5: ["厚", "安", "移", "因", "永", "衛", "液", "演", "応", "往"],
      6: ["遺", "域", "宇", "映", "延", "沿", "我", "灰", "拡", "革"],
      7: ["摩擦", "環境", "監視", "基礎", "緊張", "具体的", "貢献", "克服"]
    };

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(type) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (type === 'normal') {
          this._note(880, now, 0.1); // ピッ
        } else if (type === 'special') {
          // チャララ〜ン！
          [523, 659, 783, 1046].forEach((f, i) => this._note(f, now + (i * 0.1), 0.3));
        } else {
          this._note(200, now, 0.3); // ブー
        }
      }
    };

    async function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.body.style.backgroundColor = "#f1f8e9";

      const grade = document.getElementById("grade-selector").value;
      const list = kanjiData[grade];
      correctKanji = list[Math.floor(Math.random() * list.length)];

      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      // ポケモンを先に表示
      const pokeId = Math.floor(Math.random() * 151) + 1;
      document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png`;

      // 読みを表示（簡易的なマッピング）
      document.getElementById("yomi-display").textContent = "正しい漢字を選ぼう！";
      document.getElementById("example-sentence").textContent = `問題の漢字： 【？】 `;

      // ダミー選択肢作成
      let options = [correctKanji];
      while (options.length < 4) {
        let dummy = list[Math.floor(Math.random() * list.length)];
        if (!options.includes(dummy)) options.push(dummy);
      }
      options.sort(() => Math.random() - 0.5);

      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt);
        choicesDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      const btns = document.querySelectorAll(".choice-btn");
      btns.forEach(b => b.disabled = true);

      if (selected === correctKanji) {
        correctStreak++;
        if (correctStreak % 5 === 0) {
          Buzzer.play('special'); // 5回ごとの音
        } else {
          Buzzer.play('normal'); // 通常の正解音
        }
        document.getElementById("result").textContent = "✨ 正解！ その調子！";
        document.body.style.backgroundColor = "#fff9c4";
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        document.getElementById("result").textContent = `❌ ざんねん！ 正解は「${correctKanji}」`;
      }
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
      document.getElementById("next-button").style.display = "inline-block";
    }

    window.onload = generateQuiz;
  </script>
</body>
</html>
