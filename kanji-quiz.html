<!DOCTYPE html>

  <title>ポケモン・漢字マスター</title>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f1f8e9;
      text-align: center;
      padding: 20px;
      transition: 0.3s;
    }
    h1 { color: #2e7d32; margin-bottom: 10px; }
    #status { font-size: 16px; color: #666; margin-bottom: 15px; }

    #kanji-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      min-width: 300px;
      max-width: 90%;
    }
    
    #pokemon-img { width: 150px; height: 150px; background: #f9f9f9; border-radius: 50%; border: 3px solid #81c784; }
    #yomi-display { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; min-height: 1.2em; }
    #hint-word { color: #e91e63; font-size: 32px; border-bottom: 2px dashed #e91e63; padding: 0 10px; }

    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 400px;
      margin: 20px auto;
    }
    .choice-btn {
      padding: 20px 10px;
      font-size: 28px;
      font-weight: bold;
      background-color: white;
      border: 2px solid #81c784;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .choice-btn:hover { background-color: #e8f5e9; }
    .choice-btn:disabled { opacity: 0.8; cursor: default; }

    #result { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 30px; }
    #next-button {
      margin-top: 10px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none;
    }
    #grade-selector { margin-bottom: 15px; padding: 8px; border-radius: 5px; font-size: 16px; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>

  <div class="choices-container" id="choices"></div>

      4: "愛案以衣位囲胃印英栄塩億加果貨課芽改械害街各覚完官管関観願希季紀喜旗器機議求泣給挙漁共協鏡競極訓軍郡径型景芸欠結建健験固候功巧好康航告差最菜材昨刷札殺察参産散残士氏史司試児治辞失借種周祝順初松笑唱焼象照賞臣信真成省清静席積折節説浅戦選然争倉巣束側続卒孫帯隊達単置仲貯兆低底停的典伝徒努灯堂働特得毒熱念敗梅博飯飛費必票標不夫付府副粉兵別辺変便包法望牧末満未脈民無約勇要養浴利陸良料量輪類令冷例歴連老労録",

      6: "遺域宇映延沿我灰拡革閣割株干巻看簡危机揮貴疑吸供胸郷勤筋系敬警劇激穴絹権憲源厳己呼誤后孝皇紅降鋼刻穀骨困砂座再災妻採際在財罪雑酸賛支志枝師資飼示似児事辞実写煮舎謝車射若主守手授秋終習集住重宿祝術順序叙除消商章象賞焼照上乗飾色植身真神臣薪親進図数正声星晴整昔全相総像増側速族続卒多太打対待代台大第題態炭短談断値智置忠中仲貯庁兆長鳥朝直通低底停的典伝徒努灯堂働特得独毒突南肉波配倍箱畑発反坂板皮番板悲鼻筆氷表秒病品負部服福物平返勉放味命面問役薬由油有遊予羊洋葉陽様落流旅両料緑礼列練路和",
      7: "亜尉逸姻韻畝浦詠影閲艶憶穏卸苛佳寡架稼華郭隔穫岳潟括褐喝渇葛滑堪冠艦歓緩憾喚敢閑陥含頑奇祈棄幾輝毅儀戯擬詰却脚虐丘及朽糾窮仰凝暁錦僅巾謹琴筋緊菌謹襟吟駆屈掘繰勲薫群慶稽詣憩掲携刑啓契形径茎係傾景警鯨劇撃穴結血欠決潔月犬券見研県険肩堅遣顕兼剣圏険圏検献権遣鍵験元言原原子弦現限源厳個古呼孤故虎誇孤弧顧五互語後午午後誤互娯悟碁語護口工公広交工功巧好康考恒拘皇厚候浩構江溝綱控講鋼降劫号合合拷剛傲豪克酷刻告谷国黒穀刻告酷穀腰骨困込墾婚恨根昏混墾昆困砂挫債催債罪剤財左差査沙査砂唆詐差砂座済再才災祭砕妻宰最採斎催際在材財罪剤崎作削昨策柵窄索錯撮策作物殺察拶撮雑札刷撮察殺擦拶斬暫暫酸参惨暫斬暫暫斬暫暫斬暫暫斬暫暫斬暫暫斬"
    };

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(type) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (type === 'normal') this._note(880, now, 0.1);
        else if (type === 'special') [523, 659, 783, 1046].forEach((f, i) => this._note(f, now + (i * 0.1), 0.3));
        else this._note(200, now, 0.3);
      }
    };

    async function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.body.style.backgroundColor = "#f1f8e9";
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      const grade = document.getElementById("grade-selector").value;
      const allKanji = kanjiData[grade];
      correctKanji = allKanji[Math.floor(Math.random() * allKanji.length)];

      const pokeId = Math.floor(Math.random() * 151) + 1;
      
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${pokeId}/`);
        const data = await res.json();
        const jpName = data.names.find(n => n.language.name === "ja").name;
        
        // ポケモン名の最初の1文字をヒントにする（例：キュウコン→「き」）
        document.getElementById("hint-word").textContent = jpName.charAt(0);
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png`;

        let options = [correctKanji];
        while (options.length < 4) {
          let dummy = allKanji[Math.floor(Math.random() * allKanji.length)];
          if (!options.includes(dummy)) options.push(dummy);
        }
        options.sort(() => Math.random() - 0.5);

        const choicesDiv = document.getElementById("choices");
        choicesDiv.innerHTML = "";
        options.forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.textContent = opt;
          btn.onclick = () => checkAnswer(opt);
          choicesDiv.appendChild(btn);
        });
      } catch (e) {
        generateQuiz();
      }
    }

    function checkAnswer(selected) {
      document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
      if (selected === correctKanji) {
        correctStreak++;
        Buzzer.play(correctStreak % 5 === 0 ? 'special' : 'normal');
        document.getElementById("result").textContent = "✨ せいかい！";
        document.body.style.backgroundColor = "#fff9c4";
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        document.getElementById("result").textContent = `❌ 正解は「${correctKanji}」だよ`;
      }
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
      document.getElementById("next-button").style.display = "inline-block";
    }

    window.onload = generateQuiz;
  </script>
</body>
