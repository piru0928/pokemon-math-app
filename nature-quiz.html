<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン・しぜんマスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #e8f5e9;
      text-align: center;
      padding: 10px;
      transition: 0.3s;
    }
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: #2e7d32; font-weight: normal; }

    h1 { color: #2e7d32; margin-bottom: 5px; font-size: 24px; }
    #status { font-size: 16px; color: #388e3c; margin-bottom: 10px; font-weight: bold; }

    #quiz-card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 15px;
      width: 95%;
      max-width: 400px;
    }
    
    #pokemon-img { width: 140px; height: 140px; background: #f1f8e9; border-radius: 50%; border: 4px solid #a5d6a7; margin-bottom: 10px; }
    #question-text { font-size: 18px; font-weight: bold; color: #333; margin: 10px 0; line-height: 1.8; padding: 0 5px; }

    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: 10px auto;
    }
    .choice-btn {
      padding: 15px 5px;
      font-size: 15px;
      font-weight: bold;
      background-color: white;
      border: 3px solid #a5d6a7;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px #81c784;
    }
    .choice-btn:active { transform: translateY(2px); box-shadow: 0 2px #81c784; }
    .choice-btn:disabled { opacity: 0.7; cursor: default; }

    #result { font-size: 20px; margin-top: 10px; font-weight: bold; min-height: 30px; }
    #next-button {
      margin-top: 15px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none; font-weight: bold;
    }
    #version-info { position: fixed; bottom: 5px; right: 5px; font-size: 9px; color: #9e9e9e; }
  </style>
</head>

      { q: "バナナは、どこに できるかな？", a: ["あたたかい<ruby>所<rt>ところ</rt></ruby>", "さむい<ruby>所<rt>ところ</rt></ruby>", "<ruby>海<rt>うみ</rt></ruby>のなか", "<ruby>空<rt>そら</rt></ruby>のうえ"] },
      { q: "お<ruby>米<rt>こめ</rt></ruby>は、なんという <ruby>植物<rt>しょくぶつ</rt></ruby>から できる？", a: ["イネ", "ムギ", "ハナ", "キ"] },
      { q: "<ruby>四<rt>よ</rt></ruby>つ<ruby>葉<rt>ば</rt></ruby>を みつけると <ruby>幸<rt>しあわ</rt></ruby>せになるといわれるのは？", a: ["クローバー", "タンポポ", "ペンペン<ruby>草<rt>ぐさ</rt></ruby>", "ひまわり"] },
    
      // --- 4. おそら・てんき・ちきゅう（20問） ---
      { q: "<ruby>雨<rt>あめ</rt></ruby>が あがったあと、お<ruby>空<rt>そら</rt></ruby>に でる 7<ruby>色<rt>いろ</rt></ruby>のものは？", a: ["にじ", "くも", "お<ruby>月<rt>つき</rt></ruby>さま", "かみなり"] },
      { q: "<ruby>夜<rt>よる</rt></ruby>のお<ruby>空<rt>そら</rt></ruby>で、<ruby>形<rt>かたち</rt></ruby>が かわって <ruby>見<rt>み</rt></ruby>えるものは？", a: ["お<ruby>月<rt>つき</rt></ruby>さま", "お<ruby>日<rt>ひ</rt></ruby>さま", "にじ", "ひこうき"] },
      { q: "とっても <ruby>冷<rt>つめ</rt></ruby>たい<ruby>日<rt>ひ</rt></ruby>に、お<ruby>空<rt>そら</rt></ruby>から ふってくる <ruby>白<rt>しろ</rt></ruby>いものは？", a: ["ゆき", "あめ", "おかし", "はっぱ"] },
      { q: "お<ruby>空<rt>そら</rt></ruby>で ピカッと ひかって、ゴロゴロと <ruby>音<rt>おと</rt></ruby>が するのは？", a: ["かみなり", "はなび", "たいこ", "あめ"] },
      { q: "わたしたちが <ruby>住<rt>す</rt></ruby>んでいる、この <ruby>星<rt>ほし</rt></ruby>のなまえは？", a: ["<ruby>地球<rt>ちきゅう</rt></ruby>", "<ruby>火星<rt>かせい</rt></ruby>", "お<ruby>月<rt>つき</rt></ruby>さま", "お<ruby>日<rt>ひ</rt></ruby>さま"] },
      { q: "お<ruby>日<rt>ひ</rt></ruby>さまは、どっちから のぼるかな？", a: ["<ruby>東<rt>ひがし</rt></ruby>", "<ruby>西<rt>にし</rt></ruby>", "<ruby>南<rt>みなみ</rt></ruby>", "<ruby>北<rt>きた</rt></ruby>"] },
      { q: "お<ruby>日<rt>ひ</rt></ruby>さまは、どっちに しずむかな？", a: ["<ruby>西<rt>にし</rt></ruby>", "<ruby>東<rt>ひがし</rt></ruby>", "<ruby>南<rt>みなみ</rt></ruby>", "<ruby>北<rt>きた</rt></ruby>"] },
      { q: "<ruby>雲<rt>くも</rt></ruby>は、なにで できているかな？", a: ["お<ruby>水<rt>みず</rt></ruby>のつぶ", "わたあめ", "けむり", "<ruby>紙<rt>かみ</rt></ruby>"] },
      { q: "お<ruby>空<rt>そら</rt></ruby>が <ruby>青<rt>あお</rt></ruby>いのは、いつの じかん？", a: ["お<ruby>昼<rt>ひる</rt></ruby>", "<ruby>夜<rt>よる</rt></ruby>", "ねるまえ", "<ruby>夜中<rt>よなか</rt></ruby>"] },
      { q: "<ruby>流<rt>なが</rt></ruby>れ<ruby>星<rt>ぼし</rt></ruby>に、なにをすると <ruby>叶<rt>かな</rt></ruby>うといわれている？", a: ["おねがいごと", "ダンス", "おひるね", "おかし"] },
      { q: "<ruby>冬<rt>ふゆ</rt></ruby>になると、お<ruby>外<rt>そと</rt></ruby>の <ruby>空気<rt>くうき</rt></ruby>はどうなる？", a: ["<ruby>冷<rt>つめ</rt></ruby>たくなる", "あつくなる", "きえる", "ひかる"] },
      { q: "<ruby>夏<rt>なつ</rt></ruby>になると、お<ruby>外<rt>そと</rt></ruby>の <ruby>空気<rt>くうき</rt></ruby>はどうなる？", a: ["<ruby>暑<rt>あつ</rt></ruby>くなる", "さむくなる", "かたくなる", "なくなる"] },
      { q: "<ruby>海<rt>うみ</rt></ruby>の<ruby>水<rt>みず</rt></ruby>が、<ruby>上<rt>あ</rt></ruby>がったり <ruby>下<rt>さ</rt></ruby>がったりするのは なぜ？", a: ["お<ruby>月<rt>つき</rt></ruby>さまの ちから", "クジラが およいでいるから", "サカナの せい", "<ruby>風<rt>かぜ</rt></ruby>のせい"] },
      { q: "<ruby>水<rt>みず</rt></ruby>を とっても <ruby>冷<rt>ひ</rt></ruby>やすと、なにになる？", a: ["こおり", "おゆ", "<ruby>蒸気<rt>じょうき</rt></ruby>", "ジュース"] },
      { q: "<ruby>水<rt>みず</rt></ruby>を とっても わかすと、なにが<ruby>出<rt>で</rt></ruby>る？", a: ["<ruby>湯気<rt>ゆげ</rt></ruby>", "こおり", "<ruby>石<rt>いし</rt></ruby>", "さかな"] },
      { q: "<ruby>地球<rt>ちきゅう</rt></ruby>に いちばん <ruby>近<rt>ちか</rt></ruby>い お<ruby>星<rt>ほし</rt></ruby>さまは？", a: ["<ruby>太陽<rt>たいよう</rt></ruby>", "<ruby>月<rt>つき</rt></ruby>", "<ruby>金星<rt>きんせい</rt></ruby>", "<ruby>火星<rt>かせい</rt></ruby>"] },
      { q: "お<ruby>月<rt>つき</rt></ruby>さまが まんまるのとき、なんていう？", a: ["<ruby>満月<rt>まんげつ</rt></ruby>", "<ruby>三日月<rt>みかづき</rt></ruby>", "<ruby>半月<rt>はんげつ</rt></ruby>", "お<ruby>盆<rt>ぼん</rt></ruby>"] },
      { q: "お<ruby>月<rt>つき</rt></ruby>さまが <ruby>細<rt>ほそ</rt></ruby>いとき、なんていう？", a: ["<ruby>三日月<rt>みかづき</rt></ruby>", "<ruby>満月<rt>まんげつ</rt></ruby>", "<ruby>新月<rt>しんげつ</rt></ruby>", "バナナ"] },
      { q: "お<ruby>空<rt>そら</rt></ruby>に うかぶ <ruby>雲<rt>くも</rt></ruby>が、<ruby>黒<rt>くろ</rt></ruby>くなってきたら？", a: ["<ruby>雨<rt>あめ</rt></ruby>がふるかも", "<ruby>夜<rt>よる</rt></ruby>になる", "<ruby>晴<rt>は</rt></ruby>れる", "<ruby>雪<rt>ゆき</rt></ruby>になる"] },
      { q: "わたしたちが いきをするのに、ひつようなのは？", a: ["<ruby>空気<rt>くうき</rt></ruby>", "お<ruby>菓子<rt>かし</rt></ruby>", "ジュース", "おもちゃ"] }
    ];

    let correctStreak = 0;
    let currentAnswer = "";

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(type) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (type === 'correct') {
          this._note(880, now, 0.1); this._note(1100, now + 0.1, 0.2);
        } else if (type === 'special') {
          [523, 659, 783, 1046].forEach((f, i) => this._note(f, now + (i * 0.1), 0.3));
        } else {
          this._note(200, now, 0.3);
        }
      }
    };

    function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.body.style.backgroundColor = "#e8f5e9";
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      const qData = natureQuestions[Math.floor(Math.random() * natureQuestions.length)];
      document.getElementById("question-text").innerHTML = qData.q;
      currentAnswer = qData.a[0];

      // いきもの系のポケモンを表示
      const naturePoke = [1, 4, 7, 10, 16, 25, 43, 50, 60, 129, 131]; 
      const pokeId = naturePoke[Math.floor(Math.random() * naturePoke.length)];
      document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png`;

      let options = [...qData.a].sort(() => Math.random() - 0.5);
      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerHTML = opt;
        btn.onclick = () => checkAnswer(opt);
        choicesDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
      const resArea = document.getElementById("result");

      if (selected === currentAnswer) {
        correctStreak++;
        if (correctStreak % 5 === 0) Buzzer.play('special');
        else Buzzer.play('correct');
        resArea.textContent = "✨ せいかい！ しぜん博士だね！";
        document.body.style.backgroundColor = "#f1f8e9";
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        resArea.textContent = `❌ こたえは「${currentAnswer}」だよ`;
        document.body.style.backgroundColor = "#ffebee";
      }
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
      document.getElementById("next-button").style.display = "inline-block";
    }

    window.onload = generateQuiz;
  </script>
