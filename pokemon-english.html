<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ポケモン英語マスター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #e8f5e9;
      text-align: center;
      padding: 20px;
      transition: 0.3s;
    }
    h1 { color: #2e7d32; margin-bottom: 5px; }
    #level-display { font-size: 20px; font-weight: bold; color: #1b5e20; margin-bottom: 5px; }
    #status { font-size: 16px; color: #666; margin-bottom: 15px; }

    #pokemon-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      min-width: 280px;
    }
    #pokemon-img { width: 180px; height: 180px; }
    #jp-name { font-size: 24px; font-weight: bold; color: #333; margin-top: 10px; }

    /* 選択肢エリア */
    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 500px;
      margin: 0 auto;
    }
    .choice-btn {
      padding: 15px 10px;
      font-size: 18px;
      font-weight: bold;
      background-color: white;
      border: 2px solid #81c784;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .choice-btn:hover { background-color: #f1f8e9; border-color: #2e7d32; }
    .choice-btn:active { transform: scale(0.95); }

    #result { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 30px; white-space: pre-line; }

    #next-button {
      margin-top: 20px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none;
      border-radius: 30px; cursor: pointer; display: none;
    }

    .correct-flash { background-color: #c8e6c9 !important; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>
</head>
<body>
  <div id="version-info">Ver 2.1.0 | Updated: 2026-05-11 07:45</div>
  
  <h1>🐾 ポケモン英語マスター</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">よみこみちゅう...</div>

  <div id="pokemon-card">
    <img id="pokemon-img" src="" alt="pokemon">
    <div id="jp-name">？？？</div>
  </div>
  
  <div class="choices-container" id="choices"></div>

  <div id="result"></div>
  
  <button id="next-button" onclick="generateQuiz()">つぎのもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script>
    let correctEnName = "";
    let correctJpName = "";
    let correctStreak = 0;
    let currentLevel = 1;

    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) {
          this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2);
        } else {
          this._note(200, 'sawtooth', now, 0.2); this._note(150, 'sawtooth', now + 0.2, 0.3);
        }
      }
    };

    async function generateQuiz() {
      document.getElementById("result").textContent = "";
      document.getElementById("choices").innerHTML = "読み込み中...";
      document.getElementById("next-button").style.display = "none";
      
      if (correctStreak < 5) {
        currentLevel = correctStreak + 1;
      } else {
        currentLevel = Math.floor(Math.random() * 5) + 1;
      }
      document.getElementById("level-display").textContent = `レベル ${currentLevel}`;
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;

      let maxId = currentLevel <= 2 ? 151 : 1010;
      const targetId = Math.floor(Math.random() * maxId) + 1;

      try {
        // 正解データの取得
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${targetId}`);
        const data = await res.json();
        correctEnName = data.name;
        
        const speciesRes = await fetch(data.species.url);
        const speciesData = await speciesRes.json();
        correctJpName = speciesData.names.find(n => n.language.name === "ja").name;

        document.getElementById("pokemon-img").src = data.sprites.other['official-artwork'].front_default;
        document.getElementById("jp-name").textContent = correctJpName;

        // ダミーの選択肢を作成
        let options = [correctEnName];
        while (options.length < 4) {
          let dummyId = Math.floor(Math.random() * maxId) + 1;
          if (dummyId === targetId) continue;
          
          let dRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${dummyId}`);
          let dData = await dRes.json();
          if (!options.includes(dData.name)) options.push(dData.name);
        }

        // シャッフル
        options.sort(() => Math.random() - 0.5);

        // ボタン生成
        const choicesDiv = document.getElementById("choices");
        choicesDiv.innerHTML = "";
        options.forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
          btn.onclick = () => checkAnswer(opt);
          choicesDiv.appendChild(btn);
        });

      } catch (e) {
        generateQuiz();
      }
    }

    function checkAnswer(selected) {
      const resultArea = document.getElementById("result");
      const btns = document.querySelectorAll(".choice-btn");
      btns.forEach(b => b.disabled = true);

      if (selected === correctEnName) {
        correctStreak++;
        Buzzer.play(true);
        resultArea.style.color = "#2e7d32";
        resultArea.textContent = `✨ Correct!! \n英語で「${correctEnName.toUpperCase()}」大正解！`;
        document.body.classList.add("correct-flash");
        setTimeout(() => document.body.classList.remove("correct-flash"), 1000);
      } else {
        correctStreak = 0;
        Buzzer.play(false);
        resultArea.style.color = "#d32f2f";
        resultArea.textContent = `❌ Wrong...\n正解は「${correctEnName.toUpperCase()}」でした。`;
      }

      document.getElementById("next-button").style.display = "inline-block";
    }

    generateQuiz();
  </script>
</body>
</html>
