<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formality Ranking</title>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
  <style>
    :root { --main: #2c3e50; --accent: #e67e22; --win: #2ecc71; }
    body { font-family: sans-serif; background-color: #f0f4f8; text-align: center; margin: 0; padding: 10px; color: #333; }
    #main-card { max-width: 400px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
    h1 { font-size: 20px; margin: 5px 0; color: var(--main); }
    #status-row { display: flex; justify-content: space-around; font-size: 13px; font-weight: bold; margin-bottom: 10px; background: #f8f9fa; padding: 8px; border-radius: 10px; }
    #poke-img { width: 100px; height: 100px; margin: 0 auto; display: block; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.1)); }
    #scene-box { background: #eef2f3; border-left: 4px solid #3498db; padding: 10px; text-align: left; font-size: 14px; border-radius: 5px; margin-bottom: 10px; min-height: 50px; }
    .q-prompt { font-size: 15px; font-weight: bold; color: var(--accent); margin: 8px 0; }
    .choice-btn { width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 14px; text-align: left; }
    .desc { display: none; font-size: 11px; color: #7f8c8d; margin-top: 4px; border-top: 1px dashed #ccc; }
    #explanation { display: none; background: #fff3e0; padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 13px; text-align: left; border: 1px solid #ffcc80; }
    .nav-btn { padding: 10px 15px; font-size: 14px; border-radius: 25px; cursor: pointer; border: none; margin: 5px; font-weight: bold; }
    #next-btn { background: var(--win); color: white; display: none; }
    
    /* 入力用モーダル */
    #input-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
    .modal-content { background: #fff; padding: 20px; border-radius: 15px; width: 300px; }
    #player-name-input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }

    #ranking-box { max-width: 400px; margin: 15px auto; padding: 10px; background: #fff; border-radius: 15px; font-size: 12px; }
    .rank-item { padding: 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    ruby rt { font-size: 0.6em; }
  </style>
</head>
<body>

  <div id="main-card">
    <a href="index.html" class="nav-btn" style="background:#bdc3c7; color:white; text-decoration:none;">🏠 <ruby>戻<rt>もど</rt></ruby>る</a>
    <h1>Formality Ranking</h1>
    <div id="status-row">
      <span>Lv: <span id="lv">1</span></span>
      <span>Combo: <span id="cb">0</span></span>
    </div>
    <img id="poke-img" src="" alt="pokemon">
    <div id="scene-box"></div>
    <div class="q-prompt">もっとも<ruby>適切<rt>てきせつ</rt></ruby>なフレーズはどれ？</div>
    <div id="choices"></div>
    <div id="explanation"></div>
    <button id="next-btn" class="nav-btn" onclick="nextQ()">つぎの<ruby>問題<rt>もんだい</rt></ruby>へ</button>
  </div>

  <div id="ranking-box">
    <h3 style="margin:0">🌍 <ruby>世界<rt>せかい</rt></ruby>ランキング</h3>
    <div id="rank-list">読み込み中...</div>
  </div>

      <br>

  </div>

        { sc: "【ビジネス】予算の範囲内であることを伝えるとき。", tg: "上司", p: 311, opts: [{ t: "This solution is well within our budget constraints.", d: "― 専門的な報告", ok: true }, { t: "It is cheap enough.", d: "― 表現が平易", ok: false }, { t: "We have enough money.", d: "― 幼稚", ok: false }], h: "「Within budget constraints」で「予算の制約内で」というプロの響きに。" },
        { sc: "【日常】しばらく会っていない人に連絡するとき。", tg: "知人", p: 312, opts: [{ t: "It's been a while! I hope you're doing well.", d: "― 定番の挨拶", ok: true }, { t: "Long time no see. How are you?", d: "― 少しカジュアル", ok: false }, { t: "Why no call?", d: "― 責めている印象", ok: false }], h: "「It's been a while」は再会の際の最も汎用的な表現です。" },
        { sc: "【ビジネス】相手の努力をねぎらうとき。", tg: "チーム", p: 313, opts: [{ t: "Thank you all for your hard work and dedication.", d: "― 重みのあるねぎらい", ok: true }, { t: "Good job everyone.", d: "― 普通", ok: false }, { t: "You worked a lot.", d: "― 事実の指摘のみ", ok: false }], h: "「Dedication（献身）」という言葉を使うと、感謝の深さが増します。" },
        { sc: "【日常】映画や本などの感想を尋ねるとき。", tg: "友人", p: 314, opts: [{ t: "What was your take on the ending of the movie?", d: "― 知的な質問", ok: true }, { t: "Did you like the ending?", d: "― 普通", ok: false }, { t: "Was it good?", d: "― 抽象的", ok: false }], h: "「What is your take on...?」で「〜についてどう思いますか？」という意味。" },
        { sc: "【ビジネス】自分が担当であることを伝えるとき。", tg: "クライアント", p: 315, opts: [{ t: "I'll be in charge of overseeing the implementation process.", d: "― 責任範囲の明示", ok: true }, { t: "I am the boss of this.", d: "― 傲慢", ok: false }, { t: "I do the work.", d: "― 稚拙", ok: false }], h: "「In charge of overseeing」で「〜の統括担当である」となります。" },
        { sc: "【日常】予定をキャンセルして申し訳ないとき。", tg: "友人", p: 316, opts: [{ t: "I'm so sorry to bail on you at the last minute.", d: "― 申し訳なさが伝わる", ok: true }, { t: "I can't go. Sorry.", d: "― 事務的", ok: false }, { t: "Change the date.", d: "― 自分勝手", ok: false }], h: "「Bail on someone」は約束をドタキャンするという意味の口語表現。" },
        { sc: "【ビジネス】新しいアイデアを提案する導入。", tg: "チーム", p: 317, opts: [{ t: "I've been thinking about how we could streamline the workflow.", d: "― 前向きな提案", ok: true }, { t: "Change the work style.", d: "― 具体的でない", ok: false }, { t: "Current work is bad.", d: "― 否定的", ok: false }], h: "「Streamline」は「効率化する、簡素化する」というビジネス重要語です。" },
        { sc: "【日常】体調が良くなったことを伝えるとき。", tg: "同僚", p: 318, opts: [{ t: "I'm finally back on my feet. Thanks for checking in.", d: "― 回復の報告", ok: true }, { t: "I am healthy now.", d: "― 普通", ok: false }, { t: "I am not sick.", d: "― 消極的", ok: false }], h: "「Back on one's feet」で「（病気などから）立ち直る、全快する」の意味。" },
        { sc: "【ビジネス】丁寧な反対意見の述べ方。", tg: "会議の参加者", p: 319, opts: [{ t: "With all due respect, I don't think that's the best approach.", d: "― 礼儀正しい反対", ok: true }, { t: "You are wrong.", d: "― 攻撃的", ok: false }, { t: "I hate that idea.", d: "― 感情的", ok: false }], h: "「With all due respect（失礼ながら）」は反対時のクッション言葉。" },
        { sc: "【日常】相手に同感するとき。", tg: "友人", p: 320, opts: [{ t: "I'm with you on that. It's a tough situation.", d: "― 強い共感", ok: true }, { t: "I think same.", d: "― 稚拙", ok: false }, { t: "Me too.", d: "― カジュアルすぎる", ok: false }], h: "「I'm with you」で「あなたに賛成だ、同意する」となります。" },
        { sc: "【ビジネス】メールの最後で返信を待つとき。", tg: "取引先", p: 321, opts: [{ t: "I look forward to hearing from you at your earliest convenience.", d: "― 完璧な締め", ok: true }, { t: "Reply to me soon.", d: "― 命令風", ok: false }, { t: "Answer me please.", d: "― 少し子供っぽい", ok: false }], h: "「Earliest convenience」で「ご都合のつき次第早く」という丁寧な表現。" },
        { sc: "【日常】何かを自慢するつもりはないと断るとき。", tg: "話し相手", p: 322, opts: [{ t: "I don't mean to brag, but I finally finished the marathon.", d: "― 控えめな報告", ok: true }, { t: "Listen to my great story.", d: "― 傲慢", ok: false }, { t: "I am the best.", d: "― 嫌われる", ok: false }], h: "「I don't mean to brag, but...」で「自慢するわけじゃないけど」となります。" },
        { sc: "【ビジネス】問題を解決したことを報告するとき。", tg: "マネージャー", p: 323, opts: [{ t: "We've managed to resolve the issue with the server.", d: "― 努力と結果の報告", ok: true }, { t: "Server is OK now.", d: "― 抽象的", ok: false }, { t: "I fixed the machine.", d: "― カジュアル", ok: false }], h: "「Manage to resolve」で「なんとか解決にこぎつける」というニュアンス。" },
        { sc: "【日常】相手の話に驚き、詳細を促すとき。", tg: "友人", p: 324, opts: [{ t: "You're kidding! Tell me all about it.", d: "― 興味津々な様子", ok: true }, { t: "Is it true?", d: "― 疑っている印象", ok: false }, { t: "Keep talking.", d: "― 命令", ok: false }], h: "「Tell me all about it」は「詳しく聞かせて」という非常に自然な誘い。" },
        { sc: "【ビジネス】会議で自分の意見を述べるとき。", tg: "チームメンバー", p: 325, opts: [{ t: "From my perspective, we should focus on user experience.", d: "― 知的な視点", ok: true }, { t: "I think this is good.", d: "― 普通", ok: false }, { t: "My idea is the best.", d: "― 独善的", ok: false }], h: "「From my perspective」で「私の見解では」という意味になります。" },
        { sc: "【日常】少し時間がほしいと頼むとき。", tg: "相手", p: 326, opts: [{ t: "Could you give me a second? I'll be right with you.", d: "― 丁寧な待機のお願い", ok: true }, { t: "Wait for me.", d: "― 命令風", ok: false }, { t: "I am busy now.", d: "― 突き放した印象", ok: false }], h: "「I'll be right with you」で「すぐ対応します」というセットフレーズ。" },
        { sc: "【ビジネス】相手の質問に対して、「いい質問ですね」と返す。", tg: "プレゼンの聴衆", p: 327, opts: [{ t: "That's a very insightful question. Let me address that.", d: "― 相手を立てる回答", ok: true }, { t: "Good question.", d: "― 普通", ok: false }, { t: "I don't know yet.", d: "― 頼りない", ok: false }], h: "「Insightful（洞察力のある）」を使うと知的な印象を与えます。" },
        { sc: "【日常】相手の提案が素晴らしいと思ったとき。", tg: "友人", p: 328, opts: [{ t: "That sounds like a plan! Let's go for it.", d: "― 前向きな合意", ok: true }, { t: "OK, let's do it.", d: "― 普通", ok: false }, { t: "Good idea.", d: "― 普通", ok: false }], h: "「That sounds like a plan」は「それで決まりだね！」という意欲的な表現。" },
        { sc: "【ビジネス】ミスをしてしまったときの謝罪。", tg: "上司", p: 329, opts: [{ t: "Please accept my sincere apologies for the oversight.", d: "― 深い謝罪", ok: true }, { t: "I'm sorry I missed it.", d: "― 少し軽い", ok: false }, { t: "It was a small mistake.", d: "― 言い訳に見える", ok: false }], h: "「Oversight」は「見落とし、うっかりミス」という意味の丁寧な語。" },
        { sc: "【日常】何かをはっきりさせたいとき。", tg: "話し相手", p: 330, opts: [{ t: "Let me get this straight. You're saying we're lost?", d: "― 内容の確認", ok: true }, { t: "What? Are we lost?", d: "― 感情的", ok: false }, { t: "Repeat that.", d: "― ぶっきらぼう", ok: false }], h: "「Let me get this straight」で「話を整理させて（確認させて）」となります。" },
        { sc: "【ビジネス】他部署に協力を依頼するとき。", tg: "他部署の担当者", p: 331, opts: [{ t: "We'd really appreciate your expertise on this matter.", d: "― 相手の能力を評価", ok: true }, { t: "Help us please.", d: "― 幼稚", ok: false }, { t: "You are an expert, right?", d: "― 嫌味に聞こえる場合も", ok: false }], h: "「Appreciate your expertise」で相手の専門性を尊重して依頼できます。" },
        { sc: "【日常】どっちでもいいよ、と相手に合わせるとき。", tg: "友人", p: 332, opts: [{ t: "Either way works for me. I'm easy.", d: "― 柔軟な姿勢", ok: true }, { t: "Anything is OK.", d: "― 普通", ok: false }, { t: "I don't care.", d: "― 無関心・失礼", ok: false }], h: "「I'm easy」は「（こだわりがないので）合わせるよ」という自然な表現。" },
        { sc: "【ビジネス】進捗が遅れている理由を説明するとき。", tg: "クライアント", p: 333, opts: [{ t: "We've encountered some unexpected hurdles in the process.", d: "― 的確な説明", ok: true }, { t: "There are problems.", d: "― 抽象的すぎる", ok: false }, { t: "We are slow.", d: "― プロ失格", ok: false }], h: "「Encounter hurdles」で「障害（問題）に直面する」となります。" },
        { sc: "【日常】相手に秘密を守ってほしいとき。", tg: "友人", p: 334, opts: [{ t: "Please keep this between us for now.", d: "― 適切な口止め", ok: true }, { t: "Don't tell anyone.", d: "― 強い命令", ok: false }, { t: "It is a secret.", d: "― 稚拙", ok: false }], h: "「Keep this between us」は「ここだけの話にしておいて」の定番。" },

        { sc: "【日常】相手の言っていることが筋が通っているとき。", tg: "話し相手", p: 336, opts: [{ t: "That makes sense. I hadn't thought of it that way.", d: "― 納得と感謝", ok: true }, { t: "I understand.", d: "― 普通", ok: false }, { t: "You are smart.", d: "― 少し上から目線", ok: false }], h: "「That makes sense」は「なるほど、筋が通っている」という頻出句。" },
        { sc: "【ビジネス】話が脱線したのを戻すとき。", tg: "参加者", p: 337, opts: [{ t: "Anyway, let's get back on track and finish the agenda.", d: "― スムーズな修正", ok: true }, { t: "Stop talking about that.", d: "― 攻撃的", ok: false }, { t: "Back to the topic.", d: "― ぶっきらぼう", ok: false }], h: "「Get back on track」で「本筋に戻る」という意味。" },
        { sc: "【日常】相手に「気楽にしてね」と言うとき。", tg: "来客・友人", p: 338, opts: [{ t: "Please make yourself at home.", d: "― 温かい歓迎", ok: true }, { t: "Sit down and relax.", d: "― 命令風", ok: false }, { t: "Don't be nervous.", d: "― 余計に緊張させる", ok: false }], h: "「Make yourself at home」は「自分の家のようにくつろいで」という慣用句。" },
        { sc: "【ビジネス】詳細を後でメールすると伝えるとき。", tg: "同僚", p: 339, opts: [{ t: "I'll shoot you an email with all the details later.", d: "― スピーディーな印象", ok: true }, { t: "I will write an email.", d: "― 普通", ok: false }, { t: "Check your inbox later.", d: "― 命令風", ok: false }], h: "「Shoot an email」は「（素早く）メールを送る」という少しカジュアルな仕事用語。" },
        { sc: "【日常】相手に任せると言うとき。", tg: "友人", p: 340, opts: [{ t: "I'll leave it up to you to decide where we eat.", d: "― 信頼して任せる", ok: true }, { t: "You choose.", d: "― 突き放した印象", ok: false }, { t: "I don't know.", d: "― 無責任", ok: false }], h: "「Leave it up to you」で「あなたに一任する」となります。" },
        { sc: "【ビジネス】短所を長所に言い換えるとき。", tg: "面接官", p: 341, opts: [{ t: "I am a perfectionist, which means I pay great attention to detail.", d: "― 知的な自己PR", ok: true }, { t: "I am slow because I am careful.", d: "― 欠点に見える", ok: false }, { t: "I don't like mistakes.", d: "― 具体的でない", ok: false }], h: "短所を補う利点（Attention to detail）をセットで伝えるのが定石。" },
        { sc: "【日常】話が終わったときの上品な立ち去り方。", tg: "パーティーの話し相手", p: 342, opts: [{ t: "It's been a pleasure talking to you. Enjoy the rest of the night!", d: "― 洗練された別れ", ok: true }, { t: "I'm going now. Bye.", d: "― ぶっきらぼう", ok: false }, { t: "Goodbye.", d: "― 標準的", ok: false }], h: "「It's been a pleasure」で締めくくるのが非常にスマート。" },
        { sc: "【ビジネス】新しいプロジェクトの可能性を話すとき。", tg: "パートナー", p: 343, opts: [{ t: "This collaboration has a lot of potential for growth.", d: "― 将来性への言及", ok: true }, { t: "We can make money.", d: "― 露骨すぎる", ok: false }, { t: "It looks good.", d: "― 抽象的", ok: false }], h: "「Potential for growth（成長の可能性）」はビジネスで好まれる響き。" },
        { sc: "【日常】相手の新しい服や髪型を褒めるとき。", tg: "友人", p: 344, opts: [{ t: "That color really suits you! Where did you get it?", d: "― 自然な称賛", ok: true }, { t: "Your shirt is nice.", d: "― 普通", ok: false }, { t: "You look different.", d: "― 良くも悪くも聞こえる", ok: false }], h: "「Suits you（似合っている）」は服や髪型を褒める際の最適語。" },

        { sc: "【ビジネス】解決策が思いつかないとき。", tg: "チーム", p: 347, opts: [{ t: "We're back to square one. Let's rethink our strategy.", d: "― 慣用的な表現", ok: true }, { t: "Everything is zero now.", d: "― 稚拙", ok: false }, { t: "I don't have an idea.", d: "― 頼りない", ok: false }], h: "「Back to square one」で「振り出しに戻る」という意味。" },
        { sc: "【日常】自分の言ったことが誤解されたとき。", tg: "話し相手", p: 348, opts: [{ t: "That's not exactly what I meant. Let me rephrase.", d: "― 丁寧な訂正", ok: true }, { t: "You misunderstood.", d: "― 相手のせいにする", ok: false }, { t: "Listen again.", d: "― 失礼", ok: false }], h: "「Let me rephrase（言い換えさせて）」で自分の非として訂正します。" },
        { sc: "【ビジネス】意見が一致しないまま終わる妥協。", tg: "交渉相手", p: 349, opts: [{ t: "Let's agree to disagree for now and move on.", d: "― 大人の対応", ok: true }, { t: "You are you, I am me.", d: "― 幼稚", ok: false }, { t: "I don't like you.", d: "― 喧嘩", ok: false }], h: "「Agree to disagree（見解の相違を認める）」は議論を平行線で終わらせる知的な形。" },
        { sc: "【総括】現在のプロジェクトへの意気込み。", tg: "メンター", p: 350, opts: [{ t: "I'm fully committed to making this project a success.", d: "― 強い決意", ok: true }, { t: "I will do my best.", d: "― 普通", ok: false }, { t: "I hope it works.", d: "― 他人任せな印象", ok: false }], h: "「Fully committed to...」で「〜に全力を注ぐ」という強い意志を示します。" }

      lv4: [
        { sc: "【ビジネス】暗礁に乗り上げた交渉を前進させたいとき。", tg: "交渉相手", p: 351, opts: [{ t: "How can we find some common ground to bridge this gap?", d: "― 妥協点を探る高度な問い", ok: true }, { t: "What is your final answer?", d: "― 最後通牒に見える", ok: false }, { t: "Please change your mind.", d: "― 懇願", ok: false }], h: "「Common ground」は利害の不一致を埋めるための「共通の土台」を指します。" },

        { sc: "【ビジネス】相手の非礼やミスをあえて「不問に付す」とき。", tg: "取引先", p: 355, opts: [{ t: "Let's overlook this minor discrepancy and move forward.", d: "― 器の大きさを示す", ok: true }, { t: "I forgive your mistake.", d: "― 上から目線すぎる", ok: false }, { t: "Don't do it again.", d: "― 威圧的", ok: false }], h: "「Overlook（見逃す、大目に見る）」と「Discrepancy（不一致）」の組み合わせは非常にプロフェッショナルです。" },
        { sc: "【日常】相手の深い洞察に感銘を受けたとき。", tg: "友人・知人", p: 356, opts: [{ t: "That’s a profound observation. I hadn’t looked at it that way.", d: "― 質の高い称賛", ok: true }, { t: "You are very smart.", d: "― 子供っぽい", ok: false }, { t: "Good point.", d: "― 普通すぎる", ok: false }], h: "「Profound observation」は「深い洞察、深遠な観察」を意味します。" },
        { sc: "【ビジネス】厳しい決断の正当性を主張するとき。", tg: "チーム", p: 357, opts: [{ t: "While difficult, this decision is imperative for our long-term viability.", d: "― 強い説得力", ok: true }, { t: "We must do this to survive.", d: "― 必死すぎる", ok: false }, { t: "The boss decided this.", d: "― 責任転嫁", ok: false }], h: "「Imperative（不可欠な）」と「Viability（生存能力、存続可能性）」は経営層が好む語彙です。" },
        { sc: "【ビジネス】相手の提案が現実離れしていると指摘するとき。", tg: "同僚", p: 358, opts: [{ t: "I'm concerned that the proposed timeline may not be feasible.", d: "― 婉曲的な懸念", ok: true }, { t: "That is impossible.", d: "― 突き放した印象", ok: false }, { t: "Your plan is a dream.", d: "― 嫌味", ok: false }], h: "「Feasible（実行可能な）」を否定形で使うことで、論理的に「無理がある」と伝えます。" },
        { sc: "【日常】会話を切り上げ、別の用件に移る際の上品な言い方。", tg: "相手", p: 359, opts: [{ t: "I don't want to monopolize your time, so I'll let you get back to it.", d: "― 相手を尊重した離脱", ok: true }, { t: "I'm busy, so bye.", d: "― 失礼", ok: false }, { t: "Stop talking now.", d: "― 命令", ok: false }], h: "「Monopolize（独占する）」を使うことで「お引止めしては悪いので」という配慮を示せます。" },
        { sc: "【ビジネス】複雑な問題を簡潔に本質へと導くとき。", tg: "クライアント", p: 360, opts: [{ t: "Ultimately, it all boils down to the efficiency of the supply chain.", d: "― 本質の抽出", ok: true }, { t: "The problem is the chain.", d: "― 稚拙", ok: false }, { t: "Simply, it is this.", d: "― 語彙が乏しい", ok: false }], h: "「Boil down to...」は「結局は〜に行き着く、要は〜だ」という非常に便利な慣用表現です。" },
        { sc: "【ビジネス】自分の能力を過信せず、教えを請うとき。", tg: "専門家", p: 361, opts: [{ t: "I'd value your input on how to optimize this process.", d: "― 相手の価値を認める", ok: true }, { t: "Tell me how to do this.", d: "― 命令風", ok: false }, { t: "Teach me.", d: "― カジュアルすぎる", ok: false }], h: "「Value your input」は、相手の意見に高い価値を置いていることを示す洗練された表現です。" },
        { sc: "【ビジネス】反対意見を「検討の余地がある」と受け流すとき。", tg: "会議", p: 362, opts: [{ t: "That's a valid point, and it warrants further investigation.", d: "― 建設的な保留", ok: true }, { t: "Maybe you are right.", d: "― 頼りない", ok: false }, { t: "We will think about it.", d: "― 事務的", ok: false }], h: "「Warrant（正当化する、値する）」はフォーマルな場で重宝される動詞です。" },
        { sc: "【ビジネス】先入観を捨てて議論しようと促すとき。", tg: "チーム", p: 363, opts: [{ t: "Let's approach this with an open mind and no preconceived notions.", d: "― ニュートラルな要請", ok: true }, { t: "Don't be biased.", d: "― 否定的", ok: false }, { t: "Forget everything.", d: "― 極端", ok: false }], h: "「Preconceived notion」は「先入観」を指すフォーマルな言い回しです。" },
        { sc: "【日常】相手に多大な迷惑をかけた際の、形式を整えた謝罪。", tg: "知人", p: 364, opts: [{ t: "I cannot emphasize enough how much I regret this oversight.", d: "― 強い反省", ok: true }, { t: "I am very very sorry.", d: "― 語彙が幼稚", ok: false }, { t: "It won't happen again.", d: "― 定型文すぎる", ok: false }], h: "「I cannot emphasize enough」で、言葉では言い尽くせない強調を表します。" },
        { sc: "【ビジネス】自身の立場が中立であることを強調するとき。", tg: "対立する二者", p: 365, opts: [{ t: "I remain impartial in this matter to ensure a fair outcome.", d: "― 公平性の宣言", ok: true }, { t: "I don't help anyone.", d: "― 冷淡", ok: false }, { t: "I am in the middle.", d: "― 表現が平易", ok: false }], h: "「Impartial」は「偏らない、公平な」という法務やビジネスで重要な語です。" },
        { sc: "【日常】相手に強い確信があるか尋ねるとき。", tg: "友人", p: 366, opts: [{ t: "Are you certain that this aligns with your long-term goals?", d: "― 本質的な問いかけ", ok: true }, { t: "Is this OK for you?", d: "― 抽象的すぎる", ok: false }, { t: "Do you really want this?", d: "― 詰問風", ok: false }], h: "「Align with（〜と一致する）」は、目的と手段の適合性を語る際の標準語です。" },
        { sc: "【ビジネス】不本意ながら妥協を受け入れるとき。", tg: "取引先", p: 367, opts: [{ t: "We are prepared to make some concessions if it ensures a partnership.", d: "― 戦略的な譲歩", ok: true }, { t: "We will give up.", d: "― 敗北宣言に見える", ok: false }, { t: "Okay, we do what you say.", d: "― 無気力", ok: false }], h: "「Concession（譲歩）」は契約交渉における最重要単語の一つです。" },
        { sc: "【ビジネス】現在の状況が「極めて重要」であると伝えるとき。", tg: "上司", p: 368, opts: [{ t: "We have reached a critical juncture in this project.", d: "― 緊迫感のある報告", ok: true }, { t: "It is a very important time.", d: "― 表現が平易", ok: false }, { t: "Now or never.", d: "― 劇的すぎる", ok: false }], h: "「Critical juncture」は「重大な局面、分かれ道」を意味する上級表現です。" },
        { sc: "【日常】相手の決断に口を挟まないことを明言するとき。", tg: "家族・友人", p: 369, opts: [{ t: "I'll defer to your judgment on this particular issue.", d: "― 敬意を持った委ね", ok: true }, { t: "You decide everything.", d: "― 投げやり", ok: false }, { t: "I don't care.", d: "― 失礼", ok: false }], h: "「Defer to（〜に従う、委ねる）」は、相手の専門性や権利を認める上品な言葉です。" },
        { sc: "【ビジネス】期待を上回る成果を出したいという意欲。", tg: "クライアント", p: 370, opts: [{ t: "Our goal is to exceed your expectations in every aspect.", d: "― 高いプロ意識", ok: true }, { t: "We will do more than you think.", d: "― 稚拙", ok: false }, { t: "Trust us.", d: "― 根拠がない", ok: false }], h: "「Exceed expectations（期待を上回る）」はビジネス目標の金言です。" },
        { sc: "【ビジネス】詳細よりも全体像を優先して話すとき。", tg: "幹部", p: 371, opts: [{ t: "Let's take a holistic view of the company's strategy.", d: "― 包括的な視座", ok: true }, { t: "Look at the big picture.", d: "― カジュアル", ok: false }, { t: "Don't see small things.", d: "― 命令風", ok: false }], h: "「Holistic view」で「全体的、包括的な視点」を意味します。" },
        { sc: "【日常】相手の親切に恐縮していることを伝えるとき。", tg: "目上の人", p: 372, opts: [{ t: "I'm overwhelmed by your generosity. Thank you so much.", d: "― 感銘を受けた感謝", ok: true }, { t: "You are too kind.", d: "― 定型文", ok: false }, { t: "I am surprised.", d: "― 感情のみ", ok: false }], h: "「Overwhelmed（圧倒される）」を使って感謝の大きさを表現します。" },
        { sc: "【ビジネス】暗黙の了解や「空気を読む」ことを指すとき。", tg: "同僚", p: 373, opts: [{ t: "We need to be mindful of the underlying cultural nuances.", d: "― 繊細な配慮", ok: true }, { t: "Understand the atmosphere.", d: "― 直訳的", ok: false }, { t: "Don't be rude.", d: "― 攻撃的", ok: false }], h: "「Underlying nuances（根底にある微妙な違い）」は高度な語彙です。" },
        { sc: "【ビジネス】自身の発言の責任を明確にするとき。", tg: "会議", p: 374, opts: [{ t: "I take full responsibility for the outcome of this initiative.", d: "― 責任ある宣言", ok: true }, { t: "It's my fault.", d: "― 単なる謝罪", ok: false }, { t: "I did it.", d: "― 事実のみ", ok: false }], h: "「Initiative（構想、戦略的行動）」と責任をセットで語ります。" },
        { sc: "【日常】物事が計画通りに進まないことを悟ったとき。", tg: "友人", p: 375, opts: [{ t: "It seems we've hit a bit of a snag with our travel plans.", d: "― 落ち着いた問題指摘", ok: true }, { t: "We have a big problem.", d: "― 焦りすぎ", ok: false }, { t: "Plan is dead.", d: "― 極端", ok: false }], h: "「Hit a snag」は「（小さな）障害にぶつかる、思わぬ支障が出る」という慣用句です。" },
        { sc: "【ビジネス】相手の忍耐に感謝するとき。", tg: "顧客", p: 376, opts: [{ t: "We sincerely appreciate your patience during this transition.", d: "― 丁寧な感謝", ok: true }, { t: "Thanks for waiting.", d: "― カジュアル", ok: false }, { t: "Don't be angry.", d: "― 失礼", ok: false }], h: "「Transition（移行、変化の時期）」に伴う不便を詫びる際の定番。" },
        { sc: "【ビジネス】議論の「前提条件」を確認するとき。", tg: "チーム", p: 377, opts: [{ t: "What are the underlying assumptions behind this forecast?", d: "― 論理的な確認", ok: true }, { t: "Why do you think so?", d: "― 詰問風", ok: false }, { t: "Tell me the basis.", d: "― ぶっきらぼう", ok: false }], h: "「Underlying assumptions」は「根本にある前提」を問う知的な言い方です。" },
        { sc: "【日常】相手に「一考の価値がある」と勧めるとき。", tg: "友人", p: 378, opts: [{ t: "It's certainly food for thought, isn't it?", d: "― 示唆に富む表現", ok: true }, { t: "Think about it.", d: "― 命令", ok: false }, { t: "This is a good idea.", d: "― 平易", ok: false }], h: "「Food for thought」で「考えるための糧、思考の材料」という意味になります。" },
        { sc: "【ビジネス】自分の能力が及ばないことを認め、助力を得るとき。", tg: "同僚", p: 379, opts: [{ t: "This is slightly outside my area of expertise. Can you help?", d: "― 謙虚な境界線の明示", ok: true }, { t: "I don't know this.", d: "― 頼りない", ok: false }, { t: "Do it for me.", d: "― 傲慢", ok: false }], h: "「Area of expertise（専門分野）」を盾に、スマートに助けを求めます。" },
        { sc: "【ビジネス】効率を上げるために「同時並行」で進める提案。", tg: "上司", p: 380, opts: [{ t: "We can execute these tasks in parallel to save time.", d: "― 専門的な提案", ok: true }, { t: "Let's do them at the same time.", d: "― 普通", ok: false }, { t: "Two works together.", d: "― 稚拙", ok: false }], h: "「In parallel（並行して）」はITや製造現場でよく使われる上級語です。" },
        { sc: "【日常】自分の主張が「極論ではない」と前置きするとき。", tg: "話し相手", p: 381, opts: [{ t: "I don't want to sound hyperbolic, but this is a life-changer.", d: "― 誇張を避ける導入", ok: true }, { t: "I'm not lying.", d: "― 疑われる", ok: false }, { t: "This is the best ever!", d: "― 説得力に欠ける", ok: false }], h: "「Hyperbolic（誇張された）」という語を使うことで、冷静さを演出できます。" },
        { sc: "【ビジネス】議論をより高い次元（視点）に引き上げるとき。", tg: "参加者", p: 382, opts: [{ t: "Let's pivot the conversation toward our long-term vision.", d: "― 戦略的な方向転換", ok: true }, { t: "Talk about future.", d: "― 単純", ok: false }, { t: "Change the topic.", d: "― 強引", ok: false }], h: "「Pivot（方向転換する）」は近年ビジネスシーンで非常に好まれる動詞です。" },
        { sc: "【ビジネス】期限が厳守であることを伝えるとき。", tg: "部下", p: 383, opts: [{ t: "Adherence to the schedule is paramount for this launch.", d: "― 強い重要性の提示", ok: true }, { t: "Don't be late.", d: "― 命令", ok: false }, { t: "Time is important.", d: "― 表現が平易", ok: false }], h: "「Paramount（至高の、最優先の）」は非常に重みのある単語です。" },
        { sc: "【日常】相手に「気を使わないで」と優しく伝えるとき。", tg: "ゲスト", p: 384, opts: [{ t: "Please don't go to any trouble on my account.", d: "― 洗練された気遣い", ok: true }, { t: "Don't work hard.", d: "― 不自然", ok: false }, { t: "I'm fine, really.", d: "― 普通", ok: false }], h: "「Go to any trouble（手間をかける）」は、もてなしに対する丁寧な遠慮表現です。" },
        { sc: "【ビジネス】一時的な解決策（応急処置）であることを認める。", tg: "チーム", p: 385, opts: [{ t: "This is merely a stopgap measure until we find a permanent fix.", d: "― 現状の正確な把握", ok: true }, { t: "It's a temporary help.", d: "― 表現が平易", ok: false }, { t: "We will fix it later.", d: "― 無責任に見える", ok: false }], h: "「Stopgap measure」で「穴埋め、応急処置」という意味になります。" },
        { sc: "【ビジネス】相手の提案を絶賛しつつ、採用するとき。", tg: "同僚", p: 386, opts: [{ t: "Your proposal is remarkably innovative. Let's implement it.", d: "― 質の高い称賛", ok: true }, { t: "Great idea, let's do it.", d: "― 普通", ok: false }, { t: "You are a genius.", d: "― 軽々しい", ok: false }], h: "「Remarkably innovative（著しく革新的な）」は最上級の褒め言葉です。" },
        { sc: "【日常】予想外の展開に驚きを隠せないとき。", tg: "友人", p: 387, opts: [{ t: "I'm absolutely flabbergasted by this news!", d: "― 強い驚愕", ok: true }, { t: "I am very surprised.", d: "― 普通すぎる", ok: false }, { t: "I can't believe it.", d: "― 定型文", ok: false }], h: "「Flabbergasted」は「驚きで口が塞がらない、仰天した」という豊かな語彙です。" },
        { sc: "【ビジネス】自分の主張を裏付けるデータがあると言うとき。", tg: "クライアント", p: 388, opts: [{ t: "Our findings are corroborated by several independent studies.", d: "― 信頼性の強調", ok: true }, { t: "The data says yes.", d: "― 稚拙", ok: false }, { t: "We have proof.", d: "― 少し攻撃的", ok: false }], h: "「Corroborate（裏付ける、確証する）」は学術・ビジネスの高度な語彙です。" },
        { sc: "【ビジネス】組織の「相乗効果」を強調するとき。", tg: "役員", p: 389, opts: [{ t: "We aim to create synergy between our two departments.", d: "― 専門的な目標設定", ok: true }, { t: "Let's work together.", d: "― 普通", ok: false }, { t: "One plus one is three.", d: "― 比喩が幼稚", ok: false }], h: "「Synergy（相乗効果）」は組織論の定番ワードです。" },
        { sc: "【日常】相手に「察してほしい」と遠回しに言うとき。", tg: "知人", p: 390, opts: [{ t: "I'll leave that to your imagination.", d: "― 洒落た回答", ok: true }, { t: "I can't tell you.", d: "― 冷淡", ok: false }, { t: "Guess what?", d: "― カジュアルすぎる", ok: false }], h: "「ご想像にお任せします」という、余韻を残す大人の返しです。" },
        { sc: "【ビジネス】プロジェクトの遅れを取り戻す計画。", tg: "マネージャー", p: 391, opts: [{ t: "We've devised a recovery plan to mitigate the impact of the delay.", d: "― 論理的な対策", ok: true }, { t: "We will work hard to be fast.", d: "― 精神論に見える", ok: false }, { t: "Sorry for being late.", d: "― 謝罪のみ", ok: false }], h: "「Mitigate（軽減する）」はリスク管理における重要単語です。" },
        { sc: "【ビジネス】意見の対立が「避けられない」ことを認める。", tg: "交渉相手", p: 392, opts: [{ t: "There seems to be an inherent conflict of interest here.", d: "― 客観的な分析", ok: true }, { t: "We don't like each other's ideas.", d: "― 感情的", ok: false }, { t: "You and I are different.", d: "― 普通すぎ", ok: false }], h: "「Inherent conflict（内在する対立）」は構造的な問題を指す表現です。" },
        { sc: "【日常】相手の決断を「賢明だ」と褒めるとき。", tg: "友人", p: 393, opts: [{ t: "That was a prudent decision given the circumstances.", d: "― 知的な称賛", ok: true }, { t: "Good choice.", d: "― 普通", ok: false }, { t: "You are smart.", d: "― 子供っぽい", ok: false }], h: "「Prudent（慎重な、賢明な）」は思慮深さを褒める言葉です。" },
        { sc: "【ビジネス】相手の忍耐に報いたいとき。", tg: "顧客", p: 394, opts: [{ t: "As a token of our appreciation, we'd like to offer a discount.", d: "― 礼儀正しい提案", ok: true }, { t: "Here is a discount for you.", d: "― 直接的", ok: false }, { t: "Thank you, so it's cheap.", d: "― 稚拙", ok: false }], h: "「As a token of appreciation（感謝のしるしとして）」は非常に丁寧な定型句。" },
        { sc: "【ビジネス】目標達成に向けて一致団結を促す。", tg: "チーム", p: 395, opts: [{ t: "We need to align our efforts to maximize our impact.", d: "― 戦略的な鼓舞", ok: true }, { t: "Let's do our best together.", d: "― 普通", ok: false }, { t: "Don't work alone.", d: "― 否定的", ok: false }], h: "「Align efforts（努力の方向を合わせる）」はリーダーが好む表現。" },
        { sc: "【日常】状況が「二進も三進も行かない」とき。", tg: "友人", p: 396, opts: [{ t: "I'm caught between a rock and a hard place.", d: "― 慣用的な苦境の吐露", ok: true }, { t: "I have no choice.", d: "― 語彙が平易", ok: false }, { t: "I am in big trouble.", d: "― 普通", ok: false }], h: "「板挟み、絶体絶命」を意味する非常に有名なイディオムです。" },
        { sc: "【ビジネス】詳細な分析（深掘り）が必要だと言うとき。", tg: "チーム", p: 397, opts: [{ t: "We need to perform a deep dive into the consumer data.", d: "― 徹底的な分析の提案", ok: true }, { t: "Look at the data carefully.", d: "― 普通", ok: false }, { t: "Research more.", d: "― 具体的でない", ok: false }], h: "「Deep dive」は「徹底的な調査、詳細な分析」を意味する現代的なビジネス語。" },
        { sc: "【ビジネス】相手に「自由裁量」を与えるとき。", tg: "部下・パートナー", p: 398, opts: [{ t: "I'll give you full discretion to handle this account.", d: "― 信頼の付与", ok: true }, { t: "You can do anything.", d: "― 無責任に聞こえる", ok: false }, { t: "It's your job.", d: "― 冷淡", ok: false }], h: "「Full discretion（全権、自由裁量）」はプロとしての信頼を示す重い言葉です。" },
        { sc: "【日常】お世辞ではないことを強調するとき。", tg: "相手", p: 399, opts: [{ t: "I'm not just being polite; your work is truly exceptional.", d: "― 真実味のある称賛", ok: true }, { t: "I'm serious.", d: "― 少しぶっきらぼう", ok: false }, { t: "I'm not lying.", d: "― 疑念を招く", ok: false }], h: "「Exceptional（並外れた）」は「Good」や「Great」を遥かに凌ぐ褒め言葉です。" },
        { sc: "【ビジネス】会議を総括する締めの挨拶。", tg: "参加者", p: 400, opts: [{ t: "I'm confident that our collaborative efforts will yield great results.", d: "― 前向きな締めくくり", ok: true }, { t: "I hope we can win.", d: "― 願望にすぎない", ok: false }, { t: "Thanks for coming today.", d: "― 普通", ok: false }], h: "「Yield results（成果を生む）」はビジネスの成果を語る際の洗練された動詞です。" },
        { sc: "【ビジネス】相手の要求が過大で、やんわりと断るとき。", tg: "取引先", p: 401, opts: [{ t: "I'm afraid that falls somewhat outside our current scope of engagement.", d: "― 範囲外であることを論理的に提示", ok: true }, { t: "We can't do that. It's too much.", d: "― 直接的で余裕がない", ok: false }, { t: "That's not my job.", d: "― 責任回避の印象", ok: false }], h: "「Scope of engagement（業務範囲）」という言葉で、感情を交えず断るのがプロの流儀です。" },
        { sc: "【ビジネス】複雑な利害関係を調整する必要があるとき。", tg: "ステークホルダー", p: 402, opts: [{ t: "We need to strike a balance between innovation and regulatory compliance.", d: "― 二律背反の調整", ok: true }, { t: "Innovation is good, but rules are rules.", d: "― 表現が平易すぎる", ok: false }, { t: "Let's do both.", d: "― 具体性に欠ける", ok: false }], h: "「Strike a balance（バランスを取る）」は、対立する要素を調整する際の必須表現です。" },
        { sc: "【社交】相手の功績がチーム全体のおかげだと謙遜するとき。", tg: "表彰の場", p: 403, opts: [{ t: "This achievement is a testament to the collective hard work of my team.", d: "― 品格のある謙遜", ok: true }, { t: "Everyone worked hard, not just me.", d: "― 普通すぎる", ok: false }, { t: "I am lucky to have a good team.", d: "― 少し頼りない", ok: false }], h: "「Testament to...（〜の証、〜の賜物）」という格調高い表現を使います。" },
        { sc: "【ビジネス】結論を急がず、多角的な検討を促すとき。", tg: "経営層", p: 404, opts: [{ t: "It would be prudent to examine this from multiple perspectives before committing.", d: "― 慎重かつ知的な提言", ok: true }, { t: "Don't decide yet.", d: "― 失礼な命令", ok: false }, { t: "We need more time to think.", d: "― 準備不足に聞こえる", ok: false }], h: "「Prudent（賢明な）」と「Multiple perspectives（多角的な視点）」で説得力を高めます。" },
        { sc: "【ビジネス】不手際があったが、関係修復に前向きなとき。", tg: "重要な顧客", p: 405, opts: [{ t: "We are committed to rectifying the situation and regaining your trust.", d: "― 誠実な再生の決意", ok: true }, { t: "We will fix it soon. Sorry.", d: "― 軽すぎる", ok: false }, { t: "Please trust us one more time.", d: "― 感情的な懇願", ok: false }], h: "「Rectify（是正する、直す）」は「Fix」よりも公式で重みのある言葉です。" },
        { sc: "【日常】相手の意見に反対だが、視点は面白いと認めるとき。", tg: "友人・知人", p: 406, opts: [{ t: "That's an intriguing point, though I have some reservations.", d: "― 知的な距離感", ok: true }, { t: "I don't think so, but it's funny.", d: "― 相手を小馬鹿にしている印象", ok: false }, { t: "You are unique.", d: "― 褒め言葉にならない場合も", ok: false }], h: "「Intriguing（興味深い）」と「Reservations（懸念、ためらい）」の組み合わせ。" },
        { sc: "【ビジネス】情報の信憑性に疑問を投げかけるとき。", tg: "チーム", p: 407, opts: [{ t: "I'm concerned about the veracity of the data provided in this report.", d: "― 鋭い指摘", ok: true }, { t: "Is this data true?", d: "― 疑い方が直接的すぎる", ok: false }, { t: "I don't believe this.", d: "― 感情的な拒絶", ok: false }], h: "「Veracity（真実性、正確さ）」は「Truth」よりも分析的な響きがあります。" },
        { sc: "【ビジネス】自発的に動くことを高く評価するとき。", tg: "部下", p: 408, opts: [{ t: "I really appreciate your proactive approach to solving this bottleneck.", d: "― 意欲を称える", ok: true }, { t: "You worked fast. Good.", d: "― 表面的な評価", ok: false }, { t: "Thanks for doing it alone.", d: "― 意味がズレている", ok: false }], h: "「Proactive（先見的な、自発的な）」はビジネスでの最上級の褒め言葉の一つ。" },
        { sc: "【ビジネス】会議で自分の意見が少数派だと分かっているとき。", tg: "参加者", p: 409, opts: [{ t: "I may be an outlier here, but I believe we should reconsider the pricing.", d: "― 謙虚ながら芯のある主張", ok: true }, { t: "Everyone is wrong except me.", d: "― 傲慢", ok: false }, { t: "I'm sorry to say this.", d: "― 謝る必要はない", ok: false }], h: "「Outlier（外れ値、例外的な人）」という言葉で、自分の立ち位置を客観視します。" },
        { sc: "【日常】相手に感謝しきれないほど恩を感じているとき。", tg: "恩人", p: 410, opts: [{ t: "I am profoundly grateful for your unwavering support.", d: "― 深い敬意と感謝", ok: true }, { t: "Thanks a lot for everything.", d: "― 軽すぎる", ok: false }, { t: "You are a life saver.", d: "― 少しカジュアル", ok: false }], h: "「Profoundly（深く）」と「Unwavering（揺るぎない）」で感謝に重みを持たせます。" },
        { sc: "【ビジネス】他社との差別化（強み）を語るとき。", tg: "投資家", p: 411, opts: [{ t: "Our proprietary technology gives us a sustainable competitive advantage.", d: "― 専門的な強みの提示", ok: true }, { t: "We are better than others.", d: "― 根拠が薄い", ok: false }, { t: "Our machine is special.", d: "― 表現が幼稚", ok: false }], h: "「Proprietary（独自の）」と「Competitive advantage（競争優位性）」はピッチの定番。" },
        { sc: "【ビジネス】抽象的な話を具体化させたいとき。", tg: "上司・同僚", p: 412, opts: [{ t: "Could you provide a concrete example of how this would be implemented?", d: "― 実行レベルへの落とし込み", ok: true }, { t: "Show me how.", d: "― 命令風", ok: false }, { t: "I don't understand.", d: "― 能力不足に聞こえる", ok: false }], h: "「Concrete example（具体的な例）」を求めることで、議論の質を上げます。" },
        { sc: "【ビジネス】交渉で譲れない「最低ライン」を伝えるとき。", tg: "交渉相手", p: 413, opts: [{ t: "To be transparent, that figure is non-negotiable for us.", d: "― 断固とした拒否", ok: true }, { t: "We can't change the price.", d: "― 少し弱い", ok: false }, { t: "Take it or leave it.", d: "― 攻撃的すぎる", ok: false }], h: "「Non-negotiable（交渉の余地なし）」は、決裂を覚悟した強い言葉です。" },
        { sc: "【日常】相手の決断に感銘を受け、敬意を表するとき。", tg: "友人", p: 414, opts: [{ t: "I admire your integrity in standing up for what you believe in.", d: "― 人格への称賛", ok: true }, { t: "You are brave.", d: "― 表現が平易", ok: false }, { t: "Good for you.", d: "― 皮肉に聞こえるリスクあり", ok: false }], h: "「Integrity（誠実さ、高潔さ）」は、人間の気高さを表す言葉です。" },
        { sc: "【ビジネス】新しい市場への進出を検討するとき。", tg: "役員会", p: 415, opts: [{ t: "We must meticulously assess the risks before penetrating the new market.", d: "― 慎重な戦略姿勢", ok: true }, { t: "Let's check the risks fast.", d: "― 慎重さに欠ける", ok: false }, { t: "New market is scary.", d: "― 語彙が乏しい", ok: false }], h: "「Meticulously（細心の注意を払って）」と「Penetrate（進出する、浸透する）」の活用。" },
        { sc: "【ビジネス】相手の非を責めず、改善策に集中させるとき。", tg: "部下", p: 416, opts: [{ t: "Let's not dwell on the past; focus on how we can mitigate future risks.", d: "― 前向きなリーダーシップ", ok: true }, { t: "Stop talking about mistakes.", d: "― 命令的", ok: false }, { t: "Forget the error.", d: "― 投げやり", ok: false }], h: "「Dwell on（くよくよ考える）」を否定し、「Mitigate（軽減する）」に目を向けさせます。" },
        { sc: "【ビジネス】自分の意見が「推測」であることを断るとき。", tg: "クライアント", p: 417, opts: [{ t: "I don't want to speculate, but initial indicators look promising.", d: "― 責任ある発言", ok: true }, { t: "I think it will be good.", d: "― 根拠が弱く聞こえる", ok: false }, { t: "I am guessing now.", d: "― カジュアルすぎる", ok: false }], h: "「Speculate（推測する、憶測する）」は、事実と推測を分けるプロの言葉。" },
        { sc: "【日常】相手の悩みに対して、深い共感を示すとき。", tg: "友人", p: 418, opts: [{ t: "I can only imagine the magnitude of the challenges you're facing.", d: "― 重みのある共感", ok: true }, { t: "That's too bad.", d: "― 他人事に聞こえる", ok: false }, { t: "I know how you feel.", d: "― 時に浅く感じられる", ok: false }], h: "「Magnitude（大きさ、重大さ）」という語で、相手の苦労を尊重します。" },
        { sc: "【ビジネス】組織の「透明性」を約束するとき。", tg: "全社員", p: 419, opts: [{ t: "We strive to maintain the highest standards of transparency and accountability.", d: "― 組織責任の宣言", ok: true }, { t: "We tell everything to you.", d: "― 子供っぽい", ok: false }, { t: "No more secrets.", d: "― 信頼性に欠ける", ok: false }], h: "「Transparency（透明性）」と「Accountability（説明責任）」はリーダーの必須語。" },
        { sc: "【ビジネス】結論が出るまで時間がかかることを詫びるとき。", tg: "パートナー", p: 420, opts: [{ t: "We appreciate your forbearance while we finalize the internal review.", d: "― 品格のある忍耐への感謝", ok: true }, { t: "Thanks for waiting for us.", d: "― 普通", ok: false }, { t: "Sorry, we are slow.", d: "― プロ意識に欠ける", ok: false }], h: "「Forbearance（忍耐、自制）」は「Patience」よりもさらにフォーマルな語です。" },
        { sc: "【ビジネス】無駄を省き、本質に集中しようと提案するとき。", tg: "チーム", p: 421, opts: [{ t: "Let's eliminate the redundancies and focus on our core competencies.", d: "― 戦略的な絞り込み", ok: true }, { t: "Stop doing extra work.", d: "― 言い方がきつい", ok: false }, { t: "Focus on important things.", d: "― 普通", ok: false }], h: "「Redundancy（余剰、無駄）」と「Core competency（核となる強み）」の対比。" },
        { sc: "【日常】相手に「過度な期待をしないで」と釘を刺すとき。", tg: "友人", p: 422, opts: [{ t: "I'd suggest managing your expectations until we have confirmation.", d: "― 冷静なアドバイス", ok: true }, { t: "Don't be too happy yet.", d: "― 水を差すような言い方", ok: false }, { t: "Wait and see.", d: "― 定型文", ok: false }], h: "「Manage your expectations」は、失望させないための大人の気遣いフレーズ。" },
        { sc: "【ビジネス】相手の提案に「一理ある」と認めつつ保留するとき。", tg: "会議", p: 423, opts: [{ t: "That's a compelling argument, but we need to verify the feasibility.", d: "― 知的な保留", ok: true }, { t: "Good idea, but maybe no.", d: "― 表現が乏しい", ok: false }, { t: "I like it, but later.", d: "― カジュアルすぎる", ok: false }], h: "「Compelling（説得力のある、抗いがたい）」は強い肯定の響きを持ちます。" },
        { sc: "【ビジネス】相手との関係を「互恵的（WIN-WIN）」にしたいとき。", tg: "提携先", p: 424, opts: [{ t: "We are looking for a mutually beneficial long-term partnership.", d: "― 理想的な関係性の提示", ok: true }, { t: "Let's make money together.", d: "― 露骨", ok: false }, { t: "Good for you and good for me.", d: "― 幼稚", ok: false }], h: "「Mutually beneficial（相互に利益のある）」はビジネス交渉の基本理念。" },
        { sc: "【日常】相手の多才さを褒めるとき。", tg: "友人", p: 425, opts: [{ t: "You are truly a person of many talents. It's quite impressive.", d: "― 洗練された称賛", ok: true }, { t: "You can do everything.", d: "― 誇張に聞こえる", ok: false }, { t: "You are so smart.", d: "― 子供っぽい", ok: false }], h: "「A person of many talents」で「多才な人（八面六臂の活躍）」を上品に表現。" },
        { sc: "【ビジネス】自分の考えがまだ「未完成」であると断るとき。", tg: "同僚", p: 426, opts: [{ t: "This is just a preliminary thought, but what if we...", d: "― アイデアの種を出す", ok: true }, { t: "My idea is not ready.", d: "― 弱気に見える", ok: false }, { t: "Just a guess.", d: "― 信頼性が低い", ok: false }], h: "「Preliminary（予備的な、導入の）」を使うことで、叩き台であることを示します。" },
        { sc: "【ビジネス】既存の枠組みにとらわれない発想を促すとき。", tg: "ブレスト", p: 427, opts: [{ t: "We need to transcend our traditional approach to find a solution.", d: "― 既存の超越", ok: true }, { t: "Think outside the box.", d: "― やや使い古された表現", ok: false }, { t: "Forget the old rules.", d: "― 乱暴", ok: false }], h: "「Transcends（超越する、越える）」を使うと、より高次元な改革の印象に。" },
        { sc: "【日常】相手の深い悲しみに寄り添う公式な弔辞など。", tg: "知人・同僚", p: 428, opts: [{ t: "Please accept my deepest condolences for your loss.", d: "― 最も丁寧な悔やみ", ok: true }, { t: "I'm so sorry about that.", d: "― カジュアルすぎる", ok: false }, { t: "Don't be sad.", d: "― 失礼", ok: false }], h: "「Condolences（お悔やみ）」は、深い悲しみに対する公式な用語です。" },
        { sc: "【ビジネス】相手の忍耐強い対応を特に評価するとき。", tg: "カスタマーサポート", p: 429, opts: [{ t: "Your professionalism in handling this grievance is commendable.", d: "― 質の高い評価", ok: true }, { t: "You did a good job with the complain.", d: "― 表現が平易", ok: false }, { t: "Thanks for being patient.", d: "― 普通", ok: false }], h: "「Commendable（賞賛に値する）」は、上司が部下を評価する際の上級語。" },
        { sc: "【ビジネス】話が複雑になりすぎた際、シンプルにまとめるとき。", tg: "会議", p: 430, opts: [{ t: "To cut through the complexity, the main issue is capital.", d: "― 核心への一突き", ok: true }, { t: "In short, money is the problem.", d: "― 露骨すぎる", ok: false }, { t: "Simply, this is it.", d: "― 語彙が少ない", ok: false }], h: "「Cut through the complexity（複雑さを切り裂く＝要約する）」という鮮やかな比喩。" },
        { sc: "【ビジネス】変更による影響が「広範囲に及ぶ」と警告するとき。", tg: "上司", p: 431, opts: [{ t: "This change will have significant ramifications across the board.", d: "― 重大な影響の示唆", ok: true }, { t: "This will affect everyone.", d: "― 表現が普通", ok: false }, { t: "Many problems will happen.", d: "― 悲観的すぎる", ok: false }], h: "「Ramification（（予期せぬ）波及効果、結果）」は悪い影響を指す際の上級語。" },
        { sc: "【日常】相手に「あまり深刻に考えないで」と励ますとき。", tg: "友人", p: 432, opts: [{ t: "Don't let it weigh too heavily on your mind.", d: "― 精神的な重荷への配慮", ok: true }, { t: "Stop thinking about it.", d: "― 命令風", ok: false }, { t: "Forget it.", d: "― 投げやり", ok: false }], h: "「Weigh heavily on one's mind（心に重くのしかかる）」という繊細な表現。" },
        { sc: "【ビジネス】相手の意見に全面的に賛成し、後押しするとき。", tg: "会議", p: 433, opts: [{ t: "I'm in complete alignment with your assessment of the situation.", d: "― 強固な同意", ok: true }, { t: "I agree with you 100%.", d: "― 少しカジュアル", ok: false }, { t: "You are right.", d: "― 平易", ok: false }], h: "「In alignment with（〜と一致して）」は、組織的な合意を示す際に多用されます。" },
        { sc: "【ビジネス】自分の役割が「補助的（サポート）」であることを伝えるとき。", tg: "プロジェクトリーダー", p: 434, opts: [{ t: "I will be acting in a supportive capacity throughout this phase.", d: "― 立場の明確化", ok: true }, { t: "I am your assistant.", d: "― 立場を低くしすぎ", ok: false }, { t: "I will help you.", d: "― 稚拙", ok: false }], h: "「In a supportive capacity（支援する立場で）」はプロらしい謙虚な表現。" },
        { sc: "【日常】相手に「自分の直感を信じて」とアドバイスするとき。", tg: "友人", p: 435, opts: [{ t: "Sometimes it's best to follow your intuition in these matters.", d: "― 相手を尊重した助言", ok: true }, { t: "Trust your gut.", d: "― カジュアル", ok: false }, { t: "Do what you feel.", d: "― 投げやり", ok: false }], h: "「Intuition（直感）」という言葉を使うと、より知的な響きになります。" },
        { sc: "【ビジネス】反対派を納得させるための「説得力のある」理由。", tg: "経営陣", p: 436, opts: [{ t: "The rationale behind this move is to mitigate long-term liability.", d: "― 論理的な正当化", ok: true }, { t: "We do this because it's safe.", d: "― 語彙が乏しい", ok: false }, { t: "Trust the data.", d: "― 具体的でない", ok: false }], h: "「Rationale（合理的根拠）」は、ビジネスの決断を説明する際の最重要語。" },
        { sc: "【ビジネス】自分の知識をさらに深めたいという意欲の表明。", tg: "メンター", p: 437, opts: [{ t: "I'm eager to broaden my horizons within this industry.", d: "― 成長への積極性", ok: true }, { t: "I want to learn more.", d: "― 子供っぽい", ok: false }, { t: "I am interested in this.", d: "― 受動的", ok: false }], h: "「Broaden my horizons（視野を広げる）」は、向上心を示す洗練された言い回し。" },
        { sc: "【日常】相手に「落ち着いて（冷静になって）」と促すとき。", tg: "パニック気味の人", p: 438, opts: [{ t: "Let's try to maintain our composure and assess the situation.", d: "― 自分も含めた冷静な促し", ok: true }, { t: "Calm down!", d: "― 逆効果になりやすい", ok: false }, { t: "Don't be crazy.", d: "― 攻撃的", ok: false }], h: "「Maintain composure（平静を保つ）」は、品格を保ったまま冷静さを求めます。" },
        { sc: "【ビジネス】他人の手柄を横取りせず、正当に評価するとき。", tg: "会議", p: 439, opts: [{ t: "Credit where credit is due; Ken did most of the heavy lifting.", d: "― 公平な賞賛", ok: true }, { t: "Ken worked hard.", d: "― 普通", ok: false }, { t: "It was all Ken's idea.", d: "― 極端", ok: false }], h: "「Credit where credit is due（認めるべきは認める）」は、成熟したビジネスパーソンの金言。" },
        { sc: "【ビジネス】既存のシステムが「時代遅れ」であることを指摘するとき。", tg: "上司", p: 440, opts: [{ t: "Our current infrastructure is becoming increasingly obsolete.", d: "― 技術的・客観的な指摘", ok: true }, { t: "The system is too old.", d: "― 表現が平易", ok: false }, { t: "We need a new computer.", d: "― 具体的すぎる", ok: false }], h: "「Obsolete（廃れた、時代遅れの）」は、更新が必要なものを指す正確な言葉。" },
        { sc: "【日常】相手に「秘密」を打ち明けるときの前置き。", tg: "親友", p: 441, opts: [{ t: "I'm telling you this in the strictest confidence.", d: "― 強い機密性の提示", ok: true }, { t: "Don't tell anyone, okay?", d: "― カジュアル", ok: false }, { t: "This is a big secret.", d: "― 稚拙", ok: false }], h: "「In the strictest confidence（厳重な機密として）」は、信頼の重さを示します。" },
        { sc: "【ビジネス】プレゼンで、これから「核心」に触れるときの合図。", tg: "聴衆", p: 442, opts: [{ t: "Let's delve into the specifics of our operational strategy.", d: "― 深掘りへの導入", ok: true }, { t: "Now, I talk about details.", d: "― 子供っぽい", ok: false }, { t: "Look at the next slide.", d: "― 事務的", ok: false }], h: "「Delve into（〜を深く探求する）」は、詳細に入る際のスムーズな移行語。" },
        { sc: "【ビジネス】相手の時間を無駄にしたくないという配慮。", tg: "取引先", p: 443, opts: [{ t: "I want to be respectful of your time, so I'll wrap this up.", d: "― 上品な締めくくり", ok: true }, { t: "I will stop talking now.", d: "― ぶっきらぼう", ok: false }, { t: "You are busy, bye.", d: "― 失礼", ok: false }], h: "「Respectful of your time（お時間を尊重して）」は、面談や会議の終盤の定石。" },
        { sc: "【日常】自分の感情が「言葉では言い表せない」とき。", tg: "友人", p: 444, opts: [{ t: "Words cannot convey how much this means to me.", d: "― 感動の深さを伝える", ok: true }, { t: "I am very happy.", d: "― 普通", ok: false }, { t: "Thank you, thank you.", d: "― 重みに欠ける", ok: false }], h: "「Convey（伝える、運ぶ）」という動詞が、感謝の深さを知的に見せます。" },
        { sc: "【ビジネス】組織の「強靭さ（回復力）」を語るとき。", tg: "全社員", p: 445, opts: [{ t: "Our resilience in the face of adversity is our greatest strength.", d: "― 逆境での鼓舞", ok: true }, { t: "We are strong and don't give up.", d: "― 精神論に見える", ok: false }, { t: "We can fight back.", d: "― 少し攻撃的", ok: false }], h: "「Resilience（回復力、弾力性）」と「Adversity（逆境）」はセットで使われます。" },
        { sc: "【ビジネス】相手の能力を最大限に引き出すと言いたいとき。", tg: "部下", p: 446, opts: [{ t: "I want to empower you to take ownership of this project.", d: "― 自律性の促進", ok: true }, { t: "You can do what you want.", d: "― 無責任に聞こえる", ok: false }, { t: "I'll give you more work.", d: "― 嫌がられる", ok: false }], h: "「Empower（権限を与える）」と「Ownership（当事者意識）」はモダンなリーダーシップのキーワード。" },
        { sc: "【ビジネス】予期せぬ事態への「予備計画」があると言うとき。", tg: "上司", p: 447, opts: [{ t: "We have developed a comprehensive contingency plan.", d: "― 盤石な準備", ok: true }, { t: "We have a Plan B.", d: "― カジュアル", ok: false }, { t: "We are ready for anything.", d: "― 根拠に欠ける", ok: false }], h: "「Contingency plan（不測の事態への備え）」はビジネスリスク管理の用語。" },
        { sc: "【日常】相手に「自分の価値を低く見積もらないで」と言うとき。", tg: "友人", p: 448, opts: [{ t: "Don't underestimate your own potential.", d: "― 前向きな助言", ok: true }, { t: "You are better than you think.", d: "― 普通", ok: false }, { t: "Be confident.", d: "― 少し突き放した印象", ok: false }], h: "「Underestimate（過小評価する）」と「Potential（潜在能力）」の組み合わせ。" },
        { sc: "【ビジネス】他人の意見に「便乗」して、さらに深める発言。", tg: "会議", p: 449, opts: [{ t: "To build on Ken's point, I'd like to suggest a new angle.", d: "― 建設的な発言の追加", ok: true }, { t: "I agree with Ken, and...", d: "― 普通", ok: false }, { t: "Ken is right, so listen to me.", d: "― 少し強引", ok: false }], h: "「Build on someone's point」は、議論を積み上げる際のマナーある言い方。" },
        { sc: "【ビジネス】全ての関係者に感謝し、プロジェクトを完了するとき。", tg: "チーム・顧客", p: 450, opts: [{ t: "This successful outcome was only possible through our seamless collaboration.", d: "― 完璧な総括", ok: true }, { t: "We finished the job. Thanks.", d: "― 事務的", ok: false }, { t: "It was a good team.", d: "― 表現が平易", ok: false }], h: "「Seamless collaboration（シームレスな協力）」で、一体感を強調して締めくくります。" }
      ],
      lv5: [
        { sc: "【交渉】相手の提案が、長期的には自滅的であると指摘するとき。", tg: "交渉相手", p: 451, opts: [{ t: "I fear this approach might yield short-term gains at the expense of long-term sustainability.", d: "― 構造的な欠陥を指摘", ok: true }, { t: "You are killing your future.", d: "― 直裁的すぎて品がない", ok: false }, { t: "This is a bad idea for later.", d: "― 語彙が平易すぎる", ok: false }], h: "「At the expense of...（〜を犠牲にして）」は、トレードオフを語る際の必須表現です。" },
        { sc: "【ビジネス】組織の慣習を抜本的に変える必要があると訴えるとき。", tg: "役員会", p: 452, opts: [{ t: "We must challenge the status quo to remain competitive in this disruptive era.", d: "― 変革を促す格調高い宣言", ok: true }, { t: "Let's change the old rules.", d: "― 表現が軽い", ok: false }, { t: "Old ways are bad.", d: "― 幼稚", ok: false }], h: "「Status quo（現状）」と「Disruptive（破壊的な）」は、現代ビジネスの最重要語彙です。" },
        { sc: "【外交】対立する意見の間に「共通の利益」を見出そうとするとき。", tg: "対立候補", p: 453, opts: [{ t: "Let's pivot toward a paradigm that aligns our disparate interests.", d: "― 高度な統合案の提示", ok: true }, { t: "We should find a middle way.", d: "― 凡庸な表現", ok: false }, { t: "Let's be friends.", d: "― 非現実的", ok: false }], h: "「Paradigm（パラダイム）」と「Disparate（全く異なる）」を使い、論理の次元を引き上げます。" },
        { sc: "【教養】相手の博識さに対して、最大限の敬意を払うとき。", tg: "教授・専門家", p: 454, opts: [{ t: "Your erudition on this subject is truly remarkable.", d: "― 知性に対する最高の称賛", ok: true }, { t: "You know everything.", d: "― 誇張に聞こえる", ok: false }, { t: "You are very smart.", d: "― 子供っぽい", ok: false }], h: "「Erudition（博学、学識）」は、深い知識を持つ人への洗練された賛辞です。" },
        { sc: "【ビジネス】不確実な未来に対して、レジリエンスを強調するとき。", tg: "投資家", p: 455, opts: [{ t: "We have built a robust framework to mitigate potential idiosyncratic risks.", d: "― 専門的なリスク管理の表明", ok: true }, { t: "We are ready for any problem.", d: "― 根拠が薄く聞こえる", ok: false }, { t: "Trust our system.", d: "― 説得力に欠ける", ok: false }], h: "「Idiosyncratic risks（個別的・特異的なリスク）」という専門用語で、分析の深さを示します。" },
        { sc: "【批判】相手の議論が「的外れ」であることを優雅に指摘するとき。", tg: "議論の相手", p: 456, opts: [{ t: "I believe that point, while interesting, is largely tangential to the core issue.", d: "― 本質からのズレを指摘", ok: true }, { t: "You are talking about something else.", d: "― 直接的でトゲがある", ok: false }, { t: "That's not important.", d: "― ぶっきらぼう", ok: false }], h: "「Tangential（本筋からそれた）」という形容詞で、相手を否定せずに議論を戻します。" },
        { sc: "【ビジネス】リーダーとして、困難な決断の責任を引き受けるとき。", tg: "チーム", p: 457, opts: [{ t: "I am prepared to shoulder the burden of this contentious decision.", d: "― 重厚な責任感の表明", ok: true }, { t: "I'll take the blame.", d: "― 謝罪のように聞こえる", ok: false }, { t: "I decided this, so okay.", d: "― 投げやり", ok: false }], h: "「Shoulder the burden（重荷を背負う）」と「Contentious（論争を呼ぶ）」の組み合わせ。" },
        { sc: "【日常】相手の親切が、自分の言葉では言い尽くせないほど身に染みたとき。", tg: "恩人", p: 458, opts: [{ t: "Your benevolence has left an indelible mark on my heart.", d: "― 文学的な深みのある感謝", ok: true }, { t: "I'll never forget your kindness.", d: "― 定型句", ok: false }, { t: "You are an angel.", d: "― 比喩が使い古されている", ok: false }], h: "「Benevolence（慈愛）」と「Indelible（消し去ることのできない）」を用いた最高級の表現。" },
        { sc: "【ビジネス】提案が時期尚早であることを、知的に伝えるとき。", tg: "提携先", p: 459, opts: [{ t: "The market conditions are not yet conducive to such an ambitious undertaking.", d: "― 環境の不備を理由に断る", ok: true }, { t: "It's too early for this.", d: "― 表現が平易", ok: false }, { t: "Maybe next year.", d: "― 具体的でない", ok: false }], h: "「Conducive to...（〜に資する、〜に適した）」は、条件の不一致を語る際に便利です。" },
        { sc: "【議論】相手の矛盾を突く、鋭い問いかけ。", tg: "討論の相手", p: 460, opts: [{ t: "How do you reconcile this new stance with your previous assertions?", d: "― 整合性を問う知的な攻撃", ok: true }, { t: "You said something different before.", d: "― 喧嘩腰に見える", ok: false }, { t: "Why did you change your mind?", d: "― 尋問風", ok: false }], h: "「Reconcile（矛盾なく一致させる）」は、論理の不一致を指摘する際の最重要動詞です。" },
        { sc: "【ビジネス】組織の官僚主義を打破したいという強い意志。", tg: "全社員", p: 461, opts: [{ t: "We must streamline our operations to circumvent unnecessary bureaucracy.", d: "― 効率化と回避の宣言", ok: true }, { t: "Stop the slow rules.", d: "― 稚拙", ok: false }, { t: "Be faster.", d: "― 命令のみ", ok: false }], h: "「Circumvent（（制限などを）回避する）」という語が、知的な戦略性を感じさせます。" },
        { sc: "【社交】予期せぬ幸運に対し、運命的な表現を使いたいとき。", tg: "パーティー", p: 462, opts: [{ t: "Our meeting today seems like a wonderful stroke of serendipity.", d: "― 洒落た表現", ok: true }, { t: "I'm lucky to see you.", d: "― 普通", ok: false }, { t: "This is a coincidence.", d: "― 事務的", ok: false }], h: "「Serendipity（素敵な偶然）」は、知的な会話で好まれる名詞です。" },
        { sc: "【ビジネス】失敗の後に、教訓を得たことを強調するとき。", tg: "上司", p: 463, opts: [{ t: "We have gleaned invaluable insights from this setback.", d: "― 失敗を資産に変える表現", ok: true }, { t: "We learned a lot from mistakes.", d: "― 表現が平易", ok: false }, { t: "Next time will be better.", d: "― 根拠が薄い", ok: false }], h: "「Glean（（情報を）少しずつ集める）」という語が、丁寧な分析作業を想起させます。" },
        { sc: "【ビジネス】相手の提案が「包括的」であることを称えるとき。", tg: "クライアント", p: 464, opts: [{ t: "Your proposal is commendable for its exhaustive analysis of the market.", d: "― 徹底した仕事を評価", ok: true }, { t: "Your plan is very big.", d: "― 稚拙", ok: false }, { t: "You checked everything.", d: "― 表現が乏しい", ok: false }], h: "「Exhaustive（徹底的な、網羅的な）」は「Comprehensive」よりさらに強い徹底度を表します。" },
        { sc: "【議論】相手の意見に一理あるが、例外もあると指摘するとき。", tg: "参加者", p: 465, opts: [{ t: "That is a valid generalization, yet there are notable caveats.", d: "― 精密な反論", ok: true }, { t: "Usually yes, but sometimes no.", d: "― 語彙が平易すぎる", ok: false }, { t: "I don't agree fully.", d: "― 抽象的", ok: false }], h: "「Caveat（警告、注意事項、ただし書き）」は、議論に条件を付ける際の必須用語です。" },
        { sc: "【ビジネス】自分の考えが「暫定的」であることを断るとき。", tg: "経営陣", p: 466, opts: [{ t: "This is a tentative hypothesis pending further empirical evidence.", d: "― 科学的・論理的な慎重さ", ok: true }, { t: "I am not sure yet.", d: "― 頼りない", ok: false }, { t: "Wait for more data.", d: "― ぶっきらぼう", ok: false }], h: "「Empirical evidence（経験的な証拠、実証データ）」は、客観性を重視するビジネス語。" },
        { sc: "【教養】物事が「一過性」のものであると述べる。 ", tg: "友人", p: 467, opts: [{ t: "We should recognize that these trends are often ephemeral.", d: "― 詩的で知的な指摘", ok: true }, { t: "This won't last long.", d: "― 普通", ok: false }, { t: "It's just a fad.", d: "― 少し軽蔑的", ok: false }], h: "「Ephemeral（つかの間の、はかない）」は、はかなさを表す美しい上級語です。" },
        { sc: "【ビジネス】複雑な利害を調整し、円満に解決したとき。", tg: "関係者", p: 468, opts: [{ t: "We have successfully orchestrated a solution that satisfies all parties.", d: "― 調整力をアピール", ok: true }, { t: "We made everyone happy.", d: "― 子供っぽい", ok: false }, { t: "The problem is gone.", d: "― 事務的", ok: false }], h: "「Orchestrate（（複雑なことを）画策する、調整する）」は、指揮者のような手腕を指します。" },
        { sc: "【批判】相手の発言が「矛盾している」と優雅に突っ込むとき。", tg: "交渉相手", p: 469, opts: [{ t: "I sense a slight dichotomy between your rhetoric and your actions.", d: "― 痛烈だが洗練された指摘", ok: true }, { t: "You are a hypocrite.", d: "― 喧嘩になる", ok: false }, { t: "Your words and deeds are different.", d: "― 普通すぎる", ok: false }], h: "「Dichotomy（二分法、矛盾）」と「Rhetoric（レトリック、言説）」の対比。" },
        { sc: "【ビジネス】不況下でも「揺るぎない」強さをアピールするとき。", tg: "株主", p: 470, opts: [{ t: "Our business model remains resilient despite the prevailing economic headwinds.", d: "― 信頼感を与える報告", ok: true }, { t: "We are okay even if economy is bad.", d: "― 表現が平易", ok: false }, { t: "Don't worry, we are strong.", d: "― 根拠が薄い", ok: false }], h: "「Prevailing headwinds（逆風）」は、経済の悪条件を指す洗練されたメタファーです。" },
        { sc: "【ビジネス】新しいプロジェクトが既存のものを「凌駕する」とき。", tg: "チーム", p: 471, opts: [{ t: "This new iteration will render our previous versions obsolete.", d: "― 圧倒的な進化の宣言", ok: true }, { t: "This is much better than the old one.", d: "― 普通", ok: false }, { t: "Old ones are useless now.", d: "― 言い方がきつい", ok: false }], h: "「Render（（ある状態に）させる）」と「Obsolete（旧式の）」の組み合わせは非常に強力です。" },
        { sc: "【社交】多忙な相手に対して、最大限の配慮を見せるとき。", tg: "VIP", p: 472, opts: [{ t: "I'm cognizant of your demanding schedule and appreciate this audience.", d: "― 謙虚かつ知的な挨拶", ok: true }, { t: "I know you are busy.", d: "― 表現が平易すぎる", ok: false }, { t: "Thanks for meeting me.", d: "― 定型句", ok: false }], h: "「Cognizant（認識している）」と「Audience（拝謁、会見）」という語彙。" },
        { sc: "【ビジネス】徹底的な調査が必要だ、と格調高く言うとき。", tg: "部下", p: 473, opts: [{ t: "Please conduct a rigorous inquiry into the source of this discrepancy.", d: "― 厳格な調査命令", ok: true }, { t: "Check the mistake carefully.", d: "― 普通", ok: false }, { t: "Find why it's wrong.", d: "― ぶっきらぼう", ok: false }], h: "「Rigorous inquiry（厳格な調査）」は、妥協を許さない姿勢を示します。" },
        { sc: "【日常】他人の意見に左右されない強さを褒めるとき。", tg: "友人", p: 474, opts: [{ t: "I admire your steadfastness in the face of such adversity.", d: "― 精神的な強靭さを称える", ok: true }, { t: "You are very strong.", d: "― 子供っぽい", ok: false }, { t: "You don't change.", d: "― 頑固に聞こえる可能性", ok: false }], h: "「Steadfastness（不撓不屈、しっかりしていること）」は、人格の安定を称える語です。" },
        { sc: "【ビジネス】意見の対立を「生産的」なものに変えたいとき。", tg: "対立する同僚", p: 475, opts: [{ t: "Let's harness this intellectual friction to spark innovative ideas.", d: "― 対立をエネルギーに変える", ok: true }, { t: "Let's not fight.", d: "― 消極的", ok: false }, { t: "Ideas are different, it's okay.", d: "― 凡庸", ok: false }], h: "「Harness（（自然の力などを）利用する）」と「Intellectual friction（知的摩擦）」という比喩。" },
        { sc: "【議論】ある事柄が「議論の余地がある」と言うとき。", tg: "会議", p: 476, opts: [{ t: "Whether this strategy is effective remains a moot point.", d: "― 疑義の提示", ok: true }, { t: "Maybe it's not good.", d: "― 頼りない", ok: false }, { t: "We don't know yet.", d: "― 普通", ok: false }], h: "「Moot point（未解決の点、議論の余地のある点）」は、知的な議論で頻出します。" },
        { sc: "【ビジネス】詳細を詰め、最終合意に導くとき。", tg: "取引先", p: 477, opts: [{ t: "We are ready to solidify the parameters of our agreement.", d: "― 最終段階への移行", ok: true }, { t: "Let's finish the contract.", d: "― 普通", ok: false }, { t: "Make it clear.", d: "― ぶっきらぼう", ok: false }], h: "「Solidify（固める）」と「Parameters（媒介変数、条件）」の活用。" },
        { sc: "【教養】相手の話が「示唆に富んでいる」と上品に言う。", tg: "講演者", p: 478, opts: [{ t: "Your discourse was highly evocative and thought-provoking.", d: "― 質の高い称賛", ok: true }, { t: "Your speech was good.", d: "― 語彙が乏しい", ok: false }, { t: "I learned a lot.", d: "― 定型句", ok: false }], h: "「Evocative（（感情や記憶を）呼び起こす）」は、心に響いたことを表す上級語。" },
        { sc: "【ビジネス】プロジェクトの「初期段階」であることを強調するとき。", tg: "クライアント", p: 479, opts: [{ t: "The project is still in its nascent stages, with much to be explored.", d: "― 将来性を秘めた序盤", ok: true }, { t: "We just started.", d: "― 表現が平易", ok: false }, { t: "It's a baby project.", d: "― 不自然", ok: false }], h: "「Nascent（発生したばかりの、初期の）」は、成長の可能性を感じさせるプロの語彙です。" },
        { sc: "【批判】相手の理屈が「独善的」であると切り捨てるとき。", tg: "議論の相手", p: 480, opts: [{ t: "That seems like a rather parochial viewpoint, don't you think?", d: "― 視野の狭さをエレガントに指摘", ok: true }, { t: "Your idea is narrow.", d: "― 直接的すぎる", ok: false }, { t: "You only think about yourself.", d: "― 感情的", ok: false }], h: "「Parochial（偏狭な、教区の）」は、視野が狭いことを知的に批判する言葉です。" },
        { sc: "【ビジネス】自社の「最高品質」を保証するとき。", tg: "VIP客", p: 481, opts: [{ t: "We pride ourselves on providing unparalleled excellence in our service.", d: "― 圧倒的な自負", ok: true }, { t: "We are the best in the world.", d: "― 根拠なく聞こえる", ok: false }, { t: "Our service is great.", d: "― 表現が普通", ok: false }], h: "「Unparalleled（比類なき）」は、並ぶものがないことを示す強力な形容詞です。" },
        { sc: "【外交】妥協案が、実は「苦肉の策」であることを示唆するとき。", tg: "パートナー", p: 482, opts: [{ t: "This is a sub-optimal solution, but perhaps necessary for now.", d: "― 現状への不満を含んだ合意", ok: true }, { t: "This is not good, but okay.", d: "― 語彙が乏しい", ok: false }, { t: "We have no other choice.", d: "― 無力感が出すぎる", ok: false }], h: "「Sub-optimal（最適ではない）」という言葉で、納得はしていないことを知的に伝えます。" },
        { sc: "【ビジネス】混乱した状況を「収拾」したとき。", tg: "マネージャー", p: 483, opts: [{ t: "We managed to restore a sense of equilibrium to the department.", d: "― 調和の回復を強調", ok: true }, { t: "Everything is quiet now.", d: "― 稚拙", ok: false }, { t: "I fixed the mess.", d: "― カジュアルすぎる", ok: false }], h: "「Equilibrium（均衡、心の平静）」は、単なる修正以上の「調和」を意味します。" },
        { sc: "【日常】相手の決断が「後戻りできない」重大なものであると言うとき。", tg: "友人", p: 484, opts: [{ t: "Once you take this step, the repercussions will be irreversible.", d: "― 重大な警告", ok: true }, { t: "You can't go back.", d: "― 表現が平易", ok: false }, { t: "Be careful of the result.", d: "― 具体的でない", ok: false }], h: "「Repercussions（（反動としての）影響）」と「Irreversible（取り返しのつかない）」の重み。" },
        { sc: "【ビジネス】部下の提案が「独創的」であることを格調高く褒める。", tg: "部下", p: 485, opts: [{ t: "Your approach is refreshingly heterodox; I like the ingenuity.", d: "― 異端さを称える", ok: true }, { t: "Your idea is unique.", d: "― 普通すぎる", ok: false }, { t: "You think differently.", d: "― 褒め言葉か不明瞭", ok: false }], h: "「Heterodox（異端の、非正統的な）」は、常識破りな才能を称える言葉です。" },
        { sc: "【批判】相手の計画に「論理的な飛躍」があると言うとき。", tg: "会議", p: 486, opts: [{ t: "There seems to be a significant non-sequitur in your argumentation.", d: "― 論理崩壊の指摘", ok: true }, { t: "Your logic is broken.", d: "― 直接的で攻撃的", ok: false }, { t: "That doesn't make sense.", d: "― カジュアルすぎる", ok: false }], h: "「Non-sequitur（不合理な推論、論理的飛躍）」は、ラテン語由来の高度な論理用語です。" },
        { sc: "【ビジネス】古い慣習を「廃止」することを正式に発表するとき。", tg: "公式文書・スピーチ", p: 487, opts: [{ t: "We have decided to abrogate the outdated protocols immediately.", d: "― 毅然とした廃止宣言", ok: true }, { t: "We stop the old rules.", d: "― 稚拙", ok: false }, { t: "No more old style.", d: "― 乱暴", ok: false }], h: "「Abrogate（（法律などを）廃止する、無効にする）」は、公的な場での強い言葉です。" },
        { sc: "【日常】相手への感謝を「一生忘れない」と誓うとき。", tg: "恩人", p: 488, opts: [{ t: "I shall remain eternally indebted to you for your guidance.", d: "― 永遠の感謝の誓い", ok: true }, { t: "I'll never forget you.", d: "― 恋人同士のような響き", ok: false }, { t: "Thanks forever.", d: "― 稚拙", ok: false }], h: "「Eternally indebted（永遠に恩義がある）」は、深い感謝を表すフォーマルな言い方。" },
        { sc: "【ビジネス】他社を「圧倒する」強固な地位を築く意欲。", tg: "役員", p: 489, opts: [{ t: "Our objective is to cement our hegemony in the global market.", d: "― 覇権を狙う強い表現", ok: true }, { t: "We want to be No.1.", d: "― 普通すぎる", ok: false }, { t: "Let's win everything.", d: "― 精神論", ok: false }], h: "「Cement（固める）」と「Hegemony（覇権）」は、圧倒的優位を語る際の言葉です。" },
        { sc: "【議論】議論を「根本的な原則」に立ち戻らせるとき。", tg: "参加者", p: 490, opts: [{ t: "Let's return to the first principles to resolve this impasse.", d: "― 哲学的・論理的な解決", ok: true }, { t: "Back to the start.", d: "― 表現が平易", ok: false }, { t: "Think simple.", d: "― 具体的でない", ok: false }], h: "「First principles（第一原理、根本原則）」と「Impasse（行き止まり、袋小路）」の活用。" },
        { sc: "【ビジネス】相手の「懸念」を完全に払拭したいとき。", tg: "クライアント", p: 491, opts: [{ t: "Allow me to assuage your fears regarding the project's timeline.", d: "― 穏やかな安心の付与", ok: true }, { t: "Don't worry about the time.", d: "― 軽すぎる", ok: false }, { t: "I will fix the time.", d: "― 意味がズレている", ok: false }], h: "「Assuage（（不安などを）なだめる、和らげる）」は、相手に安心感を与える洗練された動詞。" },
        { sc: "【日常】相手の決断が「多大な勇気」を要するものだと称える。", tg: "友人", p: 492, opts: [{ t: "The fortitude you’ve shown during this crisis is truly exemplary.", d: "― 精神的な強さを絶賛", ok: true }, { t: "You are very brave.", d: "― 表現が平易", ok: false }, { t: "Good job standing up.", d: "― カジュアルすぎる", ok: false }], h: "「Fortitude（不撓不屈の精神）」と「Exemplary（模範的な）」という高貴な褒め言葉。" },
        { sc: "【ビジネス】「想定外の」利益が出たことを報告するとき。", tg: "株主", p: 493, opts: [{ t: "We have realized a substantial windfall due to market shifts.", d: "― 幸運な利益の報告", ok: true }, { t: "We got extra money.", d: "― 露骨で稚拙", ok: false }, { t: "We are lucky.", d: "― プロらしくない", ok: false }], h: "「Windfall（棚ぼた的な利益、意外な授かり物）」は、経済用語としてよく使われます。" },
        { sc: "【批判】相手の話が「中身がない（空虚だ）」と断じるとき。", tg: "議論の相手", p: 494, opts: [{ t: "Your argument is essentially vacuous and lacks empirical support.", d: "― 痛烈な知性批判", ok: true }, { t: "Your talk is empty.", d: "― 喧嘩腰", ok: false }, { t: "You have no data.", d: "― 表現が平易", ok: false }], h: "「Vacuous（空っぽの、中身のない）」は、知性の欠如を指す手厳しい上級語。" },
        { sc: "【ビジネス】協力体制が「非常に強固である」と述べるとき。", tg: "提携先", p: 495, opts: [{ t: "Our alliance is characterized by mutual trust and synergy.", d: "― 公式な関係性の強調", ok: true }, { t: "We are good partners.", d: "― 普通すぎる", ok: false }, { t: "We trust each other.", d: "― 感情的", ok: false }], h: "「Characterized by...（〜によって特徴づけられる）」という客観的な説明。" },
        { sc: "【教養】物事が「多面的」で複雑であることを認める。", tg: "知人", p: 496, opts: [{ t: "It’s a multifaceted issue that defies simple categorization.", d: "― 複雑さへの敬意", ok: true }, { t: "It is very complicated.", d: "― 普通すぎ", ok: false }, { t: "Many things are related.", d: "― 稚拙", ok: false }], h: "「Multifaceted（多面的な）」と「Defies（（分類などを）拒む、許さない）」という高度な語彙。" },
        { sc: "【ビジネス】「先見の明」があったことを、控えめに自慢するとき。", tg: "チーム", p: 497, opts: [{ t: "In retrospect, our prescience regarding this trend was accurate.", d: "― 知的な先見性の確認", ok: true }, { t: "I knew this would happen.", d: "― 傲慢に見える", ok: false }, { t: "We were right.", d: "― 普通すぎ", ok: false }], h: "「Prescience（先見の明）」という語を使うことで、単なる予想以上の知性を演出。" },
        { sc: "【ビジネス】部下の将来の成功を確信して送り出すとき。", tg: "部下", p: 498, opts: [{ t: "I have no doubt you will flourish in your new endeavor.", d: "― 高貴な激励", ok: true }, { t: "Good luck with your new job.", d: "― 定型句", ok: false }, { t: "Do your best there.", d: "― 普通", ok: false }], h: "「Flourish（栄える、活躍する）」と「Endeavor（（真剣な）試み、努力）」の組み合わせ。" },
        { sc: "【交渉】「互いに譲歩して解決しよう」と、外交的に誘う。", tg: "交渉相手", p: 499, opts: [{ t: "Let's seek a resolution that accommodates our respective priorities.", d: "― 高度な歩み寄りの提案", ok: true }, { t: "Let's both change a little.", d: "― 表現が平易すぎる", ok: false }, { t: "Meeting in the middle.", d: "― 慣用句だがカジュアル", ok: false }], h: "「Accommodate（（要望などを）収容する、適応させる）」は、外交交渉の重要語。" },
        { sc: "【総括】全ての経験を糧に、未来を展望する締めの挨拶。", tg: "スピーチ", p: 500, opts: [{ t: "Our collective journey has been arduous, but our vision remains undiminished.", d: "― 感動的で重厚な締め", ok: true }, { t: "The work was hard, but we are still happy.", d: "― 表現が乏しい", ok: false }, { t: "Let's keep going for our dream.", d: "― カジュアルすぎる", ok: false }], h: "「Arduous（困難な、骨の折れる）」と「Undiminished（衰えない）」で、不屈の精神を表現します。" },
        { sc: "【議論】議論を「根本的な原則」に立ち戻らせ、膠着状態を打破するとき。", tg: "参加者", p: 476, opts: [{ t: "Let's return to the first principles to resolve this impasse.", d: "― 哲学的・論理的な解決", ok: true }, { t: "Back to the start.", d: "― 表現が平易", ok: false }, { t: "Think simple.", d: "― 具体的でない", ok: false }], h: "「First principles（第一原理）」と「Impasse（袋小路）」の活用。" },
        { sc: "【ビジネス】相手の「懸念」を完全に、かつ穏やかに払拭したいとき。", tg: "クライアント", p: 477, opts: [{ t: "Allow me to assuage your fears regarding the project's timeline.", d: "― 穏やかな安心の付与", ok: true }, { t: "Don't worry about the time.", d: "― 軽すぎる", ok: false }, { t: "I will fix the time.", d: "― 意味がズレている", ok: false }], h: "「Assuage（（不安などを）なだめる）」は、相手に寄り添いつつ知性を見せる動詞。" },
        { sc: "【日常】相手の決断が「多大な勇気と不屈の精神」を要するものだと称える。", tg: "友人", p: 478, opts: [{ t: "The fortitude you’ve shown during this crisis is truly exemplary.", d: "― 精神的な強さを絶賛", ok: true }, { t: "You are very brave.", d: "― 表現が平易", ok: false }, { t: "Good job standing up.", d: "― カジュアルすぎる", ok: false }], h: "「Fortitude（不撓不屈）」と「Exemplary（模範的な）」という高貴な褒め言葉。" },
        { sc: "【ビジネス】「想定外の」利益や幸運な恩恵が出たことを報告するとき。", tg: "株主", p: 479, opts: [{ t: "We have realized a substantial windfall due to market shifts.", d: "― 幸運な利益の報告", ok: true }, { t: "We got extra money.", d: "― 露骨で稚拙", ok: false }, { t: "We are lucky.", d: "― プロらしくない", ok: false }], h: "「Windfall（棚ぼた的な利益）」は、経済・投資の文脈でよく使われます。" },
        { sc: "【批判】相手の話が「中身がなく空虚だ」と知的に断じるとき。", tg: "議論の相手", p: 480, opts: [{ t: "Your argument is essentially vacuous and lacks empirical support.", d: "― 痛烈な知性批判", ok: true }, { t: "Your talk is empty.", d: "― 喧嘩腰", ok: false }, { t: "You have no data.", d: "― 表現が平易", ok: false }], h: "「Vacuous（空っぽの）」は、知性の欠如を指す非常に手厳しい上級語。" },
        { sc: "【ビジネス】協力体制や提携が「非常に強固である」と公式に述べるとき。", tg: "提携先", p: 481, opts: [{ t: "Our alliance is characterized by mutual trust and synergy.", d: "― 公式な関係性の強調", ok: true }, { t: "We are good partners.", d: "― 普通すぎる", ok: false }, { t: "We trust each other.", d: "― 感情的", ok: false }], h: "「Characterized by...（〜によって特徴づけられる）」という客観的な説明様式。" },
        { sc: "【教養】物事が「多面的」で、単純な分類を許さない複雑さを持つと認める。", tg: "知人", p: 482, opts: [{ t: "It’s a multifaceted issue that defies simple categorization.", d: "― 複雑さへの敬意", ok: true }, { t: "It is very complicated.", d: "― 普通すぎ", ok: false }, { t: "Many things are related.", d: "― 稚拙", ok: false }], h: "「Multifaceted（多面的な）」と「Defies（（分類などを）拒む）」の高度な組み合わせ。" },
        { sc: "【ビジネス】自分の「先見の明」があったことを、知的に、かつ控えめに示唆する。", tg: "チーム", p: 483, opts: [{ t: "In retrospect, our prescience regarding this trend was accurate.", d: "― 知的な先見性の確認", ok: true }, { t: "I knew this would happen.", d: "― 傲慢に見える", ok: false }, { t: "We were right.", d: "― 普通すぎ", ok: false }], h: "「Prescience（先見の明）」という語が、単なる予想以上の知性を演出します。" },
        { sc: "【ビジネス】部下の将来の成功を心から確信し、新しい門出を祝うとき。", tg: "部下", p: 484, opts: [{ t: "I have no doubt you will flourish in your new endeavor.", d: "― 高貴な激励", ok: true }, { t: "Good luck with your new job.", d: "― 定型句", ok: false }, { t: "Do your best there.", d: "― 普通", ok: false }], h: "「Flourish（栄える、活躍する）」と「Endeavor（真剣な試み）」の組み合わせ。" },
        { sc: "【交渉】「互いの優先事項を尊重し、妥協点を見出そう」と外交的に誘う。", tg: "交渉相手", p: 485, opts: [{ t: "Let's seek a resolution that accommodates our respective priorities.", d: "― 高度な歩み寄りの提案", ok: true }, { t: "Let's both change a little.", d: "― 表現が平易すぎる", ok: false }, { t: "Meeting in the middle.", d: "― 慣用句だがカジュアル", ok: false }], h: "「Accommodate（（要望などを）調整して受け入れる）」は外交交渉の重要語。" },
        { sc: "【総括】全ての困難を糧に、不屈の精神で未来を展望する締めの挨拶。", tg: "スピーチ", p: 486, opts: [{ t: "Our collective journey has been arduous, but our vision remains undiminished.", d: "― 感動的で重厚な締め", ok: true }, { t: "The work was hard, but we are still happy.", d: "― 表現が乏しい", ok: false }, { t: "Let's keep going for our dream.", d: "― カジュアルすぎる", ok: false }], h: "「Arduous（困難な）」と「Undiminished（衰えない）」で、不屈の意思を表現。" },
        { sc: "【ビジネス】ある決定が、組織にとって「不可欠な（極めて重要な）」ものであるとき。", tg: "役員会", p: 487, opts: [{ t: "This strategic pivot is indispensable for our long-term viability.", d: "― 生き残りをかけた重要性の強調", ok: true }, { t: "We really need this.", d: "― 平易すぎる", ok: false }, { t: "This is a must.", d: "― カジュアル", ok: false }], h: "「Indispensable（不可欠な）」と「Viability（生存能力、実行可能性）」の活用。" },
        { sc: "【社交】相手の振る舞いが「非の打ち所がない」と最大限に褒める。", tg: "ホスト", p: 488, opts: [{ t: "Your hospitality has been absolutely impeccable.", d: "― 完璧さを称える洗練された語", ok: true }, { t: "Everything was perfect.", d: "― 普通", ok: false }, { t: "You are so nice.", d: "― 稚拙", ok: false }], h: "「Impeccable（欠点のない、完璧な）」は、マナーや仕事ぶりを褒める最高級の語。" },
        { sc: "【議論】相手の議論が「根拠に乏しい推測」に過ぎないと指摘する。", tg: "討論の相手", p: 489, opts: [{ t: "That conclusion seems based on pure conjecture rather than empirical data.", d: "― 客観的な批判", ok: true }, { t: "You are just guessing.", d: "― 直接的でトゲがある", ok: false }, { t: "Show me the evidence.", d: "― ぶっきらぼう", ok: false }], h: "「Conjecture（推測、憶測）」は、根拠の薄さを知的に指摘する語。" },
        { sc: "【ビジネス】市場や状況の「気まぐれさ（不安定さ）」を表現するとき。", tg: "投資家", p: 490, opts: [{ t: "We must remain agile to navigate the inherent volatility of the market.", d: "― 変動への対応力を強調", ok: true }, { t: "The market changes fast.", d: "― 平易すぎる", ok: false }, { t: "Be ready for ups and downs.", d: "― カジュアル", ok: false }], h: "「Volatility（揮発性、激しい変動）」は金融・ビジネスの最重要語彙の一つ。" },
        { sc: "【教養】相手の話が「非常に含蓄があり、深い」と感じたとき。", tg: "恩師・専門家", p: 491, opts: [{ t: "Your insights are profoundly nuanced and give much food for thought.", d: "― 深い理解への敬意", ok: true }, { t: "Your talk is very deep.", d: "― 稚拙", ok: false }, { t: "I'll think about it.", d: "― 事務的", ok: false }], h: "「Nuanced（微妙なニュアンスのある）」と「Food for thought（思考の糧）」の組み合わせ。" },
        { sc: "【批判】相手の態度が「慇懃無礼（表面だけ丁寧で失礼）」であると指摘する。", tg: "交渉相手", p: 492, opts: [{ t: "I find your patronizing tone rather counterproductive to our dialogue.", d: "― 高圧的な態度への牽制", ok: true }, { t: "Don't be rude.", d: "― 直接的すぎる", ok: false }, { t: "You think you are better than me.", d: "― 感情的", ok: false }], h: "「Patronizing（恩着せがましい、見下すような）」を指摘し、対等な関係を促します。" },
        { sc: "【ビジネス】困難な状況を切り抜けるための「打開策」を提示するとき。", tg: "経営陣", p: 493, opts: [{ t: "We need a paradigm shift to transcend these structural limitations.", d: "― 次元を変えた解決の提案", ok: true }, { t: "We need a new idea.", d: "― 普通", ok: false }, { t: "Let's try something different.", d: "― 弱い", ok: false }], h: "「Transcend（超越する）」は、既存の枠組みを超える際に使われる力強い語。" },
        { sc: "【日常】相手の親切に対して、感謝の言葉が見つからないほど感動したとき。", tg: "恩人", p: 494, opts: [{ t: "I am profoundly moved by your magnanimity.", d: "― 器の大きさを称える", ok: true }, { t: "Thank you so much.", d: "― 定型句", ok: false }, { t: "You are so kind.", d: "― 普通", ok: false }], h: "「Magnanimity（寛大さ、器の大きさ）」は、相手の人間性を称える最高級の語。" },
        { sc: "【ビジネス】新しい技術が、既存の産業を「根底から覆す」可能性を語る。", tg: "技術会議", p: 495, opts: [{ t: "This innovation has the potential to subvert established industry norms.", d: "― 破壊的変革の予見", ok: true }, { t: "This will change everything.", d: "― 抽象的すぎる", ok: false }, { t: "Old ways will die.", d: "― 言葉が汚い", ok: false }], h: "「Subvert（覆す、打倒する）」は、静かだが強力な変革を意味します。" },
        { sc: "【教養】対立する二つの概念が「密接に結びついている」と言うとき。", tg: "議論の場", p: 496, opts: [{ t: "These two concepts are inextricably linked within this framework.", d: "― 分離不能な関係の指摘", ok: true }, { t: "They are very close.", d: "― 稚拙", ok: false }, { t: "You can't separate them.", d: "― 普通", ok: false }], h: "「Inextricably（密接に、切り離せないほどに）」は論理的な結びつきを指す上級副詞。" },
        { sc: "【ビジネス】自身の決定が「熟考の末」のものであると強調するとき。", tg: "クライアント", p: 497, opts: [{ t: "This conclusion was reached after a period of deliberate contemplation.", d: "― 慎重な姿勢のアピール", ok: true }, { t: "I thought about it a lot.", d: "― 平易すぎる", ok: false }, { t: "I am sure about this.", d: "― 根拠が不明", ok: false }], h: "「Deliberate contemplation（深思熟考）」は、プロとしての責任感を示します。" },
        { sc: "【外交】膠着した交渉において、相手の面子を保ちつつ合意を促す。", tg: "交渉相手", p: 498, opts: [{ t: "Let us strive for a consensus that preserves our mutual dignity.", d: "― 双方の尊厳を重んじる提案", ok: true }, { t: "Don't be shy, let's agree.", d: "― 失礼", ok: false }, { t: "We both need a win.", d: "― カジュアル", ok: false }], h: "「Consensus（合意）」と「Preserves dignity（尊厳を保つ）」は、外交の基本姿勢。" },
        { sc: "【ビジネス】プロジェクトの成功が「確実である」と、強い確信を持って言う。", tg: "投資家", p: 499, opts: [{ t: "I am supremely confident in the efficacy of our new strategy.", d: "― 圧倒的な自信の表明", ok: true }, { t: "I'm sure it works.", d: "― 表現が軽い", ok: false }, { t: "Trust me, we will win.", d: "― 根拠がない", ok: false }], h: "「Supremely（至高に、最高に）」と「Efficacy（効力、有効性）」の組み合わせ。" },
        { sc: "【総括】未来に向けた、知的で希望に満ちた最後の言葉。", tg: "聴衆", p: 500, opts: [{ t: "May our future endeavors be guided by wisdom and unwavering resolve.", d: "― 崇高な志の表明", ok: true }, { t: "Let's do our best for the future.", d: "― 普通すぎ", ok: false }, { t: "I hope we succeed.", d: "― 願望のみ", ok: false }], h: "「Unwavering resolve（揺るぎない決意）」という、最上級の締めくくりです。" }
      ]
    };

    let st = { cb: 0, stp: 1 };
    let currentScore = 0;

    function nextQ() {
      document.getElementById("explanation").style.display = "none";
      document.getElementById("next-btn").style.display = "none";
      const ctn = document.getElementById("choices");
      ctn.innerHTML = "";

      const currentLv = Math.min(5, Math.floor((st.stp - 1) / 1) + 1); // 1問ごとにLvアップ
      const pool = quizData[`lv${currentLv}`] || quizData.lv1;
      let q = pool[Math.floor(Math.random() * pool.length)];
      
      document.getElementById("lv").innerText = currentLv;
      document.getElementById("cb").innerText = st.cb;
      document.getElementById("poke-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${q.p}.png`;
      document.getElementById("scene-box").innerHTML = `<strong>Lv.${currentLv} ${q.sc}</strong><br><ruby>相手<rt>あいて</rt></ruby>：${q.tg}`;

      q.opts.sort(() => Math.random() - 0.5).forEach(o => {
        const b = document.createElement("button");
        b.className = "choice-btn";
        b.innerHTML = `${o.t}<div class="desc">${o.d}</div>`;
        b.onclick = () => judge(o.ok, q.h);
        ctn.appendChild(b);
      });
    }

    function judge(ok, h) {
      document.querySelectorAll(".desc").forEach(d => d.style.display = "block");
      document.querySelectorAll(".choice-btn").forEach(b => b.onclick = null);
      const exp = document.getElementById("explanation");
      exp.style.display = "block";

      if (ok) {
        st.cb++; st.stp++;
        exp.innerHTML = `<strong>✨ <ruby>正解<rt>せいかい</rt></ruby>！</strong><br>${h}`;
        document.getElementById("next-btn").style.display = "inline-block";
      } else {
        currentScore = st.cb;
        openModal(currentScore);
        st.cb = 0;
        exp.innerHTML = `<strong>❌ <ruby>残念<rt>ざんねん</rt></ruby>！</strong><br>${h}`;
        document.getElementById("next-btn").style.display = "inline-block";
      }
      document.getElementById("cb").innerText = st.cb;
    }

    // モーダル操作
    function openModal(score) {
      document.getElementById("modal-score-title").innerHTML = `🏆 スコア: ${score}！`;
      document.getElementById("input-modal").style.display = "flex";
    }
    function closeModal() {
      document.getElementById("input-modal").style.display = "none";
    }
    function submitRank() {
      const name = document.getElementById("player-name-input").value || "ななしさん";
      const now = new Date();
      const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
      db.ref('formality').push({ name, score: currentScore, date: dateStr });
      closeModal();
    }

    function loadOnlineRank() {
      db.ref('formality').orderByChild('score').limitToLast(10).on('value', (snapshot) => {
        const list = document.getElementById("rank-list");
        const items = [];
        snapshot.forEach((child) => items.push(child.val()));
        items.reverse();
        list.innerHTML = items.map((r, i) => `<div class="rank-item"><span>${i+1}位: ${r.name} (${r.score}回)</span><span style="font-size:9px; color:#999;">${r.date}</span></div>`).join("");
      });
    }

    loadOnlineRank();
    nextQ();
  </script>
</body>
</html>
