<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>たんぶんマスター Pro+</title>
  <style>
    body { font-family: "Arial", sans-serif; background-color: #f0f4f8; text-align: center; padding: 10px; transition: 0.3s; }
    #level-display { font-size: 20px; color: #3498db; font-weight: bold; margin-bottom: 5px; }
    #passage-box {
      background: #fff; border: 4px solid #3498db; padding: 25px;
      margin: 15px auto; max-width: 600px; border-radius: 15px;
      text-align: left; line-height: 2.5; font-size: 21px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    #question-text { font-size: 20px; margin: 15px; font-weight: bold; color: #e67e22; min-height: 3em; display: flex; align-items: center; justify-content: center; }
    .choice {
      font-size: 18px; padding: 12px; margin: 8px auto;
      border-radius: 12px; border: 2px solid #bdc3c7;
      cursor: pointer; background-color: #fff; width: 95%; max-width: 500px;
      display: block; transition: 0.2s; font-weight: bold;
    }
    .choice:hover { background-color: #fef9e7; border-color: #f1c40f; }
    #explanation { background: #fdf2f2; border: 2px solid #e74c3c; padding: 15px; margin: 15px auto; max-width: 600px; border-radius: 10px; display: none; text-align: left; font-size: 16px; line-height: 1.8; }
    #pokemon-img { margin-top: 10px; width: 100px; height: 100px; border-radius: 50%; border: 4px solid #f1c40f; background: #fff; }
    #next-button { margin-top: 15px; padding: 12px 30px; font-size: 18px; background-color: #3498db; color: white; border: none; border-radius: 30px; cursor: pointer; display: none; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; pointer-events: none; }
    ruby rt { font-size: 0.5em; color: #34495e; }
  </style>
</head>
<body>
  <div id="version-info">Ver 2.7.0 | Updated: 2026-05-12</div>
  <h1>📖 たんぶんマスター</h1>
  <div id="level-display">レベル 1</div>

  <div id="passage-box"></div>
  <div id="question-text"></div>
  <div id="choices"></div>
  <div id="explanation"></div>
  
  <div id="result-area">
    <img id="pokemon-img" src="" alt="" style="display:none;">
  </div>
  
  <button id="next-button" onclick="generateQuestion()">つぎの問題へ</button>
  <br><br>
  <a href="index.html">← <ruby>戻<rt>もど</rt></ruby>る</a>

  <script>
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) { this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2); }
        else { this._note(200, 'sawtooth', now, 0.2); this._note(150, 'sawtooth', now + 0.2, 0.3); }
      }
    };

    let currentAns = "";

    const vocab = {
      who: [{h:"うさぎ",k:"うさぎ"}, {h:"おとこのこ",k:"<ruby>男<rt>おとこ</rt></ruby>の<ruby>子<rt>こ</rt></ruby>"}, {h:"りす",k:"リス"}, {h:"おうじさま",k:"<ruby>王子<rt>おうじ</rt></ruby><ruby>様<rt>さま</rt></ruby>"}],
      where: [{h:"もり",k:"<ruby>森<rt>もり</rt></ruby>"}, {h:"こうえん",k:"<ruby>公園<rt>こうえん</rt></ruby>"}, {h:"うみ",k:"<ruby>海<rt>うみ</rt></ruby>"}, {h:"おしろ",k:"お<ruby>城<rt>しろ</rt></ruby>"}],
      item: [{h:"きのみ",k:"<ruby>木<rt>き</rt></ruby>の<ruby>実<rt>み</rt></ruby>"}, {h:"ふうせん",k:"<ruby>風船<rt>ふうせん</rt></ruby>"}, {h:"てがみ",k:"<ruby>手紙<rt>てがみ</rt></ruby>"}, {h:"おたから",k:"お<ruby>宝<rt>たから</rt></ruby>"}],
      villain: ["ライオン", "きつね", "おおかみ", "かいじゅう"]
    };

    function generateQuestion() {
      document.getElementById("explanation").style.display = "none";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("choices").innerHTML = "";

      const getV = (key) => vocab[key][Math.floor(Math.random() * vocab[key].length)].k || vocab[key][Math.floor(Math.random() * vocab[key].length)];
      const w = getV("who"), l = getV("where"), i = getV("item");
      const w2 = vocab.who.map(x=>x.k).find(x=>x!==w);
      const v = vocab.villain[Math.floor(Math.random() * vocab.villain.length)];

      let passage = "", question = "", explanation = "", options = [];
      const pattern = Math.floor(Math.random() * 5);

      switch(pattern) {
        case 0: // 順序
          passage = `${w}は ${l}で ${i}を <ruby>拾<rt>ひろ</rt></ruby>いました。そのあと、それを ${w2}に あげました。`;
          question = `${w}は ${i}を <ruby>拾<rt>ひろ</rt></ruby>ったあと、どうしましたか？`;
          currentAns = `${w2}に あげた`;
          options = [currentAns, "<ruby>自分<rt>じぶん</rt></ruby>で<ruby>食<rt>た</rt></ruby>べた", "<ruby>地面<rt>じめん</rt></ruby>にうめた"];
          explanation = "「そのあと」という<ruby>言葉<rt>ことば</rt></ruby>のあとに<ruby>答<rt>こた</rt></ruby>えが<ruby>書<rt>か</rt></ruby>いてあります。";
          break;
        case 1: // 否定
          passage = `${l}には ${w}と ${w2}が います。ふたりは ${i}を <ruby>探<rt>さが</rt></ruby>しています。`;
          question = `${l}に **いない** のは だれですか？`;
          currentAns = v; 
          options = [currentAns, w, w2];
          explanation = `<ruby>文章<rt>ぶんしょう</rt></ruby>のなかに<ruby>名前<rt>なまえ</rt></ruby>が<ruby>出<rt>で</rt></ruby>てこない「${v}」を<ruby>選<rt>えら</rt></ruby>びましょう。`;
          break;
        case 2: // 指示語
          passage = `${w}は ${l}へ <ruby>走<rt>はし</rt></ruby>っていきました。**あそこ**には <ruby>大切<rt>たいせつ</rt></ruby>な ${i}が あるからです。`;
          question = "<ruby>文<rt>ぶん</rt></ruby>のなかの **「あそこ」** とは どこを さしていますか？";
          currentAns = l;
          options = [l, "<ruby>自分<rt>じぶん</rt></ruby>の<ruby>家<rt>いえ</rt></ruby>", "ひみつの<ruby>場所<rt>ばしょ</rt></ruby>"];
          explanation = `「あそこ」は、<ruby>直前<rt>ちょくぜん</rt></ruby>に<ruby>出<rt>で</rt></ruby>てきた<ruby>場所<rt>ばしょ</rt></ruby>（${l}）のことですね。`;
          break;
        case 3: // 理由
          passage = `${w}は ${i}を なくしてしまいました。<ruby>一生懸命<rt>いっしょうけんめい</rt></ruby>さがしましたが <ruby>見<rt>み</rt></ruby>つからないので、<ruby>泣<rt>な</rt></ruby>き<ruby>出<rt>だ</rt></ruby>してしまいました。`;
          question = `${w}が <ruby>泣<rt>な</rt></ruby>き<ruby>出<rt>だ</rt></ruby>してしまったのは なぜですか？`;
          currentAns = `${i}が <ruby>見<rt>み</rt></ruby>つからないから`;
          options = [currentAns, "おなかが すいたから", "<ruby>転<rt>ころ</rt></ruby>んで<ruby>痛<rt>いた</rt></ruby>かったから"];
          explanation = "「〜ので」の<ruby>前<rt>まえ</rt></ruby>の<ruby>部分<rt>ぶぶん</rt></ruby>が、<ruby>泣<rt>な</rt></ruby>いてしまった<ruby>理由<rt>りゆう</rt></ruby>です。";
          break;
        case 4: // 内容一致（バリエーション追加）
          const scenario = Math.random() > 0.5;
          if(scenario) {
            passage = `${w}は ${l}に ${i}を <ruby>忘<rt>わす</rt></ruby>れてきてしまいました。でも、${w}は「また<ruby>明日取<rt>あしたと</rt></ruby>りに<ruby>行<rt>い</rt></ruby>けばいいや」と<ruby>笑<rt>わら</rt></ruby>っています。`;
            question = "お<ruby>話<rt>はなし</rt></ruby>の<ruby>内容<rt>ないよう</rt></ruby>と **あっているもの** は どれですか？";
            currentAns = `${w}は あまり <ruby>困<rt>こま</rt></ruby>っていない`;
            options = [currentAns, `${w}は <ruby>泣<rt>な</rt></ruby>いている`, `${i}は <ruby>盗<rt>ぬす</rt></ruby>まれた` ];
            explanation = "「<ruby>笑<rt>わら</rt></ruby>っています」という<ruby>言葉<rt>ことば</rt></ruby>から、いまの<ruby>様子<rt>ようす</rt></ruby>を<ruby>想像<rt>そうぞう</rt></ruby>してみましょう。";
          } else {
            passage = `${w}は ${l}で ${i}を <ruby>見<rt>み</rt></ruby>つけました。とても きれいだったので、${w}は <ruby>宝物<rt>たからもの</rt></ruby>にすることにしました。`;
            question = "お<ruby>話<rt>はなし</rt></ruby>の<ruby>内容<rt>ないよう</rt></ruby>と **あっているもの** は どれですか？";
            currentAns = `${w}は ${i}を <ruby>大切<rt>たいせつ</rt></ruby>にすることにした`;
            options = [currentAns, `${w}は ${i}を すてた`, `${w}は ${i}が <ruby>嫌<rt>きら</rt></ruby>いだった` ];
            explanation = "「<ruby>宝物<rt>たからもの</rt></ruby>にする」というのは、<ruby>大切<rt>たいせつ</rt></ruby>にするということですね。";
          }
          break;
      }

      document.getElementById("passage-box").innerHTML = passage;
      document.getElementById("question-text").innerHTML = `<ruby>問題<rt>もんだい</rt></ruby>：${question}`;
      
      options.sort(() => Math.random() - 0.5).forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerHTML = opt;
        btn.onclick = () => checkAnswer(opt, explanation);
        document.getElementById("choices").appendChild(btn);
      });
    }

    function checkAnswer(selected, exp) {
      document.getElementById("choices").innerHTML = "";
      const expBox = document.getElementById("explanation");
      expBox.style.display = "block";

      if (selected === currentAns) {
        Buzzer.play(true);
        expBox.innerHTML = `<strong>✨ せいかい！</strong><br>${exp}`;
        const pokeId = Math.floor(Math.random() * 151) + 1;
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeId}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
      } else {
        Buzzer.play(false);
        expBox.innerHTML = `<strong>❌ ざんねん！ <ruby>正解<rt>せいかい</rt></ruby>は「${currentAns}」</strong><br>${exp}`;
      }
      document.getElementById("next-button").style.display = "inline";
    }

    window.onload = generateQuestion;
  </script>
</body>
</html>
