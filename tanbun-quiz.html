<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>たんぶんクイズ</title>
  <style>
    body {
      font-family: "Arial", sans-serif;
      background-color: #fff3e0;
      text-align: center;
      padding: 20px;
      transition: background-color 0.3s;
    }
    h1 { color: #e65100; margin-bottom: 5px; }
    #level-display { font-size: 18px; color: #f57c00; font-weight: bold; margin-bottom: 10px; }
    
    /* 文章を表示する箱 */
    #passage-box {
      background: #fff;
      border: 3px solid #ffb74d;
      padding: 20px;
      margin: 15px auto;
      max-width: 600px;
      border-radius: 15px;
      text-align: left;
      line-height: 1.8;
      font-size: 18px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    #question-text { font-size: 20px; margin: 15px; font-weight: bold; color: #333; }
    
    .choice {
      font-size: 17px; padding: 15px 20px; margin: 8px;
      border-radius: 10px; border: 2px solid #ffb74d;
      cursor: pointer; background-color: #fff;
      width: 90%; max-width: 500px;
      display: block; margin-left: auto; margin-right: auto;
      transition: 0.2s;
    }
    .choice:hover { background-color: #fff9c4; }
    
    /* 正解演出 */
    @keyframes correct-anim {
      0%, 40%, 80% { background-color: #c8e6c9; }
      20%, 60%, 100% { background-color: #fff3e0; }
    }
    .correct-flash { animation: correct-anim 1.2s ease-in-out; }

    #pokemon-img {
      margin-top: 10px; width: 120px; height: 120px;
      background: #fff; border-radius: 50%; border: 4px solid #ffeb3b;
    }
    .poke-pop { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
    @keyframes bounceIn {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }

    #next-button {
      margin-top: 15px; padding: 12px 30px; font-size: 18px;
      background-color: #4caf50; color: white; border: none; border-radius: 30px;
      cursor: pointer; display: none;
    }
    #status { margin: 10px; font-size: 16px; color: #555; }
    #version-info {
      position: fixed; bottom: 10px; right: 10px; font-size: 10px;
      color: #90a4ae; background: rgba(255, 255, 255, 0.5); padding: 2px 5px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="version-info">Ver 1.0.0 | Updated: 2026-05-10 12:00</div>
  
  <h1>📖 たんぶんクイズ</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">ただいま 0もん れんぞくせいかい！</div>

  <div id="passage-box">文章をよみこんでいます...</div>
  <div id="question-text"></div>
  
  <div id="choices"></div>
  
  <div id="result" style="font-size: 20px; margin-top: 10px; color: #2e7d32; font-weight: bold; white-space: pre-line;"></div>
  <img id="pokemon-img" src="" alt="" style="display:none;">
  <div id="pokemon-info" style="font-size: 18px; font-weight: bold; color: #e91e63;"></div>
  
  <button id="next-button" onclick="newQuestion()">つぎのもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへもどる</a>

  <script>
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbz5p2qedT5CAxNXmd5NGUjNh0oivxDW1PcaDCf-AM2aVwHyfQf-VPJktVPDOqRek9A-/exec";
    
    // 電子音生成
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration, endFreq) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, start + duration);
        gain.gain.setValueAtTime(0.1, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(pattern) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (pattern === 'correct') {
          this._note(880, 'sine', now, 0.1, 1320);
          this._note(880, 'sine', now + 0.2, 0.1, 1320);
        } else {
          this._note(200, 'sawtooth', now, 0.3, 100);
          this._note(200, 'sawtooth', now + 0.4, 0.3, 100);
        }
      }
    };

    // クイズデータ（学齢に合わせた難易度別）
    const quizData = {
      1: [
        { passage: "おじいさんが かぶを うえました。「あまい あまい かぶになれ。大きな 大きな かぶになれ。」と いいました。", question: "おじいさんは 何を うえましたか？", choices: ["だいこん", "かぶ", "にんじん"], answer: "かぶ", pokeId: 1, reason: "フシギダネも 植物（しょくぶつ）の たねを せ負っているよ！" }
      ],
      2: [
        { passage: "ひょうじゅうが きたとき、ごんはおどろいて、一ぴきのいたちを ふりすてて にげだしました。", question: "ごんは 何を すてて にげましたか？", choices: ["くり", "まつたけ", "いたち"], answer: "いたち", pokeId: 37, reason: "ごんぎつねと 同じ、きつねの ポケモンだよ！" }
      ],
      3: [
        { passage: "小さな かにの 子供らが、青じろい 水の底で お話ししていました。「クラムボンは わらったよ。」「クラムボンは かぷかぷ わらったよ。」", question: "クラムボンは どのように わらいましたか？", choices: ["にこにこ", "わっはっは", "かぷかぷ"], answer: "かぷかぷ", pokeId: 98, reason: "かにの 子供といえば クラブ（クラブ）だね！" }
      ],
      4: [
        { passage: "メロスは激怒した。必ず、かの邪智暴虐の王を除かなければならぬと決意した。メロスには政治がわからぬ。メロスは、村の牧人である。", question: "メロスの 本職（ほんしょく）は 何ですか？", choices: ["王さま", "牧人（羊飼い）", "政治家"], answer: "牧人（羊飼い）", pokeId: 179, reason: "羊の メリープの お世話を しているかも！？" }
      ],
      5: [
        { passage: "ある日の事でございます。御釈迦様は極楽の蓮池のふちを、独りでぶらぶら御歩きになっていらっしゃいました。池の中に咲いている蓮の花は、みんな玉のように真っ白でございます。", question: "お釈迦様が 歩いていたのは どこですか？", choices: ["蓮池（はすいけ）のふち", "地獄（じごく）の底", "村の 広場"], answer: "蓮池（はすいけ）のふち", pokeId: 493, reason: "すべてを はじめた 神さまのような ポケモン！" }
      ]
    };

    let currentLevel = 1;
    let correctStreak = 0;
    let currentQuestion;

    async function fetchPokemonName(number) {
      try {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${number}`);
        const data = await response.json();
        return data.names.find(n => n.language.name === "ja")?.name || "ポケモン";
      } catch { return "ポケモン"; }
    }

    function newQuestion() {
      // レベル決定ロジック
      if (correctStreak < 5) {
        currentLevel = correctStreak + 1;
      } else {
        currentLevel = Math.floor(Math.random() * 5) + 1;
      }

      const questions = quizData[currentLevel];
      currentQuestion = questions[Math.floor(Math.random() * questions.length)];

      document.getElementById("level-display").textContent = `レベル ${currentLevel}`;
      document.getElementById("passage-box").textContent = currentQuestion.passage;
      document.getElementById("question-text").textContent = currentQuestion.question;
      document.getElementById("result").textContent = "";
      document.getElementById("pokemon-info").textContent = "";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("next-button").style.display = "none";
      
      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      currentQuestion.choices.sort(() => Math.random() - 0.5).forEach(val => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = val;
        btn.onclick = () => {
          if (Buzzer.ctx.state === 'suspended') Buzzer.ctx.resume();
          checkAnswer(val);
        };
        choicesDiv.appendChild(btn);
      });
    }

    async function checkAnswer(selected) {
      document.getElementById("choices").innerHTML = "";
      if (selected === currentQuestion.answer) {
        correctStreak++;
        Buzzer.play('correct');
        document.body.classList.add("correct-flash");
        setTimeout(() => document.body.classList.remove("correct-flash"), 1200);

        const pokeName = await fetchPokemonName(currentQuestion.pokeId);
        document.getElementById("result").textContent = "せいかい！ よく よめたね！";
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${currentQuestion.pokeId}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
        document.getElementById("pokemon-img").classList.add("poke-pop");
        document.getElementById("pokemon-info").textContent = `${pokeName} を ゲット！\n（${currentQuestion.reason}）`;
        
        if (correctStreak === 5) {
          markCleared();
          document.getElementById("result").innerHTML += `<br><b style="color:red;">🎉 5もんクリア！マスターモードに なったよ！</b>`;
        }
      } else {
        correctStreak = 0;
        Buzzer.play('wrong');
        document.getElementById("result").textContent = `ざんねん！ 正解は 「${currentQuestion.answer}」 だよ。`;
      }
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
      document.getElementById("next-button").style.display = "inline";
    }

    function markCleared() {
      localStorage.setItem("cleared-tanbun-quiz", "true");
      fetch(WEBHOOK_URL, {
        method: "POST", mode: 'no-cors',
        body: JSON.stringify({ name: "なぎ", stage: "こくご：たんぶんクイズ", score: correctStreak, date: new Date().toLocaleString() })
      });
    }

    window.onload = newQuestion;
  </script>
</body>
</html>
