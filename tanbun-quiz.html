<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>たんぶんマスター</title>
  <style>
    body { font-family: "Arial", sans-serif; background-color: #f0f4f8; text-align: center; padding: 20px; transition: 0.3s; }
    #level-display { font-size: 20px; color: #3498db; font-weight: bold; margin-bottom: 5px; }
    #status { font-size: 16px; color: #7f8c8d; margin-bottom: 15px; }
    #passage-box {
      background: #fff; border: 4px solid #3498db; padding: 25px;
      margin: 15px auto; max-width: 650px; border-radius: 15px;
      text-align: left; line-height: 2.2; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      min-height: 120px;
    }
    #question-text { font-size: 22px; margin: 20px; font-weight: bold; color: #e67e22; }
    .choice {
      font-size: 18px; padding: 15px; margin: 10px auto;
      border-radius: 12px; border: 2px solid #bdc3c7;
      cursor: pointer; background-color: #fff; width: 90%; max-width: 500px;
      display: block; transition: 0.2s; font-weight: bold;
    }
    .choice:hover { background-color: #fef9e7; border-color: #f1c40f; }
    #explanation {
      background: #fdf2f2; border: 2px solid #e74c3c; padding: 15px;
      margin: 15px auto; max-width: 600px; border-radius: 10px;
      display: none; text-align: left; font-size: 16px; line-height: 1.6;
    }
    #pokemon-img { margin-top: 10px; width: 110px; height: 110px; border-radius: 50%; border: 4px solid #f1c40f; background: #fff; }
    #next-button {
      margin-top: 20px; padding: 15px 40px; font-size: 18px;
      background-color: #3498db; color: white; border: none; border-radius: 30px; cursor: pointer; display: none;
    }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>
</head>
<body>
  <div id="version-info">Ver 2.3.1 | Updated: 2026-05-10 17:03</div>
  <h1>📖 たんぶんマスター</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">あと 5問正解でマスターモード！</div>

  <div id="passage-box"></div>
  <div id="question-text"></div>
  <div id="choices"></div>
  <div id="explanation"></div>
  
  <div id="result-area">
    <img id="pokemon-img" src="" alt="" style="display:none;">
    <div id="pokemon-info" style="font-weight: bold; margin-top:10px;"></div>
  </div>
  
  <button id="next-button" onclick="generateQuestion()">つぎの問題へ</button>
  <br><br>
  <a href="index.html">← TOPへもどる</a>

  <script>
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) {
          this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2);
        } else {
          this._note(200, 'sawtooth', now, 0.2); this._note(150, 'sawtooth', now + 0.2, 0.3);
        }
      }
    };

    let level = 1;
    let correctStreak = 0;
    let currentAns = "";

    const vocab = {
      who: [
        { h: "うさぎ", k: "うさぎ" }, { h: "おとこのこ", k: "男（おとこ）の子（こ）" },
        { h: "あり", k: "アリ" }, { h: "おんなのこ", k: "女（おんな）の子（こ）" },
        { h: "りす", k: "リス" }, { h: "おうじさま", k: "王子（おうじ）様（さま）" }
      ],
      where: [
        { h: "くさむら", k: "草（くさ）むら" }, { h: "もり", k: "森（もり）" },
        { h: "うみ", k: "海（うみ）" }, { h: "おしろ", k: "お城（しろ）" },
        { h: "こうえん", k: "公園（こうえん）" }
      ],
      item: [
        { h: "あめ", k: "あめ" }, { h: "きのみ", k: "木（き）の実（み）" },
        { h: "ふうせん", k: "風船（ふうせん）" }, { h: "おたから", k: "お宝（たから）" },
        { h: "てがみ", k: "手紙（てがみ）" }
      ],
      feel: ["うれしい", "かなしい", "びっくりした", "わくわくした"]
    };

    function generateQuestion() {
      document.getElementById("explanation").style.display = "none";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("pokemon-info").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("choices").innerHTML = "";

      let curLv = (correctStreak >= 5) ? Math.floor(Math.random() * 10) + 1 : level;
      const mode = (curLv <= 3) ? "h" : "k";
      const getV = (key) => vocab[key][Math.floor(Math.random() * vocab[key].length)][mode];

      let passage = "";
      let question = "";
      let explanation = "";
      let options = [];

      const w = getV("who"), l = getV("where"), i = getV("item"), f = vocab.feel[Math.floor(Math.random()*4)];

      if (curLv <= 3) {
        // Lv1-3: 短い記述から特定
        passage = `${l}に、${w}が いました。${w}は ${i}を もっていました。`;
        const qType = Math.random() > 0.5;
        if(qType) {
          question = `${w}は どこに いましたか？`;
          currentAns = l;
          options = [l, "空の上", "家の中"];
          explanation = `文章の最初の方に「${l}に」と書いてありますね。`;
        } else {
          question = `${w}は 何を もっていましたか？`;
          currentAns = i;
          options = [i, "ぼうし", "お花"];
          explanation = `文章の最後に「${i}を もっていました」と書いてあります。`;
        }
      } else if (curLv <= 7) {
        // Lv4-7: 接続詞（ので・でも）
        const reasons = ["お腹がすいた", "道で見つけた", "友達にあげたい"];
        const r = reasons[Math.floor(Math.random()*reasons.length)];
        passage = `${w}は ${l}で ${i}を 見つけました。 ${r}ので、${w}は ${f} 気持ちになりました。`;
        
        const qType = Math.random() > 0.5;
        if(qType) {
          question = `${w}が ${f} 気持ちになったのは なぜですか？`;
          currentAns = `${r}から`;
          options = [currentAns, "天気がよかったから", "走ったから"];
          explanation = `「〜ので」の前の部分に、その時の理由が書いてありますよ。`;
        } else {
          question = `${w}は どこで ${i}を 見つけましたか？`;
          currentAns = l;
          options = [l, "学校", "山の上"];
          explanation = `「${l}で」という場所の言葉を探してみよう。`;
        }
      } else {
        // Lv8-10: 逆接と詳細読解
        passage = `${w}は ${l}へ ${i}を 届けに行こうとしました。しかし、途中で雨が降ってきたため、近くの洞窟（どうくつ）で休むことにしました。${w}は「少し残念だ」とつぶやきました。`;
        
        const qType = Math.random() > 0.5;
        if(qType) {
          question = `${w}は 最終的に どこで 休むことにしましたか？`;
          currentAns = "洞窟（どうくつ）";
          options = ["洞窟（どうくつ）", l, "自分の家"];
          explanation = `「しかし」の後の展開を読みましょう。「洞窟で休むことにした」とあります。`;
        } else {
          question = `${w}は どうして 洞窟で休むことにしたのですか？`;
          currentAns = "雨が降ってきたため";
          options = ["雨が降ってきたため", "疲れたため", "道に迷ったため"];
          explanation = `「〜ため」という言葉に注目すると、理由がわかります。`;
        }
      }

      document.getElementById("passage-box").textContent = passage;
      document.getElementById("question-text").textContent = question;
      document.getElementById("level-display").textContent = `レベル ${curLv}`;
      document.getElementById("status").textContent = (correctStreak >= 5) ? "マスターモード！" : `あと ${5 - correctStreak}問正解でレベルアップ！`;

      options.sort(() => Math.random() - 0.5).forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, explanation);
        document.getElementById("choices").appendChild(btn);
      });
    }

    async function checkAnswer(selected, exp) {
      document.getElementById("choices").innerHTML = "";
      const expBox = document.getElementById("explanation");
      expBox.style.display = "block";

      if (selected === currentAns) {
        correctStreak++;
        if (level < 10 && correctStreak < 5) level++;
        Buzzer.play(true);
        expBox.innerHTML = `<strong>✨ せいかい！ 正解のヒント：</strong><br>${exp}`;
        
        const pokeId = Math.floor(Math.random() * 151) + 1;
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeId}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
      } else {
        correctStreak = 0;
        level = 1;
        Buzzer.play(false);
        expBox.innerHTML = `<strong>❌ ざんねん！ 正解は「${currentAns}」</strong><br>${exp}`;
      }
      document.getElementById("next-button").style.display = "inline";
    }

    window.onload = generateQuestion;
  </script>
</body>
</html>
