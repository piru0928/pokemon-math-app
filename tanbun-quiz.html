<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>たんぶんマスター Pro+</title>
  <style>
    body { font-family: "Arial", sans-serif; background-color: #f0f4f8; text-align: center; padding: 10px; }
    #passage-box {
      background: #fff; border: 4px solid #3498db; padding: 25px;
      margin: 15px auto; max-width: 600px; border-radius: 15px;
      text-align: left; line-height: 2.5; font-size: 21px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    #question-text { font-size: 20px; margin: 15px; font-weight: bold; color: #e67e22; min-height: 3em; }
    .choice {
      font-size: 18px; padding: 12px; margin: 8px auto;
      border-radius: 12px; border: 2px solid #bdc3c7;
      cursor: pointer; background-color: #fff; width: 95%; max-width: 500px;
      display: block; font-weight: bold;
    }
    #explanation { background: #fdf2f2; border: 2px solid #e74c3c; padding: 15px; margin: 15px auto; max-width: 600px; border-radius: 10px; display: none; text-align: left; }
    #pokemon-img { margin-top: 10px; width: 100px; height: 100px; border-radius: 50%; border: 4px solid #f1c40f; background: #fff; }
    #next-button { margin-top: 15px; padding: 12px 30px; font-size: 18px; background-color: #3498db; color: white; border: none; border-radius: 30px; cursor: pointer; display: none; }
    ruby rt { font-size: 0.5em; color: #34495e; }
  </style>
</head>
<body>
  <h1>📖 たんぶんマスター</h1>
  <div id="passage-box"></div>
  <div id="question-text"></div>
  <div id="choices"></div>
  <div id="explanation"></div>
  <div id="result-area"><img id="pokemon-img" src="" alt="" style="display:none;"></div>
  <button id="next-button" onclick="generateQuestion()">つぎの問題へ</button>
  <br><br>
  <a href="index.html">← <ruby>戻<rt>もど</rt></ruby>る</a>

  <script>
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        const now = this.ctx.currentTime;
        if (correct) { this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2); }
        else { this._note(200, 'sawtooth', now, 0.3); }
      }
    };

    let currentAns = "";

    const vocab = {
      who: ["うさぎ", "<ruby>王子<rt>おうじ</rt></ruby><ruby>様<rt>さま</rt></ruby>", "リス", "<ruby>男<rt>おとこ</rt></ruby>の<ruby>子<rt>こ</rt></ruby>", "くまさん", "おひめさま"],
      where: ["<ruby>森<rt>もり</rt></ruby>", "<ruby>公園<rt>こうえん</rt></ruby>", "お<ruby>城<rt>しろ</rt></ruby>", "<ruby>砂場<rt>すなば</rt></ruby>", "お<ruby>庭<rt>にわ</rt></ruby>"],
      item: ["<ruby>木<rt>き</rt></ruby>の<ruby>実<rt>み</rt></ruby>", "お<ruby>宝<rt>たから</rt></ruby>", "<ruby>風船<rt>ふうせん</rt></ruby>", "<ruby>帽子<rt>ぼうし</rt></ruby>", "お<ruby>花<rt>はな</rt></ruby>"],
      actions: [
        { text: "に あげました", q: "に あげた" },
        { text: "を きれいに <ruby>洗<rt>あら</rt></ruby>いました", q: "を <ruby>洗<rt>あら</rt></ruby>った" },
        { text: "を <ruby>地面<rt>じめん</rt></ruby>に <ruby>隠<rt>かく</rt></ruby>しました", q: "を <ruby>隠<rt>かく</rt></ruby>した" },
        { text: "を お<ruby>部屋<rt>へや</rt></ruby>に <ruby>飾<rt>かざ</rt></ruby>りました", q: "を <ruby>飾<rt>かざ</rt></ruby>った" }
      ],
      reasons: [
        { state: "なくしてしまった", cause: "<ruby>見<rt>み</rt></ruby>つからないので", react: "<ruby>泣<rt>な</rt></ruby>きだしました", ans: "が <ruby>見<rt>み</rt></ruby>つからないから" },
        { state: "たくさん <ruby>遊<rt>あそ</rt></ruby>んだ", cause: "おなかが すいたので", react: "おやつを <ruby>食<rt>た</rt></ruby>べました", ans: "おなかが すいたから" },
        { state: "いっぱい <ruby>歩<rt>ある</rt></ruby>いた", cause: "足が つかれたので", react: "おやすみなさいと <ruby>言<rt>い</rt></ruby>いました", ans: "足が つかれたから" },
        { state: "プレゼントを もらった", cause: "とても うれしかったので", react: "ぴょんぴょん <ruby>跳<rt>は</rt></ruby>ねました", ans: "うれしかったから" }
      ]
    };

    function generateQuestion() {
      document.getElementById("explanation").style.display = "none";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("choices").innerHTML = "";

      const getR = (arr) => arr[Math.floor(Math.random() * arr.length)];
      const w = getR(vocab.who), l = getR(vocab.where), i = getR(vocab.item);
      
      let passage, question, explanation, options;
      const pattern = Math.floor(Math.random() * 3);

      if (pattern === 0) { // 行動順序
        const w2 = vocab.who.filter(x => x !== w)[0];
        const act = getR(vocab.actions);
        passage = `${w}は ${l}で ${i}を <ruby>拾<rt>ひろ</rt></ruby>いました。そのあと、それ${act.text.includes('あげ') ? w2 + act.text : act.text}。`;
        question = `${w}は ${i}を <ruby>拾<rt>ひろ</rt></ruby>ったあと、どうしましたか？`;
        currentAns = act.text.includes('あげ') ? `${w2}に あげた` : act.q;
        options = [currentAns, "<ruby>自分<rt>じぶん</rt></ruby>で<ruby>食<rt>た</rt></ruby>べた", "どこかに すてた"];
        explanation = "「そのあと」のうしろに、なにをしたか書いてありますね。";
      } else if (pattern === 1) { // 理由
        const res = getR(vocab.reasons);
        passage = `${w}は ${res.state === "なくしてしまった" ? i + "を " + res.state : res.state}。${res.cause}、${res.react}。`;
        question = `${w}が ${res.react.replace(/ました$/, '')}のは なぜですか？`;
        currentAns = res.ans.includes('見つからない') ? i + res.ans : res.ans;
        options = [currentAns, "<ruby>宿題<rt>しゅくだい</rt></ruby>が いやだから", "おばけが こわいから"];
        explanation = "「〜ので」のまえの言葉が、そのあとの行動の「りゆう」になっています。";
      } else { // 否定（いないのはだれ？）
        const w2 = vocab.who.filter(x => x !== w)[1];
        const v = ["かいじゅう", "おおかみ", "どろぼう"][Math.floor(Math.random()*3)];
        passage = `${l}には ${w}と ${w2}が います。ふたりで たのしく お話を しています。`;
        question = `${l}に **いない** のは だれですか？`;
        currentAns = v;
        options = [v, w, w2];
        explanation = "お話の中に出てこなかった名前をえらびましょう。";
      }

      document.getElementById("passage-box").innerHTML = passage;
      document.getElementById("question-text").innerHTML = `<ruby>問題<rt>もんだい</rt></ruby>：${question}`;
      options.sort(() => Math.random() - 0.5).forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerHTML = opt;
        btn.onclick = () => checkAnswer(opt, explanation);
        document.getElementById("choices").appendChild(btn);
      });
    }

    function checkAnswer(selected, exp) {
      document.getElementById("choices").innerHTML = "";
      const expBox = document.getElementById("explanation");
      expBox.style.display = "block";
      if (selected === currentAns) {
        Buzzer.play(true);
        expBox.innerHTML = `<strong>✨ せいかい！</strong><br>${exp}`;
        const pokeId = Math.floor(Math.random() * 151) + 1;
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeId}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
      } else {
        Buzzer.play(false);
        expBox.innerHTML = `<strong>❌ ざんねん！ 正解は「${currentAns}」</strong><br>${exp}`;
      }
      document.getElementById("next-button").style.display = "inline";
    }

    window.onload = generateQuestion;
  </script>
</body>
</html>
