<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>たんぶんマスター</title>
  <style>
    body { font-family: "Arial", sans-serif; background-color: #f0f4f8; text-align: center; padding: 20px; }
    h1 { color: #2c3e50; }
    #level-display { font-size: 20px; color: #3498db; font-weight: bold; margin-bottom: 10px; }
    #status { font-size: 16px; color: #7f8c8d; margin-bottom: 20px; }
    
    #passage-box {
      background: #fff; border: 4px solid #3498db; padding: 25px;
      margin: 15px auto; max-width: 650px; border-radius: 15px;
      text-align: left; line-height: 2; font-size: 19px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    #question-text { font-size: 21px; margin: 20px; font-weight: bold; color: #2c3e50; }
    
    .choice {
      font-size: 17px; padding: 15px; margin: 10px auto;
      border-radius: 12px; border: 2px solid #bdc3c7;
      cursor: pointer; background-color: #fff; width: 90%; max-width: 500px;
      display: block; transition: 0.2s;
    }
    .choice:hover { background-color: #ebf5fb; border-color: #3498db; }
    
    #explanation {
      background: #e8f8f5; border: 2px solid #2ecc71; padding: 15px;
      margin: 15px auto; max-width: 600px; border-radius: 10px;
      display: none; text-align: left; font-size: 16px; line-height: 1.6;
    }

    #pokemon-img { margin-top: 10px; width: 110px; height: 110px; border-radius: 50%; border: 4px solid #f1c40f; background: #fff; }
    .correct-flash { animation: flash 1s ease-in-out; }
    @keyframes flash { 0%, 100% { background-color: #f0f4f8; } 50% { background-color: #d4efdf; } }

    #next-button {
      margin-top: 20px; padding: 15px 40px; font-size: 18px;
      background-color: #2ecc71; color: white; border: none; border-radius: 30px; cursor: pointer; display: none;
    }

    /* バージョン情報の表示スタイル（国名クイズと統一） */
    #version-info {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 10px;
      color: #90a4ae;
      background: rgba(255, 255, 255, 0.5);
      padding: 2px 5px;
      border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="version-info">Ver 2.0.1 | Updated: 2026-05-10 12:20</div>

  <h1>📖 たんぶんマスター</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">あと 10問正解でレベルアップ！</div>

  <div id="passage-box"></div>
  <div id="question-text"></div>
  <div id="choices"></div>
  
  <div id="explanation"></div>
  
  <div id="result-area" style="margin-top: 20px;">
    <img id="pokemon-img" src="" alt="" style="display:none;">
    <div id="pokemon-info" style="font-weight: bold; color: #e74c3c;"></div>
  </div>
  
  <button id="next-button" onclick="generateQuestion()">つぎの問題へ！</button>
  <br><br>
  <a href="index.html">← TOPへもどる</a>

  <script>
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.1, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) {
          // 正解：キラキラ×2風
          this._note(660, 'sine', now, 0.1); 
          this._note(880, 'sine', now + 0.15, 0.2);
        } else {
          // 不正解：ガッカリ風
          this._note(150, 'sawtooth', now, 0.2); 
          this._note(100, 'sawtooth', now + 0.25, 0.4);
        }
      }
    };

    let level = 1;
    let currentStreak = 0;
    let currentAns = "";

    const parts = {
      who: ["ピカチュウ", "小さな女の子", "森のクマさん", "お腹をすかせたキツネ", "勇敢な騎士", "不思議なロボット"],
      action: ["走っていました", "眠っていました", "パンを食べていました", "手紙を書いていました", "歌を歌っていました"],
      where: ["公園のベンチで", "深い森の中で", "静かな図書館で", "雲の上にあるお城で", "海の底の学校で"],
      item: ["赤い風船", "不思議な地図", "大きなケーキ", "光る石", "古いカメラ"],
      feel: ["うれしそうでした", "驚いていました", "少し悲しそうでした", "わくわくしていました"]
    };

    function generateQuestion() {
      document.getElementById("explanation").style.display = "none";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("pokemon-info").textContent = "";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("choices").innerHTML = "";

      let passage = "";
      let question = "";
      let options = [];
      let explanation = "";
      
      const who = parts.who[Math.floor(Math.random() * parts.who.length)];
      const action = parts.action[Math.floor(Math.random() * parts.action.length)];
      const where = parts.where[Math.floor(Math.random() * parts.where.length)];
      const item = parts.item[Math.floor(Math.random() * parts.item.length)];
      const feel = parts.feel[Math.floor(Math.random() * parts.feel.length)];

      if (level <= 3) {
        passage = `${where}、${who}が ${action}。`;
        question = `${who}は どこに いましたか？`;
        currentAns = where;
        options = [where, "空の上", "家の中"];
        explanation = `「${where}」と最初に書いてありますね。場所（ばしょ）にちゅうもくして読めたかな？`;
      } else if (level <= 7) {
        passage = `${who}は ${where}で ${item}を 見つけました。${who}は とても ${feel}。`;
        question = `${who}は どんな 気持ち（きもち）でしたか？`;
        currentAns = feel;
        options = [feel, "怒っていました", "眠そうでした"];
        explanation = `最後（さいご）に「${feel}」と書いてあります。${who}のようすをあらわす言葉（ことば）を見つけられたね！`;
      } else {
        passage = `${where}で ${action} ${who}は、${item}を 手にとり、「これは大切なものだ」と つぶやきながら ${feel}。`;
        question = `${who}が 手にとったものは 何（なに）で、どんな様子（ようす）でしたか？`;
        currentAns = `${item}で ${feel}`;
        options = [`${item}で ${feel}`, `カメラで 怒っている`, `${item}で 眠っている`];
        explanation = `「${item}を 手にとり」と「${feel}」という2つの情報をくみあわせて考える問題だよ。`;
      }

      document.getElementById("passage-box").textContent = passage;
      document.getElementById("question-text").textContent = question;
      document.getElementById("level-display").textContent = `レベル ${level}`;
      document.getElementById("status").textContent = `あと ${10 - currentStreak}問正解でレベルアップ！`;

      options.sort(() => Math.random() - 0.5).forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, explanation);
        document.getElementById("choices").appendChild(btn);
      });
    }

    async function checkAnswer(selected, expText) {
      document.getElementById("choices").innerHTML = "";
      const expBox = document.getElementById("explanation");
      expBox.style.display = "block";

      if (selected === currentAns) {
        currentStreak++;
        Buzzer.play(true);
        document.body.classList.add("correct-flash");
        setTimeout(() => document.body.classList.remove("correct-flash"), 1000);
        
        expBox.innerHTML = `<strong>✨ せいかい！</strong><br>${expText}`;
        
        const pokeId = Math.floor(Math.random() * 151) + 1;
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeId}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
        document.getElementById("pokemon-img").classList.add("poke-pop");

        if (currentStreak >= 10) {
          if (level < 10) level++;
          currentStreak = 0;
          alert("レベルアップ！ おめでとう！");
        }
      } else {
        currentStreak = 0;
        Buzzer.play(false);
        expBox.innerHTML = `<strong>❌ ざんねん！ 正解は「${currentAns}」だよ。</strong><br>${expText}`;
      }
      
      document.getElementById("next-button").style.display = "inline";
    }

    window.onload = generateQuestion;
  </script>
</body>
</html>
