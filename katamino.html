<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KATAMINO-カタミノ-</title>
    <style>
        body { background-color: #fdf6e3; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; }
        #game-container { background: #fff; padding: 20px; border-radius: 30px; border: 5px solid #ffcb05; margin-top: 20px; text-align: center; }
        #board { display: grid; gap: 1px; background: #ddd; border: 3px solid #333; margin: 20px auto; }
        .cell { width: 30px; height: 30px; background: #fff; }
        #pieces-area { display: flex; justify-content: center; gap: 10px; margin: 20px; height: 60px; }
        .piece { width: 50px; height: 50px; background: #448aff; cursor: grab; border-radius: 8px; }
        .btn { padding: 10px 20px; border: none; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; margin: 5px; }
        #confetti { position: fixed; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>KATAMINO-カタミノ-</h1>
    <div id="status">レベル 1</div>
    <div id="pieces-area"></div>
    <div id="board"></div>
    <div>
        <button class="btn" style="background:#33cc33" onclick="checkAnswer()">回答合わせ</button>
        <button class="btn" style="background:#ff4500" onclick="giveUp()">ギブアップ</button>
        <button class="btn" style="background:#aaa" onclick="location.reload()">戻る</button>
    </div>
    <div style="font-size:12px; color:#888; margin-top:10px;">Version 1.3.0</div>
</div>

<script>
    let level = 1;
    const board = document.getElementById('board');
    const piecesArea = document.getElementById('pieces-area');

    function initLevel() {
        // レベル10を超えたらランダム
        const currentLevel = level > 10 ? Math.floor(Math.random() * 10) + 1 : level;
        document.getElementById('status').innerText = `レベル ${level} (現在: ${currentLevel})`;
        
        // ボード生成
        const cols = 3 + (currentLevel - 1);
        board.style.gridTemplateColumns = `repeat(${cols}, 30px)`;
        board.innerHTML = '';
        for(let i=0; i<cols * 5; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.ondragover = (e) => e.preventDefault();
            cell.ondrop = (e) => cell.classList.add('filled');
            board.appendChild(cell);
        }

        // ピース生成
        piecesArea.innerHTML = '';
        for(let i=0; i<currentLevel; i++) {
            const p = document.createElement('div');
            p.className = 'piece';
            p.draggable = true;
            piecesArea.appendChild(p);
        }
    }

    function checkAnswer() {
        alert("🎉 ポケモンゲット！おめでとう！ ✨");
        level++;
        initLevel();
    }

    function giveUp() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            setTimeout(() => cell.style.backgroundColor = '#ff9d5e', i * 50);
        });
    }

    initLevel();
</script>
</body>
</html>
