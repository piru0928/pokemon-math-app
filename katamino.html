<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>カタミノ Ver 6.0.0</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#ffcb05;--blue:#3b5bdb;--red:#e03131;
  --bg:#fdf6e3;--card:#fff;--text:#1a1a2e;
  --cs:40px;
}
html,body{
  background:var(--bg);font-family:'Nunito','Arial',sans-serif;
  height:100%;overflow-x:hidden;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
body{
  display:flex;flex-direction:column;align-items:center;
  padding:4px 0 12px;min-height:100%;
  touch-action:pan-y;
}
.top-bar{width:100%;max-width:520px;display:flex;align-items:center;padding:4px 12px;gap:8px;flex-shrink:0;}
.back-btn{text-decoration:none;font-size:12px;font-weight:800;color:var(--text);background:var(--yellow);border:2px solid var(--text);border-radius:16px;padding:2px 10px;-webkit-tap-highlight-color:transparent;}
.ver{font-size:10px;color:#aaa;margin-left:auto;}

#gc{
  background:var(--card);border:4px solid var(--yellow);border-radius:24px;
  width:100%;max-width:520px;padding:10px 12px 16px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.08);flex-shrink:0;
}

/* ===== タイトル ===== */
#title-row{
  position:relative;display:flex;align-items:center;justify-content:center;
  height:56px;margin-bottom:6px;
}
h1{font-size:20px;font-weight:900;color:var(--text);line-height:1;}
h1 span{color:var(--yellow);-webkit-text-stroke:1px var(--text);}
/* 左右で走るアニメ */
@keyframes runL{0%,100%{transform:translateX(0) scaleX(1)}50%{transform:translateX(4px) scaleX(1)}}
@keyframes runR{0%,100%{transform:translateX(0) scaleX(-1)}50%{transform:translateX(-4px) scaleX(-1)}}
.pk-side.left  .pk-sprite{animation:runL 0.55s ease-in-out infinite;}
.pk-side.right .pk-sprite{animation:runR 0.55s ease-in-out infinite;}

#sb{display:flex;justify-content:space-between;align-items:center;background:#f0f4ff;border:2px solid #c5cae9;border-radius:10px;padding:5px 12px;margin-bottom:8px;}
#lv-lbl{font-size:14px;font-weight:900;color:var(--blue);}
#ar-lbl,#pc-lbl{font-size:11px;font-weight:700;color:#555;}

#hint{background:#fffde7;border:2px dashed var(--yellow);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:#666;margin-bottom:8px;line-height:1.6;}

/* ===== パレット ===== */
#palette{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:8px;min-height:40px;}
.pcard{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:#f8f9ff;border:2px solid #c5cae9;border-radius:8px;
  padding:5px 5px 4px;
  touch-action:none;cursor:grab;
  -webkit-tap-highlight-color:transparent;
  transition:box-shadow .1s,border-color .1s;
  position:relative;
}
.pcard:active{box-shadow:0 4px 14px rgba(0,0,0,.18);}
.pcard.drag-src{opacity:.3;}
/* 短押しで回転するヒント */
.pcard::after{
  content:'タップ→回転';position:absolute;bottom:-16px;
  font-size:8px;color:#aaa;font-weight:700;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .2s;
}
.pcard:hover::after{opacity:1;}
.pmini{display:grid;gap:1px;pointer-events:none;}
.pm{width:12px;height:12px;border-radius:2px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.2);}
.pm-e{background:transparent!important;box-shadow:none!important;}

/* ===== ボード + ポケモン ===== */
#bwrap{display:flex;justify-content:center;margin-bottom:8px;overflow:visible;}
#board{display:grid;border:3px solid #333;border-radius:6px;background:#b0b8e8;gap:2px;padding:2px;touch-action:none;}
.cell{background:#eef0ff;border-radius:4px;transition:background .06s;}
.cell.placed{border-radius:2px;}
.cell.can{background:#c8e6c9!important;}
.cell.cant{background:#ffcdd2!important;}

.pk-side{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;
}
.pk-side.left{left:0;}
.pk-side.right{right:0;}

.pk-sprite{
  width:100px;height:100px;image-rendering:pixelated;
  object-fit:contain;display:none; /* ロード後に表示 */
}

/* ===== ゴースト ===== */
#ghost{
  position:fixed;pointer-events:none;z-index:9999;
  display:none;gap:1px;
}
.gm{border-radius:3px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25);}
.gm-e{background:transparent!important;box-shadow:none!important;}

/* ===== ボタン ===== */
.brow{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
.btn{padding:7px 14px;border:2px solid #333;border-radius:16px;cursor:pointer;font-weight:800;font-size:12px;font-family:'Nunito',sans-serif;box-shadow:0 3px 0 rgba(0,0,0,.15);transition:transform .1s,box-shadow .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
.b-ok{background:#33cc33;color:#fff;}.b-rs{background:#90caf9;color:#333;}.b-gv{background:#ff4500;color:#fff;}

#msg{min-height:24px;font-size:12px;font-weight:800;margin:6px 0 0;border-radius:8px;padding:3px 8px;}
#msg.ok{background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7;}
#msg.ng{background:#ffebee;color:#c62828;border:2px solid #ef9a9a;}
#msg.info{background:#fffde7;color:#f57f17;border:2px solid #ffe082;}
.footer{font-size:10px;color:#bbb;margin-top:6px;}

/* ===== 正解オーバーレイ ===== */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;}
#ov.show{display:flex;}
#ovc{background:#fff;border:4px solid var(--yellow);border-radius:24px;padding:22px 28px;text-align:center;max-width:280px;width:90%;animation:pop .45s cubic-bezier(.175,.885,.32,1.275);}
#ovc h2{font-size:24px;margin-bottom:2px;}
#ov-pk{height:90px;image-rendering:pixelated;margin:4px auto;display:block;animation:bounce .5s ease-in-out infinite alternate;}
#ov-msg{font-size:13px;color:#555;margin-bottom:14px;font-weight:700;}
#ov-stars{font-size:26px;letter-spacing:3px;margin-bottom:6px;}

.confetti{position:fixed;pointer-events:none;z-index:400;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}80%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.shake{animation:shake .35s ease;}
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="index.html">⬅ もどる</a>
  <span class="ver">Ver 6.0.0</span>
</div>
<div id="gc">
  <!-- タイトル行　-->
  <div id="title-row">
    <h1>🧩 <span>カタミノ</span></h1>
  </div>

  <div id="sb">
    <span id="lv-lbl">Level 1</span>
    <span id="ar-lbl">エリア: ?×5</span>
    <span id="pc-lbl">ピース: ?個</span>
  </div>
  <div id="hint">ドラッグで置く・タップで回転！<br>枠からはみ出して置いてもOK 👌</div>
  <div id="palette"></div>
  <div id="bwrap">
    <div class="pk-side left"><img class="pk-sprite" id="pk-l" src="" alt=""></div>
    <div id="board"></div>
    <div class="pk-side right"><img class="pk-sprite" id="pk-r" src="" alt=""></div>
  </div>
  <div class="brow">
    <button class="btn b-ok" onclick="checkAnswer()">✅ 回答する</button>
    <button class="btn b-rs" onclick="resetBoard()">🔄 リセット</button>
    <button class="btn b-gv" onclick="giveUp()">🏳 ギブアップ</button>
  </div>
  <div id="msg"></div>
  <div class="footer">カタミノ Ver 6.0.0</div>
</div>
<div id="ghost" style="display:none;"></div>
<div id="ov"><div id="ovc">
  <div id="ov-stars">⭐⭐⭐</div>
  <h2>🎉 せいかい！</h2>
  <img id="ov-pk" src="" alt="" style="display:none;">
  <p id="ov-msg"></p>
  <button class="btn b-ok" onclick="nextLevel()" style="font-size:14px;padding:10px 20px;">つぎへ ➡</button>
</div></div>

<script>
// ============================================================
// ペンタミノ全12種
// ============================================================
const PENTS=[
  {name:'F',color:'#e74c3c',shape:[[0,1],[0,2],[1,0],[1,1],[2,1]]},
  {name:'I',color:'#3498db',shape:[[0,0],[1,0],[2,0],[3,0],[4,0]]},
  {name:'L',color:'#e67e22',shape:[[0,0],[1,0],[2,0],[3,0],[3,1]]},
  {name:'J',color:'#c0392b',shape:[[0,1],[1,1],[2,1],[3,0],[3,1]]},
  {name:'N',color:'#9b59b6',shape:[[0,1],[1,0],[1,1],[2,0],[3,0]]},
  {name:'P',color:'#1abc9c',shape:[[0,0],[0,1],[1,0],[1,1],[2,0]]},
  {name:'T',color:'#e91e63',shape:[[0,0],[0,1],[0,2],[1,1],[2,1]]},
  {name:'U',color:'#f39c12',shape:[[0,0],[0,2],[1,0],[1,1],[1,2]]},
  {name:'V',color:'#27ae60',shape:[[0,0],[1,0],[2,0],[2,1],[2,2]]},
  {name:'W',color:'#2980b9',shape:[[0,0],[1,0],[1,1],[2,1],[2,2]]},
  {name:'Y',color:'#8e44ad',shape:[[0,1],[1,0],[1,1],[2,1],[3,1]]},
  {name:'Z',color:'#16a085',shape:[[0,0],[0,1],[1,1],[2,1],[2,2]]},
];

// ============================================================
// 形状ユーティリティ
// ============================================================
function normalize(s){
  const mr=Math.min(...s.map(([r])=>r)),mc=Math.min(...s.map(([,c])=>c));
  return s.map(([r,c])=>[r-mr,c-mc]);
}
function rot90(s){
  const mr=Math.max(...s.map(([r])=>r));
  return normalize(s.map(([r,c])=>[c,mr-r]));
}
function shapeKey(s){return normalize(s.map(p=>[...p])).map(p=>p.join()).sort().join('|');}
function allRots(shape){
  const seen=new Set(),res=[];
  let cur=normalize(shape.map(p=>[...p]));
  for(let i=0;i<4;i++){
    const k=shapeKey(cur);
    if(!seen.has(k)){seen.add(k);res.push(cur.map(p=>[...p]));}
    cur=rot90(cur);
  }
  return res;
}
function getBounds(s){return{R:Math.max(...s.map(([r])=>r))+1,C:Math.max(...s.map(([,c])=>c))+1};}
function getCurrentShape(idx){
  let s=pieces[idx].def.shape.map(p=>[...p]);
  for(let i=0;i<pieces[idx].rotation;i++) s=rot90(s);
  return normalize(s);
}

// ============================================================
// ソルバー（バックトラッキング）
// ============================================================
function solve(ROWS,COLS,defs,timeLimit=1500){
  const board=Array.from({length:ROWS},()=>Array(COLS).fill(-1));
  const used=Array(defs.length).fill(false);
  const deadline=Date.now()+timeLimit;
  function firstEmpty(){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]===-1)return[r,c];
    return null;
  }
  function canP(shape,br,bc){
    return shape.every(([dr,dc])=>{
      const nr=br+dr,nc=bc+dc;
      return nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1;
    });
  }
  function pl(shape,br,bc,i){shape.forEach(([dr,dc])=>{board[br+dr][bc+dc]=i;});}
  function upl(shape,br,bc){shape.forEach(([dr,dc])=>{board[br+dr][bc+dc]=-1;});}
  function bt(){
    if(Date.now()>deadline)return false;
    const pos=firstEmpty();
    if(!pos)return true;
    const[r,c]=pos;
    for(let i=0;i<defs.length;i++){
      if(used[i])continue;
      used[i]=true;
      for(const rot of allRots(defs[i].shape)){
        for(const[dr,dc]of rot){
          const adj=rot.map(([a,b])=>[a-dr,b-dc]);
          if(canP(adj,r,c)){pl(adj,r,c,i);if(bt())return true;upl(adj,r,c);}
        }
      }
      used[i]=false;
    }
    return false;
  }
  return bt()?board.map(row=>[...row]):null;
}

// ============================================================
// 問題生成
// ============================================================
const LEVEL_N=[3,3,4,4,5,5,6,7,8,9];

function generateProblem(n){
  for(let attempt=0;attempt<40;attempt++){
    const pool=[...PENTS];
    for(let i=pool.length-1;i>0;i--){const j=0|Math.random()*(i+1);[pool[i],pool[j]]=[pool[j],pool[i]];}
    const defs=pool.slice(0,n);
    if(defs.filter(d=>d.name==='I').length>1)continue;
    const sol=solve(5,n,defs,1500);
    if(sol)return{defs,sol};
  }
  // フォールバック: 既知解セット
  const FB=[
    ['P','V','Z'],['P','V','Z','L'],['P','V','Z','L','I'],
    ['P','V','Z','L','I','N'],['P','V','Z','L','I','N','T'],
    ['P','V','Z','L','I','N','T','W'],['P','V','Z','L','I','N','T','W','F'],
    ['P','V','Z','L','I','N','T','W','F','U'],
  ];
  const names=FB[Math.min(n-3,FB.length-1)];
  const defs=names.map(nm=>PENTS.find(p=>p.name===nm));
  const sol=solve(5,n,defs,3000);
  if(sol)return{defs,sol};
  // 究極フォールバック（Iの縦置き）
  const idefs=Array.from({length:n},()=>PENTS[1]);
  const isol=Array.from({length:5},(_,r)=>Array.from({length:n},(_,c)=>c));
  return{defs:idefs,sol:isol};
}

// ============================================================
// セルサイズ計算
// ============================================================
function calcCS(cols){
  const vw=window.innerWidth,vh=window.innerHeight;
  const maxW=Math.min(vw-24,520-28);
  const csW=Math.floor((maxW-4-(cols-1)*2)/cols);
  // 縦方向の余裕 (topbar36 + gc-padding20 + title62 + sb42 + hint50 + palette58 + brow44 + msg30 + footer26 + gap*5)
  const used=36+20+62+42+50+58+44+30+26+30;
  const csH=Math.floor((vh-used-4-8)/5);
  return Math.max(22,Math.min(csW,csH,48));
}

// ============================================================
// グローバル状態
// ============================================================
const ROWS=5;
let level=1,COLS=3,CS=36;
let pieces=[],boardState=[],solutionBoard=null;
let pokeSpriteUrl='';

// ドラッグ状態
let dragIdx=null,dragPointerId=null;
// ゴーストのどのセルを掴んだか（ピース内座標）
let dragGrabR=0,dragGrabC=0;

// ============================================================
// 初期化
// ============================================================
function initLevel(){
  const lv=Math.min(level,LEVEL_N.length);
  COLS=LEVEL_N[lv-1];
  CS=calcCS(COLS);
  document.documentElement.style.setProperty('--cs',CS+'px');

  const{defs,sol}=generateProblem(COLS);
  solutionBoard=sol;
  pieces=defs.map((def,i)=>{
    const solCells=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(sol[r][c]===i)solCells.push([r,c]);
    return{def,rotation:0,placed:false,solCells};
  });
  boardState=Array.from({length:ROWS},()=>Array(COLS).fill(-1));
  dragIdx=null;dragPointerId=null;

  document.getElementById('lv-lbl').textContent=`Level ${level}`;
  document.getElementById('ar-lbl').textContent=`エリア: ${COLS}×${ROWS}`;
  document.getElementById('pc-lbl').textContent=`ピース: ${COLS}個`;

  renderBoard();renderPalette();setMsg('','');
  loadPokemon();
}

// ============================================================
// PokeAPI（2体：左右に表示）
// ============================================================
async function loadPokemon(){
  const ids=[
    Math.floor(Math.random()*151)+1,
    Math.floor(Math.random()*151)+1,
  ];
  const imgIds=['pk-l','pk-r'];
  const ovImg=document.getElementById('ov-pk');

  for(let i=0;i<2;i++){
    try{
      const d=await(await fetch(`https://pokeapi.co/api/v2/pokemon/${ids[i]}`)).json();
      const url=d.sprites.front_default;
      if(!url)continue;
      if(i===0)pokeSpriteUrl=url;
      const img=document.getElementById(imgIds[i]);
      img.onload=()=>{img.style.display='block';};
      img.src=url;
    }catch{}
  }
  // オーバーレイ用（最初の1体）
  if(pokeSpriteUrl){ovImg.src=pokeSpriteUrl;ovImg.style.display='block';}
}

// ============================================================
// ボード描画
// ============================================================
function renderBoard(){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${COLS},${CS}px)`;
  board.style.gridTemplateRows=`repeat(${ROWS},${CS}px)`;
  board.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const el=document.createElement('div');
    el.className='cell';
    el.style.width=el.style.height=CS+'px';
    el.dataset.r=r;el.dataset.c=c;
    const pi=boardState[r][c];
    if(pi!==-1){el.style.background=pieces[pi].def.color;el.classList.add('placed');}
    board.appendChild(el);
  }
}

// ============================================================
// パレット描画
// ============================================================
function renderPalette(){
  const pal=document.getElementById('palette');
  pal.innerHTML='';
  pieces.forEach((piece,idx)=>{
    if(piece.placed)return;
    const shape=getCurrentShape(idx);
    const{R,C}=getBounds(shape);
    const card=document.createElement('div');
    card.className='pcard';
    card.dataset.idx=idx;

    const grid=document.createElement('div');
    grid.className='pmini';
    grid.style.gridTemplateColumns=`repeat(${C},12px)`;
    grid.style.gridTemplateRows=`repeat(${R},12px)`;
    for(let r=0;r<R;r++)for(let c=0;c<C;c++){
      const mc=document.createElement('div');
      mc.className=shape.some(([sr,sc])=>sr===r&&sc===c)?'pm':'pm pm-e';
      if(shape.some(([sr,sc])=>sr===r&&sc===c))mc.style.background=piece.def.color;
      grid.appendChild(mc);
    }
    card.appendChild(grid);

    // ---- ポインタイベントで「短押し=回転」「長押し/ドラッグ=ドラッグ」 ----
    let pressTimer=null;
    let didDrag=false;

    card.addEventListener('pointerdown',e=>{
      e.preventDefault();
      didDrag=false;
      // 300ms以上 or ある程度動いたらドラッグ開始
      pressTimer=setTimeout(()=>{
        pressTimer=null;
        beginDrag(idx,e.pointerId,e.clientX,e.clientY);
        didDrag=true;
      },300);
    },{passive:false});

    card.addEventListener('pointermove',e=>{
      if(pressTimer===null&&!didDrag)return;
      // 5px以上動いたら即ドラッグ開始
      if(pressTimer!==null){
        clearTimeout(pressTimer);pressTimer=null;
        beginDrag(idx,e.pointerId,e.clientX,e.clientY);
        didDrag=true;
      }
    },{passive:false});

    card.addEventListener('pointerup',e=>{
      if(pressTimer!==null){
        clearTimeout(pressTimer);pressTimer=null;
        // 短押し → 回転
        pieces[idx].rotation=(pieces[idx].rotation+1)%4;
        renderPalette();
      }
    },{passive:false});

    card.addEventListener('pointercancel',e=>{
      if(pressTimer!==null){clearTimeout(pressTimer);pressTimer=null;}
    },{passive:false});

    pal.appendChild(card);
  });
}

// ============================================================
// ゴースト
// ============================================================
function buildGhost(idx){
  const ghost=document.getElementById('ghost');
  const shape=getCurrentShape(idx);
  const{R,C}=getBounds(shape);
  ghost.style.gridTemplateColumns=`repeat(${C},${CS}px)`;
  ghost.style.gridTemplateRows=`repeat(${R},${CS}px)`;
  ghost.innerHTML='';
  ghost.style.display='grid';
  ghost.style.opacity='0.75';
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const mc=document.createElement('div');
    const filled=shape.some(([sr,sc])=>sr===r&&sc===c);
    mc.className=filled?'gm':'gm gm-e';
    mc.style.width=mc.style.height=CS+'px';
    if(filled)mc.style.background=pieces[idx].def.color;
    ghost.appendChild(mc);
  }
}
function posGhost(cx,cy){
  // 掴んだセル(dragGrabR,dragGrabC)がポインタ位置になるよう配置
  const ghost=document.getElementById('ghost');
  ghost.style.left=(cx-dragGrabC*CS-CS/2)+'px';
  ghost.style.top =(cy-dragGrabR*CS-CS/2)+'px';
}
function hideGhost(){
  const g=document.getElementById('ghost');
  g.style.display='none';g.innerHTML='';
}

// ============================================================
// ドラッグ開始
// ============================================================
function beginDrag(idx,pointerId,cx,cy){
  if(dragIdx!==null)return;
  dragIdx=idx;dragPointerId=pointerId;

  // 掴んだ位置からピース内セル座標を推定
  // パレット上のカードの位置は取れないので (0,0) を基点にする
  dragGrabR=0;dragGrabC=0;

  if(pieces[idx].placed){
    // ボードから持ち上げる場合：ポインタがどのセルの上にあるか
    const{r,c}=boardXY(cx,cy);
    const shape=getCurrentShape(idx);
    if(r>=0){
      // ピース内でのオフセットを求める
      const minR=Math.min(...shape.map(([sr])=>sr));
      const minC=Math.min(...shape.map(([,sc])=>sc));
      // boardState[r][c]===idx なら r,c はピースの一部
      // ピース全体の左上から見たr,cの相対位置
      const pieceCells=[];
      for(let pr=0;pr<ROWS;pr++)for(let pc=0;pc<COLS;pc++)if(boardState[pr][pc]===idx)pieceCells.push([pr,pc]);
      if(pieceCells.length){
        const pr0=Math.min(...pieceCells.map(([pr])=>pr));
        const pc0=Math.min(...pieceCells.map(([,pc])=>pc));
        dragGrabR=r-pr0;
        dragGrabC=c-pc0;
      }
    }
    removePieceFromBoard(idx);
    renderBoard();
  }
  buildGhost(idx);
  posGhost(cx,cy);
  setMsg('','');
}

// ============================================================
// ハイライト
// ============================================================
function clearHL(){document.querySelectorAll('#board .cell.can,.cell.cant').forEach(el=>el.classList.remove('can','cant'));}

function highlight(cx,cy){
  clearHL();
  if(dragIdx===null)return;
  const{r,c}=boardXY(cx,cy);
  if(r<0)return;
  const shape=getCurrentShape(dragIdx);
  // 掴んだセルオフセットで基点計算
  const br=r-dragGrabR,bc=c-dragGrabC;
  // ボード内に1マスでも重なるか確認
  const boardCells=shape.map(([dr,dc])=>[br+dr,bc+dc]);
  const anyInBoard=boardCells.some(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS);
  if(!anyInBoard)return;
  const ok=canPlaceAt(shape,br,bc);
  boardCells.forEach(([nr,nc])=>{
    const el=document.querySelector(`#board .cell[data-r="${nr}"][data-c="${nc}"]`);
    if(el)el.classList.add(ok?'can':'cant');
  });
}

function boardXY(cx,cy){
  const rect=document.getElementById('board').getBoundingClientRect();
  const x=cx-rect.left-2,y=cy-rect.top-2;
  const cw=(rect.width-4)/COLS,ch=(rect.height-4)/ROWS;
  const c=Math.floor(x/cw),r=Math.floor(y/ch);
  if(r<0||r>=ROWS||c<0||c>=COLS)return{r:-1,c:-1};
  return{r,c};
}

// ============================================================
// 配置可能判定（枠外マスは「ボードにはないが邪魔しない」→ ボード内のみチェック）
// ============================================================
function canPlaceAt(shape,br,bc){
  return shape.every(([dr,dc])=>{
    const nr=br+dr,nc=bc+dc;
    // ボード外のセルは無条件OK（はみ出し許容）
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return true;
    // ボード内は空きチェック
    return boardState[nr][nc]===-1;
  });
}

// ============================================================
// ドロップ
// ============================================================
function doDrop(cx,cy){
  if(dragIdx===null)return;
  clearHL();
  const{r,c}=boardXY(cx,cy);
  // ボード上に全くないならパレットに戻す
  const shape=getCurrentShape(dragIdx);
  let placed=false;

  if(r>=0){
    const br=r-dragGrabR,bc=c-dragGrabC;
    // ボード内に少なくとも1セルある & 配置可能
    const boardCells=shape.map(([dr,dc])=>[br+dr,bc+dc]);
    const anyInBoard=boardCells.some(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS);
    if(anyInBoard&&canPlaceAt(shape,br,bc)){
      // ボード内のセルだけ配置（はみ出した分は無視）
      boardCells.forEach(([nr,nc])=>{
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)boardState[nr][nc]=dragIdx;
      });
      pieces[dragIdx].placed=true;
      placed=true;
      renderBoard();
      setMsg('','');
      if(pieces.every(p=>p.placed))setTimeout(checkAnswer,100);
    } else if(anyInBoard){
      setMsg('そこには置けないよ！','ng');
    }
  }

  dragIdx=null;dragPointerId=null;
  hideGhost();
  renderPalette();
}

// ============================================================
// グローバルポインタイベント
// ============================================================
document.addEventListener('pointermove',e=>{
  if(dragIdx===null||e.pointerId!==dragPointerId)return;
  e.preventDefault();
  posGhost(e.clientX,e.clientY);
  highlight(e.clientX,e.clientY);
},{passive:false,capture:true});

document.addEventListener('pointerup',e=>{
  if(dragIdx===null||e.pointerId!==dragPointerId)return;
  e.preventDefault();
  doDrop(e.clientX,e.clientY);
},{passive:false,capture:true});

document.addEventListener('pointercancel',e=>{
  if(dragIdx===null||e.pointerId!==dragPointerId)return;
  dragIdx=null;dragPointerId=null;hideGhost();clearHL();renderPalette();
},{capture:true});

// ボード上の配置済みピースをドラッグ
document.getElementById('board').addEventListener('pointerdown',e=>{
  if(dragIdx!==null)return;
  const cell=e.target.closest('.cell');
  if(!cell)return;
  const r=parseInt(cell.dataset.r),c=parseInt(cell.dataset.c);
  const pi=boardState[r][c];
  if(pi===-1)return;
  e.preventDefault();e.stopPropagation();
  beginDrag(pi,e.pointerId,e.clientX,e.clientY);
  renderPalette();
},{passive:false});

// ============================================================
// ピース除去
// ============================================================
function removePieceFromBoard(idx){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(boardState[r][c]===idx)boardState[r][c]=-1;
  pieces[idx].placed=false;
}

// ============================================================
// 回答チェック
// ============================================================
function checkAnswer(){
  // 枠からはみ出した場合、ボード内のマスが全部埋まっていれば正解
  // （ただしそのピースはボード内に全部収まっている必要はない設計）
  // → 正解条件: 全boardStateが-1なし かつ 全ピースplaced
  if(!pieces.every(p=>p.placed)){setMsg('まだ置いていないピースがあるよ！','info');return;}
  if(boardState.some(row=>row.some(v=>v===-1))){setMsg('あいているマスがあるよ！','ng');return;}
  showClear();
}

// ============================================================
// 正解演出
// ============================================================
function showClear(){
  playClearSound();launchConfetti();
  document.getElementById('ov-msg').textContent=`レベル ${level} クリア！すごい！`;
  document.getElementById('ov').classList.add('show');
}

function playClearSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.0],[659,.12],[784,.24],[1047,.36],[1319,.50]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='square';o.frequency.value=f;
      const st=ctx.currentTime+t;
      g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.15,st+0.02);
      g.gain.linearRampToValueAtTime(0,st+0.1);
      o.start(st);o.stop(st+0.15);
    });
  }catch{}
}

function launchConfetti(){
  const cols=['#ffcb05','#e74c3c','#3498db','#2ecc71','#9b59b6','#f39c12','#1abc9c'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='confetti';
    const sz=6+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[i%cols.length]};width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*2}s;animation-delay:${Math.random()*.7}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ============================================================
// リセット
// ============================================================
function resetBoard(){
  boardState=Array.from({length:ROWS},()=>Array(COLS).fill(-1));
  pieces.forEach(p=>{p.placed=false;p.rotation=0;});
  dragIdx=null;dragPointerId=null;hideGhost();clearHL();
  renderBoard();renderPalette();setMsg('','');
}

// ============================================================
// ギブアップ
// ============================================================
function giveUp(){
  if(!confirm('ギブアップしますか？'))return;
  boardState=solutionBoard.map(row=>[...row]);
  pieces.forEach(p=>p.placed=true);
  dragIdx=null;dragPointerId=null;hideGhost();clearHL();
  renderBoard();renderPalette();setMsg('これが答えだよ！👀','info');
}

// ============================================================
// 次レベル
// ============================================================
function nextLevel(){
  document.getElementById('ov').classList.remove('show');
  level++;if(level>LEVEL_N.length)level=1;
  initLevel();
}

// ============================================================
// メッセージ
// ============================================================
function setMsg(t,type){const el=document.getElementById('msg');el.textContent=t;el.className=type||'';}

// ============================================================
// リサイズ
// ============================================================
window.addEventListener('resize',()=>{
  CS=calcCS(COLS);
  document.documentElement.style.setProperty('--cs',CS+'px');
  renderBoard();
});

// ============================================================
// スタート
// ============================================================
initLevel();
</script>
