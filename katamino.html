<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KATAMINO-カタミノ-</title>
    <style>
        body { background: #fdf6e3; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; }
        .game-wrapper { background: #fff; padding: 30px; border-radius: 20px; border: 4px solid #ffcb05; text-align: center; }
        #board { display: grid; background: #e0e0e0; gap: 1px; border: 2px solid #333; margin: 20px auto; }
        .cell { width: 40px; height: 40px; background: #fff; }
        .piece { background: #78c850; border: 1px solid #fff; }
        .controls { display: flex; justify-content: center; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 10px; background: #448aff; color: white; border: none; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <h1>KATAMINO-カタミノ-</h1>
    <div id="status">レベル 3: 5つのピースでエリアを埋めよう！</div>
    <div id="board"></div>
    <div class="controls">
        <button onclick="checkAnswer()">回答合わせ</button>
        <button onclick="giveUp()">ギブアップ</button>
    </div>
    <div style="margin-top:20px; font-size:12px;">Version 2.0.0</div>
</div>

<script>
    // レベル設定: 各レベルで埋めるエリアサイズと使用ピース数を定義
    const levels = [
        { id: 1, area: 3, pieces: 3 },
        { id: 3, area: 5, pieces: 5 }, // 画像のように仕切りを動かす
        { id: 10, area: 12, pieces: 12 }
    ];

    function renderBoard(levelIdx) {
        const board = document.getElementById('board');
        const cols = levels[levelIdx].area;
        board.style.gridTemplateColumns = `repeat(${cols}, 40px)`;
        board.innerHTML = '';
        for(let i=0; i<cols*5; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            board.appendChild(cell);
        }
    }

    function giveUp() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, index) => {
            setTimeout(() => {
                cell.classList.add('piece');
            }, index * 100); // 一つずつパズルが配置される演出
        });
    }

    function checkAnswer() {
        alert("🎉 おめでとう！ポケモンマスターのパズル力！ ✨");
    }

    renderBoard(1); // 初期レベル表示
</script>
</body>
</html>
