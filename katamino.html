<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KATAMINO-カタミノ-</title>
    <style>
        body { background-color: #fdf6e3; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: #fff; padding: 25px; border-radius: 30px; border: 5px solid #ffcb05; text-align: center; width: 500px; }
        
        /* ボードの設定 */
        #board { display: grid; border: 3px solid #333; margin: 20px auto; background: #eee; width: fit-content; }
        .cell { width: 35px; height: 35px; border: 0.5px solid #ccc; box-sizing: border-box; }
        .filled { background-color: #ff9d5e; }

        /* ピースの設定 */
        #pieces-area { display: flex; justify-content: center; gap: 15px; margin: 20px; flex-wrap: wrap; }
        .piece { display: grid; grid-template-columns: repeat(3, 12px); gap: 1px; cursor: grab; background: transparent; }
        .p-block { width: 12px; height: 12px; background: #448aff; border-radius: 2px; }

        .btn { padding: 10px 20px; border: none; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>KATAMINO-カタミノ-</h1>
    <div id="status">レベル 1</div>
    <div id="pieces-area"></div>
    <div id="board"></div>
    <div>
        <button class="btn" style="background:#33cc33" onclick="checkAnswer()">回答合わせ</button>
        <button class="btn" style="background:#ff4500" onclick="giveUp()">ギブアップ</button>
        <button class="btn" style="background:#aaa" onclick="location.reload()">戻る</button>
    </div>
    <div style="font-size:12px; color:#888; margin-top:10px;">Version 1.4.0</div>
</div>

<script>
    let level = 1;
    const board = document.getElementById('board');
    const piecesArea = document.getElementById('pieces-area');

    function initLevel() {
        const currentLevel = level > 10 ? Math.floor(Math.random() * 10) + 1 : level;
        document.getElementById('status').innerText = `レベル ${level} (エリア幅: ${3 + (currentLevel - 1)})`;
        
        // ボード生成
        const cols = 3 + (currentLevel - 1);
        board.style.gridTemplateColumns = `repeat(${cols}, 35px)`;
        board.innerHTML = '';
        for(let i=0; i<cols * 5; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.ondragover = (e) => e.preventDefault();
            cell.ondrop = (e) => cell.classList.add('filled');
            board.appendChild(cell);
        }

        // ピース生成（L型を例にしたペンタミノ風）
        piecesArea.innerHTML = '';
        for(let i=0; i<currentLevel; i++) {
            const p = document.createElement('div');
            p.className = 'piece';
            p.innerHTML = '<div class="p-block"></div><div class="p-block"></div><div class="p-block"></div><div class="p-block"></div><div class="p-block"></div>';
            p.draggable = true;
            piecesArea.appendChild(p);
        }
    }

    function checkAnswer() {
        alert("🎉 大正解！ポケモンマスター！ ✨");
        level++;
        initLevel();
    }

    function giveUp() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            setTimeout(() => cell.classList.add('filled'), i * 50);
        });
    }

    initLevel();
</script>
</body>
</html>
