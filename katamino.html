<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KATAMINO-カタミノ-</title>
    <style>
        body { background-color: #fdf6e3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; }
        #game-container { background: #fff; padding: 30px; border-radius: 30px; border: 5px solid #ffcb05; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 80%; max-width: 600px; }
        h1 { color: #3b4cca; }
        #board { display: grid; gap: 2px; margin: 20px auto; background: #ddd; border: 4px solid #333; width: fit-content; }
        .cell { width: 40px; height: 40px; background: #fff; }
        .filled { background-color: #ff9d5e; border-radius: 5px; }
        .controls button { padding: 12px 25px; margin: 10px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; }
        #check-btn { background: #33cc33; }
        #giveup-btn { background: #ff4500; }
        #back-btn { background: #aaa; }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>KATAMINO-カタミノ-</h1>
    <div id="status">レベル 1</div>
    <div id="board"></div>
    <div class="controls">
        <button id="check-btn" onclick="checkAnswer()">回答合わせ</button>
        <button id="giveup-btn" onclick="giveUp()">ギブアップ</button>
        <button id="back-btn" onclick="location.reload()">戻る</button>
    </div>
    <div style="margin-top:20px; font-size: 12px; color: #888;">Version 1.2.0</div>
</div>

<canvas id="confetti"></canvas>

<script>
    let level = 1;
    const board = document.getElementById('board');
    const status = document.getElementById('status');

    function createBoard() {
        const cols = 3 + (level - 1);
        board.style.gridTemplateColumns = `repeat(${cols}, 40px)`;
        board.innerHTML = '';
        for(let i=0; i<cols * 5; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            board.appendChild(cell);
        }
        status.innerText = `レベル ${level}: このエリアをピースで埋めよう！`;
    }

    function checkAnswer() {
        alert("🎉 おめでとう！ポケモンゲットだぜ！ ✨");
        if(level < 10) {
            level++;
            createBoard();
        }
    }

    function giveUp() {
        const cells = document.querySelectorAll('.cell');
        let i = 0;
        const timer = setInterval(() => {
            if(i < cells.length) {
                cells[i].classList.add('filled');
                i++;
            } else {
                clearInterval(timer);
            }
        }, 100);
    }

    createBoard();
</script>
</body>
</html>
