<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KATAMINO-カタミノ-</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #fdf6e3; font-family: 'Arial', sans-serif; 
        }
        #game-container { 
            background: #fff; padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
        }
        #board { 
            display: grid; margin: 20px auto; border: 4px solid #ffcb05; 
            background: #fff8e1; border-radius: 8px;
        }
        .cell { width: 40px; height: 40px; border: 1px solid #ffe082; box-sizing: border-box; }
        .filled { background-color: #78c850; border-radius: 4px; }
        .controls { margin-top: 20px; }
        button { 
            padding: 10px 20px; margin: 5px; border: none; border-radius: 10px; 
            background: #448aff; color: white; cursor: pointer; font-weight: bold;
        }
        #message { font-size: 20px; color: #d32f2f; margin: 10px; height: 30px; }
        #version { margin-top: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>KATAMINO-カタミノ-</h1>
    <div id="level-display">レベル: 1 (スペース: 3x5)</div>
    <div id="message"></div>
    <div id="board"></div>
    
    <div class="controls">
        <button onclick="checkAnswer()">回答をチェック</button>
        <button onclick="giveUp()">ギブアップ</button>
        <button onclick="location.reload()">戻る</button>
    </div>
    <div id="version">Version 1.1.0</div>
</div>

<script>
    let level = 1;
    const board = document.getElementById('board');
    
    function createBoard() {
        const rows = 3;
        const cols = 3 + level; // レベルで横幅が広がる
        board.style.gridTemplateColumns = `repeat(${cols}, 40px)`;
        board.innerHTML = '';
        for(let i=0; i<rows*cols; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            board.appendChild(cell);
        }
    }

    function checkAnswer() {
        document.getElementById('message').innerText = "おめでとう！ポケモンゲット！";
        // ここに派手な演出（紙吹雪など）の処理
    }

    function giveUp() {
        const cells = document.querySelectorAll('.cell');
        let i = 0;
        const interval = setInterval(() => {
            if(i < cells.length) {
                cells[i].classList.add('filled');
                i++;
            } else {
                clearInterval(interval);
            }
        }, 200);
    }

    createBoard();
</script>
</body>
</html>
