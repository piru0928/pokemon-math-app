<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>とけいマスター Pro</title>
  <style>
    body { font-family: "Arial", sans-serif; background-color: #f0f4f8; text-align: center; padding: 10px; margin: 0; overflow-x: hidden; }
    #clock-box {
      background: #fff; border: 4px solid #3498db; padding: 20px;
      margin: 10px auto; max-width: 320px; border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    canvas { max-width: 100%; height: auto; }
    #question-text { font-size: 18px; margin: 10px; font-weight: bold; color: #e67e22; }
    
    /* 入力エリア */
    .input-container { margin: 15px 0; font-size: 24px; font-weight: bold; }
    .input-container input {
      width: 60px; font-size: 24px; padding: 5px; text-align: center;
      border: 3px solid #3498db; border-radius: 10px; outline: none;
    }
    #check-button {
      padding: 10px 30px; font-size: 18px; background-color: #e67e22;
      color: white; border: none; border-radius: 10px; cursor: pointer;
    }

    #status-row { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
    #explanation { background: #fdf2f2; border: 2px solid #e74c3c; padding: 15px; margin: 10px auto; max-width: 500px; border-radius: 10px; display: none; text-align: left; }
    #pokemon-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #f1c40f; background: #fff; }
    #next-button { margin-top: 10px; padding: 12px 30px; font-size: 18px; background-color: #3498db; color: white; border: none; border-radius: 30px; cursor: pointer; display: none; }
    
    /* スペシャル演出用のエフェクト */
    @keyframes celebrate {
      0% { transform: scale(1); background-color: #f0f4f8; }
      50% { transform: scale(1.05); background-color: #fff9c4; }
      100% { transform: scale(1); background-color: #f0f4f8; }
    }
    .special-mode { animation: celebrate 0.5s ease 3; }
    .confetti { position: fixed; width: 10px; height: 10px; background-color: #f1c40f; z-index: 999; pointer-events: none; }

    ruby rt { font-size: 0.5em; color: #34495e; }
  </style>
</head>
<body>
  <h1>🕒 とけいマスター Pro</h1>
  
  <div id="status-row">
    Combo: <span id="cb">0</span>
  </div>

  <div id="clock-box">
    <canvas id="clockCanvas" width="300" height="300"></canvas>
  </div>

  <div id="question-text"><ruby>何時<rt>なんじ</rt></ruby><ruby>何分<rt>なんぷん</rt></ruby>かな？</div>

  <div id="input-area" class="input-container">
    <input type="number" id="ans-h" min="1" max="12"> 時 
    <input type="number" id="ans-m" min="0" max="59"> 分
    <br><br>
    <button id="check-button" onclick="checkAnswer()">こたえる！</button>
  </div>

  <div id="explanation"></div>
  <div id="result-area">
    <img id="pokemon-img" src="" alt="" style="display:none;">
    <h2 id="special-msg" style="color:#e74c3c; display:none;">🎉 スペシャルコンボ！ 🎉</h2>
  </div>
  
  <button id="next-button" onclick="generateQuestion()">つぎへ</button>

  <script>
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) { this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2); }
        else { this._note(200, 'sawtooth', now, 0.3); }
      },
      fanfare() {
        const now = this.ctx.currentTime;
        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => this._note(f, 'sine', now + i*0.1, 0.2));
      }
    };

    let targetH, targetM;
    let combo = 0;

    function drawClock(h, m) {
      const canvas = document.getElementById("clockCanvas");
      const ctx = canvas.getContext("2d");
      const radius = canvas.width / 2;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 時計盤
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 10, 0, 2 * Math.PI);
      ctx.fillStyle = "white"; ctx.fill();
      ctx.lineWidth = 5; ctx.strokeStyle = "#333"; ctx.stroke();

      // 数字
      ctx.font = "bold 20px Arial"; ctx.fillStyle = "#2c3e50";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      for (let n = 1; n <= 12; n++) {
        let ang = n * Math.PI / 6;
        ctx.fillText(n, radius + Math.sin(ang)*(radius-35), radius - Math.cos(ang)*(radius-35));
      }

      // 針の描画 (短針は分の進み具合で少し動く)
      drawHand(ctx, radius, (h % 12 + m / 60) * Math.PI / 6, radius * 0.5, 8, "#2c3e50");
      drawHand(ctx, radius, m * Math.PI / 30, radius * 0.8, 5, "#e67e22");
      
      ctx.beginPath(); ctx.arc(radius, radius, 8, 0, 2 * Math.PI);
      ctx.fillStyle = "#333"; ctx.fill();
    }

    function drawHand(ctx, center, pos, length, width, color) {
      ctx.beginPath(); ctx.lineWidth = width; ctx.lineCap = "round"; ctx.strokeStyle = color;
      ctx.moveTo(center, center);
      ctx.lineTo(center + Math.sin(pos)*length, center - Math.cos(pos)*length);
      ctx.stroke();
    }

    function generateQuestion() {
      document.body.classList.remove("special-mode");
      document.getElementById("special-msg").style.display = "none";
      document.getElementById("explanation").style.display = "none";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("input-area").style.display = "block";
      document.getElementById("ans-h").value = "";
      document.getElementById("ans-m").value = "";
      
      targetH = Math.floor(Math.random() * 12) + 1;
      const mOptions = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
      targetM = mOptions[Math.floor(Math.random() * mOptions.length)];

      drawClock(targetH, targetM);
    }

    function checkAnswer() {
      const userH = parseInt(document.getElementById("ans-h").value);
      const userM = parseInt(document.getElementById("ans-m").value);

      if (isNaN(userH) || isNaN(userM)) {
        alert("数字を入力してね！");
        return;
      }

      document.getElementById("input-area").style.display = "none";
      const expBox = document.getElementById("explanation");
      expBox.style.display = "block";

      if (userH === targetH && userM === targetM) {
        combo++;
        Buzzer.play(true);
        expBox.innerHTML = `<strong>✨ 正解！ ${targetH}時${targetM}分 です。</strong>`;
        
        // スペシャル演出（5の倍数コンボ）
        if (combo > 0 && combo % 5 === 0) {
          triggerSpecialEffect();
        }

        const pokeId = Math.floor(Math.random() * 151) + 1;
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeId}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
      } else {
        combo = 0;
        Buzzer.play(false);
        expBox.innerHTML = `<strong>❌ おしい！ 正解は ${targetH}時${targetM}分 でした。</strong>`;
      }

      document.getElementById("cb").innerText = combo;
      document.getElementById("next-button").style.display = "inline";
    }

    function triggerSpecialEffect() {
      Buzzer.fanfare();
      document.body.classList.add("special-mode");
      document.getElementById("special-msg").style.display = "block";
      
      // 紙吹雪（簡易版）
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-10px";
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
        document.body.appendChild(confetti);
        
        const animation = confetti.animate([
          { transform: 'translateY(0) rotate(0)' },
          { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)` }
        ], { duration: 2000 + Math.random() * 1000 });
        
        animation.onfinish = () => confetti.remove();
      }
    }

    window.onload = generateQuestion;
  </script>
</body>
</html>
