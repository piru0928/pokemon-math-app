<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>たしざん：ステップアップ</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: "Arial", sans-serif;
      background-color: #fff8e1;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #ef6c00; margin-bottom: 10px; }
    #level-display { font-size: 20px; font-weight: bold; color: #d84315; margin-bottom: 5px; }
    #question { font-size: 32px; margin: 20px; font-weight: bold; }
    
    /* 入力エリア */
    #answer-display {
      font-size: 36px;
      background: white;
      border: 3px solid #ffcc80;
      border-radius: 10px;
      width: 200px;
      height: 60px;
      margin: 10px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #333;
    }

    /* ナンバーキー */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 70px);
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .num-btn {
      width: 70px;
      height: 60px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      background-color: #fff;
      border: 2px solid #ffcc80;
      border-radius: 10px;
      box-shadow: 0 4px #fb8c00;
    }
    .num-btn:active { transform: translateY(2px); box-shadow: 0 2px #fb8c00; }
    .num-btn.clear { background-color: #ffe0b2; }
    .num-btn.submit { background-color: #ffb74d; grid-column: span 3; width: 230px; margin-top: 5px; }

    #result { font-size: 22px; margin-top: 15px; color: #4caf50; font-weight: bold; min-height: 30px; }
    #pokemon-area { margin-top: 15px; }
    #pokemon-img { width: 120px; height: 120px; background: white; border-radius: 50%; border: 4px solid #ffeb3b; display: none; }
    #pokemon-name { font-size: 20px; font-weight: bold; color: #e74c3c; margin-top: 5px; }

    #next-button {
      margin-top: 20px; padding: 12px 40px; font-size: 18px;
      background-color: #4caf50; color: white; border: none; border-radius: 30px; cursor: pointer; display: none;
    }
    #status { margin: 10px; font-size: 16px; color: #555; }
    #version-info { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #90a4ae; }
  </style>
</head>
<body>
  <div id="version-info">Ver 2.0.0 | Updated: 2026-05-11 06:45</div>
  
  <h1>➕ たしざんクイズ</h1>
  <div id="level-display">レベル 1</div>
  <div id="status">ただいま 0もんせいかい！</div>
  
  <div id="question">読み込み中...</div>
  <div id="answer-display"></div>

  <div id="controls">
    <div class="numpad">
      <button class="num-btn" onclick="addNum(1)">1</button>
      <button class="num-btn" onclick="addNum(2)">2</button>
      <button class="num-btn" onclick="addNum(3)">3</button>
      <button class="num-btn" onclick="addNum(4)">4</button>
      <button class="num-btn" onclick="addNum(5)">5</button>
      <button class="num-btn" onclick="addNum(6)">6</button>
      <button class="num-btn" onclick="addNum(7)">7</button>
      <button class="num-btn" onclick="addNum(8)">8</button>
      <button class="num-btn" onclick="addNum(9)">9</button>
      <button class="num-btn clear" onclick="clearNum()">C</button>
      <button class="num-btn" onclick="addNum(0)">0</button>
      <button class="num-btn submit" onclick="checkAnswer()">けってい</button>
    </div>
  </div>

  <div id="result"></div>
  <div id="pokemon-area">
    <img id="pokemon-img" src="" alt="">
    <div id="pokemon-name"></div>
  </div>

  <button id="next-button" onclick="newQuestion()">つぎのもんだいへ！</button>
  <br><br>
  <a href="index.html">← トップページへ</a>

  <script>
    let num1, num2, correctAnswer;
    let correctStreak = 0;
    let userTyped = "";
    let currentLevel = 1;

    // 電子ブザー音生成
    const Buzzer = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      _note(freq, type, start, duration) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
        osc.start(start); osc.stop(start + duration);
      },
      play(correct) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        if (correct) {
          this._note(880, 'sine', now, 0.1); this._note(1100, 'sine', now + 0.1, 0.2);
        } else {
          this._note(200, 'sawtooth', now, 0.2); this._note(150, 'sawtooth', now + 0.2, 0.3);
        }
      }
    };

    async function fetchPokemonName(number) {
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${number}`);
        const data = await res.json();
        return data.names.find(n => n.language.name === "ja")?.name || "ポケモン";
      } catch { return "ポケモン"; }
    }

    function addNum(n) {
      if (userTyped.length < 3) {
        userTyped += n;
        document.getElementById("answer-display").textContent = userTyped;
      }
    }

    function clearNum() {
      userTyped = "";
      document.getElementById("answer-display").textContent = "";
    }

    function newQuestion() {
      // レベル決定
      if (correctStreak < 5) {
        currentLevel = correctStreak + 1;
      } else {
        currentLevel = Math.floor(Math.random() * 5) + 1;
      }

      // レベルごとの範囲設定
      switch(currentLevel) {
        case 1: // 1~5
          num1 = Math.floor(Math.random() * 5) + 1;
          num2 = Math.floor(Math.random() * 5) + 1;
          break;
        case 2: // 1~10
          num1 = Math.floor(Math.random() * 10) + 1;
          num2 = Math.floor(Math.random() * 10) + 1;
          break;
        case 3: // 1~20 (桁上がりなし)
          num1 = Math.floor(Math.random() * 9) + 1; // 1~9
          num2 = Math.floor(Math.random() * (10 - (num1 % 10))); // 1の位を足して10にならない範囲
          if(num1 < 10) num1 += 10; // 片方を10台にする
          break;
        case 4: // 1~20 (桁上がりあり)
          num1 = Math.floor(Math.random() * 15) + 3;
          num2 = Math.floor(Math.random() * 10) + 5;
          while(num1 + num2 > 20) { num1--; }
          break;
        case 5: // 1~100
          num1 = Math.floor(Math.random() * 50) + 1;
          num2 = Math.floor(Math.random() * 50) + 1;
          break;
      }

      correctAnswer = num1 + num2;
      userTyped = "";
      
      document.getElementById("level-display").textContent = `レベル ${currentLevel}`;
      document.getElementById("question").textContent = `${num1} ＋ ${num2} ＝ ？`;
      document.getElementById("answer-display").textContent = "";
      document.getElementById("result").textContent = "";
      document.getElementById("pokemon-name").textContent = "";
      document.getElementById("pokemon-img").style.display = "none";
      document.getElementById("next-button").style.display = "none";
      document.getElementById("controls").style.display = "block";
      
      updateStatus();
    }

    async function checkAnswer() {
      if (userTyped === "") return;
      
      const selected = parseInt(userTyped);
      document.getElementById("controls").style.display = "none";

      if (selected === correctAnswer) {
        correctStreak++;
        Buzzer.play(true);
        document.getElementById("result").textContent = "✨ せいかい！";
        
        // 図鑑No.に合わせたポケモン表示
        const pokeNum = Math.min(correctAnswer, 1025);
        const name = await fetchPokemonName(pokeNum);
        document.getElementById("pokemon-img").src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeNum}.png`;
        document.getElementById("pokemon-img").style.display = "inline";
        document.getElementById("pokemon-name").textContent = `ずかんNo.${pokeNum}：${name}`;
        
        if (correctStreak === 5) {
          document.getElementById("result").innerHTML += "<br>🎉 5もんクリア！マスターモード突入！";
          localStorage.setItem("cleared-addition-stepup", "true");
        }
      } else {
        correctStreak = 0;
        Buzzer.play(false);
        document.getElementById("result").textContent = `残念！ こたえは ${correctAnswer} だよ`;
      }
      
      updateStatus();
      document.getElementById("next-button").style.display = "inline";
    }

    function updateStatus() {
      document.getElementById("status").textContent = `ただいま ${correctStreak}もん れんぞくせいかい！`;
    }

    window.onload = newQuestion;
  </script>
</body>
</html>
